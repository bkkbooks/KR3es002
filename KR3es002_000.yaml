front:
  text: 序夫天地生人古今壽夭不齊其故何也淳漓一變修短殊途矣言仁術者輯醫藥之書以救夭枉莫不首稱素難次述漢唐爰及歷代名賢之說摭拾成帙為後學之津梁其功豈不偉哉然而方宜有不同老壯之非一山居與城市異治膏粱與藜藿分途氣運之變遷時代之降升人生氣交之中其稟賦厚薄疾疚淺深與氣機相流轉未易明也至如張子和專工吐下非不名家劉守真以暑火立論動輒芩連李杲出而闡發脾胃參耆是賴朱丹溪惟事清涼不離知柏此四賢者皆足以起沉疴而安衽席豈有意於立異鳴高哉因時制宜濟世之心切不期然而然者也今之人執古法以施治將以生人者殺人於反掌翻疑古人之不足法豈其然歟前人有拆舊料蓋新房之喻繩尺不越軒檻殊觀焉運用在一心臨證如臨敵選藥如選將求其至當而後已新安羅東逸輯有名醫匯粹至當之書也咀啜近代之精華不言軒岐而經旨悉具金匱千金之方雖篇目不列而治法無遺信可謂醫學之金針迷途之寶筏矣世無刊本抄錄相沿亥豕魯魚閱者攢眉苕溪友人出所藏善本校訂精詳亟付剞劂以廣其傳未必非濟世之一助云道光三年歲次癸未正月嘉興盛新甫撰
