body:
  text: 卷七病能集五雜證十門遺溺張景嶽曰遺溺有睡中自遺有氣門不固而不禁又有氣脫於上下焦不約而遺三者皆虛有輕重之辨睡遺者幼稚多有之氣壯而固自愈若水泉不止膀胱不藏氣虛也蓋氣為水母水不蓄以氣不固更至無所知覺此虛極也又年衰大病後多有之仲景曰下焦竭則遺溺失禁也古方有虛實之論不知不禁多屬虛寒若淋瀝痛澀方是熱證勿以遺失誤用涼藥又古方多用固澀此治標法也小水雖主於腎而腎上連肺若肺氣無權則腎水必不能攝故治水必須治氣宜參耆歸朮桂附乾薑之屬為主佐以固澀之劑赤白濁遺精李士材曰赤白濁按經文前哲所論而知濁病即精病非溺病也故患濁者莖中如刀割火灼而溺清惟竅端時有穢物如瘡之膿如目之眵淋漓不斷與便溺絶不相混大抵精敗而腐者十之六也由濕熱流注與虛者十之二三其有赤白之分者何也精者血之所化濁氣太多精化不及赤未變白故成赤濁此虛之甚也所以少年天癸未至強力行房所泄半精半血壯年施泄無度亦多精血雜出則知丹溪以赤屬血白屬氣者未盡善也又以赤為心虛有熱由思慮而得白為腎虛有寒因嗜欲而得亦非確論總之心動於欲腎傷於色或強忍房事或多服淫方敗精流溢乃為白濁虛滑者血不及變乃為赤濁挾寒則脈來沉遲無力小便清白萆薢分清飲八味丸內補鹿茸丸之類挾熱則口渴便赤脈必滑數有力清心蓮子飲香苓散有胃中濕痰流注蒼白二陳湯加升紫有屬虛勞六味加蓮鬚芡實菟絲子五味龍骨牡蠣有因伏暑四苓散加香薷麥冬人參石蓮之類有稠黏如膏澀痛異常乃精塞竅道香苓散送八味丸或金匱腎氣丸有熱者萆薢分清飲茯菟丸有思想太過心動煩擾則精敗下焦加味清心飲瑞蓮丸之類如上數端此其大略也若夫五臟之傷六淫之感更難以枚舉慎勿輕忽遺精古今方論皆以遺精為腎氣衰弱之病若與他臟不相干涉不知內經言五臟六腑各有精腎則受而藏之以不夢而自遺者心腎之傷居多夢而後遺者相火之強為害若夫五臟各得其職則精藏而治苟一臟不得其正甚則必害心腎之主精者焉治之之法獨因腎病而遺者治其腎由他臟而致者則他臟與腎兩治之如心病而遺者必血脈空虛本縱不收肺病而遺者必皮革毛焦喘急不利脾病而遺者色黃肉消四肢懈惰肝病而遺者色青而筋痿腎病而遺者色墨而髓空更當六脈參詳然所因病更多端有用心過度心不攝腎而失精者宜遠志丸佐以靈砂丹有色欲不遂而致精泄者四七湯吞白丸子甚者耳聞目見其精自出名曰白淫妙香散吞玉華白丹有色欲過度精竅虛滑正元散加牡蠣粉肉蓯蓉各半錢吞靈砂丹仍佐以鹿茸丸山藥丸大菟絲子丸固陽丸之類有壯年久曠精滿而溢清心丸有飲酒厚味痰火濕熱擾動精府二朮二陳升柴俾清升濁降脾胃健運則遺滑自止矣有脾虛下陷者補中益氣湯有腎虛不固者五倍子二兩茯苓四兩為丸服之神驗然其證亦復不同或小便後出多不可禁者或不小便而自出或莖中癢痛如欲小便者或夢女交者並從前法中分別施治總共大綱言之精滑宜澀之不效即瀉心火不效即以補中益氣舉其氣上而不下往往有功王節齊曰夢遺滑精世人多作腎虛治而用補腎澀精之藥不效殊不知此證多屬脾胃飲食厚味痰火濕熱之人多有之蓋腎藏精精之所生由脾胃飲食化生而輸歸於腎今脾胃傷於濃厚濕熱內郁中氣濁而不清則其所化生之精亦得濁氣腎主閉藏臟靜則寧今所輸之精既有濁氣則邪火動於腎中而水不得寧靜故遺而滑也此症與白濁同丹溪論白濁為腎中濁氣下流滲入膀胱而云無人知此也其有色心太重妄想過用而致遺滑者自從心腎治但兼肺胃者不少要當審察張介賓曰夢遺精滑總皆失精之病無不始由於心心為君火腎為相火心動腎必應之凡少年多欲妄想多致此然精之藏蓄在腎而主宰在心精之蓄泄聽命於心治此宜淨心為要遺精有九有注戀而夢者此精為神動因於心有欲事不遂而夢者此精失其位因於腎有勞倦即遺此肝脾氣弱也思慮而遺心脾虛陷也濕熱下流相火妄動肺腎之火不清也有無故滑而不禁此下元虛腎肺不固也有素稟不足而精滑者此先天元氣薄也有久服冷利等藥元陽失守而滑也有年壯節欲而遺精滿而溢也諸症五臟皆有所主心主神肺主氣脾主濕肝主疏泄腎主閉藏當各求其所因治之夢遺有情有火情動者清心精動者固腎滑精無非因腎氣不守而然若暴滑兼痛當從赤白濁論治凡勞倦思慮每觸即遺當補心脾歸脾湯去木香氣分稍滯不堪耆者人參吞茯苓白朮菟絲丸凡心火甚者清火相火甚者壯水氣焰者升舉滑泄者固澀濕熱乘者分利虛寒利者溫補下元元陽不足精氣兩虛專培根本若概用坎離丸輩苦寒適害腎耳濁症有赤白精溺之辨赤者多由於火白者寒熱俱有由精者在心腎由溺者在膀胱肝脾有濁在溺者色白如泔凡肥甘辛熱所致此濕熱由內生也宜清之柯韻伯曰白赤濁之病有傷精傷血之分由腎肝相火搖動之所致也夫腎者作強之官其人或妄想淫欲或好為陰陽腎火內熾不能藏精強忍其精而精逆焉精未泄而離其處不復仍歸於腎乃滲入於水道與小便同出敗精雖出腎火內蘊因之竅孔不閉熱虛相搏新精虛應之淋瀝不止因名為白濁肝者罷極之本其人或勞役苦辛或惱怒內傷肝火下流不能藏血熱傷陰絡而血溢焉血未行而離其經不得反於肝亦滲入於水道合小便同出敗血雖盡陰絡未完肝極不攝鬱火內守復以新血繼之浸淫不絶是名曰赤濁白濁與遺精膏淋不同赤濁與血淋尿血亦異治之必當兼浚其源源者何至陰是也脾為陰中之至陰精血所由生又腎為陰中之太陰精為陰中之陰肝為陰中之少陽血為陰中之陽故白濁當理脾腎之陰法在滋陰降火先用導赤散加知柏以清之繼用六味加五味子以收之而精自藏矣赤濁當理脾肝二陰法在升陽散火先用逍遙散加丹皮以清之繼用補中益氣加白芍以收之而血自藏矣夫下者舉之白濁用補中益氣湯而不應是陰虛不宜升助陽則陰愈虛也赤濁用六味湯而無不平復者是虛則補母之法癸乙同歸一治也至於脾虛不能散精歸肺以致濕熱下流而然所謂中氣不足而溲便為之變也嬰兒最多此症宜四君子倍茯苓加升麻砂仁主之則水精四布膀胱得氣化而清出矣腦漏證繆仲淳曰腦者諸陽之會而為髓之海其位高其氣清忽下濁者其變也東垣云上焦元氣不足則腦為之不滿經云膽移熱於腦為鼻淵夫髓者至精之物為水之屬腦者至陽之物清氣所居今為濁氣邪熱所幹遂下臭濁之汁是火能消物腦有所傷也治法先宜清肅上焦氣道以鎮墜心火補養水源此其大略耳藥多取夫辛涼者辛為金而入肺有清肅之義故每用以升散上焦之邪如薄荷荊芥甘菊連翹升麻黏子天麻之屬鎮墜心火補養水源如犀角人參天冬麥冬五味硃砂甘草山藥生地茯苓丹皮之屬然須兼理乎肺肝蓋鼻乃肺之竅而為腦氣宣通之路又治乎上焦而行清肅之令膽為春升少陽之氣與厥陰為表裡而上屬於腦戴人有云膽與三焦尋火治內經謂膽移熱所幹義亦明矣理肺用桑皮黏子桔梗二冬花粉竹瀝清肝膽以柴胡白芍羚羊角竹茹棗仁川芎或者又謂世人多用辛溫辛熱之藥取效以辛熱甘溫多能宣通發散故病之微者亦能奏效耳此從治劫法非不易常經明者察之痧疹繆仲淳曰痧疹者手太陰肺足陽明胃二經之火熱發而為病者也小兒居多大人亦時有之殆時氣瘟疫之類歟其症類多咳嗽多嚏眼中如淚多泄瀉多痰多熱多渴多煩悶甚則躁亂咽痛唇焦神昏是其候也治法當以清涼發散為主用藥辛寒甘寒苦寒以升發之惟忌酸收最宜辛散誤施溫補禍不旋踵辛散如荊芥穗乾葛西河柳石膏麻黃鼠黏子清涼如元參花粉薄荷竹葉青黛甘寒如麥冬生甘草蔗漿苦寒如黃芩黃連貝母連翹皆應用之藥也蓋肺胃熱邪初發時必咳嗽宜清熱透毒不得止嗽疹後咳嗽但用貝母花粉甘草麥冬苦梗元參薄荷以清餘熱消痰壅則易愈慎勿用五味子等收斂之劑多喘喘者熱邪壅於肺故也慎勿用定喘藥惟應大劑竹葉石膏湯加西河柳兩許元參薄荷各二錢如天寒甚痧毒為寒氣鬱於內不得透出者加蜜酒炒麻黃一劑立止凡熱勢甚者即用白虎湯加西河柳忌用升麻服之必喘多泄瀉慎勿止瀉慎用黃連升麻乾葛甘草則瀉自止疹家不忌瀉瀉則陽明之熱邪得解是亦表裡分消之義也痧後泄瀉及便膿血皆由熱邪內陷故也大忌止澀惟宜升散仍用升麻乾葛白芍甘草扁豆黃連便膿血則加滑石末必自愈痧後牙疳最危外用雄黃牛糞尖煅存性研極細加真腦片一分研勻吹之內用連翹荊芥元參乾葛升麻黃連甘草生地水煎加生犀角汁一二匙調服緩則不可救痧後元氣不復脾胃虛弱宜用白芍炙草為君蓮肉扁豆山藥青黛麥冬龍眼肉為臣多服必漸強慎勿輕用參術痧後生瘡不已餘熱未盡故也宜用銀花荊芥元參甘草生地鱉蝨胡麻川連木通濃煎飲之良痧疹不宜依證施治惟當治本本者手太陰足陽明二經之邪熱也解其邪熱則諸症自除矣厲風鶴膝風朱丹溪曰大風病是受得天地間殺物之風古人謂之厲風者以其酷烈暴悍可畏耳人得之者須分在上在下夫在上者以醉仙散取臭涎惡血於齒縫中出在下者以通天再造散取惡物陳蟲於穀道中出所出雖有上下道路之殊然皆不外乎陽明一經治此病者須知此意看其疙瘩與瘡若上先見者上體多者在上也若下先見者下體多者在下也上下同得者在上覆在下也陽明胃經與大腸無物不受此風之入人也氣受之則在上多血受之則在下多氣血俱受者甚重古人謂大風疾三因五死三因者一曰風毒二曰濕毒三曰傳染五死者一曰皮死麻木不仁二曰脈死血潰成膿三曰肉死割切不痛四曰筋死手足縱緩五曰骨死鼻梁崩塌與夫眉落眼昏唇翻聲噎甚可畏也所以然者由邪正交攻氣血沸騰而濕痰死血充滿於經絡之中故生蟲生瘡痛癢麻木也夫從上從下皆是可治之病人見病勢之緩多忽之治療大法內通臟腑外發經絡按法施治亦須首尾斷酒戒色忌食發風動氣葷腥鹽醬炙爆生冷之物消心寡欲方得無虞也喻嘉言曰凡治厲風之法以清營衛為主其汗宜頻發血宜頻刺皆清營衛之捷法也生蟲由於肺熱其清肅之令不行故由皮毛漸及腠理腸胃莫不有蟲消其金則蟲不驅自熄試觀金風一動旱魃絶蹤其理明矣然清肺亦必先清營衛之氣蓋營衛之氣腐而不清傳入於肺先害其消肅之令故也苦藥雖能瀉肺殺蟲亦能傷胃不可久服胃者營衛從出之源也久服苦寒腐敗壅鬱不可勝言矣所以苦參丸之類營衛素弱穀食不充之人不宜久服也大楓子油最能殺蟲驅風然復過於辛熱風未除而自先壞者多矣其硫黃酒服之必致腦裂之禍又醉仙散入輕粉和末日進三服取其人昏昏苦醉毒涎從齒縫中出癘未除而齒先落矣蓋除癘之藥服之近而少癘必不除服之久且多癘雖除藥之貽害更大惟易老驅風丸東坡四神丹二方可久服且非極意懲創之人不可與治也鶴膝風即風寒濕之痹於膝者也如膝骨日大上下肌肉日枯細者且未可治其膝先養血氣俾肌肉漸營後治其膝可也此與治左右半身偏枯之症大同夫既偏枯矣急溉其未枯者然後既枯者得以通氣而復營倘不知從氣引血從血引氣之法但用麻黃防風等散風之劫藥鮮不有全枯而速死者故治鶴膝風而亟攻其痹必並其足痿不用矣古方治小兒鶴膝風用六味加鹿茸牛膝共八味不治其風其意最善小兒非必為風寒濕所痹多因先天所稟腎氣衰薄陰寒凝聚於腰膝而不解從外可知其內也故以六味丸補腎中之水以鹿茸補腎中之火以牛膝引至骨節而壯裹擷之筋此治本不治標之良法也舉此為例面病張景嶽曰形色者氣之質神之華而皆見於面然易見者形中之色而難辨者色中之神凡病人面赤氣盛必火證兩顴鮮赤如脂如縷餘地不赤者陰虛如面紅不退邪甚病進為難愈面色白氣虛白兼淡黃而氣不足必失血面白枯血氣俱敗證有痰火尤難治面青兼白陽虛陰勝面黃潤微赤必主濕熱面黃兼青木邪犯土多不可治面色青蒼主疼痛病瘥而面色如煤終凶平人面色如塵眼下青黑病至必重女人色青必肝強脾弱多怒少食或經脈不調顴頰鮮紅有虛火若久病人面轉黃蒼此欲愈也面腫有虛實腫為實浮為虛實為風火上炎脈緊數症寒熱或清或散或下邪去而腫自消虛浮者無痛無熱面目浮肺因脾肺陽虛輸化失常或肝腎陰虛水邪泛溢然浮而就上其形虛軟者多由乎氣腫而就下按而成窩者多由乎水實而調之泄之氣虛補之水虛化之然水氣有相因之治不可執也眼下如臥蠶者亦水病氣浮亦有虛實虛者多因乎脾或勞倦色欲或瀉痢中寒所致脈必微弱氣必虛餒實者多因乎胃或木火熾盛或縱酒縱食脈必滑數症必多熱目證趙養癸曰經曰五臟六腑之精皆上注於目而為之精腎藏精故治目者以腎為主目雖肝之竅子母相生腎肝同一治也華元化云目形類丸瞳神居中而前如日月之麗東南而晦西北也有神膏神水神光真氣真血真精此滋目之源液山神膏者目內包涵膏液此膏由膽中滲潤精汁而成者能涵養瞳神衰則有損神水者由三焦而發源先天真一元氣所化目上潤澤之水是也水衰則有火勝燥暴之患水竭則有目輪大小之疾耗澀則有昏眇之危虧多益少是以世無全精之目神光者原於命門通於膽發於心火之用事也火衰則有昏瞑之患火炎則有焚燥之殃雖有兩心而無正輪心君主也通於大眥故大眥赤者實火也命門為小心小心相火也代君行令通於小眥故小眥赤者虛火也若君主拱默則相火自然清寧矣真血者即肝中升運滋目注絡之血也此血非比肌肉間易行之血即天一所生之水故謂之真也真氣者即目之經絡中往來生用之氣乃先天真一發生之元陽也真精者乃先天元氣所化精汁起於腎施於膽而後及瞳神也乃此數者一有損目則病矣大概目圓而長外有堅殼數重中有消脆肉包黑稠神膏一函膏外則白稠神水水以滋膏水外則皆血血以滋水膏中一點黑瑩是腎膽所聚之精華惟此一點燭照鑑視空闊無窮者是曰水輪內應於腎北方壬癸亥子之水也五輪之中惟瞳神乃照或曰瞳神水耶氣耶血耶膏耶曰非氣非血非水非膏乃先天之氣所生後天之氣所成陰陽之妙蘊水火之精華血養水水養膏膏護瞳神氣為運用神即維持喻以日月理實同之男子右目不如左目精華女子左目不如右目光彩此皆各得其陰陽氣分之正也許學士云經曰足少陰之脈是動則病坐而欲起目䀮䀮如無所見又曰少陰所謂起則目䀮䀮無所見者陰內奪故目䀮䀮無所見也此蓋房勞目昏也左腎陰虛益陰地黃丸六味丸右腎陽虛八味丸補腎丸東垣曰能遠視而不能近視者陽有餘陰氣不足也陰精不足陽光有餘病於水者此光華髮見散亂而不能收斂近視治之在心腎心腎平則水火調而陰陽和夫水之所化為血在身為津液在目為膏汁若貪淫欲飢飽失節形脈勞甚過於悲泣能斫喪真陰陰精虧則陽火盛火性炎而發見陰精不能制伏挽回故越於外而遠照不能近之而反視也治之當壯水之主以制陽光能近視不能遠視陽不足陰氣有餘也陽不足陰有餘病於火者故光華不能發越於外而猥斂近視耳治之在膽腎膽腎足則木火通明神氣宣暢而精華遠達矣夫心之所用為氣在身為威儀在目為神光若縱恣色欲喪其元陽元陽既憊則云霾陰翳腎中之陰水僅足以回光自照耳焉能健運精汁以滋於膽而使水中之火遠布於空中治之當益火之源以消陰翳以上諸證皆陰弱不能配陽內障之病其病無眵淚痛癢羞明緊澀之證初但昏如霧露中行漸空中有黑花又漸睹物成二體又則光不收遂為廢疾患者宜養先天根本乘其初時而治之況此病最難療服藥必積歲月絶酒色毋飢飽勞役驅七情五賊庶幾有效不然終不復也世人不察謂目昏無傷及病成翳直曰熱致竟用涼藥藥又傷胃況涼為秋金肝為春木又傷肝矣往往致廢而後已悲夫又有陽虛不能抗陰者若因飲食失節勞役過度脾胃虛弱下陷於腎肝濁陰不能下降清陽不能上升天明則日月不明邪害空竅令人耳目不明夫五臟六腑之精皆稟受於脾胃而上貫於目脾者陰之首目者血氣之宗故脾虛則五臟之精皆失所司不能歸明於目矣況胃氣下陷於腎肝名曰重強相火挾心火而妄行百脈沸騰血氣逆上而目病矣若兩目昏暗四肢不怠者用東垣益氣聰明湯若兩目緊小差明畏日者或視物無力肢體倦息或手足麻木乃脾肺氣虛不能上行也用神效黃耆湯若病後或日晡或燈下不能視者陽虛下陷也用決明夜光丸或升麻鎮陰湯張子和曰目不因火則不病白輪病赤火乘肺也肉輪赤腫火乘脾也黑水神光被翳火乘肝與脾也赤脈貫目火自甚也能治火者一句可了但子和一味寒涼治火余獨補水以配火亦一句可了至於六淫七情錯雜諸證見原機啓微而薛立齊又為之參補深明壯水益火之法其於治目精於古矣口鼻齒證張三錫曰內經曰中央黃色入通於脾開竅於口又口屬上焦心肺有病則口亦病胃中有邪熱亦炎上作楚原其所由七情煩擾五味過傷皆能致此是以肝熱則口酸心熱則口甜肺熱則口辛腎熱則口咸有口淡者知胃熱也又有謀慮不決肝移熱於膽而口苦者有脾胃氣弱木乘土位而口酸者有膀胱移熱於小腸膈腸不便上為口糜者故口瘡舌破炎上之故不獨脾也而丹溪又曰勞役過度虛火上炎服涼藥不效屬中氣虛虛火炎上遊行無制用炮薑理中湯理可見矣趙養葵曰口瘡者上焦實熱中焦虛寒下焦陰火各經傳變當分別而治之如發熱作渴飲冷實熱也輕則補中益氣重則六君子飲食少思大便不實中氣虛也用人參理中湯手足逆冷肚腹作痛中氣虛寒用附子理中湯晡熱內熱血虛也用八物加丹皮五味麥冬發熱作渴唾痰小便頻數腎水虛也用八味日晡發熱或從小腹起陰虛也用四物加參朮五味麥冬不應用加減八味丸若熱來復去晝見夜伏夜見晝伏不時而動或無定處或從肺起乃無根之火也亦用前丸及十全大補加麥冬五味更以附子末唾津調塗湧泉穴若概用寒涼為害非輕王節齊曰鼻塞不聞香臭或但遇寒月多塞或略感風寒便塞不時舉發者世俗皆以為肺寒而用解表通利辛溫之藥殊不知此是肺經素有火邪火鬱甚則喜得熱而惡見寒故遇寒便塞遇感便發也治法清肺降火為主而佐以通氣之劑若如常鼻塞不聞香臭者再審其平素只作肺熱治之清金瀉火消痰或丸藥噙化或末藥輕調緩服久服無不效矣其原無舊症一時偶感者自作風寒調治鼻齄者由飲酒血熱熏肺外遇風寒血凝不散也亦有非飲酒而自赤者肺風血熱之故其鼻瘡鼻痔鼻癰皆因肺熱所致但有淺深之不同受病之有異日久不已經成瘜肉如棗塞鼻中丹溪曰胃中有食積熱痰流注故濁凝結而生瘜肉也鼻齄宜化滯生新四物加片芩紅花茯苓陳皮甘草生薑等藥調五靈末服如氣弱加黃耆齒屬腎上下齦屬陽明上齦陽明胃下齦陽明大腸凡動搖袒脆而痛或不痛或出血或不出血全具如欲落之狀者皆屬於腎齦腫不動潰爛痛穢者皆屬陽明或諸經錯雜之邪與外因為患俱分虛實治之腎經寒者安腎丸還少丹重則八味丸主之如齒痛搖動肢體倦怠飲食少思者脾胃虧損之症用安腎丸補中益氣湯並服如喜寒惡熱者乃胃血傷也清胃湯若惡寒喜熱者胃氣傷也補中益氣湯凡齒痛遇勞即發或午後甚者口渴而黧或遺精者皆脾胃虛熱補中益氣用六味丸或十全大補湯若齒齦腫痛焮連腮頰此胃經風熱犀角升麻湯若善飲者齒痛頰焮腫此胃經濕熱清胃湯加葛根或解酲湯海藏云齒齦臭穢不可近當作陽明蓄血治桃仁承氣湯為末蜜丸服之間有齒縫出血者余以六味地黃湯加骨碎補大劑一服即瘥間有不瘥者腎中火衰也本方加五味子肉桂可也王節齊曰牙床腫痛齒痛動搖或黑爛脫落世人皆作腎虛治殊不知此屬陽明濕熱症也蓋齒雖屬腎而生於牙床上下床屬陽明大腸與胃猶木生於土也腸胃傷於美酒厚味膏粱甘滑之物以致濕熱上攻則牙床不清而為腫為痛或出血或生蟲由是齒不得安而動搖黑爛脫落也治宜瀉陽明之濕熱則牙床清寧而齒固矣張介賓曰口苦口酸等症原病式皆指為熱不知口苦未必因心火口淡未必盡胃熱凡思慮勞倦色欲多有口苦舌燥飲食無味或因心脾虛肝膽邪溢而為苦或因肝腎虛真陰不足而為燥凡口淡或大勞大汗大泄大病後多有此若無火症火脈皆勞傷之症凡口渴與口乾不同渴因火燥有餘多實熱干因津液不足為陰虛然渴有實熱之渴亡陰之渴凡大瀉大汗大勞大病新産癰疽後悉由亡陰水虧所致舌苔黑有虛火實火之別實熱之黑必兼紅紫乾渴或多芒刺若沉黑少紅而帶潤滑非實證也六脈細弱形困氣倦最為虛候必寒水乘心火不歸原之病治標即死鼻塞由風寒者多噴嚏多在太陽宜辛散火炎上焦出自心肺黃芩知母湯火甚多出陽明微兼頭痛竹葉石膏湯大約常塞者多火暴塞者多風以此辨之鼻淵由太陽督脈之火上連於腦多由濕熱上熏津汁溶溢而下有作臭者古方用辛散不若但清陰火而兼以滋陰為高者抑之之法若流滲既久液道不能扃固故新病多因於熱漏泄既多傷其髓海則氣虛於上多見頭腦隱痛及眩運不寧等症此非補陽不可宜十全大補湯陽明熱壅牙痛清胃散腎陰虛為熱渴玉女煎外治辛溫可散熱三香散赴筵散蟲牙蛀空痛巴豆丸牙縫出血胃火所致亦有陰虛於下格陽於上六脈微細血出不止手足厥冷速宜鎮陰煎腎虛症當辨寒熱熱六味丸寒八味丸通加骨碎補丸妙若齒牙浮動脫落牙縫出血而口不臭亦無痛腎中陽虛安腎丸走馬牙疳腐爛脫落速內瀉陽明之火外宜冰白散三仙散或用干棗燒存性同枯礬敷之效凡齒脆搖動疏豁或突而不實宜補腎若因勞酒色齒有浮突之意輕輕咬實漸咬漸齊或日行二三次而根自固於小解時先咬定牙根則腎氣可攝非但固精亦能堅齒又夜晚漱洗或飯後必漱齒至老堅白不衰咽喉證張子和曰咽與喉會厭與舌此四者同在一門其用各異喉以候氣咽以咽物會厭與喉上下以司開合食下則吸而掩氣上則呼而出是以舌抵上齶則會厭能蔽其咽矣四者交相為用乃氣與食出入之門最急之處故難經言七衝門而會厭之下為吸門及其為病一言可了曰火內經曰一陰一陽結謂之喉痹一陰者手少陰君火心主之脈氣也一陽者手少陽相火三焦之脈氣也二火皆主脈並絡於喉氣實則內結結甚則腫脹腫脹甚則痹痹甚不通則死矣推十二經惟足太陽別項下其餘皆湊於喉嚨內經何獨言一陰一陽結為喉痹蓋君相二火獨勝則熱結正絡故痛且速也凡十二經言嗌乾嗌痛咽腫頷腫舌本強皆君火為之惟喉痹最速相火之所為也君火猶人火相火猶龍火人火焚木其勢緩龍火焚木其勢速內經之言喉痹則咽與舌在其間矣以其病同是火故不分也後人立八名曰單蛾雙蛾單閉子舌脹木舌脹纏喉風走馬喉痹生死人特反掌之間治之無如砭針出血血出則病已然喉痹為龍火雖用涼劑而不可使令服宜以火逐之以熱行寒不為熱病扦格乃可以散龍火凡用針創者宜搗生薑一塊調以熱白湯時時呷之則創口易合內經謂火鬱發之出血者乃發之一端也若其微者可以咸軟之大者以辛散之如薄荷烏頭殭蠶白礬朴硝銅緑之類皆其藥也方約之曰纏喉風喉痹之症其人膈間素有痰涎或因飲食過度或因忿怒失常或房室不節而發作也何則飲酒過度是胃火動也忿怒失常是肝火動也房室不節是腎火動也火動痰上而為痰熱燔灼壅塞於咽嗌之間所以內外腫痛而水漿不入也治法急則治標緩則治本治標用丸散以吐痰散熱治本用湯藥以降火補虛諸方出症但云風熱未云治痰但云治脾肝火未云降肝腎火豫雖不敏贅以管見如挾痰加以栝蔞半夏或千緡湯之類挾肝火加以柴胡黃連或小柴胡湯左金丸之類挾腎火加以生地黃柏或四物湯加知母黃柏之類凡人之五臟六腑皆有火不知此三經之火常更而為病之多也趙養葵曰喉咽痛喉與咽不同喉肺脘呼吸之門戶主出而不納咽胃脘水穀之道路主納而不出經曰足少陰所生病者口渴舌乾咽腫上氣噎乾及痛素問云邪客於足少陰之絡令人咽痛不可納食又曰足少陰之絡循喉嚨通舌本凡喉痛者皆少陰之病但有寒熱虛實之分少陰之火直如奔馬逆衝於上到此咽喉緊鎖處鬱結而不得舒故或腫或痛也其症必內熱口乾面赤痰涎湧上其尺脈必數而無力蓋緣腎水枯損相火無制而然須用六味地黃麥冬五味大劑作湯服之又有色欲過度元陽虧損無根之火遊行無制客於咽喉者須用八味腎氣丸大劑煎成冰冷與飲便引火歸原如此治法正褚氏所謂上病治下也以上論陰虛咽痛張景嶽曰喉痹一症有實火虛火之別凡實火可清虛火即水虧症也復有陰盛格陽者即真寒症也皆不宜清經云太陽在泉寒淫所勝民病嗌痛頷腫其義即此喉痹所屬諸經少陽陽明厥陰少陰厥陰少陽為木火之藏固多熱症陽明為水穀之海胃氣直透咽喉火為尤甚察其情志鬱怒而起者多屬少陽厥陰肥甘辛熱而致者多屬陽明此實火也若少陰絡橫骨終於會厭繫於舌本陰火逆衝於上多因喉痹有實火者自有火症火脈若因酒色過度真陰虧損此腎中虛火症也非壯水不可又有火虛於下而格陽於上此無根之火非溫補命門不可凡火浮於上結於頭面咽喉者最宜清降切不可升散蓋火得升愈熾非火鬱宜發之義經曰高者抑之正此義也陰虛喉痹者亦多內熱口渴喉干或唇紅頰赤痰涎壅盛然必尺脈無神脈雖數而浮軟無力但察過於酒色或素稟陰虛多倦少力是水不制火火甚者滋陰八味煎火微而便不堅小便不熱六味地黃湯格陽喉痹由火不歸原上熱下寒診其六脈微弱全無滑大之意且下體絶無火證腹不喜冷即其候也此因色欲傷精泄瀉傷腎所致八味地黃湯陽虛喉痹非喉痹因於陽虛乃陽虛因於喉痹也因喉痹而過於攻擊致傷胃氣凡中氣內虛疼痛外逼多致元陽飛越脈浮而數或弱而澀聲如曳鋸此肺胃垂絶之候速宜挽回元氣以獨參湯飲之痰多者加竹瀝薑汁若再用寒涼必致不救耳諸證治法綱曰耳者腎之竅足少陰之所主人身十二經絡中除足太陽手厥陰其餘十經絡皆入於耳故治耳者以腎為主或曰心亦開竅於耳何也蓋心竅本在舌以舌無孔竅固寄於耳此腎為主心為客五臟開於五部分陰陽言之在腎肝居陰故耳目二藏陰精主之在心脾肺居陽故口鼻舌三竅陽精主之靈樞云腎氣通於耳腎和則能聞五音五臟不和則九竅不通故凡一經一絡有虛實之氣入於耳者皆足以亂其聰明而致於聾聵此言暴病者也若夫久聾者於腎亦有虛實之異左腎為陰主精右腎為陽主氣精不足氣有餘則聾為虛若其人瘦而其色黑筋骨健壯此精氣俱有餘固藏閉塞是聾為實壽兆也二者皆重所致不須治之又有乍聾者經曰不知調和七損八益之道早衰之節也其年未五十體重耳目不聰明矣其症耳聾面頰黑者為精脫神憊用安腎丸八味丸蓯蓉丸薯蕷丸選而用之若腎經虛火面赤口乾痰盛內熱者六味丸主之此論陰虛者也至於陽虛者亦有耳聾經曰清陽出上竅胃氣者清氣元氣春升之氣也今人飲食勞倦脾胃之氣虛不能上升而下流於腎肝故陽氣者閉塞地氣者冒明邪害空竅令人耳目不明此陽虛耳聾須用東垣補中益氣湯主之若不知自節日就煩勞即為久聾之症矣又有因虛而外邪乘之聾者如傷寒邪入少陽之類又有耳痛耳鳴耳癢耳膿耳瘡亦當從少陰正竅分寒熱虛實而治之不可專作火與外邪治耳鳴以手按之而不鳴或少減者虛也手按之而愈鳴者實也王節齊曰耳鳴盛如蟬或左或右或時閉塞世人多作腎虛治不效殊不知此是痰火上升鬱於耳而為鳴甚則閉塞矣若其人平昔飲酒厚味上焦素有痰火只作清痰降火治之大抵此症先多有痰火在上又感惱怒而得怒則氣上少陽之火客於耳也若腎虛而鳴者其鳴不甚其人必多欲當見勞怯等症惟薛立齊詳分縷晰云血虛有火用四物加山梔柴胡若中氣虛弱用補中益氣湯若氣血俱虛用八珍加柴胡若怒便聾而或鳴者屬肝膽經氣實用小柴胡加芎歸山梔氣虛用補中益氣湯加柴胡山梔午後盛者陰血虛也四物加白朮茯苓若腎虛火動或痰盛作渴者必用地黃丸耳中哄哄然是無陰也又液脫者腦髓消脛瘦耳數鳴宜地黃丸腎虛耳中潮聲無休止時妨害聽聞者當墜氣補腎正元飲咽黑錫丹間進安腎丸腎臟風耳鳴夜間睡著如打戰鼓更鼓四肢抽摯痛耳內覺風吹奇癢宜黃耆丸腎者宗脈所聚耳為之竅血氣不行宗脈乃虛風邪乘虛隨脈入耳風與之搏故為耳鳴先用生料五苓散加制枳殼橘紅紫蘇生薑同煎吞青木香丸散邪下氣續以芎歸飲和養之耳中耵聹耳鳴耳聾內有汙血宜柴胡聰耳湯又聖惠云有一人耳癢一日一作可畏直挑剔出血稍愈此乃腎臟虛致浮毒上攻未易以常法治之宜服透冰丹勿飲酒啖濕面雞豬之屬能盡一月為佳不能戒則無效也又有耳內生瘡為足少陰其經虛風邪乘之隨脈入耳與氣相搏故令耳門生瘡也曾青散主之黃連散亦可內服鼠黏子湯蓋耳瘡屬於少陽三焦經或足厥陰肝經血虛風熱或肝經暴火風熱或腎經風火等因若發熱焮痛屬少陽厥陰風熱用柴胡山梔散若內熱癢痛屬二經血虛用當歸川芎散若寒熱作痛屬肝經風熱小柴胡湯加山梔川芎若內熱口乾屬腎經虛火用加味地黃丸如不應用加味八味丸又耳膿即聤耳用紅綿散麝香散內服柴胡聰耳湯通氣散如壯盛之人積熱上攻膿水不差紅綿散麝香散不宜收斂太過也宜三黃散若蟲入耳痛將生薑擦貓鼻其尿自出取滴耳內蟲即出用麻油則蟲死難出或用炒芝麻枕之蟲亦出但不及貓尿之速也有一小兒患耳膿經年藥不效此腎虛也用六味地黃丸加桑螵蛸服之即愈喻嘉言曰人身有九竅陽竅七眼耳目口鼻是山陰竅二前後二陰也陽氣走上竅而下入陰位則有下泄腹鳴之候陰氣走下竅而上入於陽位則有窒塞耳鳴之候故人當五十以外腎氣漸衰於下每每從陽上逆腎主閉藏不欲外泄因肝木為子疏泄母氣而散於外是以謀慮鬱怒之火一動陰氣從之上逆耳竅窒塞不清年高之體大率類此然較之聾病一天一淵聾病者竅中另有一膜遮蔽外氣不得內入故以升竅為主而方書所用石菖蒲麝香等藥及內外攻法皆為此而設至於高年陰氣不自收攝越出上竅之理從無一人言及不知陰氣致上竅亦隔一膜不能越出竅外止於竅中如蛙鼓鑼鳴鼓吹不已以故外入之聲為其內聲所混聽之不清若氣稍不逆上則聽稍清氣全不逆上則聽全清矣余悟明此理治高年逆上之氣屢獲奇驗大意全以磁石為主以其重能達下性主下吸又能制肝木之上吸故也而用地黃龜膠群陰之藥輔之更用五味子山茱萸之酸以收之令陰氣自旺於本宮不上觸於陽竅聲入即通無壅礙也方書指為少陽膽厥陰肝二經熱多所致是說左耳分部然少陽之氣能走上竅其穴皆絡於腦巔無觸筋沖耳之理不當與厥陰混同立說其通聖散一方汗下兼用乃治壯火之法丹溪所取亦無確見惟滾痰丸一方少壯用之多有效者則以大黃黃芩沉香之苦最能下氣而礞石之重墜大約與磁石之用相仿也然大損脾胃耗胸中氤氳之氣至於腎虛耳鳴指作膀胱相火上升則陽火必能透出上竅不為鳴也尤見丹溪無稽之談高年之人腎水已竭真火易露故腎中之氣易出難收況有厥陰之子為之挹取乎然則壯水以制陽光如盞中加油燈焰自小誠為良治乃云作腎虛治不效豈為老人立法哉收攝腎氣老人之先務以丹溪明哲而為此等議論乎輯選薛立齊各證醫案四十六條脾胃虧損吞酸噯腐證一儒者面色痿黃吞酸噯腐恪服理氣化痰之藥大便不實食少體倦此脾胃虛寒用六君子加炮薑木香漸愈更兼用四神丸而元氣復此症苦中氣虛弱者用人參理中湯或補中益氣加木香乾薑不應送左金丸或越鞠丸若中氣虛必加附子或附子理中湯無有不驗一上舍嘔吐痰涎發熱作渴胸膈痞悶或用清氣化痰降火前症益甚痰涎自出余曰嘔吐痰涎胃氣虛寒發熱作渴胃不生津胸膈痞滿脾氣虛弱須用參耆歸術之類溫補脾胃生髮陽氣諸病自退不信虛症悉至余曰飲食不入吃逆不絶泄瀉腹痛手足逆冷是謂五虛煩熱作渴虛陽越於外也脈洪大脈欲絶也死期迫矣果然陸陳湖母久患心腹痞痛每作必胸滿厥逆面赤唇麻嘔吐咽乾舌燥寒熱不時而脈洪大衆以痰火治之屢止屢作逮春發熱頻甚用藥反劇有欲用參朮等疑痛無補法迎余折中余曰此寒涼損真之故內真寒而外假熱也且脈弦洪而有怪狀乃脾氣虧損肝脈乘之而然惟當溫補其胃遂與補中益氣加半夏茯苓吳茱萸木香一服而效自病發月餘竟夕不安乃熟寐徹曉脈洪頓斂諸證釋然一婦人年逾二十不進飲食二年矣日飫清茶果品之類面部微黃浮腫形體如常仍能步履但體倦怠肝脾二脈弦浮按之微而結滯余用六君子木香吳茱萸下痰積甚多飲食頓進形體始瘦臥床月餘仍服六君之類而安脾胃虧損停食痢疾等證羅給事小腹急痛大便欲去不去此脾胃氣虛而下陷也用補中益氣送八味丸二劑而愈此等證候因痢藥致損元氣肢體腫脹而死者不可枚舉少宗伯顧東江停食患痢腹痛下墜或用疏導之劑兩足腫脹食少體倦煩熱作渴脈洪數按之微細余以六君加薑桂各二錢吳茱萸五味各一錢煎熱涼服諸證頓退再服全退此假熱而治以假寒也一老婦因食後怒患痢裡急後重屬脾氣下陷與大劑六君子加附子肉蔻煨木香各一錢吳茱萸五分骨脂五味各一錢二劑諸證頓愈惟小腹脹滿此肝氣滯於脾也與調中益氣加附子木香五分四劑而安後口內覺咸此腎水泛也與六味地黃丸二劑頓安先母年八十仲夏患痢腹痛作嘔不食熱渴引湯手按腹痛稍止脈鼓指而有力真氣虛而邪氣實也急用人參五錢白朮茯苓各三錢陳皮升麻附子炙甘草各一錢服之睡覺索食脈症頓退再劑而安此取證不取脈也凡暴病母論其脈當從其症時石閣老太夫人年歲脈證皆同彼專治其痢遂致不起橫金陳梓園年六十面帶赤色吐痰口乾或時作泄就疹余曰僕之症或以為脾經濕熱痰火作瀉率用二陳黃連枳實神麯麥芽白朮柴胡之類不應何也餘脈之左關弦緊腎水不能生肝木也右關弦大肝木乘脾土也此乃脾腎虧損不能生剋制化當滋化源余謂其甥曰令舅不久當損於痢後果然脾胃虧損瘧疾寒熱等證冬官朱省庵停食感寒而患瘧自用清脾截瘧二藥食後腹脹時或作痛服二陳黃連枳實之類小腹重墜腿足浮腫加白朮山楂吐食未化謂余曰何也余曰食後脹痛乃脾虛不能克化也小腹重墜乃脾虛不能升舉也腿足浮腫乃脾虛不能運行也吐食不消乃脾胃虛寒無火也治以補中益氣加吳茱萸炮薑肉桂一劑諸證頓退飲食頓加不數劑而痊大凡停食之症宜用六君子枳實厚朴若食已消而不愈用六君子湯若內傷外感用藿香正氣散若內傷多而外感少用人參養胃湯若勞傷元氣兼外感用補中益氣加川芎若勞傷元氣兼傷食補中益氣加神麯陳皮若氣惱兼食用六君子加香附山梔若咽酸或食後口酸當節飲食病作時大熱燥渴以薑湯乘熱飲之此截瘧之良法也夫人以脾胃為主未有肺胃實而患瘧痢者若專主發表攻裡降火導痰治末而忘本矣一儒者秋患寒熱至春未愈胸痞腹脹余用人參二兩生薑二兩煨熟煎服寒熱即止更以調中益氣加半夏茯苓炮姜數劑元氣頓復後任縣尹每飲食勞倦疾作服前藥即愈脾胃虧損心腹作痛等證府庠徐道大母胃脘當心而劇痛脈右寸關俱無左雖有微而似絶手足厥冷病勢危篤察其色眼胞上下青黯此脾虛肝木所勝用參朮茯苓陳皮甘草補其中氣用木香和胃氣以行肝氣用吳茱萸散脾胃之寒止心腹之痛急與一劑病悉愈向使泥其痛無補法而反用攻伐之藥禍不旋踵脾胃虧損暑濕所傷等證一儒者每春夏口乾發熱勞則頭痛服清涼化痰藥瀉喘煩躁用香茹飲神思昏倦脈大而虛此因閉藏之際不遠幃幕為患名曰注夏用補中益氣去升麻柴胡加五味麥冬炮姜一劑脈益甚仍用前藥加肉桂五分服之即蘇更用六味丸而痊肝脾虧損頭目耳鼻等證給事張禹功目赤不明服祛風散熱藥反畏明重聽脈大而虛此因勞心過度飲食失節以補中益氣加茯苓棗仁山藥山萸五味頓愈又勞役復甚用十全大補兼以前藥漸愈卻用補中益氣加前藥而痊東垣云諸經脈絡皆走於面而行空竅其清氣散於目而為精走於耳而為聽若心煩事冗飲食失節脾胃虧損心火太甚百脈沸騰邪害空竅而失明矣況脾為諸陰之首目為血脈之宗脾虛則五臟之精氣皆為失所若不理脾胃不養氣血乃治標而不治本也少宰李浦汀耳如蟬鳴服四物湯耳鳴益甚此元氣虧損之症五更服六味丸食前服補中益氣頓愈此證若血虛而有火用八珍加山梔柴胡氣虛而有火四君加山梔柴胡若因怒遂聾用小柴胡加芎歸山梔虛用補中益氣加山梔午前甚用四物加朮苓久須用補中益氣午後甚用地黃丸一儒者兩目作痛服降火祛風之藥兩目如絳熱倦殊甚余用十全大補湯數劑諸證悉退服補中益氣兼六味丸而愈復因勞役午後目澀體倦服十全大補而痊脾肺虧損咳嗽痰喘等證鴻臚蘇龍溪咳嗽氣喘鼻塞流涕余用參蘇飲一劑以散寒邪更用補中益氣以實胰理而愈後因勞怒仍作自用前藥益甚加黃連枳實腹脹不食小便短少服二陳四苓前證愈劇小便不通余曰腹脹不食脾胃虛也小便短少肺腎虛也悉因攻伐所致投以六君加黃耆炮薑五味二劑諸證悉退再用補中益氣加炮薑五味數劑全愈地官李北川每患咳嗽余用補中益氣即愈一日復作用參蘇飲益甚更服人參敗毒散項強口噤腰背反張余曰此誤汗亡津液而變痙矣仍以前湯加附子一錢四劑而痊感冒咳嗽若誤行發汗過多喘促呼吸不利吐痰不止必患肺癰矣司廳陳國華素陰虛患咳嗽以自知醫用發表化痰之劑不應因清熱化痰等藥其症愈甚余曰此脾肺虛也不信用牛黃清心丸更加心腹作脹飲食少思足三陰虛症悉具朝用六君桔梗升麻麥冬五味補脾以生肺金夕用八味丸補命門以生脾土諸症漸愈經云不能治其虛安問其餘此脾土虛不能生肺金而金病復用前藥反瀉其火吾不得而知也儒者張克明咳嗽用二陳芩連枳殼胸滿氣喘清晨吐痰加蘇子杏仁口出痰涎口乾作渴余曰清晨吐痰脾虛不能消化飲食胸滿氣喘脾虛不能生肺金涎沫自出脾虛不能收攝口乾作渴脾虛不能生津液遂用六君加炮薑肉果溫補脾胃更用八味丸以補土母而愈脾肺腎虧損小便自遺淋澀等證考功楊朴庵口舌乾燥小便頻數此膀胱陽燥陰虛先用滋腎丸以補陰而小便愈再用補中益氣六味地黃以補脾腎而安若汗多而小便少或體不禁寒乃脾肺氣虛也儒者楊文奎痢後兩足浮腫胸腹脹滿小便短少用分利之劑遍身腫兼氣喘余曰兩足浮腫脾氣下陷也胸腹脹滿脾虛作痞也小便短少肺不能生腎也身腫氣喘脾不能生肺也用補中益氣加附子而愈大尹顧榮甫尾閭作癢小便赤澀左尺脈洪數屬腎經虛熱法當滋補不信服黃柏知母等藥年許高骨腫痛小便淋瀝肺腎二脈洪數無倫余曰子母俱敗無能為矣果歿余甥凌雲漢年十六庚子夏作渴發熱吐痰唇燥遍身生疥兩腿尤多色黯作癢日晡愈熾仲冬腿患瘡尺脈洪數余曰疥腎疳也瘡骨疽也皆腎經虛證針之膿出其氣氤氳余謂火旺之際必患瘵證遂用六味十全不二旬諸證愈而瘵證具仍用前藥而愈抵冬娶妻至春其證夏作亦服地黃丸數斤煎藥三百劑而愈脾肺腎虧損遺精吐血便血等證少宰汪涵齊頭暈白濁余用補中益氣加茯苓半夏愈而復患腫痛用山藥山萸五味萆薢遠志頓愈又因勞心盜汗白濁以歸脾湯加五味而愈後不時眩運用八味丸全愈銀臺許函谷因勞發熱作渴小便自遺或時閉澀余作肝火血虛陰挺不能約制午前用補中益氣加山藥山萸午後服地黃丸月餘諸證悉退一男子鰥居數年素勤苦勞則吐血發熱煩躁服犀角地黃湯氣高而喘前證益甚更遺精白濁形體倦怠飲食少思脈洪大舉按皆有力服十全大補加麥冬五味山萸山藥而愈一童子年十四發熱吐血余謂宜補中益氣以滋化源不信用寒涼降火愈甚謂余曰童子未室何腎虛之有參耆補氣奚為用之余述丹溪先生云腎主閉藏肝主疏泄二臟俱有相火而其繫上屬於心心為君火為物所感則易於動心動則相火翕然而起雖不交會其精亦暗耗矣又精血篇云男子精未滿而御女以通其精則五臟有不滿之處異日有難狀之疾遂用補中益氣及地黃丸而痊星士張東谷說命時出中庭吐血一二口云久有此症遇勞即發余意此勞傷肺氣其血必散視之果然與補中益氣加五味麥冬山藥熟地茯神遠志服之而愈曰每服四物黃連山梔之類血益多而倦益甚得公一七吐血頓止神思如故何也余曰脾統血肺主氣此勞傷脾肺致血妄行故用健脾肺之氣而噓血歸源耳脾肺腎虧損大便祕結等證一儒者大便素結服搜風順氣丸復胸膈不利飲食善消面帶陽色左關尺脈洪而虛余曰此足三陰虛也不信乃服潤腸丸大便不實肢體困倦余與補中益氣六味地黃月餘而驗年許而安若脾肺氣虛用補中益氣若脾經鬱結者用加味歸脾若氣血虛者用八珍加肉蓯蓉若脾經津液涸者用六味若發熱作渴飲冷者用竹葉黃耆湯若燥在直腸者豬膽汁導之若肝膽邪侮脾者用小柴胡加山梔郁李仁枳殼若膏粱厚味積熱者用加味清胃散亦有熱燥風燥陽結陰結者當審其因而治之若復傷胃氣多成敗症一男子五十餘因怒少食大便不利服潤腸丸大便閉結胸膈作痛欲兼服脾約丸肝脾腎脈浮而澀余曰此足三陰精血虧損之證也東垣先生云若人胃強脾弱約束津液不得四布但輸膀胱小便數而大便難者用脾約丸若人陰血枯槁內火燔灼肺金受邪土受木傷脾肺失傳大便祕而小便數者用潤腸丸令滋其化源則大便自調矣一儒者懷抱鬱結復因場屋不遂發熱作渴胸膈不利飲食少思服清熱化痰行氣等劑前證益甚肢體困倦心脾二脈澀滯此鬱結傷脾之變證也遂用加味歸脾湯治之飲食漸進諸證漸退但大便尚澀兩顴赤色此肝腎虛火內傷陰血用八珍湯加肉蓯蓉麥冬五味至三十餘劑大便自潤脾胃虧損小便不利肚腹膨脹等證大尹劉天錫內有濕熱大便滑利小便澀滯服淡滲之劑愈加滴瀝小腹腿膝皆腫兩眼脹痛此腎虛熱在下焦淡滲導損陽氣陰無以化遂用地黃滋腎二丸小便如故更以補中益氣加麥冬五味兼服愈州同劉禹功素不慎起居七情以致飲食不甘胸膈不利用消導順氣肚腹痞悶吐痰氣逆遂用化痰降火食少泄瀉小腹作痛用分利降火小便澀滯氣喘痰湧服清氣化痰丸小便愈滯大便愈瀉肚腹脹大肚臍突出不能寢臥六脈微細左寸虛甚右寸短促此命門火衰脾腎虛寒之危證也先用金匱加減腎氣丸料肉桂附子各一錢五分二劑下淤穢甚多又以補中益氣送二神丸二劑諸證悉退五六日又用前藥數劑並附子之類貼腰臍及湧泉穴寸脈漸復而安後因怒腹悶惑於人言服沉香化氣丸大便下血諸證悉至余曰此陰絡傷也辭不治果歿一男子素不善調攝唾痰口乾飲食不美服化痰行氣之劑胸腹膨滿痰涎愈甚服導痰理脾之劑肚腹膨脹二便不利服分氣利水之劑腹大脅痛睡臥不得服破血消導之劑兩足皆腫脈浮大不及於寸口朝用金匱加減腎氣丸夕用補中益氣湯煎送前丸月餘諸證漸退飲食漸進再用八味丸補中益氣月餘自能轉側又兩月而能步履卻服大補湯還少丹又半載而康後稍失調理其腹仍脹服前藥即愈一男子胸膈痞滿專服破氣之藥余曰此血虛病也血生於脾土若服前藥脾氣弱而血愈虛矣不信又用內傷之藥反吐血余曰此陽絡傷不治後果然脾腎虧損頭眩痰氣等證閣老梁厚齊氣短有痰小便赤澀足跟作痛尺脈浮大按之則澀此腎虛而痰飲也用四物送六味丸不月而康仲景先生之氣虛有飲用腎氣丸補而逐之誠開後學之聾聵也都憲孟有涯氣短痰暈服辛香之劑痰盛遺尿兩尺浮大按之如無余以為腎家不能納氣歸源香燥致甚耳用八味丸料三劑而愈孫都憲形體豐厚勞神善怒面帶陽色口渴吐痰或頭目眩暈或熱從腹起左三脈洪而有力右三脈洪而無力余謂足三陰虧損用補中益氣加麥冬五味及而減八味丸而愈若人少有老態不耐寒暑不勝勞役四時迭病皆因氣血虧損房勞過傷故其見證難以悉狀此精氣不足但滋化源其病自痊又若飲食勞倦七情失宜以致諸證亦當治以前法設或六淫所侵而致諸證亦因真氣內虛而外邪乘襲尤當固胃氣為主蓋胃為五臟之根本故黃柏知母不宜輕用恐復傷胃氣也大凡雜症屬內因乃形氣病氣俱不足當補不當瀉傷寒雖屬外因亦宜分其表裡虛實治當審之先兄體貌豐偉唾痰甚多脈洪有力殊不耐勞遇風頭暈欲僕口舌破裂或至赤爛誤食姜蒜少許口痰益甚服八味丸及補中益氣加附子即愈停藥月餘諸證仍作此命門虛火不得歸源也脾腎虧損停食泄瀉等證進士劉華甫停食腹痛瀉黃吐痰服二陳山梔黃連枳實之類其證益甚左關弦緊右關弦長乃肝木克脾土用六君加木香治之而愈若食已消而泄未已宜用異功散以補脾胃如不應用補中益氣湯升發陽氣凡瀉痢色黃脾土虧損真氣下陷必用前湯加木香肉蔻溫補如不應當補其母宜八味丸一男子清晨或五更吐痰或有酸味此是脾氣虛弱用六君送四神丸而愈若脾氣鬱滯用二陳加桔梗山梔送香連丸若鬱結傷脾用歸脾送香連丸若胸膈不舒歸脾加柴胡山梔送左金丸若胃氣虛津液不能運化用補中益氣送左金丸長洲朱紹患肝木克脾面赤生風大腸燥結炎火上衝久之遂致臟毒下血腸鳴溏泄腹脹喘急馴至絶谷諸醫方以枳實黃連之劑投之展轉增劇余曰爾病脾肺兩虛內真寒而外假熱法當溫補遂以參術為君山藥黃耆肉果薑附為臣茱萸骨脂五味歸芩為佐治十劑俾以次服之諸醫皆曰此火病也以火濟火可乎服之浹旬盡劑而血止脾腎虛寒陽氣脫陷等證一男子食少胸滿手足逆冷飲食畏寒發熱吐痰時欲作嘔自用清氣化痰及二陳枳實之類胸腹膨脹嘔吐痰食小便淋漓又用四苓連柏知母車前小便不利諸病益甚余曰此脾胃虛寒無火之證故食入不消而反出遂用八味丸補火以生土用補中益氣加薑桂培養中宮生髮陽氣尋愈一婦女飲食無過碗許非大便不實必吞酸噯腐或用二陳黃連更加內熱作嘔余謂東垣先生云邪熱不殺穀此脾胃虛弱末傳寒中以六君子湯加炮薑木香數劑漸復飲食漸進又以補中益氣加木香炮薑茯苓半夏全愈後怒飲食頓少元氣頓怯更加發熱誠似實火脈洪大而虛兩尺如無用益氣湯八味丸悉愈朱介庵向因失足劃然有聲坐立久則手足麻木雖夏月足寒如冰又因醉覺而飲水復睡遂覺右腹痞結以手摩之腹則瀝漉有聲熱摩則氣泄而止每每加劇飲食稍多則作痛泄醫令服枳朮丸罔效余曰此非脾胃病乃命門火衰虛寒便之然也可服八味丸則愈果驗工部陳禪亭發熱即痰服二陳黃連枳殼之類病益甚請治其脈左尺微弱右關浮大重按微弱余曰此命門火衰不能生土而脾病當補火以生土或可愈也不悟仍服前藥脾土愈弱至乙巳病已革復邀治右寸脈平脫此土不能生金生氣絶於內矣經云虛則補其母實則瀉其子凡病在子當補其母況病在母而屬不足反瀉其子不死何俟肝腎虧損血燥結核等證儒者楊澤之性躁嗜色缺盆結一核此肝火血燥筋攣法當滋腎水生肝血不信乃內服降火化痰外敷南顯商陸轉大如碗余用補中益氣及六味地黃間以蘆薈丸年餘元氣漸復而消一男子素善怒左項微腫漸大如升用清痰理氣而大熱作渴小便頻濁余謂腎水虧損用六味地黃補中蓋氣而愈亦有胸腹等處大如升斗或破而如菌如榴不問大小俱治如前法舉人江節夫頸臂脅肋各結一核誤服祛痰降火軟堅之劑益甚余曰此肝膽經血少而火作也彼執前藥至明年六月各核皆潰脈浮大而澀余斷以秋金將旺肝木被克必不起果然腎虛火不歸經發熱等證顧大有父年七十有九仲冬將出少妾入房致頭疼發熱眩運喘急痰涎壅盛小便頻數口乾引飲遍舌生刺縮斂如荔枝然下唇黑裂而目俱赤煩躁不寐或時喉內如煙火上衝急飲冷茶少解已瀕於危脈大而無倫且有力捫其身烙手此腎經虛火遊行於外投以十全大補加山萸澤瀉丹皮山藥麥冬五味附子一鍾熟寐良久脈證各減三四再與八味丸服之諸證悉退後畏冷物而痊顧仁成年六十有一痢後入房精滑自遺二日方止又房勞感寒怒氣遂發寒熱右脅痛連心腹胸痞自汗盜汗如雨四肢厥冷睡中驚悸或覺上升如浮或覺下陷如墜遂致廢寢或用補藥二劑益甚脈大洪數按之微細此屬無火虛熱急與十全大補加山藥山萸丹皮附子一劑諸證頓愈此等元氣百無一二二顧氏父子是也州同韓用之年四十有六時仲夏色欲過度煩熱作渴飲水不絶小便淋瀝大便祕結唾痰如湧面目俱赤滿舌生刺兩唇燥裂遍身發熱或時如芒刺而無定處兩足心如烙以冰折之作痛脈洪而無倫此腎陰虛而陽無所附而發於外非火也蓋大熱而甚寒之不寒是無水也當峻補其陰遂以加減八味丸料一斤內肉桂一兩以水頓煎六碗冰冷與飲半響已用大半睡覺而食溫粥一碗復睡至晚乃以前藥溫飲一碗乃睡至曉食熱粥二碗諸證悉退翌日畏寒足冷至膝諸證仍至或以為傷寒余曰非也大寒而甚熱之不熱是無火也陽氣亦虛矣急以八味丸一劑服之稍緩四劑諸證悉退大便至十三日不通以豬膽導之諸證復作急用十全大補數劑方愈元氣虧損內傷外感等證車駕王用之卒中昏憒口眼喎斜痰氣上湧咽喉有聲六脈沉伏此真氣虛而風邪所乘以三生飲一兩加人參一兩煎服即蘇若遺尿手撒口開鼾睡為不治用前藥亦有得生者夫前飲乃行經絡治寒痰之藥有斬關奪門之功每服必用人參兩許駕馭其邪而補助真氣否則不惟無益適足以取敗矣觀先哲用耆附參附等湯其義自見州判蔣大用形體魁偉中滿吐痰勞則頭暈所服皆清痰理氣余曰中滿者脾氣虧損也痰盛者脾氣不能運也頭暈者脾氣不能升也指麻者脾氣不能周也遂以補中益氣加茯苓半夏以補脾土用八味丸以補脾母而愈一男卒中喎斜不能言語遇風寒四肢拘急脈浮而緊此手足陽明經虛風寒所乘用秦艽升麻治之稍愈乃以補中益氣加山梔而痊若舌喑不能言足痿不能行屬腎氣虛弱名曰痱症宜用地黃飲子治之一男子體肥善飲舌本強硬語言不清口眼喎斜痰氣湧盛肢體不遂余以為脾虛濕熱用六君加煨葛根山梔神麯而痊僉憲高如齊自大同回謂余曰吾成風病矣兩腿逸則痿軟而無力勞則作痛如針刺脈洪數而有力余曰此肝腎陰虛火盛而致痿軟無力真病之形作痛如錐邪火之象也用壯水益腎之劑而愈大尹劉孟春素有痰兩臂作麻兩目流淚服祛風化痰藥痰愈盛臂反痛不能伸手指俱攣余曰麻屬氣虛因前藥而復傷肝火盛而筋攣耳況風自火出當補脾肺滋腎水則風自息火自退痰自清遂用六味地黃丸補中益氣湯不三月而愈進士王汝和因勞役失於調養忽然昏憒此元氣虛火妄動挾痰而作急令灌童便神思漸爽更用參耆五錢芎歸各三錢元參柴胡山梔炙草各一錢服之稍定察其形倦甚又以十全大補湯加五味麥冬治之而安此人元氣素弱或因起居失宜或因飲食勞倦或因用心太過致遺精白濁自汗盜汗或內熱晡熱潮熱發熱或口乾作渴喉痛舌裂或胸乳膨脹脅肋作痛或頭頸時痛眩暈目花或心神不寧寤而不寐或小便赤澀莖中作痛或便溺餘瀝臍腹陰冷或形容不充肢體畏寒或鼻息急促或更有一切熱證皆是無根虛火但服前湯固其根本諸證自息若攻其風熱則誤矣光祿高署丞脾胃素虛因飲食勞倦腹痛胸痞誤用大黃等藥下之譫語煩躁頭痛喘汗吐瀉頻頻時或昏憒脈大而無倫次用六君加炮姜四劑而安但倦怠少食口乾發熱六脈浮數欲用瀉火之藥余曰不時發熱是無火也脈浮大是血虛也脈浮虛是氣虛也此因胃虛五臟虧損虛證發見服補脾胃之劑諸證悉退大尹徐克明因飲食失宜日晡發熱口乾體倦小便赤澀兩腿痠痛余用補中益氣湯治之彼知醫自用四物黃柏知母之劑反頭眩目赤耳鳴唇燥寒熱痰湧大便熱痛小便赤澀又用四物芩連枳實之類胸膈痞滿飲食少思汗出如水再用二陳芩連黃柏知母麥冬五味言語譫妄兩手舉拂屢治反甚復求余用參耆各五錢歸術各三錢遠志茯神棗仁炙草各一錢服之熟睡良久四劑稍安又用八珍湯調理而愈夫陰虛乃肺虛也脾為至陰因脾虛而致前證蓋脾稟於胃故用甘溫之劑以生髮胃中元氣而除大熱胡乃反用苦寒復傷脾血耶若前證果屬腎經陰虛惟因腎經陽虛不能生陰耳尤不宜用苦寒之藥當用補中益氣六味地黃以補其母此以脾虛誤為腎虛輒用黃柏知母之類反傷胃中生氣害人多矣大凡足三陰虛多因飲食勞役以致腎不能生肝肝不能生火而害脾土不能滋化但補脾土則金旺水生木得平而自相生矣一儒者素勤苦因飲食失節大便下血或赤或黯半載之後非便血則盜汗非惡寒則發熱血汗二藥用之無效六脈浮大心脾則澀此思傷心脾不能攝血歸源然血即汗汗即血其色赤黯便血盜汗皆火之升降微甚耳惡寒發熱氣血俱虛也乃午前用補中益氣以補脾肺之原舉下陷之氣午後用歸脾加麥冬五味以補心脾之血收耗散之液不兩月而諸證悉愈馬生者發熱煩渴時或頭痛昨用發散藥反加喘急腹痛其汗如水晝夜譫語余意此勞傷元氣誤汗所致其腹心喜手按詢之果然遂與十全大補湯加附子一錢服之熟睡喚之不醒及覺諸證悉退再劑而痊凡人飲食勞倦起居失宜見一切火症悉屬內真寒而外假熱故肚腹喜暖口畏冷物此乃形氣病氣俱不足法當純補上元氣為善
