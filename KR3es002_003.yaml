body:
  text: 卷三病能集一雜證九門陰病門喻嘉言曰經云身之陽氣如天之與日失其所則折壽而不彰又言陽氣者蔽塞地氣者冒明冒明者以陰濁而冒蔽陽明也仲景以後英賢輩出從未有闡揚其烈者惟韓祗和於中寒微有發明誨人以附子乾薑為急至丹溪節齋諸先生多以貴陰賤陽立説制補陰丸畸重乎陰疇非至理第於此道未具隻眼夫陰病之不可方物以其無陽每見病者陰邪橫發上干清道必顯畏寒腹痛下痢上嘔自汗淋漓肉瞤筋惕等證失此不治濁陰從胸而上入者咽喉腫痹舌脹睛突濁陰從背而上入者頸筋粗大頭項若冰渾身青紫而死故仲景於陰盛亡陽之症必用真武湯以救逆所以把住關門坐鎮北方不使龍雷升騰霄漢奈醫學闕此誠為漏義蓋卒中寒者陽微陰盛最危最急之候經曰陰盛生內寒寒氣積於胸中而不泄則溫氣去寒獨留留則血凝血凝則脈不通其脈盛大以澀故中寒夫經既言陰盛生內寒又言故中寒豈非內寒先生外寒後中之耶既言血凝脈不通又言脈盛大以澀豈非以外寒中故脈盛大血脈閉故脈澀耶夫人身衛外之陽最固太陽衛身之背陽明衛身之前少陽衛身之兩旁今不由三陽而直中少陰豈是從天而下緣厥氣上逆積於胸中則胃冷胃冷則口食寒物鼻吸寒氣皆得入胃腎者胃之關也外寒斬關直入少陰腎臟故曰中寒也然其脈盛大以澀雖曰中寒尚非卒病卒病中寒其脈必微仲景言傷寒傳入少陰則曰脈微細若寒中少陽又必但言脈微不言脈細何者微則陽之微也細者陰之細也傷寒寒邪傳腎其亡陽亡陰尚未有定至中寒則但有亡陽而無亡陰故知其脈必不細也若果見細脈則其陰先已內虧何由而反盛耶且在傷寒惟少陰有微脈他經則無其太陽膀胱為腎之腑總見微脈惡寒仲景蚤從少陰施治而用附子乾薑矣蓋脈微惡寒正陽微所致腎中既以陽微寒自內生復加外寒斬關直入或沒其陽於內或逼其陽於外其人頃刻亡陽故仲景以為卒病也夫人身血肉之軀皆陰也其一點元陽先身而生藏於兩腎之中而一身之元氣由之以生故謂之生氣之原而六淫之外邪毫不敢犯又謂守邪之神苟為不然陽微必陰盛陰盛愈益陽微是以腎中真陽得水以濟之留戀不脫得土以堤之蟄藏不露除施泄而外屹然不動而手足之陽為之役使流走周身固護腠理而捍衛於外而脾中之陽法天之健消化飲食傳布津液而運行於內而胸中之陽法日之馭離照當空消陰除翳而宣布於上此三者豐享有象腎中真陽安享太平若在外在中在上之陽衰微不振陰氣乃始有權或膚冷不溫漸至肌硬不柔衛外之陽不用矣或飲食不化漸至嘔泄痞脹脾中之陽不用矣或當膺阻礙漸至窒塞不開胸中之陽不用矣乃取水土所封之陽出而任事頭面得陽而戴赤肌膚得陽而熯燥脾胃得陽而除中即不中寒其能久乎故治陰之法不可不謹治之之法其難有八夫寒中少陰行其嚴令埋沒微陽肌膚凍裂無汗而喪神守急用附子乾薑加蔥白以散寒加豬膽汁引入陰分然恐藥力不勝尉蔥灼艾外內悉攻乃足破其堅凝少緩須臾必無及矣此一難也若其人真陽素擾腠理素疏陰盛於內必逼其陽亡於外魄汗淋漓脊項強硬用附子乾薑豬膽汁即不可加蔥及尉艾恐助其散令氣隨汗脫而陽無由內返也宜撲止其汗陡進前藥隨加固護腠理不爾恐其陽復越此二難也用附子乾薑以勝陰復陽者取飛騎突入重圍使既散之陽望幟爭趨不知此義者加增藥味和合成湯反牽制其雄入之勢必至迂緩無功此三難也其次前藥中即須首加當歸肉桂兼理其榮以寒邪中入先傷榮血故也不爾藥偏於衛與病即不相當邪不盡服必非勝算此四難也其次前藥中即須加人參甘草調元轉餉收功帷幄不爾薑附之猛直將犯上無等矣此五難也用前藥二三劑後運動頗輕神情頗悅更加黃耆白朮五味白芍大隊陰陽平補不可歇手如怠緩不為善後必墮前功此六難也若其人素有熱痰陽去早已從陰而變寒至此則無形之陰雖散而有形之寒痰尚有留為阻塞竅隧者薑附固可勿施其牛黃竹瀝一切寒涼斷不可用用則陰復用事必墮前功此七難也用平補後總有寒痰但宜甘寒助氣開通不宜辛辣助熱陽既安堵即宜休養其陰不爾轉生他患此八難也中風證喻嘉言曰金匱云夫風之為病當半身不遂或但臂不舉者此為痹病脈微而數中風使然又云寸口脈浮而緊緊則為寒浮則為虛虛寒相搏邪在皮膚浮者血虛絡脈空虛賊邪不瀉或左或右邪氣反緩正氣即急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於腑即不識人邪入於臟舌即難言口流涎沫又云寸口脈遲而級遲則為寒緩則為虛榮緩則為亡血衛緩即為中風邪氣中經則身癢而癮疹心氣不足邪氣入中則胸滿而短氣以及五臟風脈死症語語金針仲景以後英賢輩出中風一證方書充棟竟鮮畫一之法世咸知仲景為立方之祖然仲景首推侯氏黑散為主方後人罔解其意謹以明之夫八風之邪皆名虛邪人身經絡營衛素盛者無從入之入之者因其虛而襲之耳內經謂以身之虛而逢天之虛兩虛相感其氣至骨入則傷五臟工侯禁之不能傷也又謂賊風數至虛邪朝夕內至五臟骨髓外傷空竅肌膚靈樞謂聖人避邪如避矢石是則虛邪之來為害最烈然風為陽邪人身衛外之陽不固陽邪乘陽尤為易入即如偏枯不仁要皆陽氣虛餒不能充灌所致又如中風卒倒其陽虛更審設非陽虛其人必輕矯便捷何得卒倒耶仲景之謂脈微而數微者指陽之微也數者指風之熾也所出諸證諸脈字字皆本陽虛為言然非仲景之言而內經之言也內經謂天明則日月不明邪害空竅可見風性善走空竅陽虛則風居空竅漸入臟腑此惟離照當空群邪始得畢散若胸中之陽不治風必不出矣扁鵲謂虢太子尸厥之病曰上有絶陽之絡下有破陰之紐見五絡之縱於頭者皆為陽絡而邪阻絶於上其陽之根於陰陰陽相紐之處而正復破散於下故為是病古人立言之精若此仲景以後醫脈斬為中斷後賢之特起者河間主火是火召風入火為本風為標矣東垣主氣是氣召風入氣為本風為標矣丹溪主痰是痰召風入痰為本風為標矣然一人之身每多兼三者而有之曷不曰陽虛邪害空竅為本而風從外入者必挾身中素有之邪或火或氣或痰而為標耶王安道謂審其火氣痰則從三子審其為風則從內經亦為無權執一從三子固各有方論可守從內經果何著落耶中風之初治其表裡風邪非不外出而重門洞開出而復入乃至莫御者矣又謂一旬微汗一氣微利要亦五十步之走耳仲景取侯氏黑散為主方則驅風之中兼填空竅空竅一實庶風出而不復入其病瘳矣仲景所謂心折者原有所本乃遵內經久塞其空真切精粹諸家中風方論直是依樣葫蘆不足觀矣侯氏黑散菊花桔梗防風細辛川芎桂枝當歸人參白朮茯苓牡蠣礬石黃芩乾薑甘草上十四味杵為散酒服方寸匕日三服初服二十日用溫酒調服禁一切豬肉大蒜常宜冷食六十日止即藥積在腹中不下也熱食即下矣冷食自能助藥力上治中風四肢煩重心中惡寒不足者外臺用之以治風癲仲景制方皆匠心獨創乃於中風症首引此散豈非深服其方乎夫立方而但驅風補虛誰不能之至於驅補之中行其堵截之法則非思議可到方中取礬石以固澀諸藥使之留積不散以漸填其空竅服之日久風自以漸填而熄所以初服二十日不得不用溫酒調下以開其痹著以後則禁諸熱食惟宜冷服如此再四十日則藥積腹中不下而空竅填矣空竅填則舊風盡出新風不受矣蓋礬性得冷即止故囑云熱食即下矣冷食自能助藥力抑何用意之微耶脈法新中風挾舊邪或外感或內傷其脈隨之忽變兼寒則脈浮緊兼風則脈浮緩兼熱則脈浮數兼痰則脈浮滑兼氣則脈沉澀兼火則脈盛大兼陽虛則脈微亦大而空兼陰虛則脈數亦細如絲陰陽兩虛則微數或微細虛滑為頭中痛緩遲為營衛衰大抵陽浮而數陰濡而弱浮滑沉滑微虛散數皆為中風然虛浮遲緩正氣不足尚可補救急大數疾邪不受制必死無疑若大數未至急疾猶得不死內經言偏枯者不一曰汗出偏阻曰陽盛陰不足曰胃脈內外大小不一曰心脈小堅急曰腎水虛靈樞亦敘偏枯於熱病篇中皆不言風亦不言其本於何邪豈非以七情飢飽房室凡能虛其臟氣致營衛經脈痹而不通者皆可言邪即河間主火即腎水虛陽盛陰不足之一端也東垣主氣即七情抑遏之一端也丹溪主痰即飲食傷脾之一端也一病之中每多兼三者而有之安在舉一以括其餘素問云不能治其虛安問其餘偏枯陽盛陰不足固有之而陽氣虛衰痹而不通尤多可問其餘耶中絡者肌膚不仁中經者軀殼重著中腑即不識人中腑即舌難言口流涎沫然中腑必歸胃腑中臟必歸心臟也腑邪必歸胃者風性善行空竅水穀入胃則胃實腸虛風邪即進入腸中少頃水穀入腸則腸實胃虛風復進入胃中見胃風必奔迫於二腸之間也風入胃中胃熱必盛蒸其精液結為痰涎壅塞隧道胃之支絡心者才有壅塞即堵其神氣出入之竅故不識人也諸臟受邪至盛必進入於心而亂其神明神明無主則舌縱難言廉泉開而流涎沫也治中風亦如治傷寒不但邪在三陽引入三陰為犯大禁即邪在太陽引入陽明少陽亦為犯禁也故風初中絡即不可引之入經中經即不可引之入腑中腑即不可引之入臟引邪深入釀患無窮又毋論中風淺深但見自汗則津液外出小便自少若更利之使津液下竭則營衛之氣轉衰無以制風火之勢必增其煩熱而其陰日亡也況陽明利小便尤為犯禁少陰利小便必失溲而殺人矣且風中經絡只宜宣之使散誤下則風邪乘虛入腑入臟釀患無窮若夫中風之候多有平素積虛臟真不守者下之立亡惟在腑一證內實便閉間有可下然不過解其煩熱非大下也雖中腑日久熱勢深極轉入臟者此屬可下必使風與熱俱去為善若開其壅塞反增風勢何以下之哉李士材曰凡中風昏倒先須順氣然後治風用竹瀝薑汁調蘇合香丸如口噤抉開灌之如抉不開急用牙皂生半夏細辛為細末吹入鼻中有嚏可治無嚏則死最要分別閉與脫二證明白如牙關緊閉兩手握固即是閉症用蘇合香丸或三生飲之類開之若口開心絶手撒脾絶眼合肝絶遺尿腎絶聲如鼾肺絶即是脫證更有吐沫直視肉脫筋骨痛髮直搖頭上竄面赤如妝汗出如珠皆脫絶之證宜大劑理中湯灌之及灸臍下雖日不治亦可救十中之一若誤服蘇合香丸牛黃至寶之類即不可救矣蓋斬關奪門之將原為閉證設若施之脫症如人既入井而又下之石也世人蹈此弊而死不可勝數故特表而出之惟中臟之症是閉而非脫者宜蘇合丸牛黃丸至寶丹活命金丹之類若中腑與中血脈之症斷不宜用為內有麝香入脾治肉牛黃入肝治筋龍腦入腎治骨恐反引風邪深入骨髓如油入面莫之能出不語心脾受風故舌強不語風寒客於會厭故卒然無音若因痰迷心竅當清心火若因濕痰當清脾熱若因風熱當清肝火若因風痰當導痰涎若因虛火當壯水之主若因虛寒厥逆當益火之源神仙解語丹滌痰湯加味轉舌膏八味丸隨證選用手足不隨諸陽之經皆起於手足風寒客於肌膚始為痹復傷陽經隨其虛處而停滯與血氣相搏故風痹而手足不隨實者脾土太過當瀉其濕虛者脾土不足當補其氣血枯筋急者四物湯木旺風淫者四物湯加鉤藤秦艽防風多痰者加秦艽天麻竹瀝薑汁半身不遂偏枯一症皆由氣血不周經曰風氣通於肝風搏則熱盛熱盛則水乾水乾則氣不榮精乃亡此風病之所由作也故曰治風先治血血行風自滅痰涎壅盛宜用吐法稀涎散或橘紅一斤運流水七碗煎至二碗頓服白湯導之吐痰之聖藥也二陳湯星香散加竹瀝薑汁虛者六君子同星香散脈沉伏無熱者三生飲加全蠍一用養正丹可以墜下痰鎮安元氣張子和中風論曰口眼喎斜俗工於中風掉眩症一概治之然而不愈者蓋知竅而不知經知經而不知氣故也人之七竅如肝竅目目為肝之外候肺竅鼻鼻為肺之外候心竅舌舌無竅心與腎合而寄竅於耳故舌與耳俱為心之外候俗工只知目病歸之肝口病歸之脾鼻病歸之肺耳病歸之腎舌病歸之心更無改張豈之目之內眥上下三綱足太陽及陽明起於此目之鋭眥是少陽起於此手少陽至於此鼻之左右足陽明手陽明夾乎此口之左右亦此兩經環之此七竅有病不可獨歸之五臟當歸之六陽經也然求之世之能知十二經所起所會所交所合與夫循環過注上下夾貫種種所別千萬人而不得一二人於其所知又不過執十二經便為病本以陽經為熱陰經為寒檢方尋藥治之而已詎知靈樞經曰足之陽明手之太陽筋急則口目為僻此十二經受病之處也非為病者也及為病者天之六氣也俗工不識往往紛然然則口眼喎斜治之若何曰足之太陽足之陽明右目有之左目亦有之足之陽明手之陽明口左有之口右亦有之此兩道也靈樞又言足陽明之筋其病頰筋有寒則急引頰移口熱則筋弛縱緩不勝收故僻左寒右熱則左急而右緩右寒左熱則右急而左緩故偏於左者左寒而右熱偏於右者右寒而左熱也夫寒不可輕用辛熱之劑蓋左中寒而迫熱於右右中風則逼熱於左陽氣不得宣行故也而況風者甲乙木也口眼陽明皆為胃土風偏賊之此口眼之所以僻也或曰七竅惟口眼喎斜而耳鼻獨無此病者何也曰動則生風靜則風息天地之常理也考之易象有足相符者震巽主動坤艮主靜動則皆屬木靜則皆屬土觀卦者視之理也視者日之用也目之上綱則眨下綱則不眨故觀卦上巽而下坤頤卦者養之理也養者口之用也口之下頷則嚼上頷則不嚼故頤卦上艮而下震口目常動故風生焉耳鼻常靜故風息焉當思目雖斜而目之眶未常斜口雖喎而口之輔頰車未嘗喎此經之受病而非竅之受病明矣此病氣虛風入而為偏上不得出下不得泄真氣為邪氣所陷此宜灸承泣地倉不效當灸人迎又風火交勝兩手脈必急數弦實蓋火勝則制金金衰則木茂木茂則風生止可流濕潤燥通郁為主而用及薑附烏桂起石硫黃之劑者是耶非耶薛立齋曰中風者即內經所謂偏枯風痱風懿風痹是也而有中腑中臟中血脈之分焉夫中腑者為在表中臟者為在裡中血脈者為在中在表者宜微汗在裡者宜微下在中者宜調榮中腑者多著四肢如手足拘急不仁惡風寒如數者病淺皆易治用加減續命湯之類中臟多滯九竅如眼瞀者中於肝舌不能言者中於心唇緩便閉者中於脾鼻塞者中於肺耳聾者中於腎此數者病深多難治中血脈者外無六經之症內無便溺之阻肢不能舉口不能言用大秦艽湯主之中腑者多兼中臟如左關脈浮弦而目青左脅偏痛筋脈拘急目瞤頭目眩手足不收坐踞不得此中膽兼中肝也用犀角散之類如左寸脈浮洪面舌赤汗多惡風心神顛倒言語謇澀舌強口乾忪悸恍惚此中小腸兼中心也用麻黃散之類如右關脈浮或浮大面唇黃汗多惡風口喎語澀身重怠惰嗜臥肌膚不仁皮肉瞤動腹膨不食此中胃兼中脾也用防風散之類如右寸脈浮澀而短面色白鼻流清涕多喘胸中冒悶短氣自汗聲嘶四肢痿弱此中大腸兼中肺也用五味湯之類如左尺脈浮滑面目黧黑腰脊痛引小腹不能俯仰兩耳虛鳴骨節疼痛足痿善恐此中膀胱兼中腎也用獨活散之類此皆言真中風也而有氣血之分焉蓋氣虛而中者由元氣虛而賊風襲之則右手足不仁用六君子湯加鉤藤薑汁竹瀝血虛而中者由陰血虛而賊風襲之則左手足不仁用四物湯加鉤藤薑汁竹瀝氣血俱虛而中者則左右手足皆不仁用八珍湯加鉤藤薑汁竹瀝其與中風相類者則有中寒中濕中火中氣食厥勞傷房勞等症如中於寒者謂冬月卒中寒氣昏冒口噤肢攣惡寒脈浮緊用麻黃桂枝理中之類中於暑者謂夏月卒冒炎暑昏冒痿厥吐瀉喘滿用十味香薷飲之類中於濕者丹溪所謂東南之人多因濕土生痰痰生熱熱生風也用清燥湯之類加竹瀝薑汁中於火者河間所謂非肝木之風內中六淫之邪外侵良由五志過極火盛水衰熱氣怫鬱昏冒而卒倒也用六味丸四君子獨參湯之類內有恚怒傷肝火動上炎者用柴胡湯之類中於氣者由七情過極氣厥昏冒或牙關緊急用蘇合香丸之類誤作風治者死食厥者過於飲食胃氣自傷不能運化故昏冒也用六君子加木香勞傷者過於勞役耗損元氣脾胃虛衰不任風寒故昏冒也用補中益氣湯房勞者因腎虛精耗氣不歸源故昏冒也用六味丸凡此皆類中風也夫內經主於風河間主於火東垣主於氣丹溪主於濕愚之斯論攢補前人之缺若夫地之南北人之虛實固有不同其男子女人大約相似附醫案靳閣老夫人先胸脅脹滿後四肢不收自汗如水小便自遺口緊目瞤飲食不進十餘日矣或以為中臟公甚憂余曰非也若風既中臟真氣既脫惡症既見禍在反掌焉能延之乃候其色面目俱赤而時或青診其脈左三部洪數惟肝尤甚余曰胸乳脹痛肝經血虛肝氣痞塞也四肢不收肝經血虛不能養筋也自汗不止肝經風熱津液妄泄也小便自遺肝經熱甚陰挺失職也大便不實肝木熾盛克脾土也遂用犀角散四劑諸症頓愈又用加味逍遙散調理而安後因鬱結前症復作兼發熱嘔吐飲食少思月經不止此木盛剋土而脾不能攝血也用加味歸脾湯為主佐以加味逍遙散調補肝脾之氣清和肝脾之血而愈非風證張景嶽曰非風症諸書皆雲氣體虛弱邪氣乘虛而入此言感邪之由然有邪無邪何可不辨有邪者即傷寒瘧痹之屬寒熱走注腫痛偏枯此病由於經宜先扶正氣而通經逐邪之品不得不用以為佐無邪者即非風衰敗之屬本無寒熱痛苦肢體忽廢言語變常此病由乎臟故精虛則氣去為眩運卒倒氣去則神失為昏憒無知此時救本不暇尚可雜用以傷及正氣乎凡非風卒倒等症無非氣脫而然七情酒色先傷五臟之真陰此致病之本也內外勞傷或年力衰邁積損為頽此發病之因也陰虧於前陽損於後陰陷於下陽乏於上陰陽相失精氣不交以致卒爾昏憒倒僕皆陽氣暴絶之候其為病者忽然汗出榮衛之氣脫也或遺尿者命門之氣脫也或口開不合者陽明經之氣脫也或口角流涎者太陰臟氣之脫也或四肢癱軟者肝脾之氣敗也或昏倦無知語言難出者神敗於心精敗於腎也此皆衝任氣脫形神俱敗而然故於中年之後多有此症治此若痰氣阻塞必須大劑參附峻補元氣以先其急隨用地黃當歸枸杞之類填補真陰以培其本蓋精即氣之根經曰精化為氣是也若誤指風痰治從消散必不救矣風厥之症獨重肝邪肝有胃氣之賊人無胃氣則死病為強直掉眩之類皆風木之化病為四肢不用痰涎壅盛皆脾虛之候雖曰東方之實然以五陽俱敗肝失所養責在脾腎之虛使脾胃不虛肝木雖強必無乘脾之患使腎水不虛則肝木得養何有強直之虞夫所謂胃氣者即二十五陽也非獨陽明為言所謂腎水者即五臟六腑之精非獨少陰為言陰陽一敗真臟自見真臟者肝邪也無胃氣也此即非風類風病之大本也非風多痰者悉由中虛夫痰即水也其本在腎其標在脾在腎者水不歸源水泛為痰也在脾者以飲食不化土不制水也故人不能食者反能生痰此以脾虛不能化食而食即為痰凡病虛勞其痰必多正以脾愈虛則水液悉化為痰故凡癱瘓瘛瘲半身不遂等症雖痰在經絡使果榮衛和調則津血自充且行何痰之有惟元陽虧損則水中無氣津凝血敗皆化為痰若謂痰在經絡非攻不去則安有獨攻其痰而津血無動乎津血復傷元氣愈竭惟宜溫脾強腎以治痰之本使根本漸充則痰不治而自去矣治痰之法凡初病痰氣不盛者必不可疑其為痰而妄用痰藥若果痰涎壅盛填塞胸膈則不得不先開其痰以通藥食之道而開痰之法唯吐為捷如獨聖散茶調散稀涎散之屬恐元氣大虛不能當此峻劑或用牛黃丸抱龍丸之類但使咽喉氣通能進湯藥即止故治痰之法必察其可攻與否然後用之斯無誤也若其眼直咬牙肢體拘急面赤強徑有力者雖見昏沉亦為可治如形症已定痰氣不甚萬勿治痰當調其氣血若果痰涎須分虛實治之若氣不甚虛或寒或濕生痰者六安煎二陳湯因火者清膈飲及竹瀝童便火甚者抽薪飲脾虛兼嘔多痰者六君子湯五味異功散陰虛不足兼燥而咳者金水六君煎陰虛水泛為痰者六味丸八味丸脾胃虛寒不能運化為痰者但宜溫補根本中氣虛者理中湯溫胃飲陰不足者理陰煎若死證已具吐亦無益若痰氣甚極不能吐者皆不治之症蓋形氣大虛忌用吐法是皆不可攻者也凡非風口眼喎斜半身不遂及四肢無力掉搖拘攣之屬皆筋骨之病肝腎精血虧損不能滋養百骸故筋有緩急骨有痿弱如樹木之衰津液不到即一枝枯稿人之偏廢亦猶是也經曰足得血而能步掌得血而能握今偏廢如此詎非衰敗之故乎陳濟川曰醫風先醫血血行風自滅蓋為肝邪之見本由肝血之虛肝血虛燥氣乘之矣而木從金化風必隨之宜養血以除燥則真陰復而假風自散矣若用風藥血必愈燥大非宜也然陰中有血亦有氣血中無氣則為縱緩廢弛氣中無血則病抽掣拘攣蓋氣主動無氣則不能動斯不能舉矣血主靜無血則不能靜斯不能舒矣故筋緩者當責其無氣筋急者當責其無血無氣宜五福飲四君子湯十全大補湯無血宜大小營煎主其與痿症之不動痛風之不靜義稍不同凡非風症多因表裡俱虛而病治法當以培補元氣為主若無兼症亦不宜攻補兼施蓋形骸之壞神志之亂皆根本傷敗之病何邪之有能復其元庶乎可愈一非風有火盛者即陽證也火甚者專治其火如抽薪飲白虎湯火微者兼補其陰如加減一陰煎但使火去六七即當調治其本然陽勝者陰必病故治熱必從血分甚者用苦寒微者用甘涼寒甚者即陰症也專宜益火寒微者宜溫胃飲八味丸寒甚者宜回陽飲理中四逆湯然寒勝者陽必病故治寒之法必從氣分如陽脫寒甚者宜灸關元氣海神闕以回其陽氣一非風掉眩惑亂者總由氣虛於上而然經曰上氣不足腦為之不滿頭為之苦傾目為之苦眩又曰上虛則眩此明訓也微覺有此當以五福飲之類培其中氣虛甚大補元煎否則卒倒之漸所由至也一非風麻木不仁因氣血不至所以不知痛癢蓋氣虛則麻血虛則木麻木不已偏枯痿廢此魄虛之候也經曰痱之為病身無痛者四肢不收智亂不甚其言微知可治甚則不能言不可治又經曰營氣虛則不仁衛氣虛則不用營衛俱虛則不仁且不用肉如故也人身與志不相有曰死即此類也凡遇此症只宜培養血氣勿得誤認為痰一非風煩熱自汗小水不利不可以藥利之蓋津液外泄小水必少再用滲利則陰水愈竭無以制火而煩燥益甚但使熱退汗止小水自利況自汗多屬陽明忌利小便宜生脈散一陰煎一非風遺尿者由腎氣虛脫最為危候宜參耆歸術補之然必命門火衰所以不能收攝甚者須加桂附論用藥佐使凡非風有兼症則通經佐使之法本不可廢蓋脈絡不通皆由血氣血氣兼症各有所因如因於風者必閉抑宜散而通之如麻桂柴羌辛芷之屬因於寒者必凝澀宜熱而通之如蔥椒桂附甘薑之屬因於熱者必乾涸宜涼而通之如芩連梔柏石膏知母之屬因於濕者必壅滯宜順利如蒼朮茵陳萆薢五苓之屬血滯者宜活如芎歸牛膝紅花桃仁硝黃之屬氣滯者宜行如木香香附烏沉枳殼之屬痰滯者宜開如星半牛黃天竺黃硃砂海石元明粉之屬氣血虛弱者惟宜溫補如參耆歸朮熟地枸杞牛膝之屬然虛實之異尤當詳審蓋通實者各從其類使無實邪而妄用通藥必傷元氣通虛者或陰或陽尤當知要如參耆所以補氣而氣虛之甚者非薑附之佐必不能追散失之元陽歸地所以補精血而陰虛之極者非桂附之引必不能復無根之生氣寒邪在經而客強主弱非桂附之勇則血脈不行痰濕在中而土寒水泛非薑附之暖則脾腎不健此通經之法實者可以用寒涼虛者必宜溫熱也但附子性剛勇而熱陰虛水虧多熱燥者非所宜但涉陽虛非此莫達一經病之輕症皮毛枯澀汗出眩運鼻塞者肺之經病血脈不榮顏色惟悴者心之經病肌肉消瘦浮腫不仁肉瞤筋惕四肢不用者脾之經病筋力疲困拘急掉瘛脅肋脹痛者肝之經病口眼歪斜足陽明及肝膽病骨弱無力坐立不能者腎之經病一經病之危症皮腠冰冷滑汗如油畏寒之甚者肺之經病眼瞀昏黑筋痛極者肝腎經病耳聾無聞骨痛極者腎之經病反張戴眼腰脊如折膀胱經病舌強不能言心腎經病唇緩口開手撒脾之經病一臟病之稍輕症咳嗽微喘短氣悲尤不已者病在肺臟言語無倫神昏多笑不寐者病在心臟腹滿少食吐涎嘔惡吞酸噯氣譫語多思者病在脾臟胸脅氣逆多驚多怒者病在肝臟小腹疼痛二便不調動氣上衝呻吟多恐者病在腎臟一臟病之危症氣大急大喘或氣脫失聲色灰白或紫赤色者肺腎氣絶神色脫昏沉不醒色赤黑者心臟氣絶痰涎壅極吞吐不能厄逆不止腹脹極色赤黑者脾胃氣絶眼閉不開急躁擾亂懊憹囊縮色青灰白者肝臟氣絶聲喑寒厥便閉泄不禁腎臟氣絶痿病門張子和曰痿之為狀兩足痿弱不能行用由腎水不能勝心火心火上爍肺金肺金受火制六葉皆焦皮毛虛弱急而薄者則生痿躃躃者足不能伸而行也腎水者肺金之子也今腎水衰少隨火上炎腎主兩足故骨髓衰竭由使內太過而致然至真要大論云諸痿喘嘔皆屬於上上者上焦也三焦者手少陽相火也痿喘嘔三病皆在膈上屬肺金之部分也故肌痹傳為脈痿濕痿不仁傳為肉痿髓竭足躃傳為骨痿房室太過為筋痿傳為白淫大抵痿之為病皆因客熱而成好欲貪色強力過度漸成痿疾故痿躃屬肺脈痿屬心筋痿屬肝肉痿屬脾骨痰屬腎總由肺受火邪葉焦之故相傳於四臟痿病成矣故疾病無寒其人脈必浮而大治之之法與治痹頗異風寒濕痹猶可湯蒸燔炙時或一效惟痿用之轉甚蓋痿以肺熱為本葉焦而成痿以此傳於五臟若作寒治是不刃而殺也內經謂治痿之法獨取陽明陽明者胃脈也五臟六腑之海也主潤養宗筋宗筋主束骨又主大利機關機關者身中大關節也以司屈伸是以陽明虛則宗筋縱宗筋縱則大脈不伸兩足痿弱然取陽明者胃脈也胃為水穀之誨人之四季以胃氣為本本固則精化精化則髓充髓充則足能履矣丹溪先生曰諸痿起於肺熱只此一句便見治法大意蓋肺金體燥而居上主氣畏火者也脾土性溫而居中主四肢畏木者也火性炎上若嗜欲無節則水失所養火寡於畏而侮所勝肺得火邪而熱矣木性剛急肺受熱則金失所養木寡於畏而侮所勝脾得木邪而傷矣肺熱則不能管攝一身脾傷則四肢不能為用而諸痿之病作經曰東方實西方虛瀉南方補北方夫瀉南方則肺金清而東方不實何脾傷之有補北方則心火降而四方不虛何肺熱之有故陽明實則宗筋潤能束骨而利機關矣治痿之法無出於此駱龍吉亦曰風火既熾當滋腎水李士材曰丹溪之言治痿當矣惜乎其未備經言病本雖五臟各有而獨重太陰肺治法雖諸經各調而獨重陽明胃蓋肺主氣化以行令於一身五臟之熱火熏蒸則金被克而肺熱葉焦故致疾有五臟之殊而手太陰之地未有不傷者也胃主受水穀以灌溉於四肢肺金之受邪失正則本無制而侮其所勝故治法有五臟之施而足陽明之地未有或遺者也然而獨取陽明所謂真氣所受於天與谷並而充身陽明虛則五臟無所稟不能行氣血濡筋骨利機關故百體中隨其不得受水穀處不用而為痿不獨取陽明而何取哉丹溪申明瀉南補北之説固當若胃虛減食者當以芳香辛溫之劑治之若拘於瀉南之説則胃愈傷矣誠能本此施治其於痿思過半矣治法心熱脈痿鐵粉銀箔黃連苦參龍膽草石蜜牛黃龍齒秦艽白蘚皮牡丹皮地骨皮雷丸犀角之屬肝氣熱筋痿生地天冬百合紫葳白蒺藜杜仲萆薢菟絲子川牛膝黃芩黃連之屬脾氣熱肉痿二木二陳霞天膏之屬腎氣熱骨痿金剛丸牛膝丸加味四斤丸煨腎丸肺熱痿黃耆天冬麥冬石斛百合山藥犀角通草桔梗枯芩山梔杏仁秦艽之屬挾濕熱健步丸加黃柏蒼朮黃芩或清燥湯濕痰二陳二朮竹瀝薑汁血虛四物湯二妙散補陰丸氣虛四君子湯合二妙散氣血俱虛十全大補湯食積木香檳榔丸死血桃仁紅花蓬朮川山甲四物湯腎肝下虛補益腎肝丸痰飲門王節齋曰痰者病也人之一身氣血清順則津液流通何痰之有惟夫氣血濁逆則津液不清熏蒸成聚而變為痰焉痰之本水也原於腎痰之動濕也主於脾古人用二陳湯為治痰通用者所以實脾燥濕治其標也然以之而治濕痰寒痰痰飲痰涎則固是矣若夫痰因火上肺金不清咳嗽時作及老痰郁痰結成黏塊凝滯喉間吐咯難出此等之痰皆因火邪上炎熏於上焦肺氣被郁故其津液之隨氣而升者為火熏蒸凝濁鬱結而成歲月積久根深蒂固故名老痰郁痰而其原則火邪也病在上焦心肺之分咽喉之間非中焦脾胃濕痰冷痰痰飲痰涎之比也故湯藥難治亦非半夏茯苓蒼朮枳實南星等藥所能治也惟開鬱降火清潤肺金而消化凝結之痰緩以治之庶可取效天冬黃芩海粉栝蔞仁桔梗香附連翹青黛芒硝橘紅大率飲酒之人酒氣上升為火肺與胃脘皆受火邪故鬱滯而成此天冬黃芩瀉肺火也海粉芒硝咸以軟堅也栝蔞潤肺除痰香附開鬱降氣連翹開結降火青黛解鬱火故皆不用辛燥之藥痰屬濕熱乃津液所化因風寒濕熱之感或七情飲食所傷以致氣逆液濁變為痰飲或吐咯不出或凝滯胸膈或留聚腸胃或流注經絡四肢隨氣升降遍身上下無處不到其為病也為喘為咳為噁心嘔吐為痞膈壅塞關格異病為泄為眩運為嘈雜怔忡驚悸為顛狂為寒熱為腫痛或胸間轆轆有聲或背心一點常如冰冷或四肢麻癢不仁皆痰所致百病中多有兼痰者世所不知也痰有新久輕重之殊新而輕者形氣清白稀薄氣味亦淡久而重者黃濁稠黏凝結咳之難出漸成惡味酸辣鹹苦甚至帶血而出治法痰生於脾胃實脾燥濕又隨氣而升宜順氣為先分導次之又氣升屬火順氣在於降火熱痰則清之濕痰則燥之風痰則散之郁痰則開之頑痰則軟之食積痰則消之在上者吐之在中者下之又中氣虛者宜固中氣以運痰若攻之太重則胃氣虛而痰愈盛矣主方用二陳湯總治一身之痰如要下行加引下藥上行加引上藥濕痰多飲如身體倦怠之類加蒼朮白朮寒痰痞塞胸中加半夏甚者加麻黃細辛烏頭之類痰厥頭痛亦加半夏風厥加南星枳殼白附子天麻殭蠶豬牙皂角之類氣虛者則更加竹瀝氣實加荊瀝俱用薑汁熱痰加黃芩黃連痰因火盛逆上降火為先加白朮黃芩石膏黃連之類眩運嘈雜火動其痰也亦加山梔黃連黃芩血虛有痰者加天冬知母栝蔞香附竹瀝薑汁帶血者更加黃芩白芍桑皮血滯不行中焦有飲者取竹瀝加薑韭自然汁氣虛有痰者加人參白朮脾虛者宜補中益氣以運痰下陷加白朮白芍神麯兼用升麻提起內傷挾痰加參耆白朮之類薑汁傳送或加竹瀝尤妙食積痰加神麯山楂麥芽炒黃連枳實以消之甚者必用攻之宜丸藥兼血虛者用補血藥送下中焦有痰者食積也胃氣亦賴所養若攻之盡則虛矣老痰用海石半夏栝蔞仁香附連翹之類五倍子佐他藥大治頑痰宜丸藥喉中有物咯不出咽不下者此痰結也用藥化之加鹹味軟堅之類宜栝蔞海石桔梗連翹香附少佐朴硝薑汁蜜化噙服脈澀者卒難開痰在膈上必用吐法膠固稠黏者脈浮者痰在經絡間者必用吐吐中有發散之義凡用吐升提其氣便吐如防風川芎桔梗芽茶生薑韭汁之類或瓜蒂散凡吐用布緊勒肚於不通風處痰在腸胃可下枳實甘遂巴豆大黃芒硝之類凡痰用利藥過多腸胃易虛則痰易生而多痰在脅下非白芥子不能除痰在皮裡膜外非薑汁竹瀝不可及在四肢非竹瀝不開在經絡中亦用竹瀝必佐以薑汁韭汁膈間有痰或顛狂或健忘或風痰俱用竹瀝與荊汁同功氣虛少食用竹瀝氣實能食用荊瀝凡人身上中下有塊是痰也問其平日好食何物吐下後方用藥凡人頭面頸頰身中有痰核不痛不紅不作膿者皆痰疰也宜隨處用藥消之滾痰丸功瀉腸胃痰積及小兒食積痰急驚痰盛者最為要藥常令合備但量人虛實用之薛立齋曰痰者脾胃之津液或為飲食所傷或因七精六淫所擾故氣壅而痰聚諺云肥人多痰而在瘦人亦有之者何也蓋脾統血行氣之經氣血俱盛何痰之有皆由過思與飲食所傷損其經絡脾血既虛胃氣獨盛是以濕因氣化故多痰也遊行周身無所不至痰氣既盛客必勝主或奪於脾之大絡之氣則倏然仆地者此痰厥也升於肺者則喘急咳嗽迷於心則怔忡恍惚走於肝則眩運不仁脅肋脹滿關於腎不咯而多痰唾留於胃脘則嘔泄而作寒熱注於胸則咽嗝不利眉稜骨痛入於腸則轆轆有聲散則有聲聚則不利竊謂若脾氣虛不能消濕宜用補中益氣湯加茯苓半夏若脾氣虛弱濕熱所致宜用東垣清燥湯若因胃氣虛弱寒痰凝結宜用人參理中湯若因脾胃虛寒而痰凝滯者宜理中化痰丸若因脾虛而痰滯氣逆者宜用六君子加木香若因脾胃虛弱而肝木乘侮宜六君子加柴胡頭痛宜用白朮半夏天麻湯若因脾胃虛弱寒邪所乘以致頭痛宜用附子細辛湯脈訣云熱則生風故云風自火出若風邪氣滯痰蘊於胸中者宜用南星枳殼白附子天麻殭蠶牙皂之類若因肺經風熱而生痰者宜用金沸草散若因風火相搏肝經風熱熾盛而生痰者宜用牛黃抱龍丸或牛黃清心丸若因肝經血燥而生痰者宜用柴胡梔子散若因中氣虛弱不能運化而生痰者宜用六君柴胡鉤藤李士材曰五痰五飲症各不同至於脾肺二家之痰尤不可混脾為濕土喜溫而惡寒潤故二朮星夏為要藥肺為燥金喜涼潤而惡溫燥故二母二冬地黃桔梗為要藥二者易治鮮不危困每見世俗惡半夏之燥喜貝母之潤若是脾痰則土氣益傷飲食忽減矣即使肺痰毋過於涼潤以傷中州稍用脾藥以生肺金方為善治故曰不理脾胃非其治也王中暘曰古今醫方痰論已嘗喻及顧外淫之病當祖仲景專科若七情之方雖有多門原其本標半因痰病蓋亦有因病而生痰者也故痰之為病不出六經醫書以脾為中州合胃為表裡胃為水穀之海其氣熏蒸上朝肺為華蓋主司皮毛周流內外充潤百骸氤氳為榮衛之氣合會為津液不源隨經變化在肝名津在肺名液在心名血在腎為精在胃為涎元和純粹穀氣相資升降無窮髓腦涕唾精津氣血液同出一源而隨機應感故凝之則為敗痰夫痰者濕類也屬足太陰濕土所司故腫滿至極則必浮在方則有理氣消腫之藥故不言痰也肺為貯痰之器痰實鬱勃而濕熱化化屬乎少陰君火所司在方則有除熱清劑故不言痰也火盛金衰木無以制屬足厥陰風木所司風性飄蕩動靜不常干犯諸經在方則有一百二十種風故不言痰也痰乃敗精結實之形窒礙朝會隧道氣不流暢在方則有七十二般氣故不言痰也津既為痰不復合氣氤氳停留肺胃之間自為惡物其冷如冰積之日久或咳不咳或喘不喘或嘔噦涎沫或不吐痰或面青唇黑四肢厥逆或惡風或惡寒或頭疼身痛或多汗如雨或即無汗本因肺氣狀若傷寒屬足太陽寒水所司在方則合分治法故不言痰也或因志不遂憂思鬱結或因驚伏痰或因伏痰怔忡如畏人捕拂勃至甚火氣上炎性好誇大語言錯謬狂亂悲笑逾垣上屋邪陽獨盛膂力過人屬少陽相火所司在方則有寧志鎮心之劑故不言痰也中風者涎痰浮凝津不潤下大便燥澀有伏痰者肺氣不治開合失常衣食辛熱或天氣抑蒸內外交爍而壅或沖冒風寒則毛竅驟開肺壅痰塞甚至皮毛枯竭皺燥並屬陽明燥金所司在方則各方證類故不言痰也蓋因痰而致病者先治其痰後調余病因病而致痰者先調其病後逐其痰其有敗痰既下諸症悉除經又云有治本而得者有治標而得者此之謂也戴元禮曰凡人忽患胸背手足頭項腰胯痛不可忍連筋骨牽引吊痛坐臥不安走易不定俗醫不曉謂之走㾏用風藥及針灸非也以藥貼亦非也或頭痛不可舉或神思昏倦多睡或飲食無味痰唾稠黏夜間喉中如鋸聲多流涎唾手足重墜痹冷脈不通誤認為癱瘓亦非也乃是痰飲頑涎伏在心膈上下變為此疾張子和曰留飲之證不過蓄水而已然其得之由來有五肝憤鬱而不得伸則乘脾脾氣不化故為留飲肝主慮久慮而不決則飲食不行脾主思久思而不已則脾結故亦為留飲因勞役遠行乘困飲水脾胃力衰因而嗜臥不能布散於脈亦為留飲飲酒過多腸胃已滿又復增之脬經不及滲泄久久如斯亦為留飲隆暑津液焦涸喜飲寒水本欲止渴乘快過多逸而不勤亦為留飲人病飲者不能出此五者之外然水者陰物也積水則生濕停酒則發燥久則成痰在左脅者同肥氣在右脅者同息賁上入肺則多嗽下入大腸則為泄入腎則為湧水濯濯如囊漿上下無所不之故在太陽則為支飲皆由氣逆而得之故濕在上者目黃面浮在下者股膝腫厥在中者支滿痞膈痰逆在陽不去者久則化氣在陰不去者久則成形今代劉河間依仲景十棗湯制三花神佑丸而加大黃牽牛新得之痰下三五十丸氣流飲去在上可以瓜蒂散通之下以禹功丸去之然後以痰劑流其餘蘊復未盡者可以苦葶藶杏仁桑皮椒目等逐水之藥伏水皆去矣夫黃連黃柏可以清上燥濕黃耆茯苓可以補下滲濕二者可以收後不可以先驅治病有先後邪未去時慎不可補耳戴院使曰有飲癖積成塊在腹脅之間類積聚用破塊藥多不效此當行其飲宜導痰湯何以知其為飲其人先曾病瘥口吐涎沫清水或素來多痰者是也又多飲人結成酒癖腹脅積塊脹急疼痛或全身腫滿肌黃少食宜十味大七氣湯紅花酒煎服王中暘曰一切無痰不嗽不噦者世人莫知為痰又見之於脈有蝦遊雀啄代止之形亦時有痰氣關格者若非諳練揚歷未免依經斷病而貽笑大方蓋痰凝氣滯關格不通其脈固有不可動者有兩三路亂動時有時無者或尺寸一有一無者有關脈絶滑不見者或時動而大小不常者有平居之人忽然而然者有素稟痰病不時而然者有僵仆暴中而然者非皆死脈也實因乎痰而然然痰之為症方書散入雜症是以大小七氣湯治中二陳半夏茯苓湯細辛白朮薄荷石膏白礬皂角南星貝母常山以至青州白丸子壽星散利種消酒化氣去風寬膈止惡諸方皆顯仁藏用於其間古人治痰莫不在斯而余因制滾痰丸一方獲效萬無一失惟脫形不食及水泄並孕婦不服外自數歲以上至八旬者皆可量度餌之或常人大便頻去或稍腹痛或微覺後重但看其色焦黃稠黏者並是痰瀉正宜服之逐去頑痰臟腑清利自然不泄也喻嘉言曰痰飲之證留伏二義最為難明金匱論留飲者三伏飲者一曰心下有留飲其人背寒如掌大曰留飲者脅下痛引缺盆曰胸中有留飲其人短氣而渴四肢歷節痛言胸中留飲阻抑上焦心肺之陽而為陰噎則有深入於背者有冷無熱並阻督脈上升之陽而背寒如掌大無非陽火內郁之象也脅下為手足厥陰上下之脈而足少陽之脈則由缺盆過季脅故脅下引缺盆而痛為留飲偏阻是木火不升之象飲留胸中短氣而渴四肢歷節痛為肺不行氣脾不散精之象也合三條而觀之心肺肝脾痰飲皆可留而纍之矣至伏飲曰膈上病痰飲喘嗽吐發則寒熱背痛腰疼目泣自出其人振振身瞤劇則必有伏飲言胸中乃陽氣所治留飲阻抑其陽則不能發動然重陰終難蔽睍有時陽伸忽而吐發然伸而復屈太陽不伸作寒熱腰背痛目泣少陽不伸風火之化鬱而並於陽明土中陽明主肌肉遂振振身瞤而劇也留飲之伏而不去其為纍更大若此治法無大於用溫藥和之而急以通其陽若仲景苓桂朮甘湯等雖治支滿目眩可於此仿其意矣又曰小兒慢脾風痰飲阻塞竅隧星附六君湯以醒之老人腎虛水泛痰飲上湧崔氏八味丸以攝之若脾胃虛寒飲食不思陰氣痞塞嘔吐涎沫者宜溫其中真陽虛者更補其下然熱痰乘風火上入目暗耳鳴多似虛證誤行溫補轉錮其痰永無出路醫之過耳滯下門劉宗厚曰滯下之病皆由腸胃日受飲食之積余不盡留滯於內濕蒸熱淤鬱結日深伏而不作時逢炎暑大行相火司令又調攝失宜復感酷熱之毒至秋陽氣始收火氣下降蒸發蓄積而滯下之證作矣以其積滯之滯行故名之曰滯下其濕熱積淤干於血分則赤干於氣分則白赤白兼下氣血俱受邪矣久而不愈氣血不運脾積不磨陳積脫滑凝若魚腦矣甚則腸胃空虛關門失守濁液並流色非一類錯雜混下狀如豆汁矣脾氣下陷虛坐努力便出色如白膿矣其熱傷血深濕毒相淤黏結紫色則紫黑矣其汙濁積而欲出氣滯而不與之俱出所以下迫窘痛後重裡急圊不能便起止不安此皆大腸經有所壅遏窒礙不得宣通故也嘗見世方一偏妄用兜澀下以巴磠或指濕熱與以淡滲非其治矣長沙論云痢之可下者悉用大黃之劑可溫用者是薑附之類河間亦言後重則宜下腹痛則宜和身重則除濕脈弦則去風膿血稠黏以重藥竭之身冷如汗以重藥導之風邪內蓄宜汗之騖溏為痢當溫之在表者汗之在裡者下之在上者湧之在下者竭之身表熱內疏之小便澀者分利之用藥輕重之別又加詳載行血則便膿自愈調氣則後重自除而丹溪又謂有大虛大寒者法當溫補觀此治法詎可膠柱鼓瑟又有胃弱而閉不食此名噤口痢內格嘔逆火起上炎之象此則胃虛木火乘之是土敗木賊也多成危候李士材曰治痢之法庸工謂痛無補法是以百無一補而世之病痢者十有九虛請悉言之氣本下陷而再行其氣後重不益甚乎中本虛衰而復攻其積元氣不愈竭乎濕熱傷血者自宜調血若過行推蕩血不轉傷乎津亡作渴者自宜止泄若但與滲利津不轉耗乎且曰直待痛止方補不知因虛而痛者愈攻則愈虛愈虛則愈痛矣此皆本末未明據有形之疾病不思無形之元氣也是故脈來微弱者可補形色虛薄者可補疾後而痢者可補因攻而劇者可補尤有至要者則在脾腎兩臟如先泄而後痢者脾傳腎為賊邪難治先痢而後泄者腎傳脾為微邪易治是知在脾者病淺在腎者病深腎為胃關未有久痢而腎不損故治痢不知補腎非其治也凡四君歸脾十全補中皆補脾虛未嘗不善若病在火衰土位無母設非桂附大補命門以救脾家之母則飲食何由而進門戶何由而固哉後重有邪迫而後重者至圊稍減未幾復甚虛滑而後重者圊後不減以得解愈虛故也下後仍後重者當甘草緩之升麻舉之噤口食不得入到口即吐有邪在上膈火氣衝逆者黃連木香桔梗橘紅茯苓菖蒲有胃虛嘔逆者治中湯有陽氣不足宿食未消者理中湯加砂仁木香陳皮豆蔻有肝氣嘔吐者木香黃連茱萸青皮芍藥之類有積穢在下惡氣熏蒸者承氣湯石蓮為末陳米湯調下石蓮即蓮子之老者市中皆木蓮不可用丹溪用人參黃連濃煎加薑汁細細呷之但得一呷下咽便開不治症下純血者死如屋漏水者死大孔如筒者死唇若塗朱者死發熱不休者死色如魚腦如豬肝半死半生脈細皮寒氣少前後泄痢飲食不入是謂五虛死惟用參附十可救一喻嘉言曰治瘧之法當從少陽治痢之表法亦當從於少陽蓋水穀之氣由胃入腸疾趨而下始焉少陽生髮之氣不伸繼焉少陽生髮之氣轉陷故泛而求之陽明不若專而求之少陽俾蒼天清淨之氣足以升舉物産之味自然變化精微輸泄有度而無下痢奔迫之苦矣況兩陽所藏之精液既以下泄尤不可更發其汗在傷寒經禁明有陽明禁汗之條而金匱復申下痢發汗之禁所以當從少陽半表之法緩緩逆挽其下陷之清氣俾身中行春夏之令究竟亦是和法其下陷之氣已舉矣凡先泄後痢者逆也復通之而不已者虛也脈微遲宜溫補脈弦數為逆主死産後痢亦宜溫補腹痛因肺金之氣鬱於大腸之間者以苦梗發之後用痢藥肛門痛熱留於下也初病身熱脈洪大宜清之黃芩芍藥湯病久身冷自汗宜溫之理中湯下血者宜涼血活血當歸黃芩桃仁之類風邪陷下者宜升提之濕熱傷血者宜行濕清熱下墜異常積中有紫黑血而且痛甚者此為死血用桃仁滑石行之血痢久不愈者屬陽虛陰脫用八珍湯加升舉之藥甚有陳陳自下手足厥冷脈漸微縮此為元氣欲絶急灸氣海用附子理中湯稍遲無救久痢血脈沉弱諸藥不效十全大補加薑棗入蜜煎服治痢有標本先後以腸胃論大腸為標胃為本以經脈論手足陽明為標少陽相火為本故胃受濕熱水穀從少陽之火化變為惡濁傳入於大腸不治少陽但治陽明無益也少陽生髮之氣傳入土中因而下陷不先以辛涼舉之而以苦寒奪之痢無止期矣且病情有虛實實者邪氣實虛者正氣虛也七實三虛攻邪為先七虛三實扶正為本十分實邪即為壯火食氣無正可扶急去其邪以留其正十分虛邪即為奄奄一息無實可攻急補其正聽邪自去可耳王節齋曰痢是濕熱食積治者別五色以屬五臟白者傷氣分赤者傷血分赤白相雜氣血俱傷黃者食積治法泄腸胃之濕熱開鬱結之氣消化積滯通風通用其初只是下之下後未愈隨證調之痢稍久者不可下胃虛故也痢多屬熱亦有虛與寒者虛者宜補寒者宜溫年老人及虛弱者不宜下主方黃芩黃連白芍此三味痢疾必用之藥木香枳殼檳榔炙甘草若腹痛加當歸砂仁再加木香芍藥若後重加滑石再加枳殼檳榔白芍生用條芩若白痢加白朮茯苓滑石陳皮初欲下之加大黃兼食積加山楂枳實若紅痢加當歸川芎桃仁初欲下之加大黃若紅白相雜加川芎當歸桃仁以理血滑石陳皮蒼朮以理氣有食積亦加山楂枳實若白痢久胃弱氣虛或下後未愈減芩連芍加白朮黃耆茯苓陳皮砂仁再加炙乾薑若紅痢久胃氣弱血虛或下後未愈減芩連加當歸川芎熟地阿膠陳皮白朮若赤黑相雜此濕勝也小便赤澀短少加木通澤瀉茯苓山梔以分利之若血痢加當歸川芎生地桃仁槐花久不愈減芩連枳檳加阿膠炒側柏葉黑乾薑白朮陳皮若久利後重不去此大腸墜下去檳榔枳殼用條芩加升麻以提之若嘔吐食不得下加石膏陳皮山梔入薑汁緩呷之以泄胃口之熱如氣血虛而痢者四物湯加人參白朮陳皮芩連阿膠之類以補之而痢自止若寒痢用黃連木香酒芍當歸炙乾薑砂仁厚朴肉桂之類若誤服濕熱之藥止澀之雖積久亦宜用前法以下之下後方調之若下之未愈又用前法調理而久不愈此屬虛寒滑脫宜用補寒更加龍骨赤石脂粟殼烏梅等收澀之藥張景嶽曰凡治痢疾最當察虛實辨寒熱此泄痢中最大關係而陰陽之診為尤急如實症必形氣強壯脈息滑實或素縱口腹多脹滿堅痛及年少新病脾氣未損者方可用治標之法行之利之泄之若虛症形體薄弱顏色青白脈雖緊數而無力無神脈見真弦中虛似實或素稟陽衰素多痰積或偶犯生冷偶中雨水陰寒總惟脾弱之輩多有此症寒熱之辨果熱則必畏熱而喜冷不欲衣被渴甚飲水小便熱澀而痛下純血鮮紅脈滑實有力形躁急多煩若無此症而泄痢不止必是虛寒至於陰陽之用欲其相濟不欲其相賊陽賊陰則為焦枯陰賊陽則為寂滅蓋陰常喜靜而惡動陽常喜暖而惡寒及其相賊陰畏陽之亢所以陰遇陽邪非枯即稿陽畏陰之毒所以陽逢陰寇不走即飛凡諸病劇而有假真疑似者即其症也而尤於傷寒痢疾為最今之痢甚者多見上下皆有熱證而實非真熱如煩則似熱非熱躁則似狂非狂懊憹不寧莫可名狀此非真熱之證也蓋以精血敗傷火中無水而陰失其靜故煩躁若此也又如飛於上則為口渴喉瘡或面紅身熱走於下則孔熱孔痛便黃便血此非實熱症也蓋以水火相刑陽為陰逐而火離其位故飛走若此也今人但見此等症僉曰熱矣而詎知煩躁之為陰虛飛走之為陽虛耶且如肌表皆由熱症本當惡熱而反不捨衣被或臍腹喜暖宜尉宜按者此外雖熱而內有寒也又如九竅皆有熱症必喜冷飲然口雖欲寒而腹畏之或寒冷下咽反增嘔惡腹疼或噎塞不行反生脹悶或口苦雖有瘡痛而反欲熱湯此則上下雖熱而中焦有寒也此外有陽氣素弱脈色少神等症若再犯寒涼必致飛者益飛走者益走欲孤陽之不滅不可得也凡治此者但能引火歸源使丹田暖則火就燥下元固則氣歸精此陰陽顛倒之神理也凡泄痢腹痛有實熱虛寒之辨實熱或因食積火邪然多脹滿堅硬痛而拒按此屬停滯微則行之甚者逐之火邪顯有內熱清之利之大都邪實於中者必多氣逆治法無論是食是火皆當行氣為先虛寒者由寒氣之在臟故腹痛也蓋元氣不足於內則雖無外受寒邪而中氣不暖即寒症也泄痢不止胃氣受傷膏血切膚安能不痛此其為痛乃因剝及腸臟而然凡寒侵臟腑及絡脈受傷血動氣滯者皆能為痛但察其不實不堅喜按尉胸腹似飢而不欲食胃脘作嘔而多吞酸無實熱等症總屬虛寒速宜溫養脾胃不得再加消伐如痛之甚少加木香以順其氣或多加當歸以和其血俟痛稍減則當去此二味蓋又恐木香之耗氣當歸之滑腸也蓋寒在下焦而作痛必加吳茱萸或痛不至甚只以溫補脾腎為主使脾胃安則痛自止泄痢之症必多口渴當審其有火無火若火盛熏脾爍胃津液耗竭好飲冰水多而不厭隨飲隨消者此熱渴治宜涼也若雖飲水而不至甚多或時喜涼復不喜涼此即寒聚於中而無根之火浮載於上不宜涼也於喜熱喜涼即可辨其寒熱似渴者干也非渴也口雖干而不欲湯飲則尤非熱症蓋水泄於下必津涸於上故不免於渴渴而欲飲正以內水不足欲得外水以相濟也詎必皆因於火乎且氣為水母其有氣虛不能生水者必補其母土為水生其有脾虛不能約水者必強其主而渴止矣使能不治其渴而治其所以渴何渴病之有凡痢小水必多不利其寒熱虛實大宜詳察若暴注之泄清濁不分水穀並歸於大腸其不利者暫也若非其熱則或以中寒而逼陽於下或泄痢亡陰而水虧色變或下焦陽氣不暖而水無以化或妄用滲利而涕逼汁乾者俱有之但察其三焦無火則雖黃雖澀縱皆亡陰亡液之症速當培補真陰是為良法凡裡急後重病在廣腸下肛其病本則在脾胃凡熱痢寒痢虛痢皆有之不得盡以為熱也蓋中焦有熱則熱邪下迫中焦有寒則寒邪下迫脾胃氣虛則氣陷下迫欲治此者當散其所因以治脾胃之本則無有不愈然病在廣腸已非食積而所留者惟下陷之氣氣本無形故雖欲出而實無所出是皆氣之使然耳河間謂行血則便膿自愈調氣則後重自除是固然矣然調氣之法如氣熱者涼之寒者溫之虛者補之陷者舉之皆調也必使氣和乃為調氣若但以木香檳榔當歸大黃行血散氣之屬謂之調和不知此所以行散者皆中焦之氣氣既下陷而復行之散之則氣必更陷其能愈乎痛有大孔痛者脾胃不和水穀之氣失其正化而濁惡難堪之味出之孔道此痛之不能免也又若火因泄陷陽為陰逐則胃中陽氣並逼於下無從解散此腫之所由生也故寒痢熱痢皆為腫痛痢多則痛多痢少則痛少痛與不痛亦由氣之陷與不陷耳治此者但治其痢則痛腫自散凡積聚之辨果以飲食之滯或積聚成塊或脹滿硬痛不化不行乃謂之積所當逐也至於膿垢非糟粕之屬實附腸著臟之脂膏皆精血之屬也無論瘦人肥人皆有此脂今之患此者必以五內受傷脂膏不固故曰剝而下若臟氣稍強則隨去隨生若臟氣剝削殆盡或以久泄久痢但見血水及屋漏者此敗竭極危之候也惟安之固之猶恐不及況攻之逐之用苦寒以滑之利之乎凡痢絶血鮮紅者多熱症以火性急速迫而下也紫紅白者少熱症以陰凝血敗損而然也絶白者無熱症以臟寒氣薄滑而然也然有以無紅而亦因熱者此亦暴注之類而非之痢之謂也有以紅紫雖多而不可言熱者此以陰絡受傷而非暴注之比也黃深而穢臭者此有熱症若淺黃色淡不甚臭或兼腥餿氣者此即不化之類皆寒症也黑而膿厚大臭者此焦色也多有火症若青黑而臭薄者此肝腎腐敗之色也凡痢之見血者無非陰絡受傷或寒或熱但傷絡脈則無不見血故不可必認為熱當以脈色形氣兼而察之庶不誤耳凡痢有發熱者似乎屬火然實熱之證反未必發熱惟痢傷精血陰虛水虧者多為熱症或虛中有火脈見有力惟保其陰若脈本無力全屬虛火宜壯水補陰六味八味若陰虛格陽為外熱則胃關煎右歸飲一噤口不食最危急之候丹溪以胃口熱甚用黃連人參治之不知噤口不皆實熱而虛寒者居多果火鬱胃中臟腑必多熾熱脈見洪數若察其胃口無脹滿火邪但見其有出無入臟氣不能容受一由脾胃之弱或嘔惡惡聞食臭或肌不能食此以中焦不運責在脾也一由腎氣之弱命門不暖則大腸不固小腸不化而胃氣不能行此以下焦失守化源無主責在腎也欲健中焦非參朮薑草之屬不可欲實下焦非熟地附子吳茱萸肉桂之屬不可脾腎強而食自入其理甚明矣吐瀉門霍亂水泄脾瀉腎瀉張子和曰風濕暍三氣合而成霍亂吐瀉轉筋風應厥陰肝木濕應太陰脾土也又曰厥陰所至為脅痛嘔泄少陽所至為嘔湧太陽所至為中滿霍亂吐下太陰所至為濡化也轉筋者風主肝肝主筋風急甚故轉筋也吐者暍也火主心心主炎上故嘔吐也泄注者土主濕脾濕下注故泄注也脾濕土氣為風木所克土化不行矣亢無雨火盛過極上怒發焉甚則雷霆驟雨大水橫流山崩岸落詎非太陰怒發之象耶故人病心腹滿脹腸鳴而為數便甚則心痛脅脹嘔吐霍亂厥發則注下跗腫身重啓元子謂以上病症皆脾濕所生是矣王海藏曰夫嘔吐而利者霍亂也三焦者水穀之道路邪在上焦者則吐而不利邪在下焦者則利而不吐邪在中焦既吐且利以飲食不節冷熱不調清濁相干陰陽乖隔遂成霍亂揮霍撩亂重也吐利而已輕也風濕暍外至生冷硬內生內外合而為病六淫所傷各有先後飲食所滯各有多少內外傳變各有輕重以經脈臟腑隨所應見治之吐利止後見外症者只作外傷治之薛立齋曰泄瀉米食所傷用六君子加穀芽麵食所傷加麥芽肉食所傷加山楂若兼寒熱作嘔乃肝木侮脾土用六君子加柴胡生薑兼嘔吐腹痛手足厥冷乃寒水侮土六君加薑桂不應用錢氏益黃散若元氣下陷發熱作渴肢體倦怠用補中益氣湯若泄瀉色黃乃脾土之真色用六君加木香薑桂若瀉在五更清晨飲食少思乃脾腎虛弱五更服四神丸日間用白朮散如不應或愈而復作或飲食少思急用八味丸補命門火以生脾土為善朱丹溪曰泄瀉有濕火氣虛痰積食積濕用四苓散加蒼朮甚者蒼白二術同加燥濕並滲泄火用四苓散加木香黃芩伐火邪痰積宜豁之用海粉青黛黃芩神麯糊丸服之在上者用吐提在下陷者宜升提之用升麻防風氣虛用人參白朮炒芍藥升麻食積二陳湯加澤瀉蒼朮白朮山楂神麯芎藭或吞保和丸瀉水者仍用五苓散久病大腸氣泄用熟地半兩炒白芍知母各三錢升麻乾薑各二錢炙甘草一錢為末粥丸服之仍用艾炷於百會穴灸三壯脾瀉當補脾氣健運後常用炒白朮四兩炒神麯三兩炒芍藥三兩半冬月及春初用肉豆蔻代之或散或湯作餅子尤佳脾泄已久大腸不禁此脾已脫宜急澀之以赤石脂肉豆蔻乾薑戴元禮曰凡瀉水腹不痛者是濕飲食入胃不住或完穀不化是氣虛腹痛泄水腸鳴痛一陳瀉一陳是火或時瀉或時不瀉或多或少是痰積腹痛甚而瀉瀉後痛減者是食積王節齋曰凡泄瀉病誤用參耆等甘溫之藥則病不能愈而成變為黃疸蓋瀉屬濕甘溫之藥能生濕熱故反助病邪久則濕熱甚而為疸矣惟用苦溫苦寒之藥以治之則愈若寒瀉濕熱苦溫除濕寒也泄止後脾胃虛弱方可參耆之藥以補之趙養葵曰瀉痢東垣著脾胃之論其間治脾泄之症庶無餘蘊矣特未及乎腎泄也仲景云下利不止醫以理中與之利益甚理中者理中焦也此利在下焦當以理下焦法則愈矣昔趙以德云聞先師言泄瀉之症其類多端得於六淫五邪飲食所傷之外復有雜合之邪似難執法而治乃見先師治氣暴脫而虛頓瀉不知人口眼俱閉呼吸甚微凡欲絶者灸氣海飲人參膏十餘斤而愈治積痰在肺致其所合大腸之氣不固者湧出上焦之痰則肺氣不降而大腸之虛自復矣治憂思太過脾氣結而不能升舉陷入下焦而成泄瀉者開其鬱結補其脾胃使穀氣升發也治陰虛而不能司禁固之權者峻補其腎而愈也凡此之類甚多先生治之圓機活法無他熟在內經耳經曰腎主大小便又曰腎司開闔又曰腎開竅於二陰腎既虛衰則命門之火熄而水獨治故每天五更天明時正亥子水旺之刻故特甚也惟八味丸以補其陽則腎中之水火既濟而開闔之權得宜況命門之火旺火能生土而脾亦強矣古方有椒附丸五味子散皆治腎泄之神方不可不考也秦越人難經有大瘕泄者即腎泄也注云裡急後重數至圊而不能便莖中痛世人不知誤為滯下治之禍不旋踵此是腎虛之症褚氏精血論中雲精已耗而復竭之則大小便牽痛愈痛則愈便愈便則愈痛須以補中益氣湯倍升麻送四神丸又以八味丸料加五味子茱萸補骨脂肉豆蔻多服乃愈此等症候以利藥致損元氣肢體腫脹而斃者不可枚舉方約之曰久泄腸胃虛脫止澀之劑不得已而用之又用藥不可太苦太甘太苦則傷脾太甘則生濕惟當以淡劑利竅為最以滲濕燥脾為主症雖分濕火虛寒痰食六者之殊而三虛不可不察三虛者脾虛腎虛肝虛也脾虛飲食所傷也腎虛色欲所傷也肝虛忿怒所傷也飲食傷脾不能運化色欲傷腎不能閉藏忿怒傷肝木邪剋土皆令泄瀉又嘗論之瀉泄痢瘧同乎一治多由暑月脾胃氣虛飲食傷損所致才傷便作則為泄瀉停積既久則為瘧痢而瘧與痢又有分別飲食為痰充乎胸脅則為瘧疾飲食為積膠乎腸胃則為痢症古人謂無痰不成瘧無積不成痢有以哉工海藏曰吐瀉轉筋身熱脈長陽明本病也宜和中四君平胃建中選用自汗脈浮者四君加桂脅下痛脈弦者建中加木瓜柴胡湯平胃加木瓜亦可如吐瀉後大便不通胃中實痛四君加大黃主之如腹中痛體重脈沉細四君加芍藥高良薑四肢拘急脈沉遲屬少陰四君加薑附厚朴四肢厥冷微緩屬厥陰建中加附子當歸張景嶽曰泄瀉之本由於脾胃受傷則水反為濕谷反為滯精華之氣不能輸化惟脾強者滯去則愈此可以清利攻逐也脾弱者因虛所以易泄因泄所以愈虛蓋關門不固則氣隨泄去氣去則陽衰而寒從中生且陰寒之性降下必及腎故泄多亡陰謂亡其陰中之陽耳所以泄瀉不愈必自太陰傳於少陰而為腸澼詎非降泄之甚而陽氣不升臟氣不固之病乎若復以寒涼攻逐無不致敗先哲曰治泄不利小便非其治也然小便不利其因非一宜詳辨之如濕勝而不利以水土相亂並歸大腸而然也熱勝而不利以火乘陰分水道閉澀而然也有寒瀉而不利以小腸之火受傷氣化無權也有脾虛而不利以土不制水清濁不分也有命門火衰而不利以真陰虧損元精枯涸也凡此小水不利之候惟暴注新病形氣強壯者可利若病久形不足脈症多寒形氣虛弱者不可利蓋虛寒之泄本非水有餘實因火不足本非水不利實因氣不行倘不察其所病之根未有不愈利愈虛而速其危者矣又氣泄症必先怒時挾食隨觸而發此肝脾二臟受病法當補脾之虛順肝之氣但虛實有微甚宜分輕重治之程郊倩曰凡病至而能奠安治定者全賴脾胃之氣為之主今則邪犯中焦卒然而起致令脾胃失其主持一任邪之揮霍嘔吐下利從其治處而擾亂之毋論受寒中暑及挾飲食之邪皆屬中氣乖張陰邪來侮以其病陰而症則陽變治為亂是名霍亂故中虛受擾外氣輒亦失治病發熱頭痛身疼惡寒夾此吐利而來其脈則微澀此屬正虛邪勝陽微陰擾舍溫經散寒扶陽抑陰外均非其治自其初證言之其有頭疼發熱身疼痛之表症要以分寒熱而治熱多飲水者五苓散主之於溫經植土中徹其寒水寒多惡飲水者理中丸主之一意溫中補土若惡寒脈微復利利止為亡血所以更復發熱四逆加人參湯主之助陽生陰務復盡真陽為主若吐利止而身痛不休當消息和解其外宜桂枝湯小和之若吐利汗出發熱惡寒四肢拘急手足厥冷者與既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之回陽救急交通其氣用仲景之法可耳瘧疾門繆仲淳曰經云夏傷於暑秋必痎瘧瘧論一篇發明已詳蓋其間中氣不足脾胃虛弱暑邪乘虛客之而作雖隨經隨症投藥解散必先清暑益氣調理脾胃為主有食者兼消導奪食有風兼散風有老痰伏飲者兼豁痰逐飲感瘴癘者兼消瘴癘汗多者固表無汗者解表泄利兼升發利小便便燥者兼益陰潤燥久而不解必屬於虛氣虛補氣血虛補血兩虛者氣血兼補非大補真氣大健脾胃不得瘳也蓋瘧邪由於中氣虛破氣則傷中氣邪不能解甚則中滿不思飲食作泄惡寒口乾惟傷食宜消不同此法若誤下則邪氣陷於內變為滯下或腹痛腫脹嘔惡不思食凡破氣下泄藥切戒勿用宜清暑益氣健脾開胃兼消痰宜分臟腑手足六經所見症施治先清暑熱宜服白虎湯加減消息用之其藥俱宜黃昏煎以井水澄冷露一宿五更時溫服蓋瘧乃暑邪得露則散也若足太陽見症其人腰痛頭痛頭重寒從背起先寒後熱熇熇暍暍然熱止汗出難已或遍身骨痛小便赤宜羌活廣皮黃芩前胡甘草豬苓知母若渴者即兼陽明宜加石膏倍知母麥冬渴而汗少加葛根若涉深秋或入冬宜多加薑皮因虛加人參虛汗多加黃耆桂枝汗止即止桂枝不可多用若病人素有熱去桂枝以芍藥五味代之若發於陰並加當歸小便短澀與六一散二三服下午服理脾健胃藥橘紅豆蔻茯苓山楂麥芽藿香人參白朮白芍扁豆有肺火者去參術加麥冬叉斛烏梅肉停食者必惡食加消導藥食消即已多服則損中氣胃家素有濕痰者其症不渴寒多方可用半夏橘紅二術大劑與之嘔甚者兼用薑皮若症見足陽明其人發熱頭痛鼻乾欲引飲目眴眴不得眠甚則煩躁畏火光人聲木聲可加葛根虛而作勞者加人參汗多加白朮痰多加貝母橘紅寒熱俱盛指爪見紫暗者加桂枝久而不解用人參薑皮兩許下午服理脾健胃藥如前若症見足少陽經其人往來寒熱口苦耳聾胸脅痛或嘔宜服小柴胡湯渴者去半夏加石膏麥冬肺熱去人參加知母倍加麥冬有痰不渴本方加貝母白朮茯苓薑皮病人陰虛而有熱者雖嘔惡忌用半夏生薑宜竹茹橘紅麥冬茯苓烏梅代之以上三陽經瘧邪在三陽藥宜辛寒如石膏知母柴胡甘寒如葛根麥冬竹葉粳米苦寒如黃芩之類為君乃可以散暑邪除熱渴墜頭痛兼寒甚者則間用辛溫如薑皮桂枝以為嚮導以伏其邪則病易退凡寒甚者病因於虛或作勞者亦因於虛皆宜甘溫以人參黃耆術為君佐以辛甘如桂枝薑皮之屬脾胃虛弱飲食不消者則補之以參朮佐以消導如白豆蔻麥芽砂仁草豆寇枳實陳皮山楂之屬在陰分者則以當歸牛膝為君佐以薑桂如熱甚而渴去薑桂加知母麥冬竹葉牛膝鱉甲若足厥陰經其症先寒後熱也色蒼蒼然善太息甚者狀如欲死或頭疼而渴宜先服三黃石膏湯加鱉甲柴胡陳皮以祛暑邪後用當歸鱉甲牛膝柴胡如熱甚而渴加花粉麥冬知母如脾胃薄弱或溏瀉去當歸加人參寒甚者加桂枝薑皮人參足太陰見症先寒後熱或寒多若脾瘧必寒從中起善嘔嘔已乃衰然後發熱熱過汗出乃已熱甚者或渴否則不渴喜火宜服桂枝湯建中湯虛者以人參薑皮各兩許有痰加朮陳皮足少陰見症寒熱俱甚腰痛脊強口渴寒從下起小便短赤宜先服人參白虎湯加桂枝以祛暑邪後用鱉甲牛膝熱甚者加知母麥冬寒甚者加桂枝嘔則兼加薑皮如熱甚而嘔去桂枝薑皮加竹茹人參陳皮肝腎同一治也以上三陰經瘧夫瘧病多挾痰以故熱痰須用貝母為君竹瀝竹茹花粉橘紅茯苓佐之如寒痰發熱不渴者用半夏白朮陳皮為君加生薑皮瘧病多挾風有風者必用何首烏為君白朮陳皮為臣葛根薑皮羌活佐之不頭痛除羌活勞瘧病人陰不足或作勞或房勞發於陰或間日或二日三日一發為病深以鱉甲牛膝何首烏為君陳皮為佐發於夜而便燥者加當歸脾虛弱者勿加薛立齋曰瘧因脾胃虛弱飲食停滯或外邪所感或鬱怒傷脾或暑邪所伏審系飲食停滯用六君子加桔梗蒼朮藿香外邪多而飲食少用藿香正氣散外邪少而飲食多用人參養胃湯勞傷元氣用補中益氣湯若鬱怒所傷用小柴胡兼歸脾湯隨證加減用之病作時大熱躁渴以薑湯乘熱飲之此截瘧之良法也每見發時飲啖生冷多致脾胃虛損大抵屬外感者主以補養佐以解散其邪自退審系勞傷元氣雖有百症但用補中益氣其病自愈若外邪既退即補中益氣以實其表若過用發表虧損脾胃皆致綿延難治凡此不問陰陽日夜所發皆宜補中益氣此不截之截也夫人以脾胃為主未有脾胃實而患瘧痢者若專主發表攻裡降火導痰治其末而忘其本也然此乃瘧之大略如不應當分六經表裡而治之大凡久瘧多屬元氣虛寒蓋氣虛則寒血虛則熱胃虛則惡寒脾虛則發熱陰火下流則寒熱交作或吐涎不食戰粟泄瀉手足逆冷皆脾胃虛弱但補中益氣諸症悉愈喻嘉言曰夫人四體安然外邪得入而瘧之每伏藏於半表半裡入而與陰爭則寒出而與陽爭則熱半表半裡者少陽也寒熱往來一皆少陽所主謂少陽而無他經之症則有之謂他經而全不涉少陽則不成其為瘧矣柴胡湯本陰陽兩停之方可隨瘧邪之進退以為進退如加桂枝乾薑則進而從陽痹著之邪可以開矣加黃芩黃連即退而從陰暑留之邪亦可以解矣咳嗽門徐叔拱曰咳嗽為患所感不同內分經絡臟腑外辨風寒暑濕燥火冷熱虛實之因咳者聲重從丹田下起連咳不已為肺氣傷而不清嗽者聲輕在上焦中起因脾濕動而為痰咳嗽者有痰有聲痰從聲出痰出而聲方止是也治之當隨臟腑四時傷感之因七情內傷五臟相勝而辨治之推其何因何脈以用何藥假令脈浮緩為風風宜發散非麻黃細辛旋覆花前胡之屬金沸草散參蘇飲之類則不能散其風邪脈弦緊為寒寒宜溫解非乾薑官桂款冬佛耳草之屬理中湯溫肺湯之類則不能溫其寒邪脈虛軟為暑暑當清之非柴胡黃芩地骨皮之屬六和湯中加麥冬烏梅之類則不清其暑毒脈沉澀為濕濕當燥之非蒼朮白朮輩不換金正氣散白朮散之類則不能燥其濕脈弦滑在胃中及氣口則為痰痰當利之非白芥子皂角石鹼二陳湯導痰湯之屬非半夏南星茯苓陳皮之類則不能去其痰涎脈浮盛在氣口者則為氣氣當舒之非紫蘇香附枳殼並香砂二陳湯紫蘇子湯加減三奇湯之屬則不能升降鬱結之氣脈虛弱漸細者為虛虛宜溫補非鍾乳阿膠黃耆人參不能補肺之虛虛而極作喘急又當暖補鎮墜於下脈弦細數者為虛勞勞則當滋養血氣非人參天冬五味子當歸之屬並黃耆鱉甲散秦艽鱉甲散之類則不能滋養榮衛脈沉實有力者為氣實氣實則當泄之非葶藶桑皮之屬以瀉白散平肺湯之類則不能以瀉肺之實脈濡而弱者為肺氣耗散則宜斂之非粟殼訶子烏梅酸澀之類提金散細辛五味湯之屬則不能收斂肺氣中間止有散斂二法散者為解散寒邪斂為收斂肺氣也宜散而斂則斂住寒邪為害匪輕宜斂而散走泄正氣害亦非小且如感風咳嗽已經發散表虛復感虛邪相乘又為喘咳若欲散風則愈重若收斂又滯其邪當先清解漸次斂之喘嗽自止矣喻嘉言曰內傷之咳治各不同火甚壯水金虛崇土郁甚舒肝氣逆理肺食積和中房勞補下內已先傷藥不宜峻李士材曰咳雖肺病五臟六腑皆能致之晰其條目經文尚有漏義總其綱領不過內傷外感而已風寒暑濕傷其外則先中於皮毛皮毛為肺之合肺邪不解他經亦病此自肺而後傳於諸臟也欲勞情志傷於內則臟氣受傷先由陰分而病及上焦此自諸臟而後傳於肺也自表而入者病在陽宜辛溫以散邪則肺清而咳愈自內而生者病在陰宜甘以壯水潤以養金則肺寧而咳愈大抵治表者藥不宜靜靜則流連不解變生他病故忌寒涼收斂如五臟生成篇所謂肺欲辛是也治內者藥不宜動動則虛火不寧燥癢愈甚故忌辛香燥熱如宣明五氣篇所謂辛走氣氣病無多食辛是也然治表者雖宜動以散邪若形病俱虛者又當補中氣而佐以和解倘專於發散恐肺氣益弱腠理益疏邪乘虛入病反增劇也治內者雖宜靜以養陰若命門火衰不能歸元則參耆桂附在所必用否則氣不化水終無補於陰也隨所症而調治在老人虛人皆以溫養補脾胃為主稍稍治標可也趙養葵曰肺為清虛之腑一物不容毫毛必咳又肺為嬌臟畏熱畏寒火刑金故嗽水冷金寒亦嗽故咳嗽者必責之肺而治之之法不在於肺而在於脾不專在脾而又歸重於腎蓋脾者肺之母腎者金之子故虛則補其母虛則補其子也如外感風寒而咳嗽者今人率以麻黃枳殼紫蘇之類發表散邪果系形氣俱實一汗而愈若形氣病氣俱虛宜補脾為主而佐以解表之藥古人所以制參蘇飲中必有參桂枝湯中有芍藥甘草解表兼實脾也脾實則肺金有養皮毛有衛已入之邪易以出後來之邪無自入矣又仁齋直指云肺出氣也腎納氣也肺為氣之主腎為氣之本凡咳嗽暴重動引百骸自覺氣促臍下逆奔而上者此腎虛不能收氣歸元當以地黃丸安腎丸主之毋徒從事於肺此虛則補子之義也有火爍肺金而咳嗽者宜清金降火然清金降火之理補北方正所以瀉南方也滋其陰即所以降火也自王節齋論酒色過度損傷肺腎真陰者不可服參耆服之過多則死蓋恐陽旺而陰消也此説行而世之治陰虛嗽者視參耆為砒毒以知柏為靈丹反不如能寡欲而不服藥者可綿延得活可悲也蓋病起於房勞虧損真陰陰虛而火上刑肺金金不能不傷當先以壯水之主以補真陰使水升而火降隨以參耆救肺之品以補腎之母使金水相生則病易愈矣又有脾胃先虛土虛不能制水水泛為痰子來乘母而嗽者初雖起於心火刑金因誤服寒涼致脾土受傷寒水挾木勢而上侵於肺胃水冷金寒粗工不達尚謂痰火難除寒涼倍進不知此症須用六君子加炮薑以補脾肺八味丸以補土母而引水歸元否則殆矣有嗽而聲啞者蓋金實不鳴金破亦不鳴實則清之破則補之又須知少陰之絡入肺中循喉嚨挾舌本肺為之標本虛則標弱故聲亂咽嘶舌萎聲不能前
