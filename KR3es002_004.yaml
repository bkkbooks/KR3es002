body:
  text: 卷四病能集二雜證十一門暑證王節齋曰夏至後病熱者為暑暑者相火行令也夏月人感之自口齒而入傷心胞絡之經其脈虛或浮而大散或弦細芤遲蓋熱傷氣則氣消而脈虛弱其為證煩則喘渴靜則多言身熱而煩心痛大渴引飲頭痛自汗倦怠少氣或下血發黃生斑甚者火熱制金不能平木搐搦不省人事治暑之法清心利小便最好暑傷氣宜補其氣為要又有惡寒或四肢逆冷甚者迷悶不省而為藿亂吐利痰滯嘔逆腹痛瀉利此則非暑傷人乃因暑而自致之病也以其因暑而得故亦謂之暑病然治法不同也若行人或農夫於日中勞役得之者是動而得之陽症也其病必苦頭痛發躁熱惡熱捫之肌膚火熱必大渴引飲汗大泄無氣以動乃天熱外傷元氣也宜清暑益氣用香薷黃連扁豆人參黃耆五味知母石膏之類暑熱發渴脈虛用人參白虎湯或竹葉石膏湯若暑熱之時無病之人或避暑熱納涼於深堂大廈涼臺水閣大扇風車是靜而得之陰症也其人必頭痛惡寒身形拘急肢節疼痛而煩心肌膚大熱無汗此為陰寒所遏使周身陽氣不得伸越宜用辛溫之劑以解表散寒用厚朴紫蘇葛根藿香羌活蒼朮之類若外既受寒內復傷生冷瓜果之類前藥再加乾薑砂仁神麯之類此非治暑也治因暑而致之病也若外不受寒止是內傷冰水冷物腹痛泄瀉或霍亂吐逆宜縮脾飲或理中湯加神麯麥芽砂仁蒼朮溫中消食也若吐瀉脈沉微者不可用涼藥宜用大順散加熟附等分或附子理中湯加炒白芍若既傷暑熱復傷生冷外熱內寒宜先治其內溫中消食次治其外清暑益氣而以理脾為主東垣立方已兼此意其用黃耆升麻人參白朮甘草麥冬當歸五味黃柏葛根是清暑補氣也蒼朮神麯青皮陳皮澤瀉是補脾也朱丹溪曰暑病之外又有注夏屬陰虛元氣不足夏初春末頭疼腳軟食少體熱者宜補中益氣湯去升柴加炒黃柏白芍挾痰加半夏橘紅或用生脈湯喻嘉言曰暑症日中勞役而觸冒其暑此宜清涼解其暑毒若深居廣廈襲風涼餐生冷遏抑其陽而病者一切清涼之方即不得徑情直施如無汗仍須透表以宣其陽如吐利急須和解以安其中甚者少用溫藥以從治之故冒暑之霍亂吐瀉以治暑為主避暑之霍亂吐瀉以和中溫中為主不可不辨也元豐朝立和劑局萃聚醫家經驗之方於中暑一門獨詳夏月暑症五方歷試見聞廣耳其取小半夏茯苓湯不治其暑專治其濕又以半夏茯苓少加甘草名消暑丸見消暑在消其濕名正言順矣其香薷飲用香薷扁豆厚朴為主方如熱盛則去扁豆加黃連為君治其心火濕盛則去黃連加茯苓甘草治其脾濕其縮脾飲則以脾為濕所浸淫而重滯於扁豆葛根甘草中佐以烏梅砂仁草果以快脾而去脾所惡之濕甚則用大順散來復丹以治暑症之多泄利者又即縮脾之意而推之也醫者於熱濕虛寒淺深緩急間酌而用之其利溥矣而後來諸賢以益虛繼之河間之桂苓甘露飲五苓三石意在生津液以益胃之虛子和之桂苓甘露飲用人參葛根甘草藿香木香益虛之中又兼去濁或用十味香薷飲於局方五味中增參耆朮陳木瓜益虛以去濕熱乃至東垣之清暑益氣湯人參黃耆湯又補中實衛以去其濕熱肥白內虛之人勿論中暑與否所宜頻服也中暑必顯躁煩熱悶東垣仿仲景竹葉石膏湯之制方名清燥湯仍以去濕為首務夫燥與濕相反者也而清燥亦務除濕非東垣具過人之識不及此矣又如益元散之去濕而加辰砂則並去其熱五苓散之去濕而加人參以補其虛加辰砂減桂以去熱白虎湯加人參以益虛加蒼朮以勝濕合之局方則大備矣然尚有未備者焉暑風一症為心火暴甚煎熬陰血其卒倒類乎中風而不可從風門索治百一選方雖有大黃龍丸初不為暑風立法然有中暍昏死以此方灌之立蘇但其人陰血素虧暑毒深入血分此方慎不可用良方復有地榆散治中暑昏迷不省人事而欲死者但用平常涼血之藥清解深入血分之暑風良莫良於此矣中暑卒倒無知名曰暑風大率有虛實兩途實者痰之實也平素積痰充滿經絡一旦感召盛暑痰阻其氣卒倒流涎此濕暍合病之最劇者也宜先吐其痰後清其暑猶易為也虛者陽之虛也平素陽氣衰微不振陰寒久已用事一旦感召盛暑邪湊其虛此濕暍病之得自虛寒者也宜回陽藥中兼清其暑最難為也東垣曰夫脾胃虛弱至六七月間人汗沾衣身重短氣甚則四肢痿軟行走不正腳欹眼花黑欲倒者此腎也膀胱俱竭之狀也當急救之滋肺氣以補水之上源又汗多則津液傷筋骨失養則痛或渴不可作暑熱治濕證原病式曰諸痙強直積飲痞膈中滿霍亂吐下體重跗腫肉如泥按之不起皆屬於濕張三錫曰濕有天之濕霧露雨是也天本乎氣故先中表之榮衛有地之濕水泥是也地本乎形故先傷皮肉筋骨血脈有飲食之濕酒水乳酪之類是也胃為水穀之海故傷於脾胃有汗液之濕汗液亦氣也止感於外有人氣之濕太陰濕土之所化也乃動於中治外感之濕當表散大法濕在上甚而熱者平以苦佐以甘辛以汗為效而止治內傷之濕宜健脾理胃利小便大抵皆宜發汗及利小便使上下分消可也燥證張三錫曰金者水之源金受火克不能生水而源於上則不能榮養皮膚腸胃筋骨諸燥症作矣情欲無涯精髓枯竭勞神過慮心血耗散加以濃酒炙爆辛香厚味邪火彌熾真水頓虧在上則咽乾口燥在中則煩渴不已在下則腸胃枯澀為消渴為噎膈為經閉身熱為干嗽治須養血生津潤澤腸胃使源竭而複流枝枯而再榮也醫者不察謬指為火大汗大下復損津液禍不旋踵原病式曰經云風熱火同陽也寒燥濕同陰也然燥金雖屬秋陰而異於寒濕故反同其風熱燥萬物者莫熯於火故火熱勝金氣必衰而風生風能勝濕熱能耗精風熱相扇而燥也燥金主於收斂勁切緊澀故為病筋脈勁強緊急而口噤也或消渴痿痹筋緩毛落色焦不潤二便阻塞皆屬金燥如秋燥甚則草搖落病之象也是以手得血而能握足得血而能步燥之為病血液衰少不能榮養四肢百骸也或病後曾服汗下藥及吐後產後老年見諸燥症脈細澀或洪數者俱屬血液不足補以潤之又縱欲人多腎虛以腎主五液火證張景岳曰君火者其化虛相火者其化實化虛者無形者也其或衰或旺惟見於神明神惟貴足衰則可畏也化實者有形者也其或熱或寒必著於血氣確有證據方可以言火也然君火衰則相火亦敗此以無形者虧及有形者也相火熾則君火亦炎此亦有形者病及無形者也故火得其正即為陽氣此火不可無亦不可衰衰則陽氣之虛也火失其正是為邪熱此火不可有尤不可甚甚則真陰之敗也然陽以元氣言火以病氣言病在元氣者不得以火論蓋人之元氣止於充足焉得有餘既非有餘何以言火所謂無形者其化虛也惟病在形體者乃可以察火症蓋其不在氣即在血所謂有形者其火實也若以形質之間本無熱症可據而曰此火也熱也是皆妄談者矣且火症即具猶有虛實之殊真假之異其可不為詳辨乎虛火病即假熱症也病有寒熱真假之不同真寒宜溫真熱宜清此正治也而惟假熱假寒為難治如虛火之病源有二虛火之外症有四一曰陰虛者能發熱此以真陰虧損水不制火也二曰陽虛者能發熱此以元陽敗竭火不歸源也此病源之二也至若外症一曰陽戴於上而見於頭面咽喉之間者此其上雖熱而下則寒所謂無根之火也二曰陽浮於外而發於皮膚肌肉之間者此其外雖熱而內則寒所謂格陽之火也三曰陽陷於下而見於便溺二陰之間者此其下雖熱而中則寒所謂失位之火也四曰陽亢乘陰而見於精血髓液之間者此其金水敗而鉛汞干所謂陰虛之火也此外症之四也證雖有四本則惟二陰虛陽虛盡之矣第陰虛惟一金水敗者是也治法當壯水壯水之法只宜甘涼陽虛有三上中下者是也治宜益火益火之法只宜溫熱大忌清涼但溫熱之效速每一二劑便可奏功甘涼之力緩非多服不能見效也然清涼之藥終損脾胃如不得已易以甘平倘甘平未效則惟有甘溫之一法斯堪實濟否則生氣之機終非清涼所能致也此義最微不可不察一火有虛實故熱有假真而察之之法總當以中氣為主而外寒外熱無足據也故凡假熱之證本中寒也假寒之症本中熱也中寒者原是陰症中熱者原是陽症內有可據本皆真病又何假之有諸痹門張子和曰痹之為狀麻木不仁以風寒濕三氣合而成之故內經曰風氣勝者為行痹風則陽受之故其痹行旦劇而夜靜世俗不知反呼為走注疼痛虎咬之疾寒氣勝者為痛痹寒則陰受之故其痹痛旦靜而夜劇世俗不知反呼為鬼忤濕氣勝者為著痹濕勝則筋脈皮肉受之故其痹不去肌肉削而著骨世俗不知反呼為偏枯痹則從外入所受之邪各有淺深或痛或不痛或仁或不仁或筋屈而不能伸或引而不縮寒則蟲行熱則縮緩不相亂也皮痹不已而成肉痹肉痹不已而成脈痹脈痹不已而成筋痹筋痹不已而成骨痹久而不已乃舍其合若臟腑俱病雖有智者不能善圖也凡病痹其脈沉澀其病以濕熱為源風寒為兼三氣合而為痹李士材曰痹病初在外久而不去則各因其合而內舍於臟在外者祛之猶易入臟者攻之實難治外者散邪為亟治臟者養正為先治行痹者散風為主禦寒利濕仍不可廢大抵參以補血之劑蓋治風先治血血行風自滅也治痛痹者散寒為主疏風燥濕仍不可缺大抵參以補火之劑非大辛大溫不能釋其凝寒之害也治著痹者利濕為主祛風解寒亦不可缺大抵參以補脾補氣之劑蓋土強可以勝濕而氣足自無頑麻也分條治法別列於左筋痹即風痹也遊行無定上下左右隨其虛邪與氣血相搏聚於關節或赤或腫筋脈弛縱古稱走注今名流火防風湯主之如意通聖散桂心散沒藥散虎骨丸十生丹一粒金丹乳香應痛丸脈痹即熱痹也臟腑移熱復遇外邪客搏經絡留而不行故𤸷痹肌肉熱極唇口反裂皮膚色變升麻湯主之肌痹即著痹濕痹也留而不移汗多四肢緩弱皮膚不仁精神昏塞今名麻木神效黃耆湯主之皮痹者邪在皮毛癮疹風瘡搔之不痛宜疏風養血骨痹即寒痹痛痹也痛苦切心四肢攣急關節浮腫五積散主之喻嘉言曰痹症非不有風然風入於陰分與寒濕互結擾亂其血脈致身中之陽不通於陰故致痹也古方多有用麻黃白芷者以麻黃能通陽氣白芷能行榮衛也然入在四君四物等藥之內非專發表明矣至於攻裡之藥從無用之者以攻裡之藥皆屬苦寒用之則陽愈不通其痹轉入諸腑而成危症者多矣朱丹溪痛風論曰氣行脈外血行脈內晝夜五十營此平人之造化也得寒則行遲而不及得熱則行速而太過內傷於七情外感於六淫則氣血之運或遲或速而病作矣痛風者大率因血受熱已自沸騰其後或涉於水或立濕地或扇取涼或臥當風寒涼外搏熱血得寒汙濁凝滯所以作痛夜則痛甚行於陰也治以辛熱之劑流散寒濕開發腠理其血得行與氣相和其病自安然亦有數種東陽傅文年逾六十性急作勞患兩腿痛動則更甚予視之曰此兼虛症當補血溫血病當自安遂與四物湯加桃仁陳皮牛膝生甘草煎入生薑汁研潛行散熱飲三四十帖而安又朱宅閫內年近三十食味甚厚性躁急患痛風攣縮數月予視之曰此挾痰與氣症當和血疏氣導痰病自安遂以潛行散入生甘草牛膝炒枳殼通草陳皮桃仁薑汁煎服半年而安又鄰鮑六年二十餘因患血痢用澀藥取效後患痛風叫號撼鄰予視之曰此惡血入經絡症血受濕熱久必凝濁所下未盡留滯隧道所以作痛經久不治恐成偏枯遂與四物湯加桃仁紅花牛膝黃芩陳皮生甘草煎入生薑汁研潛行散入少酒飲之數十劑而安張三錫曰痛風即內經痛痹但今人多內傷氣血虧損濕痰陰火流滯經絡或在四肢或在腰背痛不可當一名白虎歷節風是也大抵濕多則腫熱多則痛陰虛則脈數而重在夜氣虛則脈大而重在晝肢節痛須用羌活去風濕亦宜用之如肥人肢節痛多是風濕與痰飲流注經絡而痛宜南星半夏如瘦人肢節痛是血虛宜四物湯加防風羌活如瘦人性急躁肢節痛發熱是血熱宜四物加酒炒黃芩黃柏如肢節腫痛脈滑者常用燥濕宜蒼朮南星兼行氣藥木香枳殼檳榔在下加漢防己若肢節腫痛脈澀數者此是淤血宜桃仁紅花當歸川芎及大黃微利之如倦怠無力而肢節痛此是氣虛兼有痰飲流注宜參朮星半戴院使曰臂痛有血虛一症血不榮於筋或致臂痛宜蠲痹湯四物湯各半煎服若坐臥為風濕所搏或睡後手在被外為寒邪所襲遂令臂痛宜五積散及蠲痹湯烏藥順氣散審知是濕蠲痹湯加蒼朮防己三四分方約之曰風痿之別痛則為風不痛則為痿經曰痛則為實不痛則為虛曰風曰痿虛實二者而已東垣曰氣盛病盛氣衰病衰何則人之氣血充實而風寒客於經絡之間則邪正交攻而疼痛作矣人之氣血虛弱而痰火起於手足之內則正不勝邪而痿痹作矣故丹溪先生曰痿症切不可作風治而用風藥蓋以風為實而痿為虛也曰散邪曰補虛豈可紊亂乎附腳氣張三錫曰腳氣委屬濕熱內經曰諸濕腫滿皆屬脾土又曰傷於濕者下先受之蓋脾主四肢足居於下而足多受其濕濕鬱成熱濕熱相搏其病作矣是以先從氣衝穴隱核痛起及兩足紅腫或惡寒發熱狀若傷寒是其候也或一旬或半月復作如故漸至足筋腫大如瓠者有之古方名為緩風宋元以來呼為腳氣原其所由非止一端有從外感而得者有從內傷而得者所感雖有內外之殊其濕熱為患則一也凡腳氣初起其勢甚微飲食起居如故惟卒起腳屈弱不能動為異耳風痹薛立齋曰手足不隨由風寒濕三氣合而為痹風多者為風痹其狀肌膚盡痛諸陽之經皆起於手足而循行於身體風寒之氣客於肌膚始為痹復傷陽經隨其虛處而停滯與血氣相搏血氣行則遲緩故風痹而手足不隨也若風邪淫旺或怒動肝火血燥筋攣用加味逍遙散脾肺氣虛不能滋養筋骨或肝脾血虛而筋痿痹用六味丸服燥藥而筋攣者用四物湯加生甘草氣血俱虛用八珍湯何醫林集要等方新刊丹溪心法附錄云若人大拇指麻木不仁或手足少力或肌肉微掣三年內必有大風之證宜先服八風湯天麻丸防風通聖散以預防之不知河間云風者病之末也所以中風有癱瘓者非謂肝木之風內中亦非六淫風邪外襲良由五志過極心火熾盛腎水虛衰不能制之則陰虛陽實而熱氣拂鬱心神昏冒筋骨無所用而卒倒無知也治法當以固元氣為主若遽服八風等藥則反傷元氣適足以招風取中醫風先醫血此論得之經曰風客淫氣精乃亡邪傷肝也夫風搏則熱盛熱盛則水乾水乾則氣不榮精乃亡此風病之所由作也三消劉宗厚曰三消之症總由燥熱傷陰所致然因乎飲食失節腸胃乾涸而氣液不得宣平或耗亂精神過違其度或因大病陰氣損而血液衰虛陽氣悍而燥熱益甚或久嗜咸物恣食炙爆飲食過度亦有服金石丸散積久實熱結於下焦燥甚於腎故渴而不飲若飲水多而小便多者名曰消渴若飲食多而不甚渴小便數而消瘦者名曰消中若渴而飲水不絕腿消瘦而小便有脂液者名曰腎消此三消者其燥熱同也夫腎水屬陰而本寒虛則為熱心火屬陽而本熱虛則為寒若腎水陰虛則心火陽實水虛不能制火陽實熱燥其液是以燥熱太甚而三焦腸胃之腠理怫鬱結滯緻密壅塞而水液不能滲泄浸灌於外以養乎百骸故腸胃之外燥熱太甚雖多飲水入於腸胃之內終不能浸潤於外致渴不止而小便多水液既不能滲漉浸灌於外則陰益燥竭而無以自養故久而多變為聾盲瘡瘍痤痱之類而危殆故治是疾者補腎水真陰之虛而泄心火陽熱之實除腸胃燥熱之甚濟一身津液之衰使道路散而不結津液生而不枯氣血利而不澀則病日已矣若日用苦寒反從火化不危何待哉喻嘉言曰消渴之患常始於微而成於著始於胃而極於肺腎始如以水沃焦水入猶能消之既而以水投石水去而石自若至於飲一溲二則燥火動其真陰而勢成熇熇矣經謂凡治消癉僕擊偏估痿厥氣滿發逆肥貴人則膏粱之疾也此中消所由來也夫既癉成為消中隨其或上或下火熱熾盛之區以次傳入矣上消者胃以其熱上輸於肺而子受母累心復以其熱移之於肺而金受火刑金者生水而出高源者也飲入胃中遊溢精氣而上則肺通調水道而下今火熱入之高源之水為暴虐所逼合外飲之水建瓴而下飲一溲二不但不能消外水且並素醞水精竭絕而盡輸於下較大腑之暴注暴泄尤為甚矣故死不治也所謂由心之肺謂之死陰死陰之屬不過三日而死者此之謂也至於胃以其熱由關門下傳於腎又或以石藥耗其真女欲竭其精陽強於外陰不內守而小溲渾濁如膏飲一溲一腎消之症成矣夫惑女色以喪志精泄無度以致水液渾濁反從火化亦最危候經云君火之下陰精承之故陰精有餘足以上承心火則其人壽精不足心火直下腎中陽精所降其人夭故腎者胃之關也關門不開則水無輸泄而為腫滿關門不閉則水無底止而為消渴消渴屬腎一症其曰飲一斗溲一斗者腎氣丸主之於以蒸動精水上承君火而止其下入之陽光可謂其通天手眼戴人以承氣治壯火然施之消渴又無其事故下消之火水中之火也下之則愈燔中消之火竭澤之火也下之則愈傷上消之火燎原之火也水從天降可滅徒攻腸胃無益反損夫地氣上而為云然後天氣下為雨是故雨出地氣地氣不上天能雨乎故亟升地氣以慰三農亟升腎氣以溉三焦皆事理之必然者乎金匱云寸口脈浮而遲浮即為虛遲即為勞虛則衛氣不足勞則榮氣竭趺陽脈浮而數浮則為氣數則消穀而大堅氣盛則溲數溲數則堅堅數相搏即為消渴舉寸口以候胸中之氣舉趺陽以候胃中之氣蓋陰在內為陽之守陽在外為陰之固寸口脈浮陰不內守故衛外之陽浮即為虛也寸口脈遲陽不外固故內守之陰遲即為勞也總因榮傷榮衛致寸口脈虛而遲也然榮者水穀之精衛者水穀之悍氣虛而且遲水穀之氣不上充而內郁已見膈虛胃熱之一斑矣更參以趺陽脈之浮數浮則為氣即內經熱氣熏胸中之變文數則谷消而大堅是胃中堅燥不受水之潤浸轉從火熱之勢急奔膀胱故溲數溲去其內愈燥所以堅數相搏即為消渴直引內經味過於苦反從火化脾氣不濡胃氣乃厚之意為消渴之源精矣微矣潔古云能食而渴者白虎加人參湯不食而渴者錢氏白朮散加葛根末傳瘡疽者火邪盛也急攻其陽無攻其陰下焦元氣得強者生失強者死此皆慮泉竭之徽言然火之在陽在陰分何臟腑合何臟腑宜升宜降宜抑宜伏各各不同從其性而治之使不相扦格乃為良法若不治其火但治其熱火無所歸熱寧有止耶如腎消陰病用六味陽病用八味此亦一法若謂下消只此一法其在中消宜下之說能以寸哉癉成為消中胃熱極深胃火極熾以故能食易飢多渴諸家咸謂宜大承氣下之不知積漸之熱素蘊之火無取急下下之亦不去徒損腸胃轉增其困耳即當用大黃當久蒸以和其性更不可用枳樸助其疾趨之勢大黃與甘草合用則緩急互用與人參合用則攻補兼施如充國之屯田乃可耳張景岳曰消症有陰陽不可不察如多渴者曰消渴善飢者曰消穀小便淋濁如膏曰腎消凡此者多由於火火盛則陰虛是皆陽消之症也至於陰消之義則未有知之者凡陰陽血氣之屬日見消敗者皆謂之消此不可盡以火為言如氣厥論曰心移寒於肺為肺消飲一溲二死不治此正以元氣之衰而金寒水冷故水不化氣而氣悉化水詎非陽虛之症也又如邪氣臟腑病形篇曰五臟之脈細小者皆為消癉豈以微小之脈而為有餘之陽症也此內經陰消之義顯然而人多未察也故古人雖以上焦屬肺中焦屬胃下焦屬腎皆從火治而不知三焦之火多有病本乎腎而無不由乎命門者夫命門為水火之腑已水虧而為消渴者以水不濟火則火不歸源故有火遊於肺而為上消者火遊於胃而為中消者火鑠陰精而為下消者是皆真陰不足而水虧於下消症也若火虧而消鑠者以陽不化氣則水精不布水不得火則有降無升所以直入膀胱而飲一溲二以致泉源不滋天壤枯涸是皆真陽不足火虧於下之消症也陰虛之消治宜壯水矣若陽虛之消謂宜補火人必不信不知釜底加薪槁禾得雨徹頂歸巔所必然耳噎膈朱丹溪曰氣之初病也其端甚微或因此小飲食不謹或外冒六淫或內感七情或食味過厚偏助陽氣積成膈熱或資稟充實表密無汗或性急易怒火炎上以致津液不行清濁相干氣為之病或痞或痛不思飲食或噫腐氣或吞酸或糟雜或膨滿不思原本遂以辛香燥熱之劑投之暫時得快厚味仍前不節七情反覆相因溺液易於攢聚如此蔓延自氣成積自積成痰此為痰為飲為吞酸之由也良工未遇謬藥又行痰挾淤血遂為窠囊此為痞為痛嘔吐為噎為膈反胃之次第也飲食湯液滯泥不行滲道蹇澀大便或秘或溏下失傳化中焦愈停求可以溫脾壯胃消積行氣以冀一旦之效不思胃為水穀之海多血多氣清和則能受脾為消化之臟清和則能運若香燥偏助氣血沸騰其始也胃液凝聚無所容受其久也脾氣耗散傳化漸遲積而久也血液俱耗胃脘乾槁其槁在上近咽之下水飲可行食物難入名之曰噎其槁在下與胃為近食雖可入難盡入胃良久復出名之曰膈亦曰反胃大便秘少若羊矢然古方用人參以補肺御米以解毒竹瀝以消痰歸芍以養血粟米以實胃蜜水以潤燥姜以去穢病邪易伏其病自安張雞峰亦曰噎是神思間病惟內觀靜養可以治之此言深中病情夫噎病生於血乾陰主靜內外兩靜則臟腑之火不起而金水二氣有養陰血自生腸胃津潤傳化合宜何噎之有趙養葵曰丹溪之論其妙惜其分別欠明且以潤血為主而不直探乎腎中先天之源故其立方以四物中牛羊乳之類加之竹瀝韭汁化痰化淤皆治標而不治本也內經曰三陰結謂之膈三陽者大腸小腸膀胱也大腸主津小腸主液大腸熱結則津涸小腸熱結則液燥膀胱為州都之官津液藏焉膀胱熱結則津液竭然而三陽何以致結熱皆腎之病也腎主五液又腎主大小便腎水既干陽火偏盛煎熬津液三陽熱結則前後閉塞下既不通必反於上直犯清道上衝吸門喉咽所以噎食不下也何為水飲可入食物難下蓋食入於陰長氣於陽反引動胃口之火故難入水者陰類也同氣相投故可入口吐白沫者所飲之水沸而上騰也糞如羊矢者食入者少渣滓消盡腸亦干小而不寬也此症多是年高五十於外其天真已絕只有孤陽治之唯以養陰為主王太僕曰食入即出是無水也食入反出是無火也無水者壯水之主無火者益火之源褚侍中雲上病療下直須六味地黃料大劑煎飲久服可挽十中之一二又須遠絕房幃薄滋味可也若曰溫胃胃本不寒若曰補胃胃本不虛若曰開鬱香燥之品適以助火無如補陰光焰自滅反胃東垣書謂吐有三症氣積寒也上焦吐者從氣中焦吐者從積下焦吐者從寒若脈沉遲暮食朝吐朝食暮吐小便利大便閉此下焦吐也法當通其閉溫其寒觀此可見下焦吐乃命門火衰釜底無薪不能蒸腐胃中水穀腹中脹滿不得不吐也王太僕所謂食入反出是無火也是矣須益火之源先以八味丸補命門火以救脾土之母徐以附子理中湯理中焦萬舉萬全李士材曰噎寒大都屬熱反胃大都屬寒然亦不可拘也脈大有力當作熱治脈小無力當作寒醫色之黃白而枯者為寒虛色之紅赤而澤者為實熱以脈合症以色合脈庶乎無誤此症之所以疑難者方欲健脾理痰恐燥劑有妨於津液方欲養血生津恐潤劑有凝於中州審其陰虛火旺者當以養血為亟脾傷陰盛者當以溫補為先更有憂恚盤礴火鬱閉結神不大衰脈猶有力當以倉公河間之法下之小小湯丸累累加用關扃自透膈間痰盛微微湧出因而治下藥勢易行設或不行蜜鹽下導始終勾引自然宣通此皆虛實陰陽之辨臨症之權衡也方約之曰丹溪云年高者不治蓋少年氣血未虛用藥劫去痰火病不復生年高氣血已虛用藥劫去痰火雖得暫愈其病復作所以然者氣虛不能運化而生痰血虛不能滋潤而生火也丹溪又云此症切不可用香燥藥服之必死宜薄滋味予嘗用霞天膏加於補虛藥中治此症一人則吐瀉以去積血一人則吐瀉以去積痰俱獲病安思食然二人俱不能節戒隨啖肥甘終不能免殊不知此症挾虛脾胃尚弱肥甘難化故復病也霞天膏吐瀉後又宜用人參煉膏補之劉河間曰趺陽脈緊內燥盛而溫氣衰又緊而見澀其血已亡上脘亡血膈間乾澀食不得入下脘亡血又並大小腸皆枯食不得下故難治也張仲景反胃脈症問曰病人脈數數為熱當消穀引飲而反吐者何也師曰以其發汗令陽脈微膈氣虛脈乃數數為客熱不能消穀胃中虛冷也脈弦者虛也胃氣無餘朝食暮吐變為胃反寒在於上醫反下之令脈反弦故名曰虛又曰寸口脈微而數微則無氣無氣則榮虛榮虛則血不足血不足則胸中冷此二條仲景形容脈證之微妙凡陽盛則數陰盛則遲其人陽氣既微何得脈反數脈既數何得胃反冷此不可不察求其故也陽氣微則榮虛榮虛則不為陽守而浮為客熱陽氣微則膈氣虛膈氣虛則亦不能運陰而為胃冷況醫不知而反下之致上下之陽俱損其脈遂從陰而變為弦因是上之陽不足日中已前所食亦不消化下之陽不足日暮已後陽亦不入於陰而糟粕亦不輸於大小腸故曰胃氣無餘所以反胃而朝食暮吐也蓋人身之脈法天地微則陽不健運數則陰不盡翁陰陽兩乖其度榮衛不充而胸中冷榮衛本生於穀能復消磨其谷是榮衛非谷不充谷非榮衛不化胸中既冷胃必不能出納其谷證成反胃又何疑乎東逸改注喻嘉言曰胸中之陽如天之有日其關係納穀之道最為扼要此條所云是也蓋胸中下連脾胃其陽氣虛者陰血亦必虛但宜用沖和之劑以平調臟腑安養榮衛舍純粹以精之藥不可用也腎中之陽如斷鱉立極其關係命根存亡之機尤為宏矩後條四逆湯等是也蓋腎中內藏真陽其陽外亡者陰氣必極盛惟從事剛猛之劑以推鋒陷陣勝陰復陽非單刀直入之法不可行也痞滿河間曰痞與否同不通泰之義也其心膈悶而不痛者為痞滿內外皆脹急者為腫脹二者似同實異有中氣弱不能運行精微而為痞者又有飲食痰積不能運化而為痞者又有濕熱太甚上乘心下而為痞者有誤下以致內虛入而痞者皆土邪之為病東垣曰傷寒雜症下之太過則為痞滿皆血症也蓋下則亡陰陰者即脾胃之陰亡也故胸中之氣因陰虛而下陷於心之分以致心下痞滿宜理脾胃兼陰藥治之若全用氣藥則痞益甚此發前人所未發也然痞有虛實之殊實痞能食而大便閉黃連枳實厚朴苦以泄之虛痞不能食而大便利白芍陳皮酸以收之有濕則四肢困重小便短少蒼朮茯苓半夏滑石澤瀉以滲之鬱滯不通食難消化撫芎厚朴香附蒼朮枳實以開之脾胃虛而運轉不舒為痞者人參甘草茯苓白朮甘以溫之飲食過傷痞寒者青皮枳實厚朴山楂神麯以消導之挾痰血成窠囊者桃仁紅花香附大黃之類右關多弦遲者必心下堅滿以肝木克脾土鬱結不得開通木香順氣丸如大病後元氣未復而痞者補中益氣湯加陳皮腫脹李士材曰內經之論腫脹五臟六腑靡不有之詳考全經如脈要論曰胃脈實則脹病形篇曰胃病者腹䐜脹本神篇曰脾氣實則腹脹涇溲不利應象論曰濁氣在上則生䐜脹此四條皆實脹也太陰陽明論曰飲食起居失節入五臟則䐜滿閉塞師傳篇曰足太陰之別公孫虛則鼓脹此二條皆虛脹也經脈篇曰胃中寒則脹滿方宜論曰臟寒生滿病風論曰胃風膈寒不通失衣則䐜脹此三條皆寒脹也六元正紀至真等論云太陰所至為跗腫及土鬱之發太陰之初氣太陰之勝復皆濕勝之腫脹也或曰水運太過或曰寒勝則浮或曰太陽司天太陽勝復少陽司天少陽勝復或曰熱勝則腫皆火勝之熱脹也或曰厥陰司天在泉厥陰之復或曰陽明之復皆水邪侮土及金氣反勝之腫脹也由是則五運六氣亦各有腫脹矣然經有提其綱者曰諸濕腫滿皆屬於脾又曰其本在腎其末在肺皆聚水也又曰腎者胃之關也關門不利故聚水而從其類也可見諸經雖皆有腫脹無不由於脾肺腎者蓋脾土主運行肺金主氣化腎水主五液凡五氣所化之液悉屬於腎五液所行之氣悉屬於肺轉輸二臟以制水生金者悉屬於脾故腫脹不外此三經也但陰陽虛實不可不辨大抵陽症必熱熱者多實陰症必寒寒者多虛先脹於內而後腫於外者為實先腫於外而後脹於裡者為虛小便黃赤大便秘結者為實小便清白大便瀉泄為虛滑數有力為實弦數微細為虛色紅氣粗為實色悴聲短為虛凡諸實症或六淫外客或飲食內傷陽邪急速甚至必暴每成於數日之間若是虛症或情志多勞酒色過度日積月累其來有漸每成於經月之後然治實頗易理虛恆難虛人氣脹者脾虛不能運氣也虛人水脹者土虛不能制水也水雖制於脾實則統於腎腎本水臟而元陽寓焉命門火衰既不能自制陰寒又不能溫養脾土則陰不從陽而精化為水故水腫之症多屬火衰也丹溪以為濕熱宜養金以制水使脾無賊邪之患滋水以制火使肺金得清化之權夫制火固可保金獨不慮其害土乎惟屬熱者宜之若陽虛者豈不益其病哉更有不明虛實專守下之則脹已之一法雖得少寬於一時真氣愈衰未幾而腫脹再作遂致不救殊可嘆也余於此症察其實者直清陽明反掌收功苟涉虛者溫補脾胃漸次康復其有不大實亦不大虛者先以清利見功繼以補中調攝又有標實而本虛者瀉之不可補之無功極為危險在病名有鼓脹與蠱脹之殊鼓脹者中空無物腹皮繃急多屬於氣也蠱脹者中實有物腹形充大非蟲即血也在女科有氣分血分之殊氣分者心胸堅大而病發於上先病水脹而後經斷血分者血結胞門而病發於下先因經斷而後水脹在治法有理肺理脾之殊先喘而後脹者治在肺先脹而後喘者治在脾此其大略也腹脹身熱者死腹脹寒熱似瘧者死腹大脹四未清脫形泄甚者為逆腹脹便血脈大時絕者死唇黑或腫肝傷缺盆平心傷臍突脾傷足心平腎傷背平肺傷五傷死大便滑泄水腫不消者死瀉後腹脹而有青筋者死陰囊及莖腫者死水腫先起於腹後散四肢者可治先起於四肢後歸於腹者死中滿趙養葵曰中滿與鼓脹水腫無異然而不同者中滿中空似鼓虛滿而非實滿也大約脾腎兩虛所致治者惟知泄水而不知益胃是以發而不能制也若真知為水濕之氣客於中焦侵於皮膚如水晶之光亮手按之隨起者內經去菀陳莝開鬼門潔淨府之法近如舟車丸禹功散之類一服而退何誤之有若久病大病後或傷寒瘧痢後女人產後小兒痘後與夫元氣素弱概以前法施之脾氣愈泄愈虛不可復收矣故治腫者先以補脾土為主或為喘滿而又加純補恐益䐜脹必加行氣利水之品方妙不知肺氣已虛不可復行其氣腎水已衰不可複利其水純補之劑初時似覺不快過時藥力得行漸有條理矣張仲景金匱腎氣丸能補而不滯通而不泄為治腫之神方以中滿之病原於腎中之火氣虛不能行水此方以八味為主以補腎中之火則三焦有所稟命而能行水又火能生土土實而能制水矣如牛膝車前二味最為切當車前利小便而不走氣與茯苓同功強陰益精牛膝治老人失溺補中續絕壯陽益精此方試之甚效故詳著焉前所論症乃治脾腎兩虛者至於純是脾虛既以參耆四君為主亦須以八味丸兼補命門火蓋脾土非命門不能生虛則補母之義也喻嘉言曰從來腫病遍身頭面俱腫尚易治若只單單腹脹腫則難治遍身俱腫者臟腑俱各有見症故瀉肝瀉肺瀉膀胱瀉大小腸之藥間有取效之時而單單腹脹則中州之地久窒其四達之軸而清者不升濁者不降互相結聚牢不可破實因脾氣之衰而瀉脾之藥尚敢漫用乎或謂腫為大滿大實必從乎瀉則病後腫與產後腫將亦瀉之耶世人過信劉張之學以汗吐下三法劫除百病不顧元氣之羸劣所以凡用劫奪之藥其始非不遽消其後攻之不消矣後再攻之如鐵石矣不知者見之方謂何物邪氣若此之甚自明者觀之不過為猛藥所攻即以此身之元氣轉與此身為難首實有如驅良民為寇之比所以赤子盜兵弄於潢池稟其然哉惟理脾一法可以行之故有培養一法補元氣是也三法俱不言瀉而瀉在其中無餘蘊矣徐東皋曰經云臟寒生滿病胃中寒則脹滿太陰所至為中滿大抵脾濕有餘無陽不能施化如土之久於雨水則為泥矣惟風和日暖濕去陽生自然生長也治此宜以辛熱藥主之若濕熱飲食有餘脾胃充實者可下如傷寒邪入於裡而或腹滿堅實大便硬結者三承氣下之若因脾虛為主少佐辛熱以行壅滯之氣庶使脾土旺健脹滿運行經所謂塞因塞用也張景岳曰腫脹之病氣水二字足以盡之能辨而知其虛實無餘蘊矣病在氣分當治氣為主病在水分則治水為先然氣水本為同類故治水者當兼理氣益氣化水自化也治氣亦當兼水以水行氣亦行也夫病在氣分者因氣之滯氣血之逆飲食之逆寒熱風濕之逆氣虛不能運化之逆但治節有不行者悉由氣分作脹而虛實之治反如冰炭必詳辨之乃能因機通變若病在水分者以陰勝於陽而肌膚皆腫光薄明潤且腫不速每自下而上腫有分界欲辨水氣之異者須辨陰陽若病在氣分陽症陰症皆有之若病在水分則為陰症蓋陽旺則氣化而水即為精陽衰則氣不化而精即為水水即身中之血氣為邪為正總在化與不化耳水不能化因氣之虛豈非陰中無陽乎然水主於腎氣主於肺水清於下而氣竭於上所以下為腫滿上為喘急標本俱病危斯亟矣此宜速救本原若作實喘猶然泄肺無不敗矣水腫喻嘉言曰病機之切於人者水火而已矣水泛溢於表裡火遊行於三焦可無具以應之乎三陽結謂之消三陰結謂之水手足陽明熱結而病消渴火之為害已論之矣而三陰者手足太陰脾肺二臟也胃為水穀之海水病莫不本之於胃經乃以屬之脾肺昔何耶使足太陰脾足以轉輸水精於上手太陰肺足以通調水道於下海不揚波矣惟脾肺二臟之氣結而不行乃胃中之水曰蓄浸灌表裡無所不到也是則脾肺之權可不伸耶然其權尤重於腎腎者胃之關也腎司開闔腎氣從陽則開陽太盛則關門大開水直下而為消腎氣從陰則闔陰太盛則關門常闔水不通而為腫經文謂腎本肺標相輸俱受為言然則水病以脾肺腎為三綱矣於中節目尤難辨晰金匱為五水之名及五臟表裡主病曰風水曰正水曰皮水曰石水曰黃汗其風水皮水黃汗雖關於腎屬在陽分至於正水與石水則陰分之水一切治陽之法所不得施正水其脈沉遲外症自喘北方壬癸自病故脈見沉遲腎藏水肺生水子病累母故外症自喘內經曰腎者胃之關關門不利故聚水成病上下泛溢於皮膚跗腫腹大上為喘呼不得臥金匱正水之名蓋本諸此石水其脈自沉外症腹滿不喘此因腎氣並於水而不動故脈沉水蓄膀胱之內胞但小腹滿硬氣不上於肺故不喘內經曰陰陽結斜陰多陽少名曰石水又曰腎肝並沉為石水以肝腎兩臟之氣皆得貫入於胞中故也然石水即關於肝腎兩臟腎多即下結而難上肝多則挾水勢上犯胃界亦勢所必至也後世漫不加察治水輒宗霸術可謂智乎然水在心之部則鬱心火炳明之化在肝之部則鬱肝木發生之化在肺之部則孤陽竭於外其魂獨居在脾之部則陰竭於內而穀精不布在腎之部不但諸陽退伏即從陽之陰亦且退伏孤陽獨居於下而隔絕也故胃中之水惟恐其有火有火仍屬消渴末傳中滿之不救腎中之水惟恐其無火無火則真陽滅沒而生氣內絕其在心之水遏抑君火若得脾土健運子必救母即在肝在肺在腎之水脾土一旺水有所制斯不敢於橫發故當襄陵懷山之日而欲求土宜稼穡舍神禹仲景之道而誰師乎胃為水穀之海五臟六腑之大源脾不能散胃之水精於肺而病於中肺不能通胃之水道於膀胱而病於上腎不能司胃之關門時其輸泄而病於下所以胃中積水浸注無所底止耳仲景論雜症於水氣一門極其精詳惟恐足太陰脾之健運失職手太陰肺之治節不行足少陰腎之關門不開並其腑膀胱之氣化不行所以方藥皆不蹈重虛之戒立於無過之地後世諸治不傷脾即瀉肺不瀉肺即瀉膀胱水病門中成方百道求一救肺氣之膹鬱而伸其治節之方無有也求一救膀胱阻絕而伸其氣化之方無有也海藏設水氣問難用藥大凡要其方治渾是後人窠臼況其他乎張景岳曰凡水腫症乃脾肺腎三臟相干之病蓋肺虛則氣不化精而化水脾虛則土不制水而反克腎虛則水無所主而妄行水不歸經則逆而上泛故傳入於脾而肌肉浮腫入於肺則氣息喘急分言之三臟各有所主合言之總由陰勝之害而病本皆歸於腎經曰腎為胃關關門不利故聚水而從其類然關門何以不利也經曰膀胱者州都之官津液藏焉氣化則能出矣夫所謂氣化者即腎中之氣也陰中之火也陰中無陽則氣不能化所以水道不通溢而為腫故治腫惟下焦之真氣得行始能傳化下焦之真水得位始能分清求古法惟薛立齋加減腎氣湯誠對症之方也此雖壯水之劑而即脾肺腎三臟之正治蓋腎為先天生氣之源若先天元氣虧於下則後天胃氣失所本而由脾及肺治節所以不行而喘脹但宜峻補命門使氣復元則三臟自安方中用桂附化陰中之陽也熟地山藥牛膝養陰中之水也茯苓澤瀉車前利陰中之滯也此能使氣化於精即所以治肺補火生土即所以治脾壯水通竅即所以治腎補而不滯利而不伐誠諸方是第一也若症有全由脾胃不足而為腫脹者宜四君歸脾之屬須兼補命門人知土能剋水而不知陽實制陰知氣化為精不知精化為氣虛則補母正此之謂也脾腎虛症用腎氣湯誠善然有脾腎大虛並以滲利未免減去補力正與實漏扈者同元氣終不能復惟參附理陰仍加白朮大劑與之凡治全虛悉用此法無一不效塞因塞用斯其最也關格證喻嘉言曰關格之症自靈素以及難經仲景脈法皆深言之然無其方也素問謂人迎一盛病在少陽二盛病在太陽三盛病在陽明四盛以上為格陽寸口一盛病在厥陰二盛病在少陰三盛病在太陰四盛以上為關陰人迎與寸口俱盛四倍以上為關格關格之脈羸不能極於大地之精氣則死矣靈樞復言邪在腑則陽脈不和陽脈不和則氣留之氣留之則陽氣盛矣陽氣太盛則陰脈不和陰脈不和則血留之血留之則陰氣盛矣陰氣太盛則陽氣不能榮也故曰關陽氣太盛則陰氣不能榮也故曰格陰陽俱盛不能相榮故曰關格關格者不能盡期而死也越人宗之發為陰乘陽乘之脈因推其陰乘之極上為魚溢入尺為覆形容陰陽偏而不返之象精矣至仲景復開三大法門謂寸口脈浮而大浮為虛大為實在尺為關在寸為格關則不得小便格則吐逆從兩手關陰格陽過盛中察其或浮或大定其陰虛陰實陽虛陽實以施治療蓋於靈樞陰陽太盛不能相榮以及越人陽乘陰乘之法加以浮大之辨而虛實始得燎然不爾關則定為陰實格則定為陽實矣此一法也謂心脈太盛而長是其本脈上微頭小者則汗出下微本大者則關格不通不得尿頭無汗者可治有汗者死此則深明關格之源由於五志厥陽之火遏鬱於心胞之內其心脈上微見頭小亦陽虛之驗下微見本大亦陽實之驗頭無汗者可治有汗則心之液外亡自焚而死矣此一法也在二陽之病發心脾且不得隱曲男子少精女子不月傳為風消索澤況關格之病精氣竭絕五臟空虛厥陽之火獨行上合心神存亡之機間不容髮此一法也謂趺陽脈伏而澀伏則吐逆水穀不化澀則食不得入名曰關格診趺陽足脈或伏或澀胃氣之所存可知矣榮衛之行遲水穀之入少中樞不運下關上格詎待言哉此一法也仲景以此三法言關格大概在顧慮其虛矣後世云岐子述其陰陽反背之狀傳其所試九方其謂陰陽易位病名關格膈以上陽氣常在則熱為主病身半以下陰氣常在則寒為主病胸中有寒以熱藥治之丹田有熱以寒藥治之若胸中寒熱兼有以主客之法治之治主當緩治客當急此從傷寒論胸中有寒丹田有熱立說實非關格本症所引運氣治主客之法亦屬無據於素難金匱之文絕不體會所定諸方又入後人惡劣窠臼殊不慊人夫陰陽不交各造其偏而謂陰反在上陽反在下可乎九死一生之症而以霸術劫奪其陰陽可乎仲景之以趺陽為診者正欲人調其榮衛不偏陰偏陽聽胃氣之自為敷布乃始得協於平也故不問其關於何開格於何通一惟求之於中握樞而運以漸透於上下俟其趺陽脈不伏不澀乃因其勢而利導之庶不與藥扦格耳惟治吐逆之格由中而漸透於上治不溲之關由中而漸透於下治格而且關由中而漸透於上下可耳進退黃連湯腎氣丸治法論黃連湯仲景治傷寒之方也傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之以其胃中有邪氣阻遏陰陽升降之機而不交於中土於是陰不得升而獨滯於下為下寒陽不得降而獨治於上為胸中熱欲嘔吐與此湯以升降陰陽固然矣而濕家下之舌上如胎者丹田有熱胸中有寒亦用此方何耶蓋傷寒分表里中三法表裡之邪俱盛則從中而和之故有小柴胡湯之和法以人參甘草半夏生薑大棗助胃之中但加柴胡一味透表黃芩一味透里聽胃氣之升者帶柴胡出表胃氣之降帶黃芩入里一和而表裡之邪盡服其有未盡者加工治之不相扦格矣至於丹田胸中之邪則在於上下而不為表裡即變柴胡為黃連湯和其上下以桂枝易柴胡以黃連易黃芩以乾薑易生薑亦聽胃氣之上下敷布故不問上熱下寒上寒下熱皆可治之也夫表裡之邪則用柴胡黃芩上下之邪則用桂枝黃連表裡之邪則用生薑之辛以散之上下之邪則用乾薑之辣以開之仲景聖法灼然矣前論所謂求之於中握樞而運以漸透於上下俟其榮氣前通衛氣後通而為進退也夫格則吐逆進而用此方為宜蓋太陽主開太陽不開則胸中窒塞食不得入入亦復出以桂枝為太陽經藥和調榮衛而行陽道故能開之也至於五志厥陽之火上入桂枝又不可用矣用之以火濟火頭有汗而陽脫矣其關不得小便退之之法從胃氣以透入陰分桂枝亦在所不取但胃之關門已閉少陰主闔少陰之氣不上胃之關必不開矣內經常兩言之曰腎氣獨沉曰腎氣不衡夫真氣之在腎中猶權衡也有權有衡則關門時開時闔有權無衡則關門有闔無開矣小溲亦從何而出耶是以腎氣丸要亦退之之中所有事矣腎氣交於胃則關門開交於心則厥陽之火下伏有不得不用之時矣張景岳曰關格一症在內經本言脈體以明陰陽離絕之危症也自越人以上魚為溢入尺為覆以尺寸言關格已失本經之意仲景亦云在尺為關在寸為格夫內經云人迎四倍寸口四倍既非尺寸之謂再至丹溪則曰此症寒在上熱在下脈兩寸俱盛四倍以上法當吐以提其氣之橫格夫兩寸俱盛四倍又安得謂寒在上耶且脈大如此則浮豁無根其虛可知又堪吐乎謬而又謬莫此甚矣夫關格症者在內經本以人迎察六腑之陽寸口察五臟之陰人迎盛至四倍以上者此陽明經孤陽獨見水不濟火也故曰格陽格陽者陰格於陽也氣口盛至四倍以上此太陰經元陰無主氣不歸精也故曰關陰關陰者陽關於陰也若人迎寸口俱盛至四倍以上且大且數此其陽氣不藏故陰中無陽陰氣不升故陽中無陰陰陽相離故名關格也脈度篇曰陰氣太盛則陽氣不能榮故曰關陽氣太盛則陰氣弗能榮故曰格陰陽俱盛不能相榮故曰關格關格者不得盡期而死也是可見陽病極於陽分陰病極於陰分也凡陽盛於陽似乎當瀉而陰分見陰又不可瀉陰極於陰者似乎當補而陽分見陽又不可補病至此陽自陽陰自陰上下痞膈兩顧不能補瀉不可有死而已此與真寒假熱假熱真寒之症大有不同凡見此症總由酒色傷腎情欲傷精以致陽不守舍故脈沉氣露亢極如此真陰敗竭元海無根誠亢悔之象最危之危也然關格診法後人不察人迎但寸口為脈之大會脈見於彼未有不見於此者若其弦大至極四倍以上且大且數者便是關格之脈不得誤認為火症蓋其症無實邪發熱又無咳嗽失血所以為異也然富貴之人及形體豐肥者多有此症求其所因無非耽嗜少艾中年酒色所致雖與勞損症若有不同實則勞損之別名也故關格之脈必弦大至極夫弦者為中虛浮大者為陰虛此腎水大虧有陽無陰之脈也治此宜峻補真陰為主然又當察虛中之寒熱陰中之陰陽分別處治用藥總論附東庵曰藥品多端理可融會性不過寒熱溫涼味不過辛甘酸澀苦咸六種而已寒者凝滯熱者宣行溫者熱之次涼者寒之輕酸則必收澀則必固苦則必降辛則必散咸能潤下甘能緩中香燥者其性竄烈多服則耗氣滋潤者其性濡濕多服則傷脾消導者其性甚劣多服則破氣推蕩者其性迅烈多服則傷陰滲泄者其性下流多用則走泄諸凡種種可以類推是能於去病之功但用之不宜偏務推有補益之品久服多服不妨但不宜呆補以行滯分消之品用之則萬全而無弊矣
