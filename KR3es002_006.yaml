body:
  text: 卷六病能集四雜證十門諸血證張三錫曰營血之行各有常道為火所迫則錯亂沸騰而諸失血之證作矣有如火急湯沸勢不可遏丹溪之論曰口鼻出血皆是陽盛陰虛有升無降血隨氣上越出上竅法當補陰抑陽氣降則血歸經矣是論血症三昧語蓋陽明之脈絡鼻是經火盛迫血妄行從鼻出者曰衄從口湧出者曰吐初起脈洪大宜犀角地黃湯犀角性升散能散一切有餘之火乃陽明經藥故曰如無犀角以升麻代之今人不知泥於犀角解乎心熱一句不分虛實與四物同用若是實火固為得宜陰虛者寧免飛揚之禍吐血心口脹悶口中血腥氣用韭汁童便薑汁鬱金同飲其血自清勢盛脈芤大吐用十灰散遏之次用花蕊石散消之後用清血藥鬱金丹皮赤芍之類加降火有因怒而得者宜平肝降火炒梔子青皮芩連柴胡一切上焦血症用五生飲大獲奇驗用生韭藕荷葉亦可京墨側柏生地各取汁一杯對童便其生地側柏研爛以童便和方得汁凡一應上溢之症若脾胃氣壯不瀉能食者皆當以大黃醋製和生地汁及桃仁泥牡丹皮之屬引入血分使血下行轉逆為順也最妙法不知此而徒事涼藥脾胃反傷今人治此無一生者此也諸失血後倦怠昏憒面失血懶於言動濃煎人參湯所謂血脫補氣也最妙先噁心血雜痰出嘔多至升許者為嘔血有怒而得者有過飲得者鬱悒人久之氣血凝滯中焦運化失常亦作嘔痰帶血出宜分治之若肝脈旺兩手弦數宜平肝降火連梔青皮香附柴胡甘草歸芍或用赤茯瀉心湯是實者瀉其子也若右寸脈洪滑或數解酒毒降火和中二陳加芩連梔丹皮若沉結或洪數宜舒郁越鞠丸去蒼朮加丹皮赤芍歸尾主之加韭汁亦妙脾統血肺主氣勞神多言脾肺致傷血妄行忌涼劑必用補中益氣湯加減遇勞即發心肺受傷其血必散補中益氣加麥冬五味山藥熟地茯神遠志佳咳血熱壅於肺者易治損於肺者難治瘦人有此脈細數多成勞宜二母二冬紫菀花粉生地丹皮竹瀝童便薑汁選用一方服藥血不止是肺上有竅也用白芨末豬肺煮熟蘸食日三四次妙不可言昔人為白芨下咽至血竅則竅為填而血止詳見本草綱目一法取末於粥中吃妙勞傷肺經咳嗽有血雞蘇散最妙功在阿膠炒蒲黃勞嗽服阿膠不止無藥用矣咳血非靜養絶欲不可與治諸病皆然此尤當慎者咳血胸中痛腥臭異常肺脈數而虛是肺痿諸失血過多體倦少食及血不止扶正氣為急人參黃耆五味子芍藥麥冬甘草歸身加鬱金亦可唾血平時津唾中有血一屬腎虛有熱一屬上焦實火有餘則瀉加減涼膈加牡丹皮藕節之類不足則補滋腎坎離酒炒黃柏肉桂一分許瀉腎火或加二冬二母咯血不嗽而咳出血也咯同於痰氣鬱於喉嚨之下滯不得出咯而乃出求其所屬咯唾同出於腎也咯血為病最重以肺手太陰之經氣多血少又肺為清肅之臟為火所爍迫血上行以為咯血逆之甚矣上氣見血下聞病音謂喘而見血且咳嗽也為難治初起用童便青黛以瀉手足少陽三焦膽經之相火而薑汁為佐用地黃牛膝輩以補陰安其血如喉中咯出小血塊或血點亦分虛實瘦人最忌大法四物入童便薑汁青黛或牛膝膏地黃膏尤妙上焦一切血症稍止即服六味丸最不可緩有血症者終身不可脫滑伯仁曰失血家須用下劑破血蓋施之於妄蓄之初亡血虛家不可下蓋戒於亡失之後朱丹溪曰凡血症既久古人多以胃藥收功喻嘉言曰血證有新久微甚本無不由於火然火有陰陽不同治法因之迥遠今有暴病嘔血數盂經曰暴病非陽則其為火也即非陽火甚明陽火者五行之火天地間經常可久之物何暴之有惟夫龍雷之火潛伏陰中方其未動不知其為火也及其一發暴不可御以故載陰血而上溢蓋龍雷之性必陰雲四合然後遂其升騰之勢若天青日朗則退藏不動矣故凡用涼血清火之藥者皆以水制火之常法施之於陰火未有不轉助其虐者大法惟宜溫補而溫補之微細曲折要在講明有素經曰少陰之脈營舌本又曰咯血者屬腎明乎陰火發於陰中其血咯之成塊而出不比咳嗽勞症痰中帶血為陽火也此義惟張長沙傷寒症中垂戒一款云誤發少陰汗動其經血者下竭上厥為難治後人於下竭上厥之理總之弗省不知下竭者陰血竭於下也上厥者陰氣逆於上也故陰火動而陰氣不得不上奔陰氣上奔而陰血不得不從上溢陰血上溢則下竭矣血既上溢其隨血之氣散於胸中不能復返本位則上厥矣陰氣上逆不過至頸而止不能越高巔清陽之位是以喉間窒塞心忡耳鳴胸膈不舒也然陰氣久居於上勢必龍雷之火應之於下血不盡竭不止也氣不盡厥不止也仲景斷為難治其以是乎吾將闢其扃則以健脾中之陽氣為第一義健脾之陽有三善一者脾中之陽氣旺如青天日朗而龍雷潛伏也一者脾中之陽氣旺而胸中窒塞之陰氣如太空不留纖翳也一者脾中之陽氣旺而飲食運化精微復生其下竭之血也況乎地氣必先蒸土為濕然後上升為云若土燥而不濕地氣於中隔絶矣天氣不常清乎今方書皆治陽火之法至龍雷之火徒有其名而無其治反妄引久嗽成癆痰中帶血之陽症不敢用健脾增嗽為例不思咯血之嗽不過氣逆上厥氣下則不嗽矣古方治龍雷之火用桂附然施於暴血之症可暫不可常蓋已虧之血恐不能制其悍而未動之血恐不可滋之擾況此症以勞房憂恐傷精傷腎又肝惟疏泄是以少陰之氣當藏不藏而少陰之血無端溢出與仲景所謂誤發少陰汗動其血者無少異矣究而論治龍雷之火全以收藏為主以秋冬則龍雷潛伏也故治法惟以崇土為先土厚則陰濁不升而血患自息矣繆仲淳曰吐血有三要宜降氣不宜降火氣有餘即是火氣降則火降血隨氣行無溢出上竅之患矣降火必用寒涼之劑反傷胃氣胃氣傷則脾不能統血血愈不能歸經矣今之療吐血者大患有二一則專用寒涼往往傷脾作泄以致不救一則專用人參肺熱傷肺咳逆愈甚亦有用參而愈者此是氣虛喘嗽不由陰火致然宜以白芍炙草制肝枇杷葉麥冬薄荷橘紅貝母清肺苡仁山藥養脾番降香蘇子下氣青藁鱉甲銀柴胡丹皮地骨皮補陰清熱酸棗仁茯神養心山萸枸杞子牛膝補腎此纍試輒驗之方然陰無驟補之法非多服不效宜行血不宜止血血不循經絡者氣逆上壅也血得熱則行得寒則凝故降氣行血則血循經絡矣若血凝必發熱及胸脅痛病曰沉痼耳宜補肝不宜伐肝經曰五臟者藏精氣而不瀉者也肝主藏血吐者肝失其職也養肝則肝氣平而血有所歸伐之則肝不能藏血血愈不止矣薛立齋曰血症多屬形病俱虛治者當求其屬而主之若鬱熱傷肺而衄者用黃耆益氣湯肺氣虛熱不能攝血而衄者用四君加芎歸五味鬱結傷脾而咳吐血者用歸脾湯胃經有熱而咳吐血者用犀角地黃湯胃氣弱而咳吐血者用四君子加川芎當歸升麻腎經虛熱陰火內動而咯吐血者用六味丸補中益氣湯怒動肝火而見血者用逍遙散雖曰血得熱而錯經妄行亦有衛氣虛不能統攝營血而為妄行者不可不察臨症審諸又曰勞嗽見血亦有勞傷元氣內火妄動而傷肺者亦有勞傷腎水陰火上炎而傷肺者有因過服天冬生地寒藥損傷脾胃不能生肺氣而不愈者有因誤用黃柏知母之類損傷陽氣不能生陰精而不愈者凡此脾肺虧損而腎水不足以致虛火上炎真臟為患也須用補中益氣湯補脾土而生肺金用六味丸滋腎水而生陰精否則不救戴元禮曰牙宣有二證有風壅牙宣有腎虛牙宣風壅者消風散擦仍服腎虛者以腎主骨牙者骨之餘虛而上炎故宣服涼劑而愈甚者此屬腎下虛上盛宜鹽湯下安腎丸間黑錫丹仍用薑鹽炒香附黑色為末揩擦妙鼻衄鼻通於腦血上溢於腦所以從鼻而出有頭風自衄頭風才發則衄不止宜芎附飲間進一字散有因虛而衄此為下虛上盛不宜過用涼劑宜養正丹佐以四物湯芎歸湯磨沉香飲傷濕而衄腎著湯加川芎名除濕湯傷胃致衄者名酒食衄喜怒憂思諸氣皆能動血以此致衄者名五臟衄上膈極熱而衄者金沸草散去麻黃半夏加茅花如荊芥散或用黃芩芍藥湯加茅花一撮虛極者茯苓補心湯飲酒過多及食熱物而衄先用茅花湯衄愈甚則用理中湯去乾薑加乾葛驀然以水噴其面使戰驚則止衄愈後血因舊路一月或三四衄又有洗面而衄日以為常此即水不通借路之意並宜止衄散茅花煎湯調下或四物湯加石菖蒲阿膠蒲黃各半錢調熟石膏一匙許兼進養正丹趙羽皇曰營者水穀之精氣也衛者水穀之悍氣也又云肺朝百脈之氣脾統諸經之血可知血藏於肝而屬於脾胃明矣但人身之失血種種不同故有鬱熱傷胃而吐血者怒動肝火而見血者腎虛火泛而咯血者治法如清胃散地黃湯六味丸之屬用之得宜無不獲效獨見血之出於脾胃者每略不講一遇此等症而莫可如何蓋人身之脾為營衛之主氣血之根今人思慮不遂郁傷火動脾不攝血而從上竅出者用歸脾湯補以斂之力役過度中氣勞傷脾不統血而從下竅出者用補中湯升以舉之一滋脾胃之陰而從陰以引陽一補脾胃之陽而從陽以引陰先哲有言曰血脫益氣須以參耆救之又云下血諸症日久多以胃藥收功無非為陽生陰長以滋化生之源耳世人往往不識此症多用地黃童便以清火養陰豈知脾胃既虛多不利地黃之泥滯中氣既弱斷不宜童便之沉寒豫見蹈此病者多特為拈出柯韻伯曰失血之症關係最重先輩立論甚詳治法甚備如血脫益氣見之東垣矣滋陰清火見之丹溪矣安神補血見之陸迎矣引血歸源見之吳球矣攻補迭用見之伯仁矣逐淤生新見之宇泰矣辛溫從治見之巢氏矣先止後補見之葛氏矣胃藥收功見之石山矣宜滋化源見之立齋矣無説不通無治不善乃創法者用之而痊遵法者因循而敗豈古今人有不相及歟抑亦未知其要耳請言治血之要其取效在調氣而補血其收功在安神而固精夫人身中惟氣血用事血隨氣行誰不能言獨於失血病不言調氣之理血脫須補誰不知之反於失血症不知補血之法惟以降火為確論寒涼為定方至於氣絶血凝猶不悔悟不深可憫耶夫氣亢於上焦之陽分則陽絡傷血隨氣上溢於口鼻當桃仁承氣以下之氣並於下焦之陰分則陰絡傷血隨氣而下陷於二便用補中益氣以舉之氣有餘必挾火當用苦寒以涼其氣氣不足便挾寒宜用甘溫以益其氣此調氣之大要也血自心來者補心丹主之脾來者歸脾湯主之肺來者生脈散主之腎來者腎氣丸主之此補血之大要然氣血者後天精神者先天故精神不散氣血和調形體不敝精神內守故治血者必用安神固精使病者積精全神以善其後何有夭枉之憾哉驚悸怔忡健忘煩躁不寐張三錫曰內經云心者君主之官神明出焉夫怔忡驚悸之病或因怒氣傷肝或因驚入膽氣母令子虛因而心血為之不足又或遇事煩冗思想無窮則心君亦為之不寧故神不安而怔忡驚悸之所由生也夫所謂怔忡者心神惕惕然動搖而不得安靜無時而作者是也驚悸者驀然跳動有欲厥之狀有時而作者是也然症之由亦有停痰積飲留結於心胸胃口而病者又不可執以為心虛而治健忘者陡然而忘其事也為事有始無終言談不知首尾此因遇事煩冗思想無窮精神斫喪之所致也然過思傷脾亦能令人健忘治之當兼理心脾神寧志定其證自除大抵怔忡驚悸健忘三者名雖不同未有不由心血不足脾氣虛弱積飲停痰而成此症其治惟在補養心血調和脾氣寧神化痰使神完氣充則無此三者之患矣又有一種虛煩心中擾亂鬱郁不寧良由津液去多五內枯燥或營血不足陽勝陰微或腎水下竭心火上炎故虛熱而煩生焉甚則至於躁也又有大病後血氣未復而煩者陳氏曰內熱曰煩外熱曰躁心熱則煩腎熱則躁宜八珍湯加竹葉棗仁麥冬或四物加人參茯神又有不寐一種老年人及病後虛弱人陽衰而不寐有痰在膽經神不歸舍而不寐虛者四君子加棗仁黃耆痰者溫膽湯加天南星亦有心血不足而然者宜益營湯原病式曰因水衰火旺其心胸躁動謂之怔忡然悸之為病是心臟之氣不得其正動而為火邪者也蓋心為君火包絡為相火火之為陽陽主動君火之下陰精承之相火之下水氣承之夫如是而動則得其正而清淨光明為生之氣也若乏所乘則君火過而不正變而為煩熱相火妄動既熱且動豈不見心悸之證哉況心者神明居之經曰兩精相搏謂之神又曰血氣者人之神則是陰陽氣血在心臟未始相離也今失其陰偏傾於陽陽亦失其所承而散亂故精神怔怔忡忡不能自安矣如是者當自心臟中補其不足之心血以安其神氣不已則求其屬以衰之壯水之主以制陽光也又包絡之火非惟輔心而且遊行於五臟故五臟之氣妄動者皆火也是以各臟有痰皆能於包絡之火合動而作悸如是者當自各臟補瀉其火起之由而後從包絡調之平之隨其攸利而治若各臟移熱於心而致包絡之火動者治亦如之若心氣不足腎水凌之逆上而停心者心折其逆氣瀉其水補其陽若左腎之真水不足而右腎之火上逆與包絡合動者必峻補左腎之陰以制之若內外諸邪郁其二火不得發越隔絶營衛不得充養其正氣者則皆以治邪解鬱為主若痰飲停於中焦礙其經絡不得舒通而鬱火與痰相擊於心下以為怔忡者必導去其痰經脈行則病自已朱丹溪曰怔忡大概屬血虛與痰有慮使動屬虛時作時止者痰因火動瘦人多是血虛肥人多是痰飲食直覺心跳者是血少多勞則心跳屬虛兼氣東垣曰六脈大而空虛病面赤心跳乃火虛炎上也補以降之有不因驚而心動者謂之憺憺動屬痰火王宇泰曰一陰一陽多對待而言如喜怒並稱者喜出於心為陽怒出於肝為陰志意並稱者志是靜而不移意是動而不定靜則陰也動則陽也驚恐並稱者驚因觸於外事內動其心心動則神搖恐因惑於外事內歉其志志歉則精卻是故內經所謂驚則心無所依神無所歸慮無所定故氣亂矣恐則精卻卻則上焦閉閉則無氣還無氣還則下焦脹故氣不行矣又謂嘗貴後賤嘗富後貧悲憂內結至於脫營失精病深無氣則灑然而驚此類皆是病從外事而動內之心神者也若夫在人身之陰陽盛衰而致驚恐者驚是火熱躁動其心心動則神亂神用無方故驚之變態亦不一狀與五神相應而動肝藏魂魂不安則為驚駭為驚妄肺藏魄魄不安則驚躁脾藏意意不專則為驚惑腎藏志志不慊則為驚恐心惕惕然胃雖無神然五臟之海諸熱歸之則發驚狂若聞木音亦惕惕然心欲動也驚則安其神而散亂之氣可斂恐則定其志而走失之精可固聲喑張景嶽曰聲音出於臟氣臟實則聲宏臟虛則聲怯然舌為心苗心病則舌不能轉此心在聲音之主也聲由氣而發肺病則氣奪此肺為聲音之戶也腎藏精精化氣陰虛則無氣此腎為聲音之根也病雖由五臟而三者實為之主然人以腎為根元氣所由生使腎一衰則元陽寢弱聲音之標在心肺聲音之本則在腎經云內奪而厥則為喑痱此腎虛也腎為聲音之根信非謬矣喑病分虛實實者病在標風寒火邪氣逆之閉易治之若其色欲傷腎憂思傷心驚恐傷膽飢餒疲勞傷脾非各求其屬而大補元氣安望其嘶敗者復完而殘損者復振乎此虛為難治矣然猶有難易者暫而近者易漸久者難脈緩滑者易細數者難素無損傷者易積有勞怯者難以及病人久嗽聲啞肺腎俱敗但宜補肺氣滋腎水養金潤燥其聲自出或略加訶子百藥煎之類兼收斂以治其標若見假熱痰盛再用寒涼消耗鮮不危矣癲癇狂證癲癇狂三者雖有輕重之分實因痰火鬱悒心神耗散氣虛不能勝敵痰火猖狂犯上之所致也正內經所謂主不明則十二官危使道閉塞不通形乃大傷是也夫人事混濁神識不清語言顛倒曰癲一云失心風有狂之意不如狂之甚屬心血不足乃求望高遠所願不遂者有之心脈及兩寸必虛數或洪大無力當從心清治心舒郁養神石菖蒲香附子川芎當歸茯神梔子貝母麥冬橘紅柏仁之類痰多者先以湧劑去其痰後服安神藥若心經蓄熱發作不常或時煩躁鼻眼覺有熱氣不能自由有類心風稍定復作清心湯加石菖蒲思慮傷心而得者酒調天門冬地黃膏多服乃效妄歌妄笑登高逾垣罵詈不避親疏曰狂俗謂之風子是也與傷寒熱極發狂同屬痰火內盛有樂極而成有怒極而成尋火尋痰分多少而治牛黃瀉心湯滾痰丸極對症方須斷厚味酒肉麵食薑蒜煎炒內經所謂奪其食乃已即此義也此心火獨盛陽氣有餘神不守舍痰火壅盛而然耳亦有水涸相火獨旺而致者忽然僵仆作獸聲手足徑強厥不知人曰癇俗名羊頭風是也方書以五畜分五臟丹溪斷其為痰千古灼見大法行痰為主用黃連膽星栝蔞仁如內有熱者用涼藥以清其心有痰氣實者可用吐法虛實在脈上辨不可以肥瘦取若虛而不能吐下者用人參菖蒲茯苓麥冬全蠍竹瀝之類大抵癲為心血不足狂為痰火實盛癇病獨生乎痰因火動之所作也治法癇宜乎吐狂宜乎下癲則安神養血兼清痰火雖然此病神脫目瞪如愚如癡者縱倉扁復生亦末如之何也又有小兒胎癇胎元之始當母受驚之邪出腹後一二歲始發或八九歲發之必待復感之邪與所感母腹之邪相搏而後作然小兒質弱目瞪不過歲月難出成人之年蓋腎間生命之氣虛而不復故不復壽也諸積病準繩曰大全方分痃癖諸氣疝瘕八瘕腹中瘀血痞癥食癥血癥凡七門痃者在腹內近臍左右各有一條筋脈急痛大者如臂次者如指因氣而成如弦之狀故名曰弦癖者僻在兩脅之間有時而痛故名曰癖疝者痛也瘕者假也其積聚浮假而痛推移乃動也瘕有八症黃青燥血脂狐蛇鱉積在腹內或腸胃之間與臟氣結搏堅牢雖推之不移名曰癥言其病形可徵驗也氣壅塞為痞言其氣痞塞不宣暢也傷食成塊堅而不移名曰食癥淤血成塊者也大抵以推之不動為癥動為瘕也至夫疝與痃癖則與痛俱見不痛即隱在腹左右為痃在兩脅之間為癖在小腹而牽引腰脅為疝朱丹溪曰痞塊在中為痰飲在右為食痰積在左為血塊氣不能作塊成聚塊乃有形之物痰與食積死血而成也用醋煮海石三稜蓬朮桃仁紅花五靈脂香附之類為丸石鹼白朮湯吞下瓦壠子能消血塊次消痰石鹼一物有痰積有塊可用洗滌垢膩又能消食積治塊當降火消食積即痰也行死血塊去須大補凡積不可用下藥徒損真氣病亦不去當用消積藥使之融化則除根矣張子和曰積之在臟如陳莖之在江河中間多著脂膜曲折之處區臼之中如陳莖之在江河不在中流多在汀灣洄薄之地遇江河之溢一漂而去積之在臟理亦如之故豫先以丸藥驅新受之食使無梗塞其闢著之積已離而未下次以散藥滿胃而下橫江之筏一壅而盡設未盡者得以藥調之惟堅積不可用此法宜以漸除內經曰堅者削之是也凡食積酸心腹滿大黃牽牛之類甚者礞石巴豆酒積目黃口乾乾葛麥芽之類甚者甘遂牽牛氣積噫氣痞塞木香檳榔之類甚者枳殼牽牛涎積咽喉如曳鋸硃砂膩粉之類甚者瓜蒂甘遂痰積涕唾稠黏半夏南星之類甚者瓜蒂藜蘆癖積兩脅刺痛三稜廣朮之類甚者甘遂蠍梢水積足脛脹滿郁李商陸之類甚者甘遂芫花血積打撲肭淤産後不月桃仁地榆之類甚者虻蟲水蛭肉積贅瘤核癘膩粉白丁香砭刺出血甚者硇砂信石九積皆以氣為主各據所屬之狀而對治之方約之曰凡積聚痞塊之症人之氣血營衛一身上下周流無時少息一旦七情感動五志之火火性炎上有升無降以致氣液水穀不能順序稽留而為積也必矣丹溪以為氣不能成塊成聚塊必痰與死血食積而成在中為痰飲在右為食積在左為血塊誠哉言也夫左關肝膽之位藏血液右關脾胃之位藏飲食所以左邊有積為血塊右邊有積為食積中間則為水穀出入之道路五志之火熏蒸水穀而為痰飲所以中間有積則為痰飲也治法順氣破血消食豁痰是已如木香檳榔去氣積三稜莪朮去血積麥芽神麯去酒積香附枳實去食積牽牛甘遂去水積山楂阿魏去肉積海粉礞石去痰積雄黃白礬去涎積乾薑巴豆對寒積黃連大黃去熱積各從其類也大抵積之初固為寒而積之久則為熱矣豫分辛溫辛平辛涼三例正欲人知新久之義耳然陰虛難補久積難除誠節欲以養性內觀以養神固可從容而治耳治法綱曰積有常所痛有常處聚無常所痛無常處蓋陰伏而靜陽浮而動故臟腑之氣有積聚之別然雖有積聚之脈總皆氣病無二端也其脈浮洪者易治沉澀者難治治宜審其所因倘有風寒束於外使氣不宣通當以驅邪為主或憂思納於內使氣不流暢當以理氣為本丹溪治積法甚善又云若積於皮裡膜外者尤非藥石所能治必須針灸之方能消散甚得肯綮潔古云養正則積自除亦有滋味蓋元氣實方可攻邪也今以通用藥味加減主之各加引經之藥庶無差誤以檳榔木香青皮陳皮枳殼三稜莪朮之類如因風寒外束氣滯不行加麻黃蘇葉乾薑官桂吳茱萸之類因七情內傷氣鬱不散加香附川芎蒼朮蘇梗之類如肝積左脅嘔逆倍用青皮加柴胡白芍川芎防風之類如心積臍上至心煩悶加菖蒲炒黃連香附川芎當歸之類如脾積中脘其人黃瘦加白朮蒼朮神麯麥芽山楂之類如肺積右脅喘咳加桔梗葶藶前胡蘇子之類如腎積臍下奔築加細辛官桂香附之類如手足太陽經聚加羌活如手足少陽經聚加柴胡如手足陽明經聚加白芷若治痞塊以培養脾胃為主而兼以消化之劑以人參白朮茯苓黃耆陳皮白芍歸身甘草之類如痰塊加半夏蒼朮南星海石牡蠣如血塊加三稜莪朮香附桃仁紅花蘇木乾漆如食積加山楂麥芽神麯枳實如肉積加生薑黃連阿魏疝證張三錫曰疝屬肝經濕熱為外寒所郁氣不得通則痛甚是固然也乃或腎氣憊甚酒色無節滲利不及濁氣流入下部厥陰之分或勞碌或遇寒則發發作有時或有形結於小腹不能頓消乃濕熱為標腎虛為主丹溪法用參朮佐心疏導是也張子和以寒水筋血氣孤㿗名七疝其治一以攻下為主恐非確大抵七疝為病若非勞役過度即是遠行辛苦涉水履冰熱血得寒而凝滯於小腸膀胱之分或濕乘虛而流入於足厥陰之經古方一以為寒而純用烏附我丹溪先生獨斷為濕熱也發前人所未發也火鬱於中而寒束於外宜有非常之痛故治法宜驅逐本經之濕熱消導下焦之瘀血而寒因熱用則邪易伏稍安即加培養更慎酒色厚味為佳其症有有聲者有無聲者或有形如瓜或有聲如蛙有小腹痛連睪丸者有痛在下部一邊者然濕熱又須分多少而治濕者腫多㿗疝是也其有挾虛而發者肺沉緊大豁無力其痛亦輕惟覺重墜牽引耳當補而兼疏導寒疝其狀囊冷結硬如石陰莖不舉或控睪丸而痛得之坐臥濕地寒月涉水或冒雨雪或勞碌熱極坐臥磚石水疝其狀腎莖腫痛陰汗時出或囊腫狀如水晶或囊癢而搔出黃水或小腹按之作水聲得之飲水醉酒使內過勞汗出寒濕乘虛襲入下部而然筋疝其狀陰囊腫脹或潰或痛而裡急筋縮或莖中痛痛極則癢或挺縱不收或白物隨溺而下得之房勞及邪術血疝其狀如王瓜在小腹傍核骨兩端俗云便癰得之醉飽勞碌入房氣血流入脬囊結成癰腫後復生梅瘡氣疝其狀上連腎區下及腎囊或因號哭忿怒則氣鬱而脹脹罷則氣散是也小兒有此俗名偏氣惟灸築賓穴可消狐疝其狀如瓦臥則入小腹行立則出小腹入囊中狐則晝出穴而溺夜入穴而不溺此疝出入往來正與狐相類今人帶鉤鉗是也㿗疝其狀陰囊腫縋如升如斗不癢不痛是也得之地氣卑濕所生女子前陰突出後陰痔核皆疝類但不謂之疝謂之瘕心胸胃脘腹痛諸證李土材曰心腹諸痛按內經之論心痛未有不兼五臟為病者獨詳於心而略於胸腹舉一以利其餘也心為君主義不受邪受邪則本經自病名真心痛必死不治然經有云邪在心則病心痛喜悲時眩僕此言胞絡受邪在腑不在臟也又云手少陰之脈動則病嗌乾心痛渴而欲飲此言別絡受邪在絡不在經也其絡與腑之受邪皆因怵惕思慮傷神涸血而方論復分九種飲食熱冷氣血悸蟲疰苟不能遍識病情將何治耶胃屬濕土列處中焦為水穀之海五臟六腑十二經脈皆受氣於此壯者邪不能幹弱者著而即病偏熱偏寒水停食積皆與真氣相搏而痛肝木相乘為賊邪腎寒厥逆為微邪挾他藏而見症當與心痛相同但或滿或脹或嘔吐或不能食或吞酸或大便難或瀉利面浮而黃本病與客邪又參雜而見也胸痛即膈痛其與心痛別者心痛在歧骨陷處胸痛橫滿胸膈間也其與胃脘痛別者胃脘在心之上也經曰南風生於夏病在心俞在胸脅此以胸屬心也肝虛則胸痛引背脅肝實則胸痛不能轉側此又以胸屬肝也夫胸中肺家之分野其言心者以心之脈從心系卻上肺也其言肝者以肝之脈貫膈上注肺也脅痛舊從肝治不知肝固內胠脅何以異於足少陽手心主所過而痛者哉若謂筋脈挾邪而痛何以異於經筋所過而痛者哉故非審色按脈熟察各經氣變卒不能萬舉萬當也且左右肺肝氣血陰陽亦有不可盡拘臨症者可不詳察耶腹痛分為三部腹以上痛者為太陰脾當臍而痛者為少陰腎少腹痛者為厥陰肝及沖任大小腸每部各有五臟之變七情之發六氣之害五運之邪至紛至博苟能辨氣血虛實內傷外感而為之調劑無不切中病情矣心痛有停飲則噁心煩悶時吐黃水甚則搖之作水聲小胃丹或胃苓湯食積則飽悶噫氣如敗卵得食輒甚香砂枳朮丸加神麯莪朮火痛忽減忽增口渴便閉清中湯外受寒內食冷草豆蔻丸虛寒者歸脾湯加薑桂菖蒲氣壅攻刺而痛沉香降氣散死血脈必澀飲下作厄手拈散甚者桃仁承氣湯心痛而煩發熱動悸此為虛傷妙香散蟲痛面上白斑唇紅能食或食後即痛或痛後能食或口中沫出剪紅丸蛔蟲蛔動則噁心嘔吐烏梅丸蕪荑散鬼疰昏憒妄言蘇合香丸熱厥心痛金鈴子散寒厥心痛朮附湯胃脘痛與心痛相仿但有食積按之滿痛者下之大柴胡湯虛寒者理中湯胸痛肝虛者痛引背脅補肝湯肝實者不得轉側喜太息柴胡疏肝散有痰二陳湯加薑汁腹痛芍藥甘草湯主之稼穡作甘甘者己也曲直作酸酸者甲也甲己化土此仲景妙法也脈緩傷水加桂枝生薑脈洪傷金加黃芩大棗脈澀傷血加當歸脈弦傷氣加芍藥脈遲傷火加乾薑綿綿痛而無增減欲得熱手按及熱飲食其脈遲者寒也香砂枳朮理中湯冷痛用溫藥不效大便祕者當微利之藿香正氣散加官桂木香大黃時痛時止熱手按而不散脈大而數者熱也大金花丸或黃連解毒湯暑痛十味香薷飲濕痛小便不利大便溏脈必細緩胃苓湯痰痛或眩暈或吐冷涎或下白積或小便不利或得辛辣熱湯則暫止脈必滑輕者二陳加枳殼薑汁重者用礞石滾痰丸食積痛甚大便後減其脈弦或沉滑平胃加枳實山楂麥芽砂仁木香甚者加大黃酒積痛葛花解酲湯加三稜莪朮茵陳氣滯必腹脹脈沉木香順風散死血作痛痛有定在而不移脈澀或芤虛者四物湯料加大黃蜜丸服實者歸尾桃仁加童便酒韭汁桃仁承氣湯或丹皮香附穿山甲降香紅花蘇木元胡蟲痛心腹懊憹往來上下痛有休止或有塊耕起腹熱善渴面色乍青乍白乍赤吐青水者蟲也椒湯吞烏梅丸安之夫近世治痛有以諸痛為實痛無補法者有以痛則不通通則不痛有以痛隨利減者以為不可易之法不知形實病實便閉不通乃為相宜若形虛脈弱食少便泄者豈容混治須知脹閉而痛者為實不脹閉者多虛拒按者為實可按者為虛喜寒者多實受熱者多虛飽則甚者多實飢則甚者多虛脈實氣粗者多實脈虛氣少者多虛新病年壯者多實久病年衰者多虛補而不效者多實攻而愈劇者多虛痛在經者脈多弦大痛在臟者脈多沉微必以望聞問切四者詳辨則虛實灼然故表虛而痛者陽不足也非溫經不可裡虛而痛者陰不足也非養營不可上虛而痛者以脾傷也非補中不可下虛而痛者脾腎敗也非溫補命門不可若泥痛無補法則殺人慘於刀劍矣脅痛左痛多留血代抵當湯右痛多痰氣痰二陳湯氣推氣散左為肝邪枳芎散右為肝移邪於肺推氣散挾寒理中湯加枳殼死血日輕夜重或午後熱脈澀或芤桃仁承氣湯加枳殼鱉甲痰飲導痰湯加白芥子食積有一條扛起者是也枳朮丸加吳茱萸黃連神麯山楂肝火盛龍薈丸虛冷理中湯送黑錫丹肝脈軟補肝湯驚傷脅痛桂枝散脅痛肝火盛左金丸治肝火有氣鬱者看其脈沉澀當作郁治痛而不得伸舒龍薈丸最快右脅痛嚴氏推氣散左脅痛蒼朮川芎青皮當歸柴胡痛甚當歸龍薈丸薑汁下然脅痛固屬肝常見口吐苦水脅痛寒熱用豬膽炒黃連入小柴胡是膽家有火也若夫謀慮不決不眠辛苦膽氣傷而作痛用歸芍人參麥冬茯神棗仁有火加元參此膽虛脅痛也方約之曰脅痛之症多是肝火上升不得條達之故豫每度其左脅痛甚者即是肝火盛木氣實也宜用龍薈丸左金丸辛涼之劑以治之凡右脅痛微者即是痰疰宜用鹽煎散順氣丸辛溫之劑以治之是也又嘗論左脅痛胃脘痛之症婦人為多以其憂思忿怒之氣素灌於中發則上衝被濕痰死血阻滯其氣而不得條達故作痛也故治婦人諸痛必以行氣開鬱為主而破血散火兼之庶乎得法矣諺云香附縮砂女人之至寶此之謂也張景嶽曰脅痛者左右氣血之辨若左無氣右無血食積痰飲豈必無涉於左乎此謬談也豫以為莫若察其有形無形蓋血積有形而不移或堅硬而拒按氣痛流行而無迹或倏聚而倏散若食積痰飲皆屬有形之症詳察所因自可辨識凡屬有形之症亦無非由氣之滯但得氣行則何聚而不散無論是氣是血是痰必皆兼氣為主而後隨宜佐使以治之可也一內傷虛損房勞腎虛之人多有胸脅間隱隱作痛此肝腎精虛不能化氣氣虛不能生血而然凡人之氣血猶源泉也盛則流暢少則壅滯故氣血不虛則不滯虛則無有不滯者倘於此症不知培氣血而但知行滯通經則誤矣王節齋曰凡治心腹疼痛但是新病須問曾何飲食因何傷感有無積滯便與和中消導之藥若日數已多曾多服過辛溫燥熱之藥嘔吐不納胸膈飽悶口舌乾燥大小便澀難則內有鬱熱矣或原有舊病因感而發綿延日久見症如前者俱用開鬱行氣降火潤燥之藥如川芎香附山梔黃連薑汁之類甚者再加芒硝但治心腹久痛須於溫散藥內加苦寒鹹寒之藥溫治其標寒治其本也諸積諸痛喜溫而惡寒熱藥與病情相合積久成郁而火邪深矣鬱熱既深則見寒愈逆見熱愈喜雨熱相從故不生他病所謂火極而似水者也然真氣被食陰血乾枯病日深錮而不可為矣世人不識但見投熱不熱誤認為沉寒錮冷而益投之至死不悟然則如之何曰從治法熱因寒用寒因熱用伏其所主先其所因是也朱丹溪曰心膈之痛須分新久病久則成郁久鬱則蒸熱古方多以山梔為熱藥之嚮導用梔子炒去皮每服十五枚濃煎湯一呷入生薑汁令辣再煎小沸又入川芎一錢尤妙大概胃中有熱而作痛者用山梔不可須佐以薑汁臺芎開之痰發者或用二陳湯加川芎蒼朮倍加炒梔痛甚者加乾薑從之反治之法也若用山梔並劫藥不止用元明粉一服立止腹痛有寒有熱死血食積濕痰脈弦為食脈滑為痰濕痰多作腹痛臺芎蒼朮香附白芷為末以生薑汁入湯服大法主方在氣用氣藥如木香檳榔香附沒藥之類血用血藥如當歸川芎桃仁紅花之類初得時元氣未虛必推蕩之此通因通用之法壯實者同若人虛弱衰與久病者宜升之消之凡心腹痛必用溫散此是鬱結不行阻氣不運故痛在上者多屬食用炒乾薑蒼朮川芎白芷香附薑汁之類不可用峻藥攻下之更兼行氣快氣藥助之無不可者寒痛者綿綿痛無增減者是也時痛時止者是熱也死血痛者痛有處不移者也大便利後減者是濕痰東垣云感寒而痛宜薑桂嘔者加丁香傷暑而痛宜玉龍丸肥人腹痛屬氣兼濕痰宜人參蒼朮白朮半夏或曰痰豈能作痛不知氣鬱則痰聚痰聚則凝氣道不得運故痛也如稟受素弱飲食過傷而腹痛者以養胃湯加桂茱萸各半錢木香三分又或理中湯建中湯皆可用內加茱萸良絞腸痧以樟木煎湯大吐或白礬調湯吐之鹽湯亦可探吐亦宜刺委中出血喻嘉言曰五臟失治皆為心痛理甚明晰腎心痛者多由陰邪上衝故善瘈如從後觸其心胃心痛者多由停滯故胸腹脹滿脾心痛者多由寒逆中焦故其病甚肝心痛者多由木火之郁病在血分故色蒼蒼如死狀肺心痛者多由上焦不清病在氣分故動作則病益甚若知其在氣則順之在血則行之鬱則開之滯則逐之火多實則或散或清實多虛則或溫或補必真心痛乃不可治否則得其本隨手而應也張景嶽曰諸症虛實皆可以脈辨惟心腹痛症脈多難辨雖滑實有力者固多實邪虛弱無神者固多虛邪此其常也然暴病之極每多沉伏細澀最似極虛之候不知氣為邪逆脈道不行而沉伏異常此正邪實之脈然於沉伏之中細察之必有梗梗然弦緊之意此必寒邪阻遏陽氣者多有是脈若火邪作痛則不然也辨此之法但當察其形氣以見平素強弱問其病因以知新久及何所因而起大都暴病痛急而脈忽細伏者多實邪久病痛緩而脈本微弱者為虛邪論其虛實酌之以理參而論之則萬無一失矣凡治心腹痛症已經攻擊蕩滌愈而復作或再三用之愈作愈甚脈反浮弦虛大為中虛之候速當酌其虛實或專補正氣或兼治邪氣若用補無礙不可妄亂雜投使脾胃強則痛自愈矣一胸腹之痛有無關於內而在筋骨皮肉之間此邪之在經不可混作里症必詳問的當而分其或火或寒或氣或血滯或血虛或淫瘡邪毒留蓄在經庶治之無誤也附醫案余治一上舍年近三旬因食麵角午刻至初更食及小腹下至右角間遂停積不行堅突如拳痛劇之甚余察其明系面積已入大腸乃與木香檳榔丸連下二三次其痛如故疑藥未及病更投神佑丸瀉之又不效又疑藥性皆寒故滯不行因再投備急丸連得大瀉而堅痛毫不為減因潛測其由不過因面豈無所制之今既逐之不及使非借氣以行之不可也計面毒非大蒜不殺氣滯非木香不行又其滯深道遠非精鋭之嚮導不能得達乃用火酒磨木香令其嚼生蒜一瓣而以香酒進之一服後覺痛稍減三四服後痛漸止而食漸進方得全愈然小腹之塊仍在半年許始得盡消由是知欲消食滯即大黃巴豆猶有所不能及而惟宜以行氣為先也且知飲食下行之道必由小腹下右角間而後出於廣腸此自古無人言及者因筆之廣聞見云腰痛治法綱曰腰者腎之外候一身所恃賴轉移者也蓋諸經皆貫於腎而絡於腰脊腎氣一虛腰必痛矣有腎虛而腰痛者有淤血而痛者有挫閃而痛者有痰而痛者有濕熱而痛者有風寒而痛者有氣滯而痛者腰者腎之府不能轉搖腎將憊矣戴氏曰腰痛而不已者是腎虛也宜補腎淤血作痛日輕夜重是也宜行血順氣有暑熱動作必有痰或一塊作痛遇天陰而發也宜燥濕行氣豁痰使痰隨氣運化也腰樞因拗抐忽然不可俯仰此淤血為患以桃仁大黃蘇木當歸紅花之類若痛轉側如錐刺者尤是也腎冷如冰飲食如故小便自利腰間如帶五千錢治宜去濕之藥兼用溫散之劑又曰腎虛腰痛者其脈必大不能轉側如疲弱嗜臥痛而不已宜用加味虎潛丸之類風傷腎腰痛者其脈必浮或左或右痛無常處牽引兩足宜用獨活寄生湯感寒而痛其脈必緊見熱則減見寒則增宜用五積散去桔梗加吳茱萸氣滯而作痛者其脈必沉宜烏藥順氣散可加木香腰軟而不能強者是肝腎二經受病宜消息用藥凡腰痛之症多因腎臟真陰虛損外被風寒之郁遏內有濕熱之流注以致營衛不通故作痛也千金云所感不同腰痛有五一曰陽氣不足少陰腎衰之故二曰風痹風寒濕著之故三曰腎虛勞役傷腎之故四曰墜墮傷腰之故五曰濕地寢臥之故此皆各有所因而致之治宜審症用藥大抵腰之作痛亦不宜補氣之藥又不宜峻用寒涼因而氣虛作痛者非補不可不能不用補氣之藥當監製之又何執一論哉背痛有靜坐久而痛者屬虛補中益氣湯八物湯肥人多痰年高必用人捶而痛快者屬痰與虛除濕化痰兼補腎脾醉飽後多痛欲捶是脾不運而濕熱作禁也須節飲瘦人多是血少陰虛亦不禁酒及厚味而然養血清火為要又有素虛後及病後産後經行後心痛或牽引乳脅或走注背肩此元氣上逆當引使歸元不可復下疏利愈利愈虛發汗後患此者衆惟宜溫補拘於痛無補法謬矣汗者心之液陽受氣於胸中汁過多則心液耗陽氣不足故致痛也柯柏齋曰腰痛之證多因腎虛所致蓋腎虛則精血之真氣不足寒濕之氣乘虛而入久則結滯不通真氣與之相攻故痛先瀉其邪後補其氣此治法也未瀉而補則補而不效瀉而不補則痛必復作蓋邪乘其虛而再入也腰痛亦有因閃挫而得者閃挫之初必有凝滯之處亦宜先瀉而後補也疝痛與腰痛皆起於腎虛寒濕由前而入則為疝由後而入則為腰痛張景嶽曰腰痛之虛症十居八九但察既無表邪又無濕熱而或年衰勞苦或酒色斫喪或七情憂鬱所致者悉屬真陰虛症凡虛證之候形色必青白間或見黧黑脈息必和緩而或細微或行立勞動更甚而臥息少可蓋積而漸至者皆不足暴而痛甚者多有餘治宜辨之凡腎水真陰虛宜當歸地黃飲及左右歸丸若病稍輕或痛不甚虛不甚者青蛾丸煨腎丸補髓丹通氣散丹溪云諸腰痛不可用參補氣亦不可峻用寒涼此言未當蓋凡勞傷虛損而陽不足者多有氣虛之症何為參不可用又如火聚下焦痛極不可忍者速宜清火而熱不甚不宜過用寒涼者有之或虛中挾實不宜參者亦有之概謂不可用寒涼豈其然乎頭痛眩運風汗證李土材曰經之論頭痛風也寒也虛也運氣論頭痛十條傷寒論太陽頭痛一條皆六氣相侵與真氣相搏經氣逆上干清道不得運行壅遏而痛也頭為天象六腑清陽之氣五臟清華之血皆會於此故天氣六淫之邪人氣五賊之變皆能相害或蔽覆其清明或瘀塞其經絡與氣相搏鬱而成熱脈滿而痛若邪氣稽留脈滿而氣血亂則痛乃甚此實痛也寒濕所侵真氣虛弱雖不相搏成熱然邪客於脈外則血泣脈寒捲縮緊急外引小絡而痛得溫則痛止此虛痛也因風痛者抽掣惡風因熱而痛者煩心惡熱因濕而痛者頭重而天陰轉甚因痰痛者昏重而欲吐不休因寒而痛者絀急而惡寒戰栗氣虛痛者惡勞動其脈大血虛痛者善驚惕其脈芤頭痛自有多因而古方每用風藥蓋高巔之上惟風可到味之薄者陰中之陽自地升天者也在風寒濕者固為正用即虛與熱者亦假引經須知新而暴者但名頭痛深而久者名為頭風頭風必害眼者經所謂東風生於春病在肝目者肝之竅肝風動則邪害空竅也頭痛九竅不利屬氣虛補中益氣湯加芍藥川芎細辛眉尖後近髮際曰魚尾魚尾上攻頭痛屬血虛四物湯加薄荷動作頭痛胃熱也酒炒大黃濃茶煎服心煩並頭痛清空膏加麥冬丹參張三錫曰內經云諸風掉眩皆屬肝木其氣虛肥白之人濕痰滯於上陰火起於下是以痰挾虛火上衝頭目正氣虛不能勝敵故忽然眼黑生花如坐舟車而旋暈甚而至於卒倒無所知者有之丹溪所謂無痰不作暈者此也若黑瘦之人軀體弱真水虧欠或勞役過度相火上炎亦有時時眩暈何濕痰之有原病式曰靜順清謐水之化也動亂勞擾火之用也腦者地之所生故藏陰於目為瞳子系腎水至陰所主二者喜靜謐而惡動擾若掉眩散亂故腦轉目眩也治法肥白人作眩運宜清痰降火兼補陰黑瘦人宜滋陰降火而帶抑肝之劑亦有感風邪而為眩運者宜祛風順氣伐肝降火為良有因嘔血而眩運多是血虧氣損虛火泛上與産後血暈同準繩曰凡有過節即隨其所動經臟之氣而妄起又或腎水不足或精血傷敗不能制其五陽之火獨光或中土虛衰不能提防下氣之逆則龍雷之火得此震動於巔諸火上至於頭輕則旋轉為眩暈重則搏擊而為痛矣薛立齋曰頭目眩運丹溪先生曰眩者言其黑運旋轉其狀目閉眼暗身轉耳聾如立舟車之上起則欲倒蓋虛極乘寒得之亦不可一途而取軌也若風則有汗寒則掣痛暑則熱悶濕則重滯此四氣乘虛而眩運也若鬱結生痰而眩運者此腎虛氣不歸元也若吐衄崩漏而眩運者元氣虛也正元飲下黑錫丹傷濕頭暈用腎著湯加川芎有痰用青州白丸子頭風風熱也久則目昏偏頭風相火也久則目緊便澀皆宜出血以開表之竊謂前症肝虛頭暈用鉤藤散腎虛頭暈六味丸頭暈吐痰養正丹不應八味丸血虛四物參蒼白朮不應當歸補血湯氣虛四君歸耆不應補中益氣湯肝木實瀉青丸虛地黃丸不應川芎散脾氣虛二陳參朮柴升不應益氣湯加茯苓半夏脾胃有痰半夏白朮天麻湯風痰上湧四神散發熱惡寒八物湯七情氣逆四七湯傷寒而暈除濕湯朱丹溪曰頭眩痰挾氣虛併火治痰為主挾補氣藥及降火藥無痰則不作眩左手脈數熱多肺澀有死血右手脈實有痰積脈大是久病之人氣血俱虛而脈大痰濁不降也頭痛多主於痰痛甚者火多有可吐者可下者頭痛可用川芎如不愈各加引經藥太陽川芎陽明白芷少陽柴胡太陰蒼朮少陰細辛厥陰吳茱萸肥人是濕痰宜半夏蒼朮瘦人是熱宜酒製黃芩防風感冒頭痛宜羌活藁本芷風熱在上宜天麻蔓荊子臺芎酒芩肥白人是氣虛宜黃耆生地南星祕藏安神湯形瘦蒼黑是血虛宜芎歸酒芩如苦頭痛用細辛頂巔痛宜藁本防風柴胡且如太陽頭痛惡風脈浮緊川芎羌活獨活麻黃之屬為主少陽頭痛脈弦細往來寒熱柴胡為主陽明頭痛自汗發熱惡寒脈浮緩長實升麻葛根石膏白芷為主太陰頭痛必有痰體重或腸痛脈沉緩以蒼朮半夏南星為主少陰頭痛足寒氣逆為寒厥其脈沉細麻黃附子細辛為主厥陰頭痛或吐痰沫厥冷其脈浮緩吳茱萸湯主之血虛頭痛川芎當歸為主氣虛頭痛參耆為主氣血俱虛頭痛調中益氣內加川芎蔓荊子細辛其效如神頭風屬痰者多有熱有風有血虛在左屬風薄荷荊芥屬血虛川芎當歸在右屬痰蒼朮半夏屬熱酒芩為主又屬濕痰川芎南星蒼朮偏頭風在左屬風者荊芥薄荷此二味即是治之至藥須要察其兼見何症而佐使之如有痰即以二陳治痰而佐之察識病情全在活法王海藏曰頭汗出劑頸而還血證也額上偏多何謂也曰首者六陽之所會也故熱蒸熏而頭汗出也額上偏多以部分左頰屬肝右頰屬肺鼻屬中州頤屬腎額屬心三焦之火涸其腎水溝渠之餘迫而上入於心之分故發為頭汗而額上偏多者屬心之部而為血證也飲酒飲食頭汗出者亦血症也至於雜症相火迫腎水上行入於心為盜汗或自汗傳而為頭汗出者或心下痞者俱用血症例治之無問傷寒雜症酒積下之而心下痞者血症也何以然曰下之亡陰亡陰者則損脾胃而亡血氣在胸中以亡其血陷在心之分也故心下痞世人以為血病用氣藥導之則痞病愈甚而又下之故變為中滿膨脹非其治也獨益中州脾土為血藥治之其治無以加矣王節齋曰久頭痛略感風寒便發寒月須重綿厚帕包裹者此屬鬱熱本熱而標寒世人不識率用辛溫解散之劑暫時得效誤認為寒殊不知因其本有鬱熱毛竅常疏故風寒易入外寒束其內熱閉逆而為痛辛熱之藥雖能開通閉逆散其標之寒邪然以熱濟熱病本益深惡寒益甚矣惟當瀉火涼血為主而佐以辛溫散表之劑以從法治之則病可愈而根可除也戴院使曰有頭風眩暈不可謂其無痛而不以為風切宜詳審未可遽作虛治若投補劑愈甚別又無疾又非諸般病後卒然得此是風暈分曉宜小續命湯加全蠍三四個眼眶骨痛有二症有肝虛而痛才見光明則眶骨痛甚宜生熟地黃丸又有肝經停飲一證發則眉稜骨痛眼不可開晝靜夜劇宜導痰飲或芎辛湯去茶芽或二陳湯吞青州白丸子張介賓曰頭痛須先審久暫次辨表裡暫痛必因邪氣久病必兼元氣暫痛有表邪治宜疏散忌清降有里邪治宜清降忌升散久病者或發或愈或表虛微感則發陽勝微熱則發或水虧於下虛火乘之或陽虛於上陰寒勝之而發所重元氣此大綱也亦有暫病而虛久病而實當以脈證辨之火邪痛諸經有之陽明為最無表邪者白虎湯加生地麥冬木通澤瀉他經則芩連知柏治火不宜佐以升散外邪之火可散而去內郁之火得升愈熾矣張景嶽曰眩運一證河間取內經諸風掉眩皆屬於肝丹溪曰痰在上火在下火炎上而動其痰無痰不能作眩也據此二説則凡眩運無非風火痰症也然痰飲之症軒岐絶不言此但曰上氣不足頭為之傾目為之眩曰上虛則眩曰督脈虛則頭重高搖曰髓海不足則腦轉耳鳴而眩冒凡此豈皆痰症耶丹溪以無痰不能作眩余則以為無虛不能作眩當以治虛為主而兼酌其標且頭痛之與頭眩有虛實之辨內經分別甚明曰頭痛巔疾上實下虛為厥巔疾此以邪氣在上所以為痛故曰上實也若至眩運則曰上氣不足又曰上虛則眩未聞言上之實也豈非頭眩為上虛證耶諸家以氣逆奔上下虛上實何與內經相反若此夫眩運之症或為頭重或為眼黑或腦髓旋轉不可以動求其言實之由不過以頭重不知頭本不重於往日惟不勝其重者乃甚於往日耳上力不勝陽之虛也豈上實乎然頭眩猶有大小之異今人氣稟薄弱或勞倦酒色忽有耳鳴如磨頭眩眼黑倏頃而止者乃人所常有之事至於中年之外多見眩僕卒倒等症亦人所常有之事但忽運即止者皆謂頭運眼花卒倒不醒者必謂中風中痰不知忽止者以氣血未敗故旋見旋止即小中風也卒倒而甚以根本既虧故遽病而難復即大頭眩也於此察之是風非風是痰非痰虛實從可悟矣然頭眩雖屬上虛不能無涉於下蓋上虛者陽中之陽虛也下虛者陰中之陽虛也陽虛宜治其氣四君子異功散歸脾湯補中益氣湯陰虛宜補其精左歸右歸四物等湯主之故伐下者必枯其上滋苗者必灌其根當以兼補氣血為最兼火清火兼痰清痰有氣順氣在乎因機應變無不當以治虛為先也二便門李士材曰小便閉與癃二症也新病為溺閉蓋點滴難通也久病為溺癃蓋屢出而短少也閉癃之病內經分肝與督脈三焦與膀胱膀胱但主藏溺其主出溺者皆肝經及督脈三焦也又考膀胱為州都之官津液藏焉氣化則能出矣夫主氣化太陰肺經也若使肺燥不能生水則氣化不及州都法當清金潤肺車前紫菀麥冬桑皮之類如脾濕不運而精不上升故肺不能生水法當燥脾健胃蒼朮白朮茯苓半夏之類如腎水燥熱膀胱不利法當滋腎滌熱黃柏知母茯苓澤瀉通草之類夫滋腎瀉膀胱名為正治清金潤肺名為隔二之治健胃燥脾名為隔三之治又或有水液只滲大腸小腑因而燥竭宜以淡滲之品茯苓豬苓澤瀉通草之類分利而已或有氣滯不能通調水道下輸膀胱者順氣為急枳殼木通橘紅之類有實熱者非純陰之劑則陽無以化上焦熱者梔子黃芩中焦熱者黃連白芍下焦熱者黃柏知母有大虛者非與溫補之劑則水不能行如金匱腎氣丸及補中益氣湯是也如東垣治一人小便不通目突腹脹皮膚欲裂服淡滲之藥無效東垣曰疾急矣非精思不能處思至半夜曰吾得之矣膀胱為州都之官津液之腑必氣化而能出服淡滲氣薄皆陽藥也孤陽無陰欲化得乎以滋腎丸群陰之劑投之即愈丹溪言曰吾以吐法通小便譬如滴水之器上竅閉則下無以自通必上竅開而下竅之水出焉氣虛者補中益氣湯先服後吐血虛者芎歸湯先服後吐痰多者二陳氣閉者香附木通探吐更有淤血而小便閉者牛膝桃仁為要藥別録云小便不利審是氣虛獨參湯如神由是觀之受病之源自非一途矣趙養葵曰小便不利東垣分在氣在血而治之辨在渴乎不渴如渴而小便不利此屬上焦氣分水生於金肺熱則是消化之源絶矣當於肺分助其秋令用清金之藥如生脈散之類為當又有脾虛因飲食失節傷其胃氣陷於下焦經所謂脾胃一虛令人九竅不通用補中益氣湯以參耆甘溫之品先調其胃氣以升麻柴胡從九原之下而提之則清升而濁自降矣清肺者隔二治補脾者隔三治東垣虛則補母之妙如不渴而小便不利此屬下焦血分下焦者腎與膀胱也乃陰中之陰陰受熱閉塞其下流經曰無陽則陰無以生無陰則陽無以化若淡滲之藥乃陽中之陰非純陰之劑陽何以化須用滋腎丸此氣味俱陰乃陰中之陰也東垣嘗治一人便祕危急以此法治即愈然真陰者東垣未之論真陰虛惟六味丸以補腎水滋腎丸又所當禁黃柏知母恐其苦寒泄水又忌淡味滲泄之藥有真陽虛者須八味丸戴氏云有似淋非淋便中似鼻涕之狀此乃精溺俱出精塞溺道故欲出不能而痛宜大菟絲子丸鹿茸丸戴氏亦用褚侍中之法也丹溪治一老人患小便不利因服分利之藥太過遂致閉塞點滴不出豫以其胃氣下陷用補中益氣湯一服而通因先多用利藥損其腎氣遂至通後遺尿一夜不止急補其腎然後已凡醫之治是症者未有不用泄利之劑誰能固其腎氣之虛哉書此以為世戒薛立齋曰小便赤澀短少若津液偏滲於大腸大便瀉而小便少者宜用豬苓澤瀉茵陳山梔分利之若陰陽已分而小便短少者此脾肺氣虛不能生水也宜補中益氣湯加麥冬五味陰火上炎而小便赤少者此肺氣受傷不能生水也用六味丸加麥冬五味腎經陰虛陽無所生而小便短少者用補中益氣湯六味丸若誤用滲泄分利者先用滋腎丸急投金匱加減腎氣丸王節齋曰小便不禁或頻數古方多以為寒而用溫澀之藥殊不知屬熱者多蓋膀胱火邪妄動水不得寧故不能禁而頻數來也故年老人多頻數是膀胱血少陽火偏旺也治法當補膀胱陰血瀉火邪為主而佐以收澀之味如牡蠣山萸五味子之類不可用溫藥也病本屬熱故宜瀉火因水不足故火動而致小便多小便既多水益虛矣故宜補血瀉火治其本也收之澀之治其標也薛立齋曰經云膀胱不約為遺溺小便不禁常常出而不覺也人之旋溺賴心腎兩氣之所傳送蓋心與小腸為表裡腎與膀胱為表裡若心腎氣虧傳送失度故有此症治宜溫暖下元清心寡欲女人有産蓐不慎致傷膀胱屬虛寒者祕元丹韭子丸內虛濕熱者六味地黃加五味杜仲補骨脂年老者八味丸收生不謹損破尿胞者參朮補胞湯加豬羊胞煎之類竊謂肝主小便若肝經血虛用四物山梔若小便澀滯或莖中作痛屬肝經濕熱用龍膽瀉肝湯若小便頻數或勞而益甚屬脾氣虛弱用補中益氣加山藥五味若小便無度或淋瀝不禁乃陰挺痿痹也用六味若小便澀滯或補而益甚乃膀胱熱結也用五淋散其脾肺燥不能生化者黃芩清肺飲膀胱陰虛陽無所生者滋腎丸膀胱陽虛陰無所化者六味丸若陰痿思色精不出莖道澀痛如淋用加減八味丸料加車前牛膝治老人精竭復耗大小便牽痛如淋亦用前藥不應即加附子多有生者遺尿若脬中有熱宜加味逍遙散若脾肺氣虛補中益氣加益智仁若肝腎陰虛宜六味丸趙養葵曰臟腑祕一證腎司二便其不禁者責之腎矣然則大便不通者獨非腎乎腎氣虛則大小便難宜以地黃蓯蓉車前茯苓之屬補其陰利水道少佐辛藥開胰理致津液而潤其燥潔古云臟腑之祕不可一概治療有熱祕有冷祕有實祕有虛祕有風祕有氣祕老人與産後及發汗利小便過多病後氣血未復者皆能成祕禁用硝黃巴豆牽牛等藥世人但知熱祕不知冷閉冷祕者冷氣橫於腸胃凝陰固結津液不通胃氣閉塞其人腸內氣攻喜熱惡冷宜以八味料大劑煎之冷飲即愈或局方半硫丸碾生薑調乳香下之或海藏已寒丸俱效其丸雖熱得芍藥茴香潤劑引而下之陰得陽化故大小便自通如遇春和之陽則冰自消矣東垣嘗論治祕豫體之而不用其方如潤腸丸潤燥湯通幽散之類俱不用惟用六味地黃丸料煎服自愈如熱祕而又兼氣虛者以前湯加參耆各五錢立愈此因氣虛不能推送陰虛不能濡潤故耳李士材曰五淋石淋清其積熱滌去砂石則水道自利宜神效琥珀散如聖散獨聖散選用勞淋有脾勞腎勞之分多思多慮負重遠行應酬紛憂勞於脾也宜補中益氣與五淋散分進專思考慮者歸脾湯若強力入房或施泄無度勞於腎也生地黃丸或黃耆湯腎虛而寒者金匱腎氣丸血淋有血瘀血虛血冷血熱之別小腹硬滿莖中作痛欲死血瘀也一味牛膝煎膏酒服大效但虛人能損胃耳宜四物加桃仁通草紅花牛膝丹皮血虛者六味丸加側柏車前子白芍或八珍湯送益元散血色鮮紅者心與小腸實熱脈必數而有力柿蒂側柏黃連黃柏生地丹皮白芍木通澤瀉茯苓血氣黑暗面色枯白尺脈沉遲下元虛冷也金匱腎氣丸然有內熱過極反兼水化而色黑者未可便以為冷也氣淋有虛實之分如氣滯不通臍下妨悶而痛者沉香散石韋散瞿麥湯氣虛者八珍湯加杜仲牛膝倍茯苓凡膏淋似淋非淋小便色似米泔或如鼻涕此精溺俱出精塞溺道故欲出不快而痛鹿角霜丸大沉香丸海金砂散菟絲子丸隨症選用冷淋是腎虛肉蓯蓉丸澤瀉散金匱腎氣丸胞痹膀胱者州都之官津液藏焉氣化則能出矣風寒濕邪氣客於胞中則氣不能化出故胞滿而水道不通小腹膀胱按之內痛若沃以湯澀於小便以足太陽經上交於巔入絡腦下灌鼻則為清涕也腎著湯腎瀝湯巴戟丸方約之曰淋證其感不一或因房勞或因忿怒或因醇酒或因厚味夫房勞陰虛火動也忿怒者氣動生火也醇酒厚味者釀成濕熱也積熱既久熱積下焦所以小便淋瀝欲去不去又來而痛不可忍者初則熱淋血淋久則煎熬水液稠濁如膏如沙如石也故諸方中類多散熱利小便而於開鬱行氣破血滋陰蓋少焉若夫散熱利小便只能治熱淋血淋而已其膏淋沙淋石淋三者必須開鬱行氣破血滋陰方可也東垣用藥凡例小腹痛疏肝滋腎蓋小腹小便乃肝腎之部位也學者不可不知戴院使曰五淋皆有冷有熱血有熱有淤氣有熱有冷勞有虛冷虛熱與湯過差精不由其道妄行不禁與溺俱出此熱劑之傷未可概以為冷也治淋之法除的然虛冷之外其餘諸症若用本題不效便宜施於調氣之劑蓋津道之逆順皆一氣之通塞為之也如木香流氣飲卻為的當其中自有木通麥冬腹皮輩此如不效但宜受以益血之方蓋小便者血之餘也血苟充滿則滋腴下潤自然流通如火府丹卻為的當其中有地黃輩然此非特言血淋氣淋一應淋皆可用獨不可用之虛冷耳淋病小便之色多見赤未可便以赤為熱氣道蘊結故如此耳張景嶽曰淋病小便滴瀝痛澀嚴氏有氣石血膏勞之辨亦有濁久而為淋者多因心腎不交積熱鬱結而致初病固因於熱亦有久寒不愈或痛澀皆無但下膏液如白濁者此中氣下陷及命門不固之症宜辨脈以定虛實治淋與濁同熱宜清澀宜利下陷者宜升虛者宜補陽不固者宜溫補命門趙羽皇曰經云膀胱者州都之官津液藏焉氣化則能出矣遍考諸方獨指膀胱立論如五苓八正清熱滲利以為正治而深於治者又有隔二隔三之論然不能暢發氣化之旨豈知氣化之由則有上焦中焦與下焦之辨蓋水液雖瀦於脬中而降升總由乎肺經雲水出高源又曰金為水母若肺金燥則氣化之源絶而寒水斷流肺金虛則治節之令失而下輸失職以致溲溺不通而或時淋瀝者實由上焦之氣不化也治以生脈散加茯苓牛膝潤燥清金如天令至秋而白露降矣平人飲食入胃精氣輸脾肺不自專而上奉於肺是天氣之下降本於地氣之上升今人久病而大氣未復汗下而津液重亡以致脾肺氣虛不能生水而小便數少者由於中焦之氣不化也法以補中益氣湯加麥冬五味滋其化源清陽升而濁陰自降矣腎司開合主二便其藏主水得陽則開得陰則合故腎中有火則津液乾涸而小便澀腎中無火則天寒水凍而小便閉古人用八味丸治此症效者以其有桂附之辛溫蒸動腎氣化而膀胱之氣亦化也三焦之説大率如此外有心移熱於小腸而小便閉者肝移熱於膀胱而莖中痛者又須以導赤逍遙加減治之不可混也趙羽皇曰脫肛有二一屬虛寒一屬濕熱蓋虛寒則中氣餒而不能收濕熱則火邪迫而不能閉此芩連參附用藥霄壤也然虛者不痛火熱腫痛
