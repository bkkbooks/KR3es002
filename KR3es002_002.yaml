body:
  text: 卷二脈要集內經脈要並附名公諸論注診法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂故乃可診有過之脈切脈動靜而視精明察五色視五臟有餘不足六腑強弱形之盛衰以此參伍決死生之分切脈動靜診陰陽也視目精明診神氣也察五色變現診生克邪正也觀臟腑虛實以診其內別形容盛衰以診其外故凡診病者必合脈色內外參伍以求則陰陽表裡寒熱之情無所遁而先後緩急真假逆從之治必無瘥故可以決生死之分知醜知善知病知不病知高知下知坐知起知行知止用之有紀診道乃具凡此數者皆有對待之理差之毫釐謬以千里故凡病之善惡形之動靜皆所當辨能明此義而用之有紀診道斯備微妙在脈不可不察察之有紀從陰陽始始之有經從五行生生之有度四時為宜補瀉勿失與天地如一得一之精以知死生陰陽五行四時脈之正反所不能離離則無從補瀉所謂一之精天人一理之精微也故知此之所以然者是謂得一則知人之生死矣持脈有道虛靜為保虛靜二字診家當關一句虛者廓然無我胸無一字之預留靜者遊神寂寞前無一意之或雜然後可診有過之脈春日浮如魚之遊在波夏日在膚泛泛乎萬物有餘秋日下膚蟄蟲將去冬日在骨蟄蟲周密君子居室故曰知內者按而紀之知外者終而始之此六者持脈之大法脈從四時弦洪毛石內經並之胃氣而各形容其妙使人可思可悟而又兼內外以診內則藏氣藏象有位故可按而紀之外則經氣經脈有序故可終而始之四時內外六者之法則脈之時動病之所在或內或外皆可知之尺內兩傍則季脅也此言氣口左右三部候脈法也柯韻伯曰季脅之位在章門穴名後包於腹前合於臍天樞穴名之分帶脈所束古聖欲明氣口成寸之義將分肺脈三部以候五臟而先提此句者以氣口獨為五臟主而臟氣會季脅故也夫脈之有尺如木之有根季脅包於腎外人之元氣在腎包含全賴乎季脅前賢只講得脈會太淵而不審臟會季脅仲景所謂按寸不及尺也經曰善調尺者不待於寸此尺內兩傍診季脅也尺列以候腎尺內以候脾中人身背包乎外胸腹隱於手足之裡故兩腎附於背脊者謂之外二腸膀胱三焦之在腹者謂之內故內以候腹中所謂腹中者凡大小腸膀胱命門皆在其中矣中附上左外以候肝內以候膈右外以候胃內以候肺柯韻伯曰從尺而上之故以為附上即尺前膈骨所謂關也肝居左而近背故外候膈在胸中故內候人之有膈前齊鳩尾後齊權骨所以膈中下焦之濁氣不使上熏心肺而傷清陽之氣心肺居膈上肝脾腎居膈下五臟俱注於膈肺脾腎膽之脈俱貫膈而上腸胃心腎包絡三焦之脈從膈而下是十一經必由之道也越人廢而不講故後人不知此義上附上右外以候肺內以候胸中左外以候心內以候膻中柯曰上附上謂寸也心居肺下而位於中肺偏於右是心居肺左矣心肺俱近背故俱外候胸中主宗氣膻中主包絡相火之氣在中故內候此三部中上部天一候之法耳難經不審氣口候陰以六腑配三部之中胸膻膈腹廢而不講矣前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也喻嘉言曰上古神聖首重切脈內經部位分明後人以心與小腸為表裡遂舉越人之言以定部位不知此可論病機如心遺熱於小腸遺熱於大腸之類不可以定部位也內經尺裡以候腹中尺外以候腎二語已盡其義蓋胸中屬陽腹中屬陰大腸小腸三焦膀胱所傳渣滓水液惟腹中是其位置非若胃為水穀之海清氣在上膽為決斷之官靜藏於肝為十一藏之所決可得部之於中焦也至於上焦重重膈膜惟心肺得以居之所謂膈肓之上中有父母是也二腸濁穢之腑與膈上清陽迥不相通豈可因外絡連屬反謂寸之清陽上浮為腑沉者為臟經所謂臟真高於肺者乃臟真高於大腸矣且左浮為小腸脈沉為心脈是水中汙泥反浮於蓮花之上有是理乎若膻中為臣使包裹而絡於心下以寄心君喉舌之司下膈歷絡三焦與手少陽之脈散絡心包正見心胞相火與少陽相火相輸應也心胞關係之重是亦以待分手經之一而可稱為臟耳羅東逸曰喻説二腸止明部之不當未嘗明其脈之謬也今姑以脈經之所謂陰陽即其所謂而辨之其曰呼出心與肺吸入腎與肝又曰關前為陽心肺主之關後為陰肝腎主之又曰脈浮而大散者心脈浮而短澀者肺是心肺主陽而出關前為浮而呼出腎肝主陰出關後為沉而吸入者也今其書百條乃曰左寸陽實者小腸實也陽虛者小腸虛也陽絶者小腸絶也左寸陰實者少陰實也等語夫浮而大散者為心脈為關前主陽矣其脈之有虛實絶皆以為陰而杜撰一小腸之虛實絶為陽而加以心脈之上則小腸之陽脈當作何狀得加於浮大而散之上耶且右脈浮澀而短又以為陰彼大腸陽脈更當作何狀而云虛實與絶也終脈經竟無一舉二腸脈據者不寧唯是候外感風寒必於左寸則又太陽膀胱與小腸同居左寸俱在心之上矣其瑕不攻自破特莫之覺耳平人脈準羅東逸曰劉守真嘗為脈原以脈行同五臟四時之遷流不知內經已極詳矣而原脈之所以則仍未之講也夫脈為人之神氣血之本而見於營之行營之行其根原有二一出於中焦之穀神化精液以輸肺肺主治節以施隧道故營血之能通流實胃氣為之充徹此脈之本於胃氣也一起於太衝出少陰腎下匯血海於厥陰上發真陽於太陽此太衝之精氣能灌溉十二經皆得於陽明胃之盛氣同駐中焦共為宗氣與營俱行於十二經而備五十營故脈至五十營則先後天之氣合而五臟之真備矣以是上朝於肺肺統行之會於太淵故曰氣口成寸以決生死決死生者以氣口能顯胃氣形藏真占四時度六部而有諸中者必形於外無差忒此脈之所以為人之神也內經論脈必自下而起推始以季脅以次附上定其部伍自肘中曲池量至神門得一尺為尺自尺至寸得一寸為寸其診先尺後寸先陰後陽者以人陰陽皆起於足下五臟之氣會於章門章門在季脅之次脈從三陰起足三陽而上之先會於此故內經詔人以脈必自下而上也然診之精微其占亦有二一呼脈行三寸一吸脈行三寸呼吸脈行六寸常流無間晝夜六時而為五十營此以流行者占之也五十動不一代乃為生人之太和不及是者臟無氣命曰狂生狂生者反太和也候法左以候左右以候右上以候上下以候下前以候前後以候後六部一定候之不移而以五臟為占此以部位占之也原其然者肺統元氣為心血脈之相非獨能朝百脈亦能顯百脈脈雖藉以充著其所以能充著者皆肺神藏真之停泓此其中之停泓行者居者固有其留而為地與人以可占者非特一為流行而盡之也要其元神能常照百脈為五臟鏡以顯其純疵故太淵一脈五臟全體俱現是以上下左右可占六部可診矣然人之陰陽必奉天而應四時故春弦夏鉤秋毛冬石雖六脈各為臟主而又有不得不聽令於時也此繇天人葆合故人氣有不離如此矣乃人又有平生之診陰陽之稟氣態各不同形其脈亦異如六陰六陽以至老少肥瘦相因脈異善脈者先察其本原次候其胃氣藏真於四時之正乃生平老少之分而後及其病脈茲四診兼之望聞問謂之七診而脈之道得矣今世以左手為人迎此出自難經叔和祖之不知人迎者陽明胃之本輸在結喉兩傍動脈者是此六陽之所迎古人於此以候六腑之陽若以右之寸口而候之豈人迎之所候哉更有趺陽者穴之動脈在足趺三寸之間是胃脈之下行復上與太衝之脈合故得先後天並符之氣會合於此為人之根柢死生之診於是最切故仲景法趺陽與少陰同診並取以決百病今人廢之此仲景所斥為按手不及足之庸工也岐伯曰人一呼脈再動一吸脈亦再動呼吸定息脈五動閏以太息命曰平人平人者不病也人一呼脈一動一吸脈一動曰少氣人一呼脈三動一吸脈三動而躁尺熱曰病溫尺不熱脈滑曰病風脈澀曰痹人一吸脈四動以上曰死脈絶不至曰死乍數乍疏曰死一日一夜五十營以營五臟之精不應數者名曰狂生所謂五十營者五臟皆受氣持其脈口數其至也五十動不一代者五臟皆受氣四十動一代者一臟無氣三十動一代者二臟無氣二十動一代者三臟無氣十動一代者四臟無氣不滿十動一代五臟無氣豫之短期要在終始所謂五十動而不一代者以為常也以知五臟之期豫之短期者乍數乍疏也張景嶽曰難經曰經言脈不滿五十動而一止一臟無氣者何臟也然人吸者隨陰入呼者隨陽出今吸不能至腎至肝而還故知一臟無氣者腎氣先盡也然則五臟和者氣脈長五臟病者氣脈短觀此一臟無氣必先乎腎以至二臟三臟四臟五臟者當自遠而近以次而短則腎及肝由肝及脾由脾及心由心及肺故凡病將危氣促似喘僅呼吸於胸中數寸之間蓋真陰絶於下孤陽浮於上此氣短之極也醫於此際尚欲平之未有不隨撲而滅者夫人之死生由乎氣氣之聚散由乎陰而得以苟延者賴一線之氣未絶耳此臟氣之不可不察也又曰代脈之義自仲景叔和俱云動而中止不能自還因而復動由是復止尋之良久乃復強起為代故後世以結促代並言均目之為止脈然豈以盡其義哉夫緩而一止為結數而一止為促其止或三或五或七八至不等此皆至數分明起止有力所主之病有因氣逆痰壅而為間阻者有因氣血虛脫而為續斷者有因平素稟賦而脈道不流利者此是結促之謂也至於代脈之辨則又不同如宣明五氣論曰脾脈代臟腑病形篇曰黃者其脈代皆言臟氣之常候非謂代為止也又平人氣象曰但代無胃曰死乃言胃氣去而真臟見亦非謂代為止也觀此則代本不一各有深義如五十動而不一代者乃至數之代本篇所云是也若脈本平勻而忽強忽弱者乃形體之代即平人氣象論所云是也若脾主四季隨時更代者乃氣候之代宣明五氣篇所云是也凡脈無定候更變不常則均謂之代但各因其變而察其情按本篇但言動止以診五臟無氣未嘗鑿言死期而王氏曰脈來緩而一止一臟無氣卻後四歲春草生而死云云恐未有一臟無氣尚活四歲二臟無氣尚活三歲之理診者辨之胃脈平人之常氣稟於胃胃者平人之常氣也人無胃氣曰逆逆者死平人之常稟氣於谷谷入於胃五臟六腑皆以受氣有不可一刻無者此脈之大主四時五臟六經皆以此立無則為逆逆則死矣春胃微弦曰平弦多胃少曰肝病但弦無胃曰死胃而有毛曰秋病毛甚曰今病臟真散於肝肝藏筋膜之氣也夏胃微鉤曰平鉤多胃少曰心病但鉤無胃曰死胃而有石曰冬病石甚曰今病臟真通於心心藏血脈之氣也長夏胃微軟弱曰平弱多胃少曰脾病但代無胃曰死軟弱有石曰冬病弱石甚曰今病臟真濡於脾脾藏肌肉之氣也秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死毛而有弦曰春病弦甚曰金病臟真高於肺以行營衛陰陽也冬胃微石曰平石多胃少曰腎病但石無胃曰死石而有鉤曰夏病鉤甚曰今病臟真下於腎腎藏骨髓之氣也人以水穀為本故人絶水穀則死無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也羅東逸曰經云飲食入胃脈道乃行又曰脈得食即高故知脈道之行待此而起此胃氣者精氣神三寶之神糧而榮衛之根據也為氣流營溢衛合精而神行於脈五臟四時待此而得其平者也故其氣昌大於春夏收斂於秋冬皆稍變更歷四時以應令故微見微弦微鉤微軟微毛微石要其以微言者正以狀其胃氣之充壯鼓行要其不違四時故不免有奉令脈然不盡變其本氣故皆曰微也若此氣稍有衰颯即所云弦鉤軟毛石之多而胃少也胃少則五臟之真不能充而本臟自病何怪也夫弦鉤軟毛石五者乘時而見何嘗不正惟稍見偏勝遂已成為臟病況其已甚者無胃而單見也故曰死也又若春之胃而見毛毛與弦反而乃見之於春是胃之不能相為於肝而存弦令反受克於毛則胃之衰已甚矣其曰至秋病者前此春夏三陽得令皆能扶我至秋則胃不能勝而為病也若毛甚則胃家之太和已戕即曰今病即今不能掩其惡也此脈之根本源頭診家第一首事不可不察也臟真者即胃氣也胃氣何以為臟真以五臟得此而後能立五行之體主四時之行主筋膜血脈肌肉骨髓榮衛陰陽之氣臟無此則不真故必須胃氣以為臟真而後能散能通能濡能高能下苟穀神之不至則五臟之魂遊而魄散矣此真臟也故曰死四時脈岐伯曰春脈者肝也東方木也萬物之所以始生也故其氣來軟弱輕虛而滑端直以長故曰弦反此者病其氣來實而長此為太過病在外其氣來不實而微此謂不及病在中人身胃氣充足太和洋溢至春而少陽生未有不應者蓋人稟天氣既在陰陽之中天氣至則人氣亦符故六脈皆奉之所以主春而為弦夫弦者東方少陽木氣也萬物之所始生人之肝主之以陽之少故其氣軟弱輕虛端直以長此為正氣之和者也反此則病矣實強為弦之過不實而微為弦之不及過則病在外外為有餘為外感不及病在中中為不足為內傷下準此春脈太過則令人忽忽眩冒而巔疾其不及則令人胸痛引背下則兩脅胠滿夏脈者心也南方火也萬物之所盛長也故其氣來盛去衰故曰鉤反此者病其氣來盛去亦盛此為太過病在外其氣來不盛去反盛此謂不及病在中太過則令人身熱膚痛為浸淫其不及則令人煩心上見咳唾下為氣泄秋脈者肺也西方金也萬物之所以收成也故其氣來輕虛以浮來急去散故曰浮反此者病其氣來毛而中央堅兩傍虛此為太過病在外其氣來毛而微此謂不及病在中太過則令人逆氣而背痛慍慍然其不及則令人喘呼吸少氣而咳上氣見血下聞病音冬脈者腎也北方水也萬物之所以合藏也故其氣來沉以搏故曰石反此者病其氣來如彈石此謂太過病在外其去如數者此為不及病在中如數者動止疾促真陰虧損有似緊數然愈虛則愈數原非陽強實熱之數故云如數此辨之深矣冬脈太過則令人解㑊脊氣痛而少氣不欲言其不及則令人心懸如病飢眇中清脊中痛少腹滿小便變帝曰四時之序逆從之變異也然脾脈獨何主岐伯曰脾脈者土也孤藏以灌四旁者也善者不可得而見其惡可見其來如水之流者此謂太過病在外如鳥之啄者此謂不及病在中太過則令人四肢不舉其不及則令人九竅不通名曰重強以上所以明令脈也人在氣交之中循環六氣之內歷其溫熱涼寒本其生長收藏故人之臟必起而應之其於四時各舉一臟為主而無四臟之診者令之所至四臟之氣無不從之此以知天時之不可違而無不奉令也所謂弦鉤毛石各以其微以胃氣之充而各致其和也苟非其然太過不及皆成病氣太過應有外邪故云病在外不及斯為內傷故云病在內要以胃氣存亡即為奉行得失其有得失雖令在所不救矣五臟脈夫平心脈來纍纍如連珠如循琅玕曰心平夏以胃氣為本病心脈來喘喘連屬其中微曲曰心病死心脈來前曲後居如操帶鉤曰心死琅玕似珠盛滿滑利即微鉤之義也喘喘連屬急促相仍也前曲者謂輕取則堅強而不柔後居者則牢實而不動如持革帶之鉤全失沖和之氣是但鉤無胃故曰心死平肺脈來厭厭聶聶如落榆英曰肺平秋以胃氣為木病肺脈來不上不下如循雞羽曰肺病死肺脈來如物之浮如風吹毛曰肺死厭厭聶聶衆苗齊秀貌如落榆莢輕浮和緩貌即微毛之象也不上不下往來澀滯也如循雞羽輕浮而虛也亦毛多胃少之義如物之浮空虛無根也如風吹毛散無緒也亦但毛無胃之義平肝脈來軟弱招招如揭長竿末稍曰肝平春以胃氣為本病肝脈來盈實而滑如循長竿曰肝病死肝脈來急益徑如新張弓弦曰肝死平脾脈來和柔相離如雞踐地曰脾平長夏以胃氣為本病脾脈來實而盈數如雞舉足曰脾病死脾脈來鋭堅如鳥之喙如鳥之距如屋之漏如水之流曰脾死和柔雍雍不迫也相離勻淨分明也如雞踐地從容輕緩也此即沖和之義實而盈數強急不和也如雞舉足輕疾不緩也前篇言弱多胃少此言實而盈數皆失中和之氣故曰脾病鳥喙鳥距堅鋭不柔也屋漏點滴無倫也水流去而不返也是皆脾絶怪脈但代無胃平腎脈來喘喘纍纍如鉤按之而堅曰腎平冬以胃氣為本病腎脈來如引葛按之益堅曰腎病死腎脈來發如奪索辟辟如彈石曰腎死喘喘纍纍如心之鉤陰中藏陽而得微石之義引葛堅搏索連也按之益堅石甚不和也索若相奪甚徑又甚彈石其堅可知但石無胃也真肝脈至急如循刃責責然如按琴瑟弦色青白不澤毛折乃死真心脈至堅而搏如循薏苡子纍纍然色赤黑不澤毛折乃死真肺脈至大而虛如以羽毛中人膚色白赤不澤毛折乃死真腎脈至搏而絶如指彈石辟辟然色黑黃不澤毛折乃死真脾脈至弱而乍數乍疏色黃青不澤毛折乃死真臟見乃死也青本木色而兼白不澤金剋木也五臟準此然率以毛折死者皮毛得血氣而充毛折則精氣敗矣故皆死柯韻伯曰經云能合色脈可以萬全取色脈之相應也又云色夭不澤謂之難治今見本臟色又兼見相勝之色且天然不澤是色脈之不相應也雖云肺朝百脈輸精於皮毛毛脈合精留於五臟氣歸權衡今毛折是精氣不輸皮毛也毛脈之精不合矣此色診之易見也見真臟曰死何也岐伯曰五臟皆稟氣於胃胃者五臟之本也臟氣者不能自致於手太陰必因於胃氣乃致於手太陰也故五臟各以其時自為而至於手太陰也故邪氣勝者真氣衰也故病甚者胃氣不能與之俱至於手太陰故真臟之氣獨見獨見者病勝藏也故曰死此論真藏而拈胃氣為本最為發明顯切夫五臟雖各有本氣以主時要必得胃氣之贍養而其真得藏焉如心脈之纍纍連珠腎脈之喘喘纍纍以下皆形容其藏之得胃以為臟真故浮而不浮沉而不沉急而不急緩而不緩有神存於其間此能以時自為而至於手太陰也若喘喘連屬以下則五臟之邪氣勝而真氣衰矣若胃氣竭絶已不能自至於手太陰亦不能復藏其神而真臟見胃家餉絶真神孤削故其惡見如此是以古聖於四時五臟皆占胃氣以為本也鼓一陽曰鉤鼓一陰曰毛陽勝急曰弦陽絶而亟曰石陰陽相過曰溜此言鉤弦毛石之正象以為諸脈之準則也經曰太陽為開陽明為闔少陽為樞三陽者不得相失也搏而勿浮名曰一陽此一陽者陽之盛即太陽也為心家主脈其氣純和而一正心脈之得其平者也鉤脈主夏故鼓一陽曰鉤又云三陰者不得相失也搏而勿沉命曰一陰清靜為陰而勿沉者正清輕之謂當揫斂燥金之時而其氣不沉於下而漸收於上清明之極故謂之鼓一陰曰毛此正肺脈應秋之和也至於弦者本陰部厥陰之脈厥陰為陰中之少陽木性本達方沉厥陰之下與厥陰爭而直上是以陽勝急而弦要其主春者惟少陽令之春生則木氣已發軟弱輕虛端直以長斯謂之主春之弦不然陽之勝急正仲景所謂殘賊之脈也弦脈本象如此故謂陽勝急曰弦腎為陰中之太陰水體沉滑之極此為陽絶不至而陰獨至陰獨至則至搏而沉動而且堅故曰石也若夫陰陽之相過則陰陽之交馳者也諸家注皆以為脾脈然以溜言之非脾脈之正不可以脾言然其脈順而不逆去而不滯滑而不衰敗絶似少陽之脈故曰溜本文舉此以明陰陽之交者耳若夫脾脈在諸臟善者不可得而見故不拈出欲人體認也三陰三陽藏象脈法太陽藏何象岐伯曰象三陽而浮也曰少陽藏何象曰象一陽也一陰誤文陰藏者滑而不實也曰陽明藏何象曰象大浮也太陰臟搏言伏鼓也二陰搏至腎沉不浮也此名象藏者六經之本脈也象三陽而浮者太陽主表為諸陽之極盛而在上故象三陽而浮也象一陽者輕虛以滑是也象大浮者陽明胃氣之海其氣本大而升故象浮大也太陰臟搏言伏鼓者伏言其主陰主內鼓言其有力所謂大而緩不浮者也二陰搏至即所謂沉滑者也其一陽藏者滑而不實句實一陰之誤文蓋滑而不實可言一陰而不可言一陽一陽者輕虛帶滑其滑從浮見一陰者滑而不實其不實從滑見要其地為純陰陽之所起實在於此此為陰陽相錯之地不沉為陰故滑而不實也所謂三陽者太陽也三陽脈至手太陰弦浮而不沉決以度察以心合之陰陽之論所謂二陽者陽明也至手太陰弦而沉急不鼓炅至以病皆死一陽者少陽也至手太陰上連人迎弦急懸不絶此少陽之病也專陰則死三陰者六經之所主也交於太陰伏鼓不浮上空志心二陰至肺其氣歸膀胱外連脾胃一陰獨至鉤而滑經絶氣浮不鼓此六脈者乍陰乍陽交屬相併謬通五臟合於陰陽先至為主後至為客前明六經之脈象此明六部之至寸口而弦急者當察也太陽當浮今乃帶弦則當約以四時高下之度而決斷之必又察以心而合之陰陽之論此不特太陽而然凡五部皆然也陽明浮大今弦沉急不鼓是陰勝陽木乘土也若是炅至以病是陽明之陰絶死矣少陽之脈輕虛以滑今至手太陰上出人迎脈來弦急而長浮露不斷則失其所以為少陽矣若弦急太甚是真臟脈見謂之專陰可以徵其死也三陰即脾故為六經之所主有母萬物之象和緩基本脈今見伏鼓不浮則陰盛陽衰當病上焦空虛志心為陰所傷皆致不足故曰上空志心二陰至肺者腎脈上行入肺出氣口又主水與肺行降下之令通調水道其氣歸膀胱也腎能升降又即與脾胃知升降之柄故曰外連脾胃外者腎對肺言即二陰為里之義一陰獨至則經絶於中氣浮於外故不能鼓鉤而滑但弦無胃生意竭矣此六脈者陰陽皆至於手太陽是交屬相併謬通五臟故能合於陰陽也張景嶽曰六脈之交至有先後有以陰見陽者有以陽見陰者陽脈先至陰脈後至則陽為主而陰為客陰脈先至陽脈後至則陰為主而陽為客主先至為主後至為客之謂也然至有常變有真假常陽變陰常陰變陽常者主也變者客也變有真假真變則殆假變無虞真者主也假者客也客主之義有脈體焉有運氣焉有久暫焉有順逆焉有主之先而後之客者焉診之精妙在此附六經主用發明説羅東逸曰人身之正有三陰三陽之經分主周身然其經皆起於足三陽為外三陰為內故足太陽之經從巔頂頭項而下五行居身之背以至於足足陽明從額顱頸喉而下亦五行居身之前以至於足足少陽從耳前後下脅身畔而居身之兩脅以至於足此足三陽之周身所以主外也至於三陰足太陰為後天六經之主足少陰為先天藏精之腑足厥陰為陰陽生氣之根所以立人之命蒂者盡足三陰也若手之六經雖與足六經出入相連而手少陰心君主清靜高拱太陰肺調元行氣包絡為佐二臣二腸三焦器能傳化之官耳其經位則見於兩臂地既不多而所傷之病皆自足六經及之此仲景於傷寒止立足六經而不立手經為古聖傳述為後學發蒙也蓋手六經緣與足六經相絡上下故詳之十二經其實此六經之陰陽皆足六經之附庸也末學不察見古經三陽之文遂以膀胱與小腸雙舉二陽則大腸與胃雙舉輒以附庸為主用輕重失宜不知手經緣與足經相接非謂附庸能與天運四時同體也此義不明乃自命為名家者亦墮此雲霧為之一概脈有逆從陰陽脈有陰陽知陽者知陰知陰者知陽凡陽有五五五二十五陽所謂陰者真臟也見則必敗敗必死也所謂陽者胃脘之陽也別於陽者知病處也別於陰者知死生之期所謂陰陽者去者為陰至者為陽靜者為陰動者為陽遲者為陰數者為陽脈有逆從四時未有藏形春夏而脈瘦秋冬而脈浮大命曰逆四時也風熱而脈靜泄而脫血脈實病在中脈虛病在外脈澀堅者皆難治命曰反四時也其脈絶不來若一息五六至其形肉不脫真臟雖不見猶死也逆從之例三條一以反四時一以反病體一以形脈相反凡逆從之見有餘不足輕重皆可知矣按陰陽逆從四字是診脈辨病之要法諸脈異等臟腑異情四時異宜死生之辨皆以此四字別之故胃氣四時五臟諸脈之形為診家之經陰陽逆從為診家之緯脈之大要夫脈血之府也長則氣治短則氣病數則心煩大則病進上盛則氣高下則氣脹代則氣衰細則氣少渾渾其至如湧泉病進而色弊綿綿其去如弦絶者死諸急者多寒緩者多熱大者多氣少血小者氣血皆少滑者陽氣盛微有熱澀者少血少氣微有寒諸小者陰陽形氣俱不足脈之浮沉及與人迎寸口氣大小等者病難已病之在臟沉而大者易已小者為逆病之在腑浮而大者易已人迎盛者傷於寒氣口大傷於食沉細懸絶者為陰盛躁喘數者為陽邪氣來緊而疾穀氣來徐而和脈弱以滑是有胃氣形盛脈細少氣不足以息者死形瘦脈大胸中多氣者死形氣相得者生叄伍不調者病三部九候皆相失者死上下左右之脈相應如參舂者病上下左右相失不可數者死中部之脈雖獨調與中臟相失者死中部之脈相減者死沉甚曰病弦甚曰病澀甚曰病數甚曰病參見曰病復見曰病未去而去曰病去而不去曰病反者死色脈已定別之奈何岐伯曰調其脈之緩急小大滑澀而病變定矣張景嶽曰脈之見象陰陽而已本經謂三陽搏而勿浮三陰搏而勿沉是則雖有一陽二陽三陽之分而總在勿浮之例雖有一陰二陰三陰之分而總在勿沉之例可見胃氣之本不大不小不浮不沉不遲不數滑而不澀此太和之人也一自邪氣勝而正氣衰胃氣竭而臟氣見遂有太過不及之病形與脈象俱見於是有浮沉大小緩急滑澀八者之脈見夫八者之脈皆病脈也然各有所主有於中者必形於外要其微甚懸絶之相去即可得之氣血多少死生之診故其診法雖有不同而大要則有所定所謂知要者一言而終也推按法推而外之內而不外有心腹疾也推而內之外而不內身有熱也推而上之上而不下腰足清也推而下之下而不上頭項痛也按之至骨脈氣少者腰脊痛而身有痹也此係以手推病法亦診例也柯韻伯曰按脈內側推而外欲候筋骨氣血肌肉等病脈反內著知病已在內故牢不可移是胸腹有積聚為患故脈如是也推脈外側而內求之以候胸腹諸病指欲內而脈反外鼓是病已外發氣從外向形身有熱為可證矣寸脈為陽而主降反脈為陰而主升天地氣交火既濟之理也按寸推而上之究其胸喉以上之病其脈氣上而不下是陽虛而不降則陰中無陽腰足清也按尺推而下之究其小腹腰股膝脛中病其脈下而不上是陰虛而氣不上升陽中無陰頭項痛可知也不內不外是脈氣有餘不上不下皆因脈氣不足然陰陽外降以為和及其偏勝則陽下陷入陰中而發熱陰氣上入陽中而腦髓惡寒更可以上下之法神而明之矣按之至骨所以候腎舉指不實便是少氣腎附腰脊故痛精髓不足故身有痹也脈主病粗大者陰不足陽有餘為熱中也來疾去徐上實下虛為厥巔疾粗大者浮洪之類陽實陰虛故為內熱上實者寸盛下虛者尺弱皆陽強之脈故為陽厥巔頂之疾來徐去疾上虛下實為惡風也故中惡風陽氣受也來之徐知上之虛皆陽不足也陽虛必惡風有脈俱沉細者少陰厥也沉細腎脈兼數則熱陰中有火此少陰之厥也然愈虛則愈數沉細之數厥則何疑又不可以火斷也沉細數散者寒熱也沉細為陰數散為陽陰脈數散陰不固也故或入之陰或出之陽而為來往寒熱也浮而散者為眴僕浮者陰不足散者神不守浮而散陰氣脫故為眴僕數動一代者病在陽之脈也泄及便膿血數動陽脈也一代陽邪傷其血氣也故為泄膿血肝滿腎滿肺滿皆實即為腫肺之壅喘而兩脅滿肝壅兩脅滿臥則驚不得小便腎壅脅下至少腹滿脛有大小髀胻大跛易偏枯滿邪氣壅滯而為脹滿也三經皆能為滿若其脈實當為浮腫肺居膈上其系橫出腋下故肺壅則喘而兩脅滿肝之脈環陰器布脅肋故壅則兩脅滿不得小便肝主驚臥則愈壅故多驚也腎脈循內踝上腨出膕絡膀胱而上行故壅則脅下至少腹滿也或腫或消是謂大小跛易偏枯不能運行所致心脈滿大癇瘛筋攣肝脈小急癇瘛筋攣心脈滿大火有餘也火盛則血涸故癇瘛筋攣肝藏血小為血不足急為邪有餘故為是病夫癇瘛筋攣病一也而心肝二經皆有之一以內熱一以風寒寒熱不同血衰一也肝脈騖暴有所驚駭脈不至若喑不治自己騖馳驟也驚駭肝病肝脈急亂因驚而然此特一時氣逆耳通則無喑也腎脈小急肝脈小急心脈小急不鼓皆為瘕三脈細小而急陰邪聚於陰分也故當隨經而為瘕肝腎並沉為石水並浮為風水並虛為死並小弦欲驚水病有陰陽腎肝在下肝主風腎主水俱沉者陰中陰病也石水凝結少腹沉堅在下俱浮者陰中陽病也風水遊行四體泛浮於上並虛者一為根本一為發生根本空虛有表無里當死並小真陰虛小而兼弦木邪勝氣虛膽怯故為欲驚腎脈大急沉肝脈大急沉皆為疝疝者寒氣結聚所為急者挾肝邪沉者在陰分沉急而大陰邪盛也肝腎之脈絡小腹結於陰器寒邪居之故疝按疝病乃寒邪挾肝邪之證或結小腹或結睪丸或結於丸之左右上下而筋急絞痛脈必急搏者多以寒邪結聚陰分而挾風木之氣也經曰肝風疝脾風疝皆兼一風字其必挾肝邪可知心脈搏滑急為心疝肺脈沉搏為肺疝心脈搏滑急寒挾肝邪乘心肺沉搏寒挾肝邪乘肺三陽急為瘕三陰急為疝三陽太陽也三陰太陰也陽為瘕聚陰為疝氣凡脈急皆邪盛也寒邪氣聚皆可名疝故五臟皆有之二陰急為癇厥二陽急為驚二陰少陰也二陽陽明也脈急者為風寒邪乘心腎故為癇為厥木邪乘胃故發為驚脾脈外鼓沉為腸澼久自己肝脈小緩為腸澼易治腎肝小搏沉為腸澼下血血溫身熱者死心肝澼亦下血二臟同病者可治其脈小沉澀為腸澼其身熱者死熱見七日死腸澼下痢也凡心肝脾腎皆主陰分或寒濕或熱各有所傷乃自大腸下血均謂腸澼血溫身熱者邪火有餘真陰衰敗故死心主血肝藏血故二臟澼於下血同病為順而可治若肝脾同病為土敗木賊其難治也明矣小沉而澀為腸澼者以陰不足而傷血也然脈沉細不當熱今身熱是為逆七日六陰敗盡也胃脈沉鼓澀胃外鼓大心脈小堅急皆膈偏枯沉鼓澀陽不足也外鼓大陰受傷也小堅而急心火鬱而內熱也胃為水穀之海胃氣既傷心部又病此上下痞滿膈偏枯矣脈至而搏血衄身熱者死脈來懸鉤浮為常脈搏脈堅強陰虛最忌若血衄脈搏身熱真陰敗脫也然失血之證多陰虛陰虛之脈多浮大故懸鉤浮乃其常脈無足慮也脈至如喘名曰暴厥暴厥者不知與人言脈至如數使人暴驚三四日自己如數非真數之脈以猝動肝心之火故令人暴驚心脈搏堅而長當病舌卷不能言其軟而散當消環自己心脈堅搏肝邪乘心臟氣虧甚少陰脈從心系上挾咽故令舌卷不能言搏堅之脈皆肝邪盛也五臟皆畏之蓋五臟以胃氣為本脈無胃氣則死凡木強者土必衰脈搏者胃多敗故堅搏為諸臟所忌搏之微邪亦微搏之甚則幾於真臟矣故當以搏之微甚而察病之淺深肺脈搏堅而長當病唾血其軟而散者當病灌汗至令其不復發散也肺脈搏堅邪乘肺也肺系連喉故為唾血軟散肺虛不斂汗出如水且亡陽故不可更為發散肝脈搏堅而長色不青當病墜若搏因血在脅下令人喘逆其軟而散色澤者當病溢飲溢飲者渴暴多飲而易入肌皮腸胃之外也胃脈搏堅而長其色赤當病折髀其軟而散當病食痹胃脈搏堅木乘土也色赤則陽明火盛也木火交熾胃經必傷陽明下行者從氣街下行抵伏兔故病髀如折也軟散則胃氣本虛食則氣逆滯悶不行而為食痹脾脈搏堅而長其色黃當病少氣其軟而散色不澤者當病足脛腫若水狀也邪脈乘脾脾虛無以生血故本臟之色見脾弱不能生肺故為少氣若軟散色不澤者尤見脾虛脾絡內踝前廉循䯒骨後故病足脛腫若水狀以脾不制水也腎脈搏堅而長其色黃而赤者當病折腰其軟而散者當病少血至今不復也邪干腎氣必衰色黃赤為火土有餘故病腰如折也軟散則本虛腎主水以生化津液今腎氣不化故病少血按五臟病脈一曰搏堅一曰軟散而其為病多皆不足蓋搏堅之脈邪勝於正是謂邪之所湊其氣必虛軟散者本原不足謂正氣奪則虛也有邪致虛無邪本虛虛若一而病本不同所當辨也陰搏陽別謂之有子陰主少陰而言腎主子宮胎孕之所主也陽別者言陰脈搏手似乎陽邪然其鼓動滑利本非邪脈蓋以陰中見陽而別有和調之象是謂陰搏陽別也然猶當察孕婦之強弱老少及平日之偏左偏右尺寸之素強素弱斯足以盡其義矣脈急者曰疝瘕少腹痛脈滑曰風脈澀曰痹緩而滑曰熱中盛而緊曰脹緩因胃熱滑以陽強故病熱中緩謂縱緩之狀非遲也盛則中氣滯緊則邪有餘故為脹也陰陽虛腸澼死陰陽虛尺寸俱虛也胃氣不留魄門不禁而陰陽虛者臟氣竭也故死陽加於陰謂之汗陽言脈體陰言脈位汗液屬陰而陽加以陰陰氣泄矣陰虛陽搏謂之崩陰虛沉取不足陽搏浮取有餘陽實陰虛故曰內崩失血三陰俱搏二十日夜半死二陰俱搏十三日夕時死一陰俱搏十日平旦死三陽俱搏且鼓三日死三陰三陽俱搏心腹滿發盡不得隱曲五日死二陽俱搏其病溫死不治不過十日死三陰俱脾肺也搏即真臟之擊搏二十日肺脾成數夜半陰極氣盡故死二陰俱心腎也十三日心腎之成數夕時陰陽相半水火分爭也一陰俱心主與肝也平旦木火旺極而邪更甚故死三陽俱手足兩太陽也水一火二故死在三日既搏且鼓陽邪盛極矣三陰三陽四臟俱搏則上下俱病故在上則心腹滿脹至於發盡在下則不得隱曲陰道不通也四臟俱病惟以胃氣為主五穀盡而死矣二陽俱大腸胃也獨闕一陽必脫簡病主脈脈虛氣虛尺虛是謂重虛氣虛者言無常也尺虛者行步恇然脈虛者不象陰也如此者滑則生澀則死氣虛語言輕微尺虛筋脈無力脈虛亡血可知故云不象陰也滑則血未亡故生寒氣暴上脈滿而實實而滑則生實而逆則死脈滿而實傷寒之脈尺寸俱緊也逆澀也滑則陰血不虧陰虛則澀不任大寒也脈浮而澀澀而身有熱者死澀為無血浮而身熱為邪盛為孤陽不必問四時死乳子而病熱脈懸小者手足溫則生寒則死乳子中風熱喘而肩息者脈實大也緩則生急則死乳子嬰孩也病熱而脈懸小陽證得陰脈為大禁乳子為純陽故手足溫者生脈實大而緩為有胃氣故生腸澼便血身熱則死寒則生腸澼下白沫脈沉則生脈浮則死腸澼下膿血脈懸絶則死滑大則生腸澼之屬身不熱脈不懸絶滑大則生懸澀者死以臟期之腸澼便血赤痢也身熱則血敗而孤陽獨存故死寒則營氣未絶故生白沫白痢沉則陰氣無傷浮則無陰而虛陽上泛此死生之判也膿血赤白痢也懸絶搏而無胃氣也滑為陰血大為陽氣氣血得存故生懸澀異常澀也腸澼之久大腸之氣將絶故自顯其真脈以臟期之則丙丁午未其期也癲疾脈搏大滑久自己脈小堅急死不治癲疾之脈虛則可治實則死搏過於有力也此為肝實大為氣有餘滑為血有餘故久自己若脈來小而堅急則肝之真臟脈也絶無胃氣故死不治虛則邪氣微實則邪氣盛故虛可治消疸脈實大病久可治脈懸小堅病久不可治消疸消中而熱善飲善食也脈實大真氣未漓脈懸小堅則胃氣已竭病久則死病溫汗出輒復熱而脈躁疾不為汗衰狂言不能食病名陰陽交死熱病已得汗而脈尚躁盛此陰脈之極也死其得汗而脈靜者生熱病脈尚躁疾而不得汗者此陽脈之極也脈躁疾得汗靜者生診法脈案人有胃脘癰者診當何如曰診此者當候胃脈其脈當沉細沉細者氣逆逆者人迎甚盛則熱人迎者胃脈也逆而盛則熱聚於胃口而不行故胃脘為癰也此下六條皆內經脈案教人以診之法也診者無失色脈而於脈尤當從容比類循上及下以求索之而得其病情若此條胃脘有癰當候胃脈今胃脈即沉細則胃氣不升人迎在上而盛則熱聚於上而不行此以本經上下推求而得之也有病厥者診右脈沉而緊左脈浮而遲病主安在歧伯曰冬診之右脈固當沉緊此應四時左脈浮而遲此逆四時在左當主病在腎頗關在肺當腰痛也少陰脈貫腎絡肺今得肺脈腎為之病故腎為腰痛之病也病厥者左右脈既不倫則以逆四時者推之在左則當主腎以冬令腎為主也況當腰痛則誠腎厥矣此以時令逆從而推得之者也有癃者一日數十溲此不足也身熱如炭頸膺如格人迎躁盛喘息氣逆此有餘也太陰脈細微如發者此不足也其病安在曰病在太陰其盛在胃頗在肺病名曰厥死不治此所謂五有餘二不足也五有餘者五病之氣有餘也二不足者亦病氣之不足也今外得五有餘內得二不足此其身不表不里亦正死明矣癃者氣化不及州都而外證如炭如格躁盛喘息氣逆皆以陽盛或人獨太陰脈細如髮則知太陰肺氣不得下輸膀胱是中虛已極已從脈細微見之而外五有餘此格陽之診也故病名厥日死不治此從脈細與病癃二不足者決之也有人頭痛筋攣骨重怯然少氣噦噫腹滿時驚不嗜臥此何臟之發也脈浮而弦切之石堅所以三臟者何也曰夫從容之謂也年長則求之於腑年少則求之於經年壯則求之於臟今子所言皆失八風菀熱五臟消鑠傳邪相染夫浮而弦者是腎不足也沉而實者是腎氣內著也怯然少氣者水道不行形氣消索也咳嗽煩冤者是腎氣之逆也一人之氣病在一臟也若言三臟不在法也此條為證多端頭痛筋攣可入太陽噦噫腹滿可入太陰時驚不嗜臥可入陽明而脈則浮弦石堅又可疑浮為太陰弦為厥陰石堅為少陰只以骨重怯然少氣為的屬少陰故諸證皆決於腎也其浮為有表無里弦為腎不養肝石堅則腎之內著可知是諸證皆不歸元之診也此從其病根所在而斷之也有人四肢解惰喘咳血泄而診以為傷肺切脈浮大而緊粗工下砭石多出血血止身輕何也曰子治與此病失矢夫聖人之治循守法度援物比類化之宣之循上及下何必守經今夫脈浮大虛者是脾氣之外絶去胃外歸陽明也夫二火不勝三水是以脈亂而無常也四肢懈惰此脾精之不行也喘咳者是水氣並陽明也血泄者脈急血無所行也以為傷肺不引比類夫傷肺者脾氣不守胃氣不清經氣不為使真臟壞決經脈旁絶五臟漏泄不衄則嘔此二者不相類也病見四肢懈惰喘咳血泄切脈浮大而緊大為脾脈帶浮而緊則脾傷氣不內歸故喘咳血泄如所指言者若以為肺傷不惟無此脈證亦無此診矣經脈傍絶五臟漏泄不衄則嘔蓋其證已與傷脾殊此從其比類以知之也診得心脈而急此為何病曰病名心疝少腹當有形也心為牡臟小腸為之使故曰少腹當有形也諸急者多寒心脈獨急宜結寒於心然心牡臟卒不得結必結於小腸以小腸為其使故當移之於此也此得之以心不受病而知病之移於使也診家之治法不可概列枚舉就內經脈案而悟之斯過半矣附脈診總論羅東逸曰經云微妙在脈不可不察古今察脈之精莫過內經內經之診法甚詳脈法甚約自叔和脈經興而脈象繁為二十四撰出七表八里九道之名以為診病莫盡於此不知名象愈繁診道莫準將求精而愈失之蓋由不知脈為胃氣之本源其陰陽精要即相為對待相去懸絶之間有甚精之察而不必多名象之求也夫診脈求病求其病之表裡寒熱虛實順逆而已內經説脈止於浮沉緩急大小滑澀八脈特於對待微甚懸絶著其相去之二等而脈之情盡變極察之極精及仲景又兼以陰陽著脈為十以浮數動滑大為陽沉澀弱弦微為陰而察陰陽之法又莫過於此於是診脈之精至此大備何以言之人之先天本於陰陽而陰陽復生於胃氣惟穀神興而營氣足故脈行焉中涵先天四時五臟之正而養於胃氣以微見其間是以脈常有神而可診以陰陽逆從之法故陰陽逆順之法必首診其胃氣五臟四時診胃氣者診其力診五臟者診其神診四時者診其順何謂力胃之在三陽搏而勿浮在三陰搏而勿沉其為洪圓有力陰陽兩和是平胃脈也四時而閏以太息為五至於何有病此謂有力若胃氣衰耗已先見不搏而浮沉矣何謂神五臟五神而主五行則恆見微弦微鉤微軟微毛微石之平衡所謂臟真也過則相凌弱則受克而藏神失再過則真臟現矣此謂有神何謂順五臟以胃氣各自主時而奉天令故春肝夏心秋肺冬腎如天之被物生長化收藏以一旺主時而群臟從焉毋得以錯忤事見者所謂順也反順則為逆矣逆時則逆臟並逆胃矣此謂以順是三者病本之診也於是審其陰陽以別柔剛而知其逆順之所在是以別於陽者知病起時別於陰者知死生之期此診之大源不可不知也嗣是乃有相去之三診則於其病情而知之一法為對待如浮沉對待緩急大小滑澀各對待皆兩不相侔判然可識者也一法為微甚從對待而推之或甚浮微浮甚沉微沉之過不及以從容而知之也一法為懸絶如太過三倍四倍不及之迥絶絶無之殊此為關格真臟之見脈可察而辨也辨其對待以察生克辨其微甚以察間甚辨其懸絶以察生死而又察仲景之陰陽十脈合而察之前三法為經後四法為緯不待多脈之名象而死生順逆之機瞭若指掌矣諸家脈論附張景嶽脈神章脈者血氣之神邪正之鑑也有諸中必形諸外故血氣盛者脈必盛氣血衰者脈必衰無病脈正有病脈乖人之疾病無過表裡虛實寒熱六字其中只虛實兩字足以盡之蓋表症里症寒症熱症無不皆有虛實既知表裡寒熱而能以虛實二字決之則千萬病情可一貫矣治病之法無逾攻補用攻用補無逾虛實欲察虛實無逾脈息雖脈之浮沉主病各異然一脈能兼諸病一病能兼諸脈且以諸脈中皆有虛實之變病值危難在乎能辨虛實使虛實得真則標本陰陽萬無一失或脈有疑似必兼證以察其孰主孰客孰緩孰急能知本末先後是即神之至矣論脈象浮脈舉之有餘按之不足凡洪大芤革之屬皆其陽之類也主中氣虛真陰不足其病傷風傷暑為表熱或脹滿不食為喘急其浮大為傷熱浮緊為傷寒浮滑為宿食浮緩為風為濕浮芤為失血浮數為風熱浮洪為狂躁雖有分司全在治法不可執一也雖浮為在表然有真正風寒外感脈反不浮者其有緊數而略兼浮者便是表邪必發熱無汗身有痠疼是其候也若浮而兼緩多有非表邪者大都浮而有力有神者為陽有餘陽有餘則火必隨之或痰見於中或氣壅於上可類推也若浮而無力空豁者為陰不足陰不足則水虧或血不營心或精不化氣中虛可知也若以此等為表證則害莫大其浮大弦硬之極甚至四倍以上者謂之關格此非有神之謂乃真陰虛極而陽亢無根大凶之兆凡脈見何部當隨其部而察其症諸脈皆然沉脈輕取不見重手乃得為陰凡細小隱伏反關之屬皆其類也此陽郁之候主氣鬱為寒為水其病停飲為症為瘕為脹實為厥逆為洞泄若沉細為少氣為寒飲為胃中冷為腰腳痛為痃癖沉遲為痼冷為精寒沉滑為宿食為伏痰沉伏為霍亂為胸腹痛沉數為內熱沉弦沉緊為胸腹痛沉雖屬裡然必察其有力無力以辨虛實沉而實者多滯氣故曰下手脈沉便知是氣氣停積滯者宜消宜攻若沉而虛者因陽不達因氣不舒陽虛氣陷者宜溫宜補其有寒邪外感陽為陰蔽脈見沉緊而數及有頭痛身熱等症且屬表邪不得以沉為里也遲脈不及四至為陰脈凡代緩結澀之屬皆相類也主陰盛陽虧之候其病為寒為虛浮而遲者內氣虛沉而遲者表氣虛遲在上則氣不化精遲在下則精不化氣氣寒則不行血寒則凝滯若遲兼滑兼大者多風痰頑痹之候遲兼細小者必真陽虧損而然或陰寒留蓄於中則為泄為痛或元氣不營於表則寒栗拘攣大都脈來遲慢者總由元氣不充不可妄施攻擊數脈有陰有陽今皆以數為熱詳考內經則曰諸急者多寒緩者多熱滑者陽氣盛微有熱粗大者陰不足陽有餘為熱中緩而滑者為熱中及難經云數則為熱遲則為寒而今世宗之然余歷驗凡內熱伏火等症脈反不數惟洪滑有力每如經文所言夫數脈之辨大約有七一在寒邪外感脈必暴見緊數寒邪初感本無熱邪所以只宜溫散惟數大滑實陽氣太重方可言熱若數而無力仍是陰症只宜溫中不可作熱治也一虛損有之凡陽虛者脈必數而無力或兼細小證見虛寒溫之且不暇尚堪作熱治乎又有陰虛之數脈必數而弦滑雖有煩熱諸證慎用寒涼若但清火必致脾泄而敗矣且患虛損者脈無不數數脈之病惟損最多愈虛則愈數愈數則愈危若以虛數作熱數萬無生理矣一瘧脈有之瘧作之時脈必緊數瘧止之時脈則和緩豈作則有火止則無火乎且火症無止時能作能止者唯寒邪之進退耳不可盡以為熱一痢脈有之痢之作率由寒熱內傷脾腎虛損所以脈數但兼弦澀細弱者總皆虛數非熱數也溫補命門百不一失其有形症多火年力強壯亦必見洪滑實數乃為可清一癰瘍有之凡脈數身無熱而惡寒飲食如常者或身有熱得汗不解者即癰瘍之候也然瘡瘍之發有陰有陽可攻可補亦不得盡以數為熱症一痙症有之以邪毒未達也達則不數矣此當以虛實大小分陰陽亦不得以數為熱脈一癥瘕有之凡積滯不行脈必見數若積久成疳而致口臭牙疳發熱等證者宜清胃火如無火症而脈見細數者非熱矣一胎孕有此以衝任氣阻本非火也當以強弱分寒熱勿以聖藥屬黃芩矣以上數脈諸證凡邪盛者多數脈虛甚者尤多數脈其是熱非熱諸所末盡可類推矣洪脈為陽舉按皆有餘大而實也主血氣燔灼內外大熱之候或為二便不通與動血為頭疼面熱狂躁煩渴咽乾喉痛等證或為癰瘍瘢疹此陽實陰虛氣實血虛之候若洪大至四倍以上者即陰陽離絶之脈也微脈纖細無神柔弱之極是謂陰脈凡細小虛濡之屬皆其類也乃陰陽俱虛之候主畏寒恐懼中寒少氣或脹滿食不化為嘔噦泄瀉或腰腹痛為眩運厥逆皆系元陽虧損傷精失血而然滑脈往來流利如珠走盤凡洪大芤革之屬皆其類也乃血熱氣壅之候為食滯痰逆滿悶嘔吐等症滑大滑數為內熱上為頭目咽喉心肺之熱下為小腸二便之熱婦人脈滑數而經斷為有孕若平人脈滑而和緩此營衛充實佳兆也如過於清火則為邪熱凡病虛損者多弦滑陰虛然也瀉痢多弦滑以脾腎受傷也不得通以火論澀脈為陰往來艱澀如雨沾沙如刀刮竹凡虛細微遲結促之類皆相似也主氣血俱虛之候為脾寒少食胃寒多嘔二便違和四肢厥冷痹痛拘攣麻木為憂煩為無汗為失血男子傷精女子不孕月事不調凡脈見澀滯多由七情不遂營衛耗傷血無以充氣無以暢在上則有上焦之不舒在下則有下焦之不運在表則有筋骨之疲勞在裡則有精神之短少總屬陽虛諸家言氣多血少豈以脈之不利猶有氣多者乎弦脈按之有餘如張弓弦與堅搏緊急相類陽中伏陰之象也主氣血不和為氣逆邪勝肝強脾弱為虛勞寒熱瘧痢痹疝胸脅疼痛痰飲宿食積聚脹滿拘攣等證若洪弦相搏外緊內熱欲發瘡疽也弦從木化氣通於肝可以陰亦可以陽但弦大兼滑者便是陽邪弦緊兼細者便是陰邪凡臟腑得胃氣所及則五臟相安肝邪所浸則五臟俱病蓋以木之滋生在水培養在土若木氣過強則水因食母而耗土以克賊而傷腎為精血之本胃為水穀之海根本受傷生氣敗矣所以木不宜強也唯脈見和緩者吉弦強者凶若弦甚者土必敗芤脈浮大中空按如蔥管凡浮豁虛散之屬皆相類也此孤陽脫陰之候為陰虛發熱失血脫血頭暈目眩驚悸怔忡喘急盜汗為氣無所歸血無所附芤雖陽脈而陽實無根大虛之兆緊脈急疾有力堅搏抗指有轉索之狀凡弦數之類相似也陰多陽少乃陰邪擊搏之候主為痛為寒緊數在表為傷寒發熱頭痛項強渾身筋骨疼痛咳嗽鼻塞為痹為瘧沉緊在裡為心脅疼痛胸腹脹痛為中寒逆冷吐食瀉痢陰疝痃癖風癇反張在婦人為氣逆經滯在小兒為驚風抽搐緩脈有三從容和緩浮沉得中者此平人正脈若緩而滑大者多實熱如內經所言者是也緩而遲細者多虛寒即諸家所言者是也然實熱者必緩大有力多為煩熱口臭脹滿癰瘍二便不利或傷寒溫瘧初愈而餘熱未清者多有此脈若虛寒者必緩而遲細為陽虛畏寒氣怯眩運痹弱痿厥怔忡誕妄飲食不化飧泄疼痛精寒腎冷小便頻數在女子為經遲血少失血下血等證凡諸疹毒及中風産後但得緩脈者易愈結脈脈來忽止止而復起總謂之結舊以數來一止為促促者為熱為陽極緩來一止為結為寒為陰極通謂之氣血痰食積聚癥瘕七情鬱結浮結為寒邪在經沉結為積聚在內以余驗之促類數也未必熱結類緩也未必寒但見中止者總是結脈多由氣血漸衰精力不繼所以斷而復續續而復斷常見久病者多有之虛勞者多有之或誤用攻擊消乏者亦有之但緩而結者多陽虛數而結者為陰虛緩者猶可數者更劇此可以結之微甚察元氣之消長也至如留滯鬱結等病本此脈之虛然必形強氣實舉按有力者方是又有無病而一生結脈者素稟之異也如病久不退而漸見結脈多氣血衰殘速宜培本伏脈如有如無附骨乃見此陰陽潛伏阻隔閉塞之象或火閉而伏或寒閉而伏或氣閉而伏為痛極霍亂疝癇閉結氣逆食滯忿怒厥逆水氣等症伏脈之見雖與沉微細脫者相類而不同蓋脈之伏者以其本有如無一時隱蔽不見耳有胸腹痛劇而伏者有氣逆於經脈道不通而伏者有偶因氣脫不相接續而伏者然必暴病暴逆者乃有之調其氣而脈自復矣此外有積困綿延脈本細微而漸至隱伏者乃殘爐將絶之兆安得尚有所伏哉虛脈無力無神正氣虛也浮而無力為血虛沉而無力為氣虛數而無力為陰虛遲而無力為陽虛不特微濡細弱遲澀之屬之虛類但諸脈之中見指下無神者總是虛脈經曰按之不鼓諸陽皆然即此謂也故凡洪大無神者即陰虛也細小無神者即陽虛也陰虛即金水虧殘龍雷易熾而五液神魂之病生焉或盜汗遺精或上下失血或驚悸不寧或喘咳勞熱陽虛則火土受傷真氣日損而君相化源之病生焉或頭目昏眩嘔惡亡陽或隔塞脹滿或泄痢疼痛救陰者壯水之主救陽者益火之源漸長則生漸消則死此實生死之關也實脈舉按皆強鼓動有力邪氣實也弦洪緊滑之屬皆相類為三焦壅塞之候表邪實者浮大有力以風寒暑濕外感於經里邪實者沉實有力因飲食七情內傷於臟火邪實者洪滑有力寒邪實者沉弦有力為諸痛滯症凡在氣在血脈有兼見者當以類求然實脈有真假真者易知假者難辨必問其所因兼察形證必得其神庶幾勿誤診七情脈有七情之傷而為九氣之別怒傷於肝脈促而氣上衝驚傷於膽脈氣亂而動掣過喜傷心脈散而氣緩過思傷脾脈短而氣結憂傷肺脈澀而氣沉恐傷腎脈沉而氣怯傷於寒者脈遲其人氣收傷於熱者脈數其人氣泄故脈促而人氣消因悲傷而心系掣也明常變凡衆人之脈有素大素小素陰素陽者此賦自先天若邪變之脈有倏緩倏疾乍進乍退者此病之驟至脈隨氣見也故凡診脈者必須先識臟脈而後可以察病脈先識常脈而後可以察變脈於常脈中可察人之器局壽夭於變脈中可察人之疾病死生審真偽脈言浮表沉里數熱遲寒弦強為實微細為虛是固然矣然疑似中尤有真辨不可不察也如浮為在表而凡陰虛血少中氣虧損者脈必浮而無力是浮不可概言表沉為在裡而凡表邪初感寒束皮毛脈不能達則必沉緊是沉不可概言里數雖為熱而真熱者未必數凡虛損之症陰陽俱困虛甚者數必甚是數不可概言熱遲雖為寒然傷寒初退餘熱未清脈多遲滑是遲不可概言寒弦強類實而真陰虛損胃氣大虧陰陽關格等證脈必豁大而弦強是強不可概言實微細類虛而凡痛極氣閉營衛壅滯不通者脈必伏匿是微不可概言虛凡諸脈之中皆有疑似皆有真辨診家大要當先識此知從舍治病之法有當舍症從脈者有當舍脈從症者蓋脈有真假症有真假凡見脈症有不相合者則必有一真一假隱乎其中故有以陽症見陰脈有以陰症見陽脈有以虛症見實脈有以實症見虛脈此陰彼陽此虛彼實欲將何從余嘗熟察之夫實症脈虛者必其症為假實脈實症虛者必其脈為假實也何以見之如外雖煩熱而脈見微弱者必火虛也腹雖脹滿而脈見微弱者必胃虛也虛火虛脹其堪攻乎此宜從脈之虛不宜從症之實也其有本無煩熱而脈見洪數者非火邪也本無脹滯而脈見弦強者非內實也無熱無脹其堪瀉乎此宜從症之虛不宜從脈之實也蓋實有假而虛無假假實者病多變幻此其所以有假也虛者虧損既露此其所以無假也故凡脈症不合者中必有姦必先察其虛以求其根本不易之要法也然真實假虛非曰必無如寒邪內傷或食停氣滯心腹急痛以致脈過沉伏或促或結此邪閉經絡而然脈雖若虛而必有痛脹等症可據是誠假虛之脈本非虛也又若四肢厥逆或惡風怯寒而脈見滑數以熱極生寒外雖若虛而內有煩熱便結等證可據者是誠假虛之病本非虛也又若是實脈而無是實症即假實脈有是實症而無是實脈即假實證知假知真即知所從舍矣又有從脈從症之法以病之輕重為期如病本輕淺別無危候可因現在以治其標若病關臟氣稍見疑難必須詳辨虛實憑依下藥方為切當所以輕者從症十惟一二重者從脈十嘗八九故雖脈有真假實由人見之不真耳脈何嘗假哉操獨見脈義之見於諸家者六經有序臟象有位三部九候有則詳且備矣學者按部以索象按臟以索病咸謂無遁情矣然索部位審之於寸似乎病在心肺索之於關似乎病在肝脾索之於尺似乎病在兩腎乃有不然者如頭痛一證病本在上兩寸其應也若以經臟言則少陽陽明之痛不應在兩關乎太陽之痛不應在左尺乎如淋遺等症病本在下尺中所主也若氣有不攝病脈見右寸矣神有不固病脈見左寸矣使必以部位言則上下相關不可泥也使必以經臟言則承製相移有不必執也故善為脈者貴在察神不可察形貴在衆中見獨不在部中泥證然獨之為義有三有部位之獨謂諸部無恙一部稍乖乖處藏姦有臟氣之獨不得以部位為拘如諸見洪者皆心脈諸見弦者皆肝脈肺之浮脾之緩腎之石五臟之中各有五脈五脈互見獨乖者病乖而強者即本臟之有餘乖而弱者則本臟之不足有脈體之獨內經曰獨小者病獨大者病獨疾者病獨遲者病獨陷者病是也三者之獨但得其一即見病之本矣故曰得一之精以知死生正此謂矣察胃氣經曰脈無胃氣亦死又曰脈弱以滑是有胃氣又曰邪氣來也緊而疾穀氣來也徐而和是穀氣即胃氣胃氣即元氣也凡診脈者無論浮沉遲數但於邪脈得兼軟滑徐和之象者便是有胃氣雖諸病疊見必無害也若今日尚和緩明日更弦急則知邪氣之愈進若今日甚弦急明日稍和緩知胃氣之漸至則病當漸清矣即如頃刻之間初急後緩者胃氣之來也初緩後急者胃氣之去也察邪正進退之法死生之兆惟以胃氣為主蓋脾胃屬土脈本和緩土惟畏木木脈弦強凡脈見弦急者為土敗木賊別死脈雀啄連連三五啄屋漏半日一點落魚翔似有又如無蝦遊靜中忽一躍彈石硬來尋即散搭指散亂為解索觀順逆有餘之病脈當有神有力忌見陰脈如沉澀細弱而不應手者逆也不足之症脈當和緩軟柔忌見陽脈如浮洪緊數而搏擊者逆也暴病脈宜浮洪數實久病脈宜微緩軟弱若新病而沉弱微細久病而浮數滑實者皆逆也元氣衰敗之脈有極微欲絶者用回陽救本之藥脈氣漸出為佳若暴出忽如復元者假復也必至復脫不治平病脈傷寒其脈以浮緊而有力無力表之虛實可知沉緊而有力無力里之虛實可知中而有力無力陰陽之吉凶可知浮為在表沉為在裡此古今相傳之法也然沉脈亦有表證以陰實陽虛寒勝者然也浮脈亦有里症此陽實陰虛水虧者然也故凡欲察表邪者不宜單據浮沉只當以緊數與否為辨蓋寒邪脈皆緊數若緊數浮洪有力邪在陽分即陽證也緊數浮沉無力者邪在陰分即陰症也以緊數之脈而兼見表症者其為外感無疑即當治從解散然內傷之脈亦有緊數症者但內傷之緊其來有漸外感之緊發於陡然以此辨之最為的當其有似緊非緊但較之平昔稍見滑疾而不甚者亦有外感之症以其邪輕或以初感而未甚亦多見此脈是又不可不兼證而察之也若其和緩全無緊疾脈雖浮大自非外邪脈大者為病進因邪氣勝病日甚也脈漸緩者為病退緩為胃氣至病將愈也然亦有宜大不宜大者如脈體本大而再加洪數此為病進之脈也如脈體本小自服藥後而漸見滑大有力此自陰轉陽必將汗解乃為吉兆蓋脈至不鼓由氣虛而然無陽豈能作汗虛損之脈凡甚急甚數甚細甚弱甚澀甚滑甚短甚長甚浮甚沉甚弦甚緊甚洪甚實皆勞傷之脈然無論浮沉大小但漸緩則漸有生意若弦甚者病必甚數甚者病必危若以弦細再加緊數則百無一生矣東垣發明內傷辨脈一條以左為人迎主表右為氣口主裡外感則人迎浮緊內傷則氣口脈大至今相習以為確然不知其短於論脈不容不辨夫人迎本在結喉兩傍本太陰肺脈兩寸口同稱也內傷外感之分一表一里如肝腎在左豈無里乎脾胃在右豈無表乎即仲景之論傷寒亦浮大為表沉細為里仲景之前未聞以左右言表裡者逮自叔和之後悉宗其謬嘗試論之脈見緊數此傷寒外感也然未有左數而右不數者又如所云左大為風邪右大為飲食則又不然人生稟賦右脈大者十居八九左脈大者十居一二若果陽邪在表則大者更大豈以右脈本大而可認為食乎若飲食在腑則強者愈強豈可以左脈本大而可認為寒乎不知此之大而緊則彼之小者亦緊彼之小而緩則此之大者亦必緩若因其偏強而即起偏見則忘其本體者多矣故以大小言脈體有不同可以左右分也若以遲疾言則息數本相應不可以左右分也矧左右表裡之説既非經旨亦非病徵烏足信哉夫亦六脈俱有表裡左右各有陰陽外感者兩手俱緊數內傷者左右俱緩大又必以有神無神辨虛邪實邪然必察脈之常體以參久暫之病斯可得脈症之真因辨之為東垣之一助云耳諸病惟心腹痛一症脈多難辨雖滑實有力固多實邪虛弱無神者固多虛邪然暴痛之極每多沉伏細澀最是極虛之候不知氣為邪逆脈道不行而伏沉異常此正邪實之脈也若火邪作痛則不然辨此之法暴病痛急而脈忽細伏者多實邪痛緩而脈本微弱者為虛邪酌之以理可矣王中暘痰脈論一切痰症脈有蝦遊雀啄代止之形須知其痰凝氣滯關格不通脈因有不動者有兩三路亂動者有時無者或尺寸一有一無者有關上不見者或時動而大小不常者有平居之人忽然而然者有素稟痰病不時而然者有僵仆暴中而然者皆非死脈也實因痰而然柯韻伯脈論二則脈有對看法有正看法有反看法有平看法有仄看法有徹底看法如有浮即有沉有大即有弱有滑即有澀有數即有遲合之於病則浮為在表沉為在裡大為有餘弱為不足滑為血盛澀為氣少動為搏陽弦為搏陰數為在腑遲為在臟此對看法也如浮大滑動數脈氣之有餘名陽當知其中有陰病陽勝之機沉弱澀弦遲脈氣之不足名陰當知其中有陰勝陽病之機此正看法也夫陰陽之在天地也有餘而往不足隨之不足而往有餘從之知從知隨氣可與期故其始也為浮為大為滑為動為數其始也反沉反弱反澀反弦反遲是陽消陰長之機其病為進其始也為沉為弱為澀為弦為遲其繼也微浮微大微滑微動微數是陽進陰退之機其病為欲愈此反看法也浮為陽如更兼大動滑數之陽是為純陽必陽盛陰虛之病矣沉為陰更兼弱澀弦遲之陰脈是為重陰必陰盛陽虛之病矣此為平看法如浮而弱浮而澀浮而弦浮而遲者此陽中有陰其人陽虛而陰氣伏於陽脈中也將有亡陽之變當以扶陽為急務矣如沉而大沉而滑沉而數者此陰中有陽其人陰虛而陽邪下陷於陰脈中也將有陰虛之患當以存陰為深慮矣此為仄看法如五陽脈體不變而始為有力之強陽終為無力之微陽知陽將絶矣五陰脈雖喜變陽如忽然暴見是陰極似陽知反照之不長餘燼之易滅也是為徹底看法更有真陰真陽之看法所謂陽者胃脘之陽也脈有胃氣是知不死所謂陰者真臟之脈也脈見真臟者死然邪氣來也緊而疾穀氣來也徐而和此又不得以遲數等定陰陽矣蓋十脈中浮沉是脈體大弱是脈勢滑澀是脈氣動弦是脈形遲數是脈息總是病脈而非平脈也先哲云浮而無力為陽虛沉而無力為陰虛此道其常耳然陰虛者必反見陰脈故陽愈虛脈愈沉如沉之極而復浮是微陽欲脫之兆也若服藥而漸浮僅得中脈為吉若忽然而浮浮而短澀是肺之真臟見浮而散大是心之真臟矣陽脈反是陰虛然陰愈虛則愈浮如浮極而復沉是真陰已絶之兆若服補劑而漸沉得中脈者吉忽然而沉或沉之散澀或綿綿欲絶者不可復治矣此陰陽反作之脈法喻嘉言脈論三則痙損水痙病異於常症痙脈異於常脈其曰太陽病發熱脈沉而細者名曰痙為難治發熱為太陽證沉細為少陰脈凡見微脈即陽之微見細脈即陰之細微則易於亡陽細則易於亡陰所以難治其曰太陽病脈反沉遲此為痙雖亦陽症陰脈而遲與微細大有不同遲為營血不為充養筋脈而成痙治不與少陰同法兩證夾陰之脈其辨如此脈經云痙家其脈伏堅直上下而復以按之緊而弦直上下行互發其義明伏非伏藏按之可得即所謂其脈沉也堅即緊如弦不為指撓邪氣堅實也直上下行者督脈與太陽合行脊裡太陽邪盛督脈亦顯其盛故見直上直下脈經曰直上直下者督脈也見則大人癲小兒癇者是也惟其夾於沉脈之內所以病癲及痙若舉指即見則病為陽狂登高俞垣勇力且倍平昔何至攣縮如是痙脈中有陽其辨又如此蓋體強其脈亦強求其柔軟和緩必不可得況強脈恆雜於陰脈之內所以沉弦沉緊邪深脈錮難於亟奪耳可見痙證之欲解必緊實之脈轉為微弱乃可漸解也後人所述損脈宗本越人以脈來軟者為虛緩者為虛滯為虛芤為中虛弦為中虛脈來細而微者血氣並虛脈小者血氣俱少脈沉小遲者脫氣虛損之脈似可一言而畢實未足以盡其底裡仲景曰虛勞之脈多兼浮大所以男子平人脈大為勞極虛亦為勞又謂脈浮者裡虛又謂勞之為病其脈浮大手足煩春夏劇秋冬瘥男子脈浮弱而澀為無子脈得諸芤動微緊男子失精女子夢交脈極虛芤遲為消穀亡血失精脈虛弱細微者善盜汗而總結其義曰脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相搏此名為革婦人半産漏下男子則亡血失精可見浮大弦緊外象有餘中藏不足不專泥遲緩微弱一端以驗脈而脈之情狀莫逃於指下金匾有論遲數之脈曰寸口脈浮而遲浮脈則熱遲脈則潛熱潛相搏名曰沉趺陽脈浮而數浮脈即熱數脈即止熱止相搏名曰伏沉伏相搏名曰水沉則絡脈虛伏則小便難虛難相搏水走皮膚即為水矣如是言脈令聰明知見全不得入夫寸口肺脈所過趺陽胃脈所過二脈合診表裡內經三陰結謂之水當以寸口趺陽定其診也寸口脈浮而遲浮為衛為陽遲為營為陰衛不與榮和其陽獨居脈外則為熱營不從衛匿於脈中則為潛營衛之間熱潛之脈相搏而至則肺氣不能布化故自結而沉也脾與胃以膜相連而為表裡趺陽脈浮而數胃陽不與脾陰相合浮而獨居於表則為熱脾陰不得胃陽以和反為陽氣所促而變數數則陰血愈虛而止矣數止相搏名曰伏者趺陽之脈本不伏以熱止之故而脈伏也寸口之沉趺陽之伏相搏於中則為水豈非三陰結一定之診乎然肺合皮毛者也皮膚者絡脈之所過肺沉而氣不為充營潛而血不為養則絡脈虛脾為胃行津液者也脾伏則津液不入膀胱故小便難絡虛便難水之積者乘虛而走皮間為腫矣程郊倩曰脈浮數大動滑此名陽矣仲景於浮大脈有曰浮則無血大則為寒於數脈有曰數為虛虛為寒於動滑脈有曰此三焦傷也曰滑則為噦此等虛實關頭即陰陽轉換處學者未辨到脈理之精微窮其變伏防其勝復則於脈疑處無有犀燭何能於病難時下得雷斧張隱菴曰識脈難審脈更難如浮沉遲數滑澀及二十四脈以對待之法識之猶易分別於指下所謂審脈者體氣強壯之脈何因所主之病何症以心印心而後得確者叔和曰浮為在表沉為在裡數為在腑遲為在臟又曰浮則為熱浮則為風浮為氣實浮為氣虛浮則無血浮則為虛是將為外感乎為內傷乎為氣乎為血乎為實乎為虛乎是必審其證之表裡陰陽寒熱虛實病之久病新病脈之有力無力而斷之以意也
