body:
  text: 卷五病能集三雜證十三門痙病張景嶽曰痙之為病即內經之痓病也以痙作痓蓋傳寫之誤耳其證脊背反張頭搖口噤戴眼項強四肢拘急或見身熱足寒惡寒面赤之類仲景以汗下為言謂其誤治亡陰所致然有不因誤治者而凡屬陰虛血少不能榮養筋脈致搐攣僵仆者皆是此證但人多不識耳如中風有此者必年力衰殘陰之敗也産婦有此者必去血過多衝任竭也瘡家有此者必血隨膿出營氣涸也小兒有此者或風熱傷陰遂為急驚或汗瀉亡陰遂為慢驚此皆陰虛之證蓋精血不虧雖有邪干斷無筋脈拘急之病而病至堅強其枯可知治此者當先以氣血為主邪甚者兼治其邪邪微者不必治之蓋此證所急在元氣元氣復而血脈行則微邪自不能留矣今人誤從風治不知此內生之風燥症也止宜滋補本無外邪即以傷精敗血枯燥而成若再治風痰難乎免矣陳無擇曰血氣內虛外為風寒濕熱之所中則痓蓋風散氣故有汗而不惡寒曰柔痙寒泣血故無汗而惡寒曰剛痓原其所因多由亡血筋無所榮故邪得以襲之其病在筋脈筋脈拘急所以反張其病在血液血液枯燥所以筋攣仲景曰太陽病發汗太多因致痙風病下之則成痙瘡家發汗亦成痙可見病痙者多由誤治虛實瞭然矣陳無擇能知所因而猶有未善者外為風寒濕熱所中則仍是風濕為邪而虛反次之不知發汗必傷血液誤下必傷真陰陰血傷則血燥血燥則筋失所滋拘攣反張強直之病勢所必至豈待風寒濕熱之相襲而後為痙邪必再受邪而後成痙無邪則無痙哉如以散風去濕為事豈血燥陰虛所能堪乎仲景言痙病止屬太陽以痙之反張在背背之經絡惟太陽督脈言太陽則督在其中然仲景止言表而未詳里內經曰足少陰之脈貫脊屬腎其直者從腎上貫肝膈又曰足少陰之筋循脊內挾膂上至項結於枕骨與足太陽之經合又曰足太陽之筋病脊反折項筋急足少陰之筋病主癇瘛及痙陽病者腰反折不能俯陰病者不能仰觀此則痙病乃太陽少陰之病膀胱主津液腎主藏精病在二經水虧可知治此當以真陰為主治法因汗因瀉其氣必虛微虛宜三陰煎五福飲大虛陰勝脈沉細大營煎大補元煎多汗者三陰煎參歸湯人參建中湯陽氣大虛汗出或亡陽者參附湯耆附湯大補元煎汗出兼火熱燥者當歸六黃湯因泄瀉者胃關煎溫胃飲瀉止而痙者大營煎五福飲兼火者必脈有洪數滑症見煩熱宜一陰煎或加減一陰煎火盛而陰血燥涸者清化飲玉女煎若有表邪未解者當察邪之微甚及證之陰陽身有微熱脈不緊數者微邪也只補正氣五福飲若表邪未解陰虛無汗身熱宜三四柴胡飲補陰益氣煎若陽氣大虛陰極畏寒邪不能解而痙者大溫中飲痰盛者先清上焦火盛多痰清膈煎抱龍丸多痰無火六安煎此證多屬虛痰虛火因其壅滿不得不暫為清理但得痰氣稍開便當調理血氣若兼濕以王海藏法治之剛痙神術湯加羌活麻黃柔痙白朮湯加桂心黃耆喻嘉言曰素問謂諸痙項強皆屬於濕千金推廣其義謂太陽中風重感寒濕則變痙是合風寒濕三者以論痙矣金匱以痙濕暍名篇又合暑濕熱三者言之然所謂柔痙剛痙未嘗不兼及風寒又云發汗過多因致痙古今言痙之書止此王海藏論痙知宗仲景可謂識大之賢矣夫以仲景論痙病所舉者太陽一經耳後之治此病者知為太陽或用金匱桂枝葛根二方茫不應手每歸咎仲景未備不思外感六淫之邪由太陽而傳六經邪不盡傳即不已故三陰三陽皆足致痙仲景之書雖未明言其隱而不發之旨未嘗不躍然如太陽之傳陽明項背几几少陽之頸項強是知三陽皆有痙矣而三陰豈曰無之王海藏謂三陽太陰皆病痙獨不及少陰厥陰云背反張屬太陽低頭視下手足牽引肘膝相構屬陽明一目或左或右斜視一手一足搐溺屬少陽發熱脈沉細腹痛屬太陰治太陰以防風當歸湯治太陽陽明發汗過多而致痙者以柴胡加防風治少陽汗後不解寒熱往來而成痙者製附子散桂心白朮湯附子防風散雖不及少陰厥陰意原有在觀其白朮湯下云上解三陽下安太陰一種苦心無非謂傳入少陰厥陰必成死症耳靈樞謂足少陰之經筋循脊內挾膂上至項與太陽筋合其病在此為主癇瘛及痙在外陽病不能俯在內陰病不能仰是則足少陰與足太陽兩相內外以不能俯者知為太陽主外不能仰者知為少陰主內其辨精矣太陽主外則陽明少陽主外可知少陰主內則太陰厥陰之主內可知故仲景之以項強脊強不能俯者指為太陽之痙原以該三陽也以身蜷足蜷不能仰者指為少陰之痙以該三陰所謂引而不發躍如也素問謂腎病者喜脹尻以代踵脊以代頭形容少陰病俯而不能仰之狀更著海藏所謂低頭視下肘膝相構正不能仰之陰病反指為陽明之痙立言殊有未確況仲景謂少陰病下利若利自止惡寒而蜷臥手足溫者可治又謂少陰病惡寒而蜷時自煩欲去衣被者可治言可用溫以治之也然仲景於太陽症獨見背惡寒者無俟其身蜷蚤已從陰急溫而預救其不能仰於少陰症而見口燥咽乾及下利純青水者無俟項背牽強蚤已從陽急下而預救其不能俯蓋臟陰之盛腑有先徵府陽之極入臟立稿此皆神而明之之事後代諸賢不能贊一辭耳此外如小兒之體脆神怯不耐外感壯熱多成痙病後世以驚風立名投金石腦麝之藥死而不悟又如新産婦人血室空虛外風襲入而成痙病輒稱産後驚風妄投湯藥可慨也已凡痙病所因或外感六淫或發汗過多或瘡家誤汗或風病誤下或灸後火熾或陰血素虧或陽氣素弱各各不同故痙病之壤不出亡陰亡陽兩途亡陰者津液精血素虧不能營養其筋脈此宜急救其陰也亡陽者陽氣素薄不能充養柔和其筋脈此宜急救其陽也陰已虧而復補其陽則陰立盡陽已薄而復補其陰則陽立盡不明傷寒經絡脈理動手輒錯無怪矣大頭瘟王海藏曰大頭病者雖在半身以上熱伏於經以感天地四時非節瘟疫之氣所著以成此疾至於潰裂膿出而又染他人所謂疫癘也大抵足陽明邪熱太甚實資少陽相火為之熾多在少陽或在陽明甚則逆傳視其腫勢在何部分隨其經而取之濕熱為腫火盛為痛此邪發於首多在兩耳前後所見先出者為主為根治之宜早藥不宜速恐過其病所謂上熱未除中寒已作有傷人命矣此疾自外而之內者是謂血病況頭部受邪見於無形之處至高之分當先緩而後急先緩者謂邪氣在上著無形之部分既著無形所傳無定若有重劑大瀉之則其邪不去反過其病矣雖用緩藥若又急服之或食前或頓服咸失緩體則藥不能除疾矣當徐徐服漬無形之邪或藥性味形體據象服餌皆須不離緩體及寒藥或酒炒浸之類皆是也後急者謂前緩劑已經高分瀉邪氣入於中是到陰部染於有形質之所若不速去反損陰也此卻為客邪當即去之是治客以急也且治主當緩者謂陽邪在上陰邪在下各屬本家病也若急去之不惟不能解其紛而反致其亂矣所以治主當緩也治客當急者謂陽分受陽邪陰分受陰邪主也陰分受陽邪陽分受陰邪客也凡所謂客當急去之此治客以急也假令少陽陽明之為病少陽為邪者出於耳前後也陽明者首面大腫也先以黃芩黃連甘草通炒過煎不住呷之或服畢再用大黃或酒浸或煨又以牛蒡子炒香煎納芒硝各等分亦細細呷之當食後用徐微得利及邪氣已只服前藥不已服後藥依前項次第用之取大便利邪已即止如陽明渴者加栝蔞根陽明行經加升麻葛根芍藥之類太陽行經加羌活防風荊芥之類選而加之並與上藥均分不可獨用散也厥逆張景嶽曰厥逆之證危症也內經特重而詳言之如雲卒厥暴厥皆厥逆之總名寒厥熱厥分厥逆之陰陽連經連臟論厥逆之死生近世猶有氣厥血厥痰厥酒厥尸厥臟厥蛔厥等症張仲景亦論傷寒厥之陰陽然仲景所論傷寒之厥辨在邪氣故寒厥宜溫熱厥宜攻內經之厥重在元氣故熱厥當補陰寒厥當補陽也以上症今悉誤認中風而不知總屬非風之證一氣厥有二氣虛氣實也氣虛卒倒者必形氣索然色青白身微冷脈微弱此氣脫症也宜參耆歸朮地黃枸杞大補元煎甚者回陽飲獨參湯氣實者形氣憤然勃然脈沉弱而滑胸膈喘滿此氣逆症也經曰大怒則形氣絶而血菀於上治宜排氣飲四磨飲八味順氣散蘇合香丸先順其氣然後隨其虛實調之若因怒傷氣逆氣旋去而真氣受損又若素多憂鬱恐畏氣怯氣陷者勿用行氣開滯之藥一血厥有二血脫血逆也血脫者如大崩大吐或産血盡脫氣亦隨之而脫故卒僕暴死宜先掐人中或燒醋炭以收其氣急用人參一二兩煎湯灌之使氣不盡脫必漸蘇矣然後因其寒熱徐為調理此血脫益氣也若用血藥及寒涼止血者必死血逆者即經云血之與氣並走於上又云大怒則形氣絶而血菀於上之類夫血因氣逆必先理其氣氣行則血無不行宜通淤煎化肝煎俟血行氣舒然後隨症調之一色厥有二暴脫動血也暴脫者以其人本虛偶因奇遇而悉力勉焉或相慕日久而縱竭情欲故於事畢則氣隨精去暴脫不返宜急掐人中仍用陰人摟定用口相對務使暖氣噓通以接其氣勿令放脫以保其神隨速用獨參湯灌之或速灸氣海數十壯以復陽氣庶可挽回又有不即病而病此者以精去於頻氣脫於漸每於房欲二三日後方見此症人於中年之後多因病此是皆所謂色厥也治此宜培補命門或水或火從宜而補色厥之血動者以血氣並走於上與大怒血逆者不同此因欲火上炎故血隨氣上必情欲動極或不能遂或借酒以強遏其鬱火者有之其症忽爾暴吐或鼻衄不止或厥逆汗出氣喘咳嗽此皆陰火上衝而然治此必先制火以抑其勢消化飲四陰煎其有陰竭於下火不歸原則無煩熱脈症血厥垂危非鎮陰煎不能救待其勢定然後因症治之一痰厥症凡痰壅氣閉宜或吐或開以治其標痰氣稍開便當治本如因火者清之降之因風寒者散之溫之因濕者燥之利之因脾虛補脾因腎虛補腎治其所以痰而痰自清矣然猶有不可治痰者愈攻則痰愈多矣諸郁證王安道曰內經帝曰郁之甚治之奈何岐伯曰木鬱達之土鬱奪之金鬱泄之總十三句通為一章當分三節火鬱以上九句為一節治郁之問答也然調其氣為一節治郁之餘法也過者抑之以其畏也所謂瀉之三句為一節調氣之餘法也夫五法者經雖為病由五運之郁所致而立然擴而充之則未嘗不可也且凡病之起也多由乎郁郁者滯而不通之義或所乘而為郁或不因所乘而本氣自郁皆郁也郁既非五運之變可拘則達之發之奪之泄之折之之法固可擴焉而充之矣木鬱達之達之者通暢之也如肝性急怒氣逆胠脅或脹火時上炎治以苦寒辛散而不愈者則用升發之藥加以厥陰報使而從治之又如久風入中為飧泄及不因外風之入而清風在下為飧泄則以輕揚之劑舉而散之凡此之類皆達之之法也王氏謂吐之令其條達以吐訓達則是凡為木鬱皆當吐矣可乎至於東垣所謂食塞太陰金旺剋木夫為物所傷豈有反旺之理若吐伸木氣則是反為木鬱而施治非為食傷而施治矣且食塞胸中而用吐正內經所謂其高者因而越之之義耳恐不煩木鬱之説以汩之也火鬱發之發者汗之也升舉之也如腠裡外閉邪熱怫鬱則解表取汗以散之又如龍火鬱甚於內非苦寒降沉之劑可治則用升浮之藥佐以甘溫順其性而從治之使勢窮則止如東垣升陽散火是也凡此皆發之之法也土鬱奪之奪者攻下也劫而衰之也如邪熱入胃用鹹寒之劑以攻去之又如中滿腹脹溫熱內甚其人壯氣實者則攻下之甚有勢盛而不能頓除者則劫奪其勢而使之衰又如濕熱為痢者有非力輕之劑可治者則或攻或劫以致其平凡此皆奪之之法也金鬱泄之泄者滲泄而利小便也疏通其氣也如肺金為腎水上源金受火爍其令不行原鬱而滲道閉矣宜肅清金化滋以利之又如肺氣滿膹胸憑仰息非利肺氣之劑不足以疏通之凡此皆泄之之法也王氏謂滲泄解表利小便使解表二字間於滲泄利小便之中是滲泄利小便為二治矣未當於理宜刪去水鬱折之折者制御也伐而挫之也漸殺其勢也如腫脹之病水氣淫溢而滲道以塞夫水之不勝者土也今土氣衰弱不能制之故反受其侮治當實其脾土資其運化俾可以制水而不敢犯則滲道達而後愈或病勢既旺非上法所能遽制則用泄水之藥以伐而挫之或去菀陳莝開鬼門潔淨腑三治備舉選用以漸平之王氏謂抑之制其沖逆雖俱為治水之法乃不審病者之虛實久近淺深妄施治之其不踣者寡矣然邪久客正氣必損今邪氣雖去正氣豈能遽平苟不平調正氣使各安其位復其常於治郁之餘優未足以盡治法之妙故又曰然調其氣苟調之而其氣猶或過而未服則當益其所不勝以制之如木過者當益金則木斯服矣所不勝者所畏者也故曰過者抑之以所畏也物順其欲則喜逆其欲則惡今逆之以所惡故曰所謂瀉之王氏未盡厥旨余故推明之若應變之用則又未必盡然矣朱丹溪曰郁者積聚而不能發越也當升者不得升當降者不得降當變化者不得變化也其鬱有六氣濕痰熱血食氣鬱者胸脅痛脈沉澀濕鬱者周身走痛或關節痛遇陰寒則發脈沉細痰鬱者動則喘寸口脈沉滑熱鬱者督悶小便赤脈沉數血鬱者四肢無力能食便紅脈沉食鬱者暖酸腹飽不能食人迎脈平和氣口緊盛蒼朮撫芎總解諸郁隨症加入藥凡郁在中焦以蒼朮撫芎開提其氣以升之假如食在氣上提其氣則食自降矣又方氣鬱香附蒼朮撫芎濕鬱白芷蒼朮撫芎茯苓痰鬱海石香附南星栝蔞熱鬱山梔青黛香附蒼朮撫芎血鬱桃仁紅花青黛香附川芎食鬱蒼朮香附山楂神麯針砂醋炒七次並越鞠丸解諸郁王節齋曰丹溪先生治病不出乎血氣痰三者故用藥之要有三氣用四君血用四物痰用二陳又云久病屬郁立治郁之方曰越鞠丸蓋氣血痰三病多有兼郁者或郁久而生病或病久而生郁或誤藥雜亂而成郁故豫每用此三方治病時以郁法參之故四法治病用藥之大要也黃疸證喻嘉言曰金匱云趺陽脈緊而數數則為熱熱即消穀緊則為寒食即為滿尺脈浮為傷腎趺陽脈緊為傷脾風寒相搏食谷則眩穀氣不消胃中苦濁濁氣下流小便不通陰被其寒熱結膀胱身體盡黃名曰谷疸此論內傷發黃直是開闢蓋人身脾胃居於中土脾之土體陰而用陽胃之土體陽而用陰兩者和同則不剛不柔胃納穀食脾行穀氣通調水道灌注百脈惟七情飢飽房勞過於內傷致令脾胃之陰陽不相協和胃偏於陽無脾陰以和之如造化之有夏無冬獨聚其熱而消穀脾偏於陰無胃陽以和之如造化之有冬無夏獨聚其寒而腹滿其人趺陽之脈緊寒數熱必有明徵診其或緊或數而知脾胃分主其病診其緊而且數而知脾胃合受其病法云精矣更有精焉診其兩尺脈浮又知兼傷其腎夫腎脈本沉也何以反浮蓋腎藏精者也而精生於穀脾不運胃之穀氣入腎則精無俾而腎傷故沉浮反浮也知尺脈浮為傷腎即知趺陽脈緊為傷脾然緊乃肝脈正仲景謂緊乃弦狀若弓弦之義脾脈舒緩受肝克賊則變緊肝之風氣乘脾聚之寒氣兩相搏激食谷即眩是谷入不能長氣於胃陽而反動風於脾陰即胃之聚其熱而消穀者亦特蒸為腐敗之氣而非精華之清氣矣濁氣由胃熱而下流入膀胱則膀胱受其熱氣化不行小便不通一身盡黃濁氣由脾寒而下流入腎則腎被其寒而克賊之餘其腹必滿矣究竟谷疸由胃熱傷膀胱者多由脾寒而傷腎者十中二三耳若飲食傷脾加以房勞傷腎其症必腹滿而難治矣黃疸由於火土之濕熱若合於手陽明之燥金則濕熱燥三氣相搏成黃其人必渴而飲水有此則去濕熱藥中必加潤藥乃得三焦氣化行津液通渴解而黃退渴不解者燥未除耳然非死候又云疸而渴者難治則更慮其下泉之竭不獨云在中之津液矣仲景云諸病黃家但利小便假令脈浮當以汗解之宜桂枝加黃耆湯可見大法當利小便必脈浮始可言表然疸症之脈多有榮衛氣虛濕熱乘之而浮故用桂枝黃耆湯和其榮衛用小柴胡湯和其表裡但取和法為表法乃仲景之微旨也濕熱鬱蒸而黃髮其當從下奪亦須仿治傷寒之法裡熱者始可用之重則大黃硝石湯蕩滌其濕熱如大承氣之例稍輕則用梔子大黃湯清解而兼下奪如三黃湯之例更輕則用茵陳蒿湯清解為君微加大黃為使如梔子豉湯中加大黃如博棋子大之例是則汗法固不可輕用下法亦在所慎施以疸症多夾內傷不得不回護之耳然疸症有濕多熱少者有濕少熱多者有濕熱全無者不可不察也仲景慮疸病多夾內傷故爾慎用汗吐下之法其用小建中湯則因男子發黃而小便自利是其里無濕熱惟以入房數擾其陽致虛陽上泛為黃故不治其黃但和榮衛以收拾其陽聽其黃之自去即取傷寒邪少虛多心悸而煩合用建中之法以治之又有小便本黃赤治之其色稍減即當識其蘊熱原少或大便欲自利腹滿上氣喘急即當識其脾濕原盛或兼寒藥過當宜亟用小半夏湯溫胃燥濕倘更除其熱則無熱可除胃寒起而厄逆矣此又一端也黃家日晡所發熱而反惡寒此為女勞得之膀胱急小腹滿身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水也腹滿者難治夫男子血化為精精動則一身之血俱動以女勞而傾其精血必繼之故因女勞而尿血者其血尚行猶易治也因女勞而成疸者血淤不行為難治矣甚者血瘀之久而成血蠱尤為極重非亟去其膀胱少腹之淤血萬無生路然女勞疸蓄積之血必非朝夕峻攻無益金匱以硝石礬石散方取藥石之悍得以疾趨而下達病所硝石寒咸走血可逐淤為君礬石本草謂能除錮熱在骨髓用以清腎及膀胱臟腑之熱並建消淤除濁之功此方之極妙也朱丹溪曰疸病不必分五同是濕熱熱多加芩連余但以利小便為先小便利黃自退矣趙羽黃曰黃疸之病經云中央色黃入通於脾蓋脾屬土色黃外至肌肉上應濕化今太陰邪氣熾盛濕滯熱蒸鬱而不發如酓曲相似遂成黃色所謂病痛是也治法有汗下之分補瀉之異焉今人治此但用平胃五苓茵陳湯之類清熱滲利之外並無他説雖然其濕熱之甚於腸胃者或可攻之若鬱於肌膚之間而不得發越過用疏利則濕熱反內陷而不出矣仲景治身熱發黃者有麻黃連翹赤小豆湯一法無非急解其表令熱邪自外而散耳方論止知可降而不知可升者非理也至於素患脾虛寒涼過甚或小水清白而大便微溏力倦神疲而脈細少食皆太陰脾氣虛極而真色外現之候也惟用補中益氣湯略加車前茯苓一二味熱勝者連理湯尤宜今此每遇此症不辨其孰實孰虛在表在裡概用寒涼通利詎知脾胃虛者不宜寒寒之則中氣愈敗矣脾胃弱者不宜降降之則下多亡陰矣或攻或補或升或降惟隨時變通可耳肺癰證附肺痿喻嘉言曰肺癰由五臟蘊祟之火與胃中停蓄之熱上乘乎肺肺受火熱熏灼即血為之凝血凝即痰為之裹遂成小癰所結之形日長則肺日脹而胸骨日昂乃至咳聲頻並濁痰如膠發熱畏寒日晡尤甚面紅鼻燥胸中甲錯如先即能辨其脈症屬表屬裡極力開提攻下無不愈者若至膿血吐出始識其症嗟無及矣間有癰小氣壯胃強善食仍可得生然不過十中一二此症治法用力全在成癰之先蓋肺痿者其漸積已非一日其寒熱不止一端總由胃中津液不輸於肺肺失所養轉枯轉燥然後成之但胃中津液暗傷之竇實多醫者不知愛護或腠理素疏無故而大發其汗或中氣素餒頻吐以傾倒其囊或疸成消中飲水而渴不解泉竭自中或腸枯便祕強利以求其快漏卮難繼於是肺火日熾肺熱日深肺中小管日窒咳聲以漸不揚胸中脂膜日乾咳痰艱於上出行動數武氣即喘鳴治法大要緩而圖之生胃津潤肺燥下逆氣開積痰止濁唾補真氣以通肺之小管散火熱以復肺之清肅如半身痿廢及手足痿軟治之得法亦能復起然肺癰屬在有形之血血結宜驟攻肺痿屬在無形之氣氣傷宜徐理肺癰為實誤以肺痿治之是謂實實肺痿為虛誤以肺癰治之是為虛虛此辨症用藥之大略也金匱論肺癰肺痿之脈云寸口脈數其人咳口中反有濁唾涎沫者為肺痿之病若口中辟辟燥咳即胸中隱隱痛脈反滑數此為肺癰咳吐膿血脈數虛者為肺痿數實者為肺癰又云寸口脈微而數微則為風數則為熱微則汗出數則畏寒風中於衛呼氣不入熱過於榮吸而不出風傷皮毛熱傷血脈風舍於肺其人則咳口乾喘滿燥而不渴時唾濁沫時時振寒熱之所過血為之凝滯蓄結癰膿吐如米粥始萌可救膿成則死咳嗽之初即見上氣喘急者乃外受風寒所致其脈必浮宜從越婢加半夏之法及小青龍加石膏之法亟為表散不爾即是肺癰肺痿之始基須亟散邪下氣以清其肺然亦分表裡虛實為治不當誤施轉增其困矣程郊倩曰肺痿氣虛不能化血故血乾不流只隨火熱沸上火亢乘金不生氣血而生痰可知無血無液而枯金被火肺葉安得不焦蓋肺處臟之最高葉間布有細竅凡五臟之蒸溽從肺脘吸入之便是氣從泉眼呼出之便成液息息不窮以之灌溉周身此所謂水出高源也一受火炎呼處成吸有血即從此眼滲入礙了竅道便令人咳咳則見血愈咳愈滲愈滲愈咳久則細竅俱閉吸時從引火升喉間或癢或瘡呼時並無液出六葉逐爾枯焦此肺痿之由也補肺散中用杏仁大力子者宣竅道也用阿膠者消竅淤也用馬鈴者消竅熱也肺全無一補藥而反以糯米補及脾者但取母氣到肺立方之旨全從肺家細竅著想使此處呼吸無阻則氣入液出肺不補而自補矣喘趙養葵曰喘經云諸喘皆屬於上又謂諸逆衝上皆屬於火故河間敘喘病在於熱條下華他云肺氣盛為喘活人書雲氣有餘則喘後代集症類方不過遵此而已獨王海藏辨云氣盛當作氣衰有餘當認作不足肺氣果盛有餘則清者下行豈復為喘以其火入於肺炎爍真陰衰與不足而為喘焉海藏之辨超出前人惜乎未竟火之所由愚謂火之有餘水之不足也陽之有餘陰之不足也凡諸逆衝上之火皆下焦衝任相火出於肝腎者也腎水虛衰相火偏勝壯火食氣銷爍肺金烏得而不喘焉丹溪云喘有陰虛自少腹下火起而上宜四物加青黛竹瀝陳皮入童便煎服如挾痰者四物加枳殼半夏補陰以化痰夫謂陰虛發喘丹溪實發前人所未發但治法實流弊於後人蓋陰虛者腎中之真陰虛也詎四物補陰血之謂乎其火起者下焦龍雷之火也詎寒涼所能降乎其間有有痰者有無痰者有痰者水挾木火而上也豈竹瀝枳半之能化乎須用六味地黃加麥冬五味大劑煎飲以壯水之主則水升火降而喘自定矣又有一等似火而非火似喘而非喘者經曰少陰所至嘔咳上氣喘者陰氣在下陽氣在上諸陽氣浮無所依歸故上氣喘也黃帝針經云胃絡不和喘出於陽明之氣逆陽明之氣下行今逆而上行故喘真元耗損喘出於腎氣之上奔是非氣喘乃氣不歸元也其外症或四肢厥逆面赤而煩躁惡熱非火也乃命門真元之火離其宮而不歸也察其脈兩寸雖浮大而數兩尺微而無力或似有而無為辨耳不知者以其有火也用涼藥以清之以其喘急難禁也佐以四磨之類以寬之豈知寬一分更耗一分若寒涼快氣之劑屢進去死不遠矣惟善治者能求其緒而以助元接真鎮墜之藥俾其反本歸原或可回生然亦不可峻補也宜先以八味丸安腎丸養正丹之類煎人參生脈散之類送下覺氣稍定然後以參耆補劑如破故紙阿膠牛膝等以鎮於下又以八味加河車為丸遇飢吞服然須遠房幃絶色欲方可保全不然終亦必亡矣又有一等火鬱之證六脈俱澀甚至沉伏四肢悉寒甚至厥逆拂拂氣促而喘卻似有餘欲作陰虛而按尺鼓指此為蓄郁已久陽氣拂遏不能營運於表以致身冷脈微而悶氣喘急然不可以寒藥下之又不可以熱藥投之惟逍遙散加茱連之類宣散蓄熱得汗而愈此謂火鬱發之木鬱達之即金匱云六脈沉伏宜發散則熱退而喘定是也後仍以六味養陰和陽方佳以上詳陰虛發喘之例若陽虛致喘東垣已詳盡矣外感發喘仲景已詳盡矣王節齋曰喘與脹二症相因必皆小便不利喘則必生脹脹則必生喘但要識得標本先後先喘而後脹者主於肺先脹而後喘者主於脾何則肺金司降外主皮毛經曰肺朝百脈通調水道下輸膀胱又曰膀胱者州都之官津液藏焉氣化則能出矣是小便之行由於肺氣之降下而輸化也若肺受邪而上喘則失降下之令故小便漸短以致水溢皮膚而生腫滿焉此則喘為本脹則為標治當清金降火為主而行水次之脾土惡濕外主肌肉土能剋水若脾土受傷不能制水則水濕妄行浸漬肌肉水既上行則邪反侵肺氣不得降而生喘矣此則脹為本而喘為標治當實脾行水為主而清金次之苟肺病而用燥脾之藥則金得燥而喘愈加脾病而用清金之藥則脾得寒而脹愈甚近世治喘脹但知行水而不知分別脾肺故發明之李士材曰內經論喘其因衆多究不外於火逆上而氣不降也丹溪曰實火可瀉虛火可補而世俗一遇喘家純行破氣不知喘症因虛而死者十九因實而死者十一實者攻之即效無所難治虛者補之未必即效須悠久成功其間轉相進退良非易也故辨症不可不急而辨喘症為尤急顧巢氏嚴氏止言實熱獨王海藏謂肺氣衰肺中之火盛創出前見但惜其未能縷析立方為後人窠白請得而詳之氣虛而火入於肺者補氣為先六君子湯補中益氣湯陰虛而火來乘金者壯水為亟六味地黃丸風寒者解其邪三拗湯華蓋散濕氣者利其水滲濕湯暑邪者滌其煩白虎湯香薷飲肺熱者清其上二冬二母甘桔梔芩痰壅者消之二陳湯氣鬱者疏之四七湯飲停者吐之吐之不愈白朮防己湯主之火實者清之白虎湯加栝蔞仁枳殼黃芩肺癰而喘保金化毒杏仁甘草節桔梗貝母防風銀花橘紅麥冬肺脹而喘利水散邪肺脹之狀喘而煩躁目如脫狀脈浮大者越婢加半夏湯脈浮者心下有水小青龍湯加石膏主之腎虛火不歸經導龍入海八味丸主之腎虛水邪泛濫逐水下流金匱腎氣丸薛立齋曰喘症若肺中伏熱不能生水而喘且渴者用黃芩清肺飲以治肺用五淋散以清小便若肺脾虛弱不能通調水道者宜用補中益氣湯以培元氣用六味地黃丸以補腎水若膏粱厚味脾肺積熱而喘者宜清胃散以治胃用滋腎丸以利小便若心火克肺金而不能生腎水者用人參平肺散以治肺用滋腎丸以滋小便若腎經陰虧火爍肺金而小便不生者用六味地黃丸以補腎水用補中益氣以培脾土若脾氣虛弱不能相制而喘者用補中益氣以培元氣六味地黃丸以生腎水若肝木克脾土不能相制而喘者用六君柴胡升麻以培元氣六味丸以補腎若脾腎虛寒不能相制而喘且脹者用八味丸以補脾肺生腎水若肺腎虛寒不能通調水道而喘且脹者宜用金匱加味腎氣丸補脾肺生腎水若酒色過度虧損足三陰而致喘脹痰湧二便不調或大小便通相牽作痛者宜用前丸多有生者虛勞門喻嘉言曰虛勞之症傷於精血營血傷則內熱起五心常熱目中生花見火耳內蛙聒蟬鳴口舌糜爛不知正味鼻孔乾燥呼吸不利乃至飲食不為肌膚怠惰嗜臥骨軟足酸榮行日遲衛行日疾營血為衛氣所迫不能守內而脫出於外或吐或衄或出二陰之竅血出既多大熱進入逼迫煎熬漫無休止營血有立盡而已更有勞之之極而血痹不行者血不脫於外但蓄於內蓄之日久周身血走之隧道悉痹不流惟就乾涸皮鮮滑澤面無榮潤於是氣之所過血不為動徒蒸血為熱或日晡或子午蒸熱不已瘵病成焉亦有始因脫血後遂血痹者血虛血少艱於流布發熱致痹尤易易也內經云大肉枯稿大骨陷下胸中氣高以致真臟脈見然枯稿已極即真臟脈不見亦寧有不危者乎秦越人發虛損之論謂虛而感寒則損其陽陽虛則陰盛損則自上而下一損損於肺皮聚毛落二損損於心血脈不能榮養臟腑三損損於胃飲食不為肌膚虛而感熱則損其陰陰虛則陽盛損則自下而上一損損於腎骨痿不能起於床二損損於肝筋緩不能收持三損損於脾飲食不能消化自上而下者過於胃則不可治自下而上者過於脾則不可治蓋飲食多自能生血飲食少則血不生血不生則陰不足以配陽勢必至於五臟齊損越人歸重脾胃旨哉言矣謂精生於穀谷入少而不生其血血自不能化精內經於精不足者必補之以味味者五穀之味也補以味而節其勞則積貯漸富大命不傾垂訓十則皆以無病男子精血兩虛為言而虛勞之候煥若指掌矣故血不化精則血痹矣血痹則新血不生並素有之血淤積不行血淤則榮虛榮虛則發熱熱久則蒸其所淤之血化而為蟲遂成傳尸瘵症以故傷寒狐惑之症聲啞嗄勞瘵之症亦聲啞嗄是則聲啞者營氣為蟲所蝕明矣巢氏病源不察遂有種種分門異治後人以其歧路之多茫無所適諱其名曰痰火又謂有虛有實肺虛用某藥肺實用某藥及心肝脾腎咸出虛實兩治之法是以虛損虛勞中添出實損實癆矣豈不謬哉仲景於男子平人諄諄致戒無非謂榮衛之道納穀為寶居常調榮衛以安其谷壽命之本積精自剛居常節嗜欲以生其精至病之甫成脈才見端惟恃建中復脈為主治夫建中復脈皆稼穡作甘之善藥一遵精不足者補之以味之旨也後人補腎諸方千蹊萬徑以治虛勞反十無一全仲景及其血痹不行為驅其舊生其新誠有一無二之聖法第牽常者不能用耳然秦越人發明虛損一症優入聖域其論治損之法損其肺益其氣損其心者調其榮衛損其脾調其飲食適其寒溫損其肝緩其中損其腎益其精即此便是正法眼藏矣凡虛勞病多有奪血而無汗者若認為陽實而責其汗必動其血是名下厥上竭又最防脾氣下溜若過用寒涼其人必至清穀且骨蒸發熱熱深在裡一切輕揚之藥禁不可用用之反引熱勢外出而增其熾灼干津液肌肉枯稿四出安望除熱止病乎李士材曰治勞之法以內經為式以脾腎為主水為萬化之源土為萬物之母故脾安則土生金母金實水源且土不淩水水安其位腎亦安矣腎兼水火腎安則水不挾肝上泛而凌上濕火能益土而化精微故腎安則脾愈安也救腎者必本於陰血血屬陰主下降虛則上升當斂而抑六味丸是也救脾者必本於陽氣氣為陽主上升虛則下陷當升而舉補中益氣是也近世治勞專以四物加黃柏知母不知四物皆陰行秋冬之令非所以生萬物者也且血藥常滯非痰多食少者所宜血藥常潤久行必致滑腸黃柏知母其性苦寒能瀉實火實燥而傷陰又苦先入心久能增氣反能助火至其敗胃所不待言然矯其偏者又輒以桂附為家常茶飯此惟以火衰者宜之若血氣燥熱之人能無助火為害哉大抵虛勞之症疑難不少如補脾保肺法當兼行然脾喜溫燥肺喜清潤保肺則礙脾補脾則礙肺惟燥熱而甚能食而不瀉者潤肺當急而補脾之藥亦不可缺也倘虛羸而甚食少瀉多雖喘嗽不寧但以補脾為急而清肺之品宜戒矣肺無扶脾之力脾有生肺之能故補脾之藥尤要於保肺也嘗見勞症之死多死於泄瀉泄瀉之因多因於清潤司命者能不為之兢兢耶又如補腎理脾法當兼行然方欲以甘寒補腎其人減食又恐不利於脾方欲以辛溫快脾其人陰傷又恐愈耗其水兩者並衡而校重脾者以脾土上交於心下交於腎故也若腎水大虛而勢困篤者又不可拘要知滋腎之中佐以砂仁沉香壯脾之中參以五味肉桂隨時治法可耳又如無陽則陰無以生無陰則陽無以化宜不可偏也東垣曰甘溫能除大熱又曰血脫益氣又曰獨陰不長虛者必補以人參之甘溫陽生陰長之理也且虛勞症受補者可治不受補者不治故葛可久治勞神良素著所垂十方用參者七丹溪專主滋陰所述治勞方案用參者亦十之七不用參者非其新傷必其輕淺者耳自好古肺熱傷肺節齋服參必死之説印定後人眼目甘用苦寒直至上嘔下泄猶不悔悟良可悲矣幸李瀕湖汪石山詳為之辨而宿習難返貽禍未已不知肺經自有熱者肺脈按之而實與參誠不相宜若火來乘金者肺脈按之而虛金氣大傷非參不保前哲有言曰土旺而金生勿拘拘於保肺水旺而火息毋汲汲於清心可謂洞達內經之旨深窺根本之治也張景嶽曰凡虛損之由無非酒色勞倦七情飲食所致或先傷其氣氣傷必及於精或先傷其精精傷必及於氣但精氣在人無非謂之陰分陰為天一之根形質之祖凡損形質者總曰陰虛然分而言之則有陰中之陰虛其病為發熱煩躁頭紅面赤唇乾舌燥咽痛口瘡吐血衄血便血尿血大便燥結小水痛澀等症有陰中之陽虛其病為怯寒憔悴氣短神疲頭運目眩嘔惡食少腹痛飧泄二便不禁等症甚至咳嗽吐痰遺精盜汗氣喘聲喑筋骨疼痛心神恍惚肌肉盡削夢與鬼交婦人月閉等症凡病至極皆所必至總由真陰之敗耳然真陰所居惟腎為主而人之生氣同天地元陽無非自下而上故腎水一虧則肝失所滋而燥生水不歸源而脾痰起心腎不交而神色敗盜傷脾氣而喘嗽頻孤陽無主而虛火熾凡勞傷等症使非傷及根本何以危篤至此故凡病甚於上者必其竭甚於下也余故曰虛邪之至害必歸陰五臟之傷窮必及腎夫亦貴其知微而已凡人心耽欲念腎必應之凡君火動於上則相火必應於下夫相火者水中之火也靜而守位則為陽氣熾而無制則為龍雷涸澤燎原無所不至故其在腎則為遺淋帶濁水液漸以乾枯炎上入肝則逼血妄行為吐為衄或為營虛筋骨疼痛又上入脾脾陰受傷或為發熱飲食悉化痰涎再上至肺皮毛無以扃固亡陽嗽喘啞喑聲嘶是皆無根虛火陽不守舍而火焰詣天自下而上由腎而肺本源漸稿上實下虛誠剝極之象也又師尼室女失偶之輩私情繫戀所願不得則欲火搖心真陰日削遂致不救五勞之中莫此為甚經曰嘗貴後賤雖不中邪病從內生名曰脫榮常富後貧名曰失精故五臟之傷惟心為本思生於心脾必應之思之不已勞傷在脾脾氣結則為噎膈為嘔吐飲食不能運氣血日消肌肉日削四肢不為用而生脹滿泄瀉等症此傷心脾之陽也然思本傷脾尤亦傷脾經曰脾愁憂而不解則傷意意傷則悗亂四肢不舉七情傷腎恐亦居多經曰恐懼而不解則傷精精傷則骨酸痿厥精時自下又常見猝恐者必陰縮或遺尿是皆傷腎之徵也然恐傷腎怒亦傷腎經曰腎盛怒而不止則傷志志傷則喜忘其前言腰背不可以腑仰屈伸是知盛怒不惟傷肝腎亦受害也怒生於心肝必應之經曰怒傷肝怒則氣逆甚則嘔血及飧泄故氣上矣蓋肝為陰中之陽臟故肝之為病有陰陽如火因怒動而逼血妄行以致氣逆於上而脹痛喘急者此傷陰氣以怒傷而木鬱無伸致侵脾土氣陷為嘔為脹為泄為痛為飲食不行此傷陽然怒本傷肝而悲哀亦最傷肝經曰悲哀動中則傷魂魂傷則狂妄不精陰縮筋攣兩脅骨不舉蓋盛怒傷肝肝氣實也悲哀傷肝肝氣虛也實不終實而虛則終虛耳驚本入心實通於肝膽經曰驚則心無所依神無所歸慮無所定故氣亂矣然膽為中正之官十一臟陽剛之氣皆取決焉又為少陽生氣所居若或損之則諸臟生氣皆消索致敗故驚畏日積或一時大驚損膽致膽汁泄通身發黃默默無言者皆不可救虛損兩頰紅赤或唇紅者陰虛於下逼陽於上也仲景曰其面戴陽者下虛故也虛而多渴者腎水不足引水自救也喑啞聲不出者由腎氣之竭蓋聲出於喉而根於腎經曰內奪而厥則為喑痱此腎虛也虛而喘急者陰虛肺格氣無所歸也喉乾咽痛者真水下虧虛火上浮也不眠恍惚者血不養心神不能藏也時多煩躁者陽中無陰柔不濟剛也易生嗔怒或筋急痠疼者水虧木燥肝失所資也飲食不甘肌肉漸削者脾元不守化機日敗也心下跳動怔仲不寧者氣不歸精也盜汗不止者有火則陰不能守無火則陽不能固也虛而多痰或如清水或白沫者此水泛為痰脾虛不能制水也骨痛如折者腎主骨真陰敗竭也腰脅痛者肝腎虛也膝以下冷命門衰絶火不歸原也小水黃澀淋瀝者真陽虧竭氣不化水也足心如烙者虛火爍陰湧泉涸竭也虛損之脈凡甚急甚數甚細甚弱甚澀甚滑甚短甚長甚浮甚沉甚弦甚緊甚洪甚實皆勞傷之脈然無論浮沉大小但漸緩則漸有生意若弦甚病必甚數甚病必危若以弦細而再加緊數則百無一生矣要略曰脈芤者為血虛沉遲而小者為脫氣大而無力為陽虛數而無力為陰虛脈大而芤者為血虛平人脈大為勞虛極亦為勞脈微細者盜汗寸弱而軟者為上虛尺弱軟澀為下虛尺脈滑疾為血虛兩關沉細為胃虛又脈經曰脈來軟者為虛緩者為虛弱者為虛弦者為中虛細而微小者氣血俱虛人賴以生惟此精氣氣虛即陽虛凡病有水盛火虧而見臟腑寒脾腎敗者是也故病見虛弱別無熱症者便是陽虛即當溫補元氣使真元自復萬勿兼清涼寒滑之品以殘此發生之氣精虛者即陰虛凡病有火盛水虧而見營衛燥津液枯者是也故見病多熱燥水不濟火者便是陰虛欲滋其陰惟宜甘涼醇靜之物凡陰中有火大忌辛溫然陰虛者因其水虧而水虧又忌寒涼蓋苦劣之流斷非滋補之物其有火盛之甚不得不從清涼者亦當兼壯水之劑相機間用一虛損咳嗽雖五臟皆有然專主則在肺腎蓋肺為金臟所畏者火化邪者燥燥則必癢癢則必嗽正以腎水不能制火所以剋金陰精不能化氣所以病燥故為咳嗽喘促咽痛聲啞喉癢喉瘡等症治此宜甘涼至靜之劑滋養金水使肺腎相生真陰漸復一虛損吐血者傷其陰也但當察其火有與無及火之微甚而治之凡火之盛而火戴血上脈症之間自有熱證可辨急則治標暫用芩連梔柏竹葉童便之屬血止即當養血不宜過用寒涼也若無實火而金屬傷陰則陰虛水虧血由傷動此宜甘純養陰之品以靜制動以和治傷使陰氣安靜得養則血自歸經若陰虛於下格陽於上六脈無根而大吐大衄者此火不歸源真陽失守而然萬不可用涼藥若大吐大衄六脈細脫手足厥冷危在傾刻厥逆昏憒者速當益氣以固生機若過用寒涼即死總之失血吐血陰分大傷使非加意元氣培養真陰而專用寒涼血雖得止病必自敗一虛損傷陰本由五臟然五臟症治有可分者有不可分者如諸氣之損其治在肺神明之損其治在心飲食肌肉之損其治在脾諸血筋膜之損其治在肝精髓之損其治在腎此其可分者也至氣主於肺而化於精神主於心而化於氣肌肉主於脾而土生於火諸血藏於肝而血化於脾胃精髓主於腎而受之於五臟此其不可分者也及乎既盛則標本相傳連及臟腑此又方之不可執言也故凡補虛之法但當明其陰陽升降寒熱溫涼之性精中有氣氣中有精之因且凡上焦陽氣不足者必下陷於腎也當取之至陰之下下焦真陰不足者多飛越於上也可不引之歸原乎所以治必求本方為盡善凡虛損既成不補將何以復而有不能服人參熟地諸藥者此為虛不受補何以望生若以失血後嗽不止痰多甚者此脾肺虛極飲食無能化血而隨食成痰此雖非血而實血之類也經曰白血出者死有不得左右眠而認一邊難轉者此其陰陽之氣有所偏竭而然多不可治若虛症別無邪熱而譫妄失倫此心臟之敗神去之兆也必死勞嗽喑啞聲不能出此肺臟之敗也必死勞損肌肉脫盡者此脾臟之敗也必死筋為罷極之本病虛損而筋骨疼痛若痛至極不可忍者乃血竭不能養筋此肝臟之敗也必死勞損既久再大便泄瀉不能禁止者此腎臟之敗也必死內傷陰虛發熱證治法綱曰內傷發熱則從內自汗出六脈微弱或右手氣口大三倍於人迎按之無力渾身痠軟或痛倦於言動怠惰屬內傷元氣虛宜補中益氣湯加減發熱甚於午後遺滑或咳嗽有紅皮毛枯稿屬陰虛熱久則變為骨蒸勞極治法如勞瘵條下又有傷食發熱惡寒頭痛嘔惡胸中飽悶而痛脹右寸關俱緊而滑左脈弦急屬內傷飲食外感風寒之熱先宜解散後消導和中又有發熱晝重夜輕口中無味陽虛也午後發熱夜半則止陰虛也陽虛責之胃陰虛則之腎蓋飢飽傷胃房勞傷腎以藥論之甘溫補氣甘寒滋陰若氣血兩虛只補其氣陽旺生陰也東垣曰晝則發熱夜則安靜是陽氣自旺於陽分也夜則發熱晝則安靜是陽氣下陷入陰中也名曰熱入血室晝則發熱煩躁夜亦發熱煩躁是重陽無陰也當亟瀉其陽峻補其陰王冰曰病熱而脈安按之不鼓乃寒盛格陽而致之非熱也形症是寒按之脈氣鼓擊於手下者此為熱盛拒陰非寒也趙養葵曰病熱作渴飲冷便閉此屬實熱人皆知之或惡寒發熱引衣蜷臥四肢逆冷大便清利此屬真寒人亦易知至於煩擾狂越不欲近衣欲坐臥泥水中此屬假熱之證甚者煩極發躁渴飲不絶舌如芒刺兩唇燥裂面如塗朱身如焚燎足心如烙吐痰如湧喘急大便閉結小便淋瀝三部脈洪大而無倫當是時也卻似承氣症承氣入口即斃卻似白虎症白虎下咽即亡若用二丸緩不濟事急以加減八味丸料一斤內肉桂一兩以水煎五六碗冰冷與飲諸證自退翌日必畏寒脈沉是無火也當補其陽急以附子八味丸料煎服自愈此證與脈氣俱變其常而不以常法治之者也若有産後及大失血後陰血暴傷必大發熱亦名陰虛發熱若以涼藥正治立斃正所謂象白虎證服白虎必死須用獨參湯或當歸補血湯使無形生出此陽生陰長之妙或問氣虛血虛均是內傷何以辨之曰陰虛者面必赤無根之火戴於上也若陽症火入於內面必不赤其口渴者腎水乾枯引水自救也但口雖渴而舌必滑脈雖數而尺必無力甚者尺雖洪數而按之不鼓此為辨耳戴復庵云服涼藥而脈數者火鬱宜升補王節齋曰世間發熱類傷寒者數種治各不同外感內傷乃大關鍵張仲景論傷寒傷風此外感也風寒自表入里故宜發表以解散之此麻桂二方之義也以其感於冬春寒冷藥用辛熱勝寒若時非寒令則藥當變矣如春溫之月則藥當以辛涼夏暑之月則藥當以甘苦寒故云傷寒不即病至春變溫至夏變熱而其治法必因時而有異也又有一種冬溫之病謂之非其時而有其氣冬寒也而反病溫此天時不正陽氣反泄用藥不可溫熱又有一種時行寒疫卻在溫暖之時而寒反為病此亦天時不正陰氣反逆用藥不可寒涼又有一種天行溫疫熱病多發於春夏之交沿門闔境相同此天地之厲氣當隨時令參運氣而施治宜用劉河間辛涼甘苦寒之藥以清熱解毒以上諸症皆外感天地之邪氣也若夫飲食勞倦內傷乎元氣此真陽下陷內生虛熱故東垣發補中益氣之論用人參黃耆等甘溫之藥以補其氣而提其下陷此用氣藥以補其氣之不足者也又若勞心好色內傷真陰陰血既傷則陽氣偏勝而變為火矣是為陰虛火旺勞瘵之證故丹溪發陽有餘陰不足之論用四物湯而黃柏知母補其陰而火自降此用血藥以補血之不足者也益氣補陰皆內傷症也一則因陽氣之下陷以升提之一則因陽火之上升而滋其陰以降下之一升一降迥然不同矣又有夏月傷暑之病雖屬外感卻類內傷與傷寒大異蓋寒傷形寒邪客表有餘之症故宜汗之暑傷氣元氣為熱氣所傷為耗散不足之症故宜補之東垣所謂益氣清暑是也又有因時暑熱而過食冷物以傷其內或過取涼風以傷其外此則非暑傷人乃因暑而自致之病治宜辛熱解表或辛溫理中之藥卻與傷寒治法相類者也凡此數證外形相似而實有不同治法多端而不可或謬蓋外感之與內傷寒病之與熱病氣虛之與血虛如冰炭相反治之若差則輕病必重重病必死矣可不謹哉張景嶽曰陰虛陽勝或陰陽俱虛為寒熱往來者此以真陰不足總屬虛損之病也然其陰陽微甚亦所當辨如晝熱夜靜此陽邪旺於陽分陽有餘也晝靜夜熱陽邪陷入陰中陰不足也其有晝夜俱熱兼煩躁多汗而本非外感此症雖曰重陽而實則陰虛之極也又有或見溏泄或上見嘔惡而潮熱夜熱者此元氣無根陽虛之病也大都陽實宜瀉陽瀉陽者宜用苦寒陰虛者宜補陰補陰者宜用甘涼惟陽虛一證則身雖有熱大忌寒涼此則人多不識也又有寒邪抑伏經絡而為寒為熱此似瘧非瘧之類也治法雖宜表散然邪氣得以久留者必其元氣之虛而正不勝邪故凡治此者皆當以兼補氣血為主若病久元氣大虛而寒熱不退者但當單培元氣不必兼散察其陰陽擇而用之若果陽虛非用溫補不可又曰凡寒自內生者必由臟及表所以戰栗憎寒或厥逆拘攣總之熱者多實寒者多虛故凡治寒證者當兼察其虛而仍察其臟此不易之法也汗證張景嶽曰汗出一症有自汗有盜汗自汗屬陽虛治宜實表補陽盜汗屬陰虛陰虛陽必湊之故陽蒸陰分治宜清火補陰然自汗中亦有陰虛盜汗中亦多陽虛如遇煩勞火熱之類最多自汗故飲食之火起於胃酒色之火起於腎能令人自汗此非陽盛陰衰而何且人之寤寐總由衛氣之出入衛氣者陽氣也人寐時衛入於陰非陽虛於表而何欲辨陰陽當察其有火無火火盛而汗出者以火爍陰陰虛也無火汗出者表氣不固陽虛也知斯二者無餘義矣一汗由血液本乎陰也然汗發於陰而出於陽此其根本則由陽中之營氣而其啓閉則由陰中之衛氣故凡欲疏汗而不知營衛之盛衰欲禁汗而不知陰陽之橐籥吾知其必敗矣一汗有陰陽人但知熱能致汗而不知寒亦能致汗所謂寒者非曰外寒以陽氣內虛則寒生於中而陰中無陽陰無所主故汗隨氣泄凡大驚恐懼皆令汗出是皆陽氣頓消真元失守之兆如病後産後大吐大泄失血後必多汗出豈非氣去而然乎經曰陰勝則自寒汗出身常清數栗而寒寒則厥厥則腹滿死仲景曰極寒反汗出身必冷如冰是皆陰汗之謂治此當察氣虛之微甚微虛者略扶正氣汗自收甚虛者非速救元氣不可即薑桂附之屬必所當用又濕氣乘脾亦能作汗症見身重困倦脈見緩大聲音如從甕中出者多屬濕症但濕熱甚者去火而濕自清寒濕勝者助火而濕自退健脾土之氣則濕去而汗自收丹溪曰心之所藏在內者為血發外者為汗汗為心液故自汗之症未有不由心腎俱虛而得者故陰虛陽必湊發熱而自汗陽虛陰必乘發厥而自汗皆陰陽偏勝所致也李士材曰汗為心之液而腎主五液故汗症未有不由心腎虛而得者心陽虛不能衛外而為固則外傷而自汗腎陰虛不能內營而退藏則內傷而盜汗及夫肺虛脾虛皆令汗出治法肺虛者固其皮毛黃耆六一湯玉屏風散脾虛者壯其中氣補中益氣湯四君子湯心虛者益其血脈當歸六黃湯肝虛者禁其疏泄白芍棗仁烏梅腎虛者助其封藏五味山萸龍骨牡蠣遠志五倍首烏五臟之內更有宜溫宜清宜潤宜燥無膠一定之法以應無窮可耳張三錫曰陽衰則衛虛所虛之衛行陰當瞑目之時則更無氣以固其表故腠理開津液泄而為汗逮寐則目張其行陰之氣復散於表則汗止矣夫如是者謂之盜汗即內經之寢汗也然自汗盜汗雖分陰虛陽虛細而察之悉屬於衛且衛氣者實由穀氣之所化肺臟之所布天真之陽必得是而後充大無是則衰微故素問曰陽氣者如蒼天之氣順之則陽氣固又曰陽因而上衛外者也又曰陽者衛外而為固也又曰衛氣者所以肥腠理溫分肉而司開闔者也學者不可不知不能食證李士材曰不能食東垣云胃中元氣盛則能食而不傷過時而不肌脾胃俱旺能食而肥脾胃俱虛不能食而瘦羅謙甫云脾胃弱而食少不可克伐補之自然能食許學士云不能食者不可全作脾治腎氣虛弱不能消化飲食譬之釜中水穀不有火力其何能熟嚴用和云房勞過度真陽衰弱不能上蒸脾土中州不運以致飲食不進或脹滿痞塞或滯痛不消須知補腎腎氣若壯丹田火盛上蒸脾土脾土溫和中焦自治膈開能食矣愚按脾胃者具坤順之德而有乾健之運故坤德所漸補土以培其卑監乾健稍弛益火以助其轉運故東垣謙甫以補土立言學士用和以壯火垂訓蓋有見於土強則出納自如火強則轉輸不怠火者土之母也虛則補其母治病之常經每見世俗一遇不通食者便投香砂積朴曲卜楂芽甚而黃連山梔以為開胃良方而夭枉者多矣不知此皆實則瀉子之法因脾胃間有積滯有實火元氣未衰邪氣方張者設也虛而伐之則愈虛虛而寒之遏真火生化之源有不敗其氣而絶其谷乎且誤以參術為滯悶之品畏之如砒毒獨不聞經云虛者補之又云塞因塞用乎又不聞東垣云脾胃之氣實則枳實黃連瀉之虛則白朮陳皮補之故不能食者皆屬脾虛補之不效當補其母八味地黃丸二神丸挾痰宜化六君子湯挾郁宜開育氣湯仇木宜安異功散加木香沉香子金宜顧肺氣虛則盜土母之氣以自救而脾益虛甘桔參苓之屬夫脾為五臟之母土為萬物之根安穀則昌絶谷則亡慎毋少忽趙養葵曰余於脾胃分別陰陽水火而調之如不思飲食此屬陽明胃土受病須補少陰心火歸脾湯補心火以生胃土也能食不化此屬太陰脾土須補少陽相火八味丸補相火以生脾土也理中湯用乾薑所以制土中之水也建中湯用芍藥所以制土中之木也黃耆湯所以益土之子使不食母之氣也六味丸所以壯水之主也八味丸所以益火之源也土無定位寄旺於四季無專能代天以成化故以四臟兼用總之以補為主不用克伐脾氣下陷補中益氣肝火乘脾加左金丸鬱怒傷脾歸脾湯脾虛不能攝痰六君子湯脾腎兩虛四君四神陰火乘脾六味丸命門火衰不生脾土八味丸先天之氣足而後天之氣不足者補中氣為主後天之氣足而先天之氣不足者補元氣為主張三錫曰內經曰有所勞倦形氣衰少穀氣不勝上焦不行下脘不通胃氣熱熱氣熏胸中故內熱大凡勞倦過度則陽和之氣亢極而化為火矣況水穀之味少食是陽愈亢而陰愈衰此陰字指身中之陰與水穀之氣耳然有所勞倦者過勞傷氣也形氣衰少者壯火食氣也穀氣不勝者食少不能勝邪火也上焦能行者清陽不升也下脘不通者濁陰不降也夫胃受水穀生化氣血故清陽升而濁陰降以傳化出入滋養一身今胃不納食而穀氣少則清無升濁無降矣故上焦不行下脘不通非謂全不行不通但較之平時不行不通耳上不行下下通則鬱矣鬱則少火皆成壯火而胃居上焦下脘兩者之間若虛火上炎故熏胸中而為內熱此勞倦內傷生熱如此似瘧證趙養葵曰世間似瘧非瘧者世人一見寒熱往來便以截瘧丹施治以致委頓經曰陽虛則惡寒陰虛則發熱陰氣上入陽中則惡寒陽氣下陷入陰中則惡熱凡傷寒後大病後産後勞瘵等症俱有寒熱往來似瘧非瘧或一日二三度發並作瘧治但有陽虛陰虛之別陽虛者補陽如理中湯六君子湯補中益氣湯加薑桂甚則加附子諸方中必用升麻柴胡以提出陰中之陽水升火降而愈醫者有論及之者矣至於陰虛者其寒熱亦與正瘧無異而陰瘧中又有真陰真陽之分經曰晝見夜伏夜見晝止按時而發是無水也晝見夜伏夜見晝止倏忽往來時作時止是無火也無水者壯水六味湯主之無火者益火八味湯主之世人患久瘧而不愈亦治之不如法故耳丹溪云邪入陰分宜用血藥引出陽分芎歸地紅花黃柏治之亦未及真陰真陽之至理夫發瘧有面赤口渴者俱作腎中真陰虛治治之無不立愈凡見患者寒來如冰熱來如烙惟面赤如脂渴欲飲水者以六味地黃加柴胡芍藥肉桂五味大劑一服便愈又有一種鬱症似瘧者其寒熱與正瘧無異但其口苦嘔吐清水或苦水面清脅痛耳鳴脈澀須以逍遙散加茱萸黃連貝母倍柴胡作一服繼以六味地黃加柴胡芍藥調理而安至於三陰瘧者惟太陰瘧當用理中湯必加肉桂若少陰厥陰非八味地黃不效怒傷肝證治法綱曰夫肝為將軍之官其性善怒故經謂肝性最急以甘緩之如用細生甘草之屬大怒則火起於肝實火用黃連梔子瀉之虛火看陰陽而施治內經曰怒則氣逆甚則嘔血及飧泄嘔血者用四物加丹皮甘草兼香附飧泄者以四君子加青皮柴胡神麯香附以清之有乘於肺者則咳嗽或喘急衄血乘於心者則病心跳怔忡精神恍惚夜臥不安或煩躁口渴或吐血乘於脾者則善食易飢食入反脹乘於腎則病骨蒸煩熱或夜夢泄咳嗽而似陰虛火動若本經自病則兩脅與小腹疼痛而吐或吐血或如寒熱似瘧是皆怒氣所傷而致氣血乘亂母子相乘為患則當平肝調氣為主各加引經之藥有肝膽之火動而熱火沸騰留滯於頸項之間而成瘰癧者有因怒而致小腹與兩足腫脹者此肝氣鬱滯於下故也有怒而致小便欲去時則兩手十指甲痛不可忍蓋爪甲乃筋之餘筋乃肝之餘況肝主疏泄而失其令故也有鬱怒所傷而患頭疼之疾凡遇怒氣則頭便痛此則先因濁血與滯氣留積於頭故也有暴怒而卒中者名曰中怒內經曰陽氣者大怒則形氣絶而血菀於上使人薄厥是矣有因大怒復患腰背強痛難以伸屈者內經曰志傷於盛怒則腰脊難以俯仰是矣有怒火鬱於肝經用諸開鬱降火之藥而不愈反用發散之藥微取其汗而愈者此亦火鬱則發之義也有怒氣挾食鬱於胃口患吐嘔不食胸膈脹悶痰涎壅盛治分虛實實則可吐者吐之此因而越之之法虛則元氣不足故也有怒氣挾血鬱於胃口而然用破血行氣之劑開之凡怒氣傷肝肝木之氣凌犯脾土致使胃中元氣衰甚不食雖肝之病氣有餘只宜益元救土不宜疏正氣可於補養藥中多加白芍少佐青皮治之又有遇怒便欲泄瀉此先因怒氣挾食傷胃故也稟壯者用調胃承氣湯下之去其舊積其病自瘳稟弱者只以消導等劑主之有患手足冷心下痛痛則汗泄嘔吐不欲食或食入復出此肝木之氣乘於脾胃之間使太陰陽明之氣上逆而不出名曰食痹治以白朮青皮人參香附神麯砂仁沉香之類婦人産後及小産後或行經時因怒氣所傷凡遇行經之時則小腹脹痛及經水不調此為怒傷血海用當歸川芎烏藥香附木香青皮玄胡索蒲黃五靈脂作湯看有血逆者再加破血之劑夫肝者風之舍也大怒則傷肝因怒而內動厥陰與少陽風熱患頭疼發熱或嗽咳氣逆或為耳鳴煩躁或為寒熱似瘧並以四物湯加香附柴胡防風黃芩梔子黃柏之類又有鬱怒傷肝患目珠脹痛四物湯加柴胡青皮黃連甘草香附主之若真臟脈見其人不病而自死有真肝臟病者亦死
