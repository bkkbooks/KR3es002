body:
  text: 卷一論集張景嶽大寶論夫陰陽之體曰乾與坤陰陽之用曰水與火陰陽之化曰形與氣以生殺言則陽生陰殺以寒熱言則陽熱陰寒若其生化之機則陽先陰後陽施陰受先天因氣以化形陽生陰也後天因形以化氣陰生陽也形即精精即水神即氣氣即火陰陽二氣最不宜偏平則氣和而生物偏則氣乖而殺物經曰陰平陽祕精神乃治陰陽離決精氣乃絶此先王教人察陰陽保生氣也夫陽一而陰二故偶者陰也後天之形也奇者陽也先天之氣也神由氣化而氣本於天所以發生吾身者即真陽之氣也形以精成而精生於氣所以成立吾身者即真陰之氣也上古天真論曰女子二七而天癸至男子二八而天癸至非陰生在後而陰成之難乎陰陽應象大論曰人年四十而陰氣自半也非陰衰在前而陰凋之易乎故人全盛之數惟二八之後以至四旬之外前後止二十餘年而形體漸衰矣陽道常實陰道常虛故丹溪引日月之盈虧以為陽常有餘陰常不足之論而立補陰大補等丸獨惜以黃柏知母為神丹致家傳戶用殊不知天癸之未至本由乎氣而陰陽之自半亦由乎氣是形雖在陰而氣則仍從乎陽也此生死之機不可不辨陽之為義大矣夫陰以陽為主所關乎造化之原而為性命之本者惟斯而已姑辨其最要者一曰形氣二曰寒熱三曰水火夫形氣者陽化氣陰成形是形本屬陰而凡通體之溫者陽氣也一生之活者陽氣也五官五臟之神明不測者陽氣也乃其靈覺盡滅身冷如冰形固存而氣則去此以陽脫在前而留陰在後非陰多於陽乎是形氣陰陽之辨也寒熱者春夏之暖為陽秋冬之冷為陰當長夏之暑草木昆蟲鹹苦煎炙然愈炙愈繁不熱則不盛至一夕風霜即僵枯遍野是熱能生物寒無生意熱無傷而寒可畏非寒強於熱乎此寒熱陰陽之辨也水火者造化之權其象有四日為太陽火為少陽水為太陰月為少陰此四象之真形也陽中無太陰陰中無太陽此陰陽之專主也日麗乎天此陽之陽也非太陽乎月之在天陽中之陰也非少陰乎水行於地陰之陰也非太陰乎火之在地陰中之陽也非少陽乎此等大義丹溪所未知故引日月盈虧以證陰陽虛實況夫陰陽之性太者氣剛故日不可滅水不可竭此日為火之本水為月之根也少者氣柔故火有時息月有時缺此火為日之餘月為水之餘也惟其不滅者乃為真火而時作時止豈即元陽故惟真陽之火乃能生物而燎原之凡火但能焦物也夫天一生水天一者天之一也一即陽也無一則止於六耳故水之生物者賴此一也水之化氣者賴此一也故春夏之水土得之而生長秋冬之水土得之而不生不長是水亦死矣水之所以生水之所以行孰非陽所主此水中有陽非水即為陽也夫陽氣不充則生意不廣而況於無陽乎故陽惟畏其衰陰惟畏其盛非陰能自盛也陽衰則陰盛矣凡萬物之生由乎陽萬物之死亦由乎陽非陽能死物也陽來則生陽去則死矣試以太陽證之日行南陸在時為冬斯時非無日也第稍遠耳便見嚴冬難御萬物凋零然則天地之和惟此日也萬物之生惟此日也設無此日天地雖大一寒質耳人是小乾坤得陽則生失陽則死陽衰者即亡陽之漸也聖人作易首制一爻立元陽之祖明陽德之元亨於坤初六日履霜堅冰慮陰氣之漸長防其有妨化育耳內經曰凡陰陽之要陽密乃固此言陰之所恃陽為主也又曰陽氣者若天與日失其所則折壽而不彰故天運當以日光明可見人之大寶只此一息真陽孰謂陽常有餘而欲以苦寒之物伐此陽氣欲保生可如是乎客曰欲固此陽計將安出曰但知根本此其要也命門是也所謂命門者先天之生我由此而受後天之我生由此而栽也夫生之門即死之戶人之盛衰安危皆繫於此以其為生氣之源而氣強則強氣衰則病此雖至陰之地而實元陽之宅至夫脾胃乃後天水穀之本猶屬元陽之子耳張景嶽真陰論凡物之死生本由陽氣顧今人之病陰虛者十常八九何謂哉不知此一陰字正陽氣之根也蓋陰不可以無陽非氣無以生形也陽不可以無陰非形無以載氣也故物之生也生於陽物之成也成於陰此謂元陽元陰亦曰真精真氣也欲知所以死生者須察乎陽察陽者察其衰與不衰欲知所以存亡者須察乎陰察陰者察其壞與不壞此保生之要法也稽之前輩殊有不識真陰面目而立言多矯強者自河間主火之說行而丹溪以寒苦為補陰舉世宗之莫能禁止揆厥所由蓋以熱證明顯人多易見寒證隱微人多不知而且於虛火實火之間尤為難辨亦孰知實熱為病者十中不過三四虛火為病者十中常見六七夫實熱者火之盛元氣本無所傷故可以苦寒折之然當熱去即止不可過用過用則必傷元氣虛火者真陰之虧也真陰不足又豈苦劣難堪之物所能填補矧沉寒之性絶無生意非惟不能補陰抑且善敗真火第陰性柔緩因循玩用暗損壽元勿之覺耳故有老人亦喜涼者正以元陽本足故能受寒非寒涼壽之也余請詳言真陰之象真陰之藏真陰之用真陰之病真陰之治以悉其義所謂真陰之象者陽以陰為根也經曰五臟者主臟精者也不可傷傷則失守而陰虛陰虛則無氣無氣則死矣非以精為真陰乎又曰形肉已脫九候雖調猶死非以形為真陰乎觀形質之壞與不壞即真陰之傷與不傷此真陰之象不可不察也所謂真陰之藏者凡五臟五液各有所主經曰腎者主水受五臟六腑之精而藏之故五液皆歸乎精而五精皆統乎腎腎有精室是曰命門為天一所居即真陰之腑精藏於此精即真陰之水也氣化於此氣即陰中之火也命門居兩腎之中而水火具焉消長系焉故為受生之初為性命之本欲治真陰而捨命門非其治也此真陰之藏不可不察也所謂陰之用者凡水火之功不可缺一命門之火謂之元氣命門之水謂之元精五液充則形體賴以強壯五氣治則營衛賴以和調此命門之水火即十二臟之化源故十二臟之陰陽皆賴資之以為治此皆真陰之用不可不察也所謂真陰之病者凡陰氣本無有餘陰病皆因不足即如陰勝於下者原非陰盛以命門之火衰也陽勝以標者原非陽盛以命門之水虧也水虧則陰虛之病疊出火衰則陽虛之證迭生如戴陽者面赤如朱格陽者外熱如火或口渴咽焦引水以自救或躁擾狂越欲臥於泥中或五心煩熱而消疸骨蒸或二便祕結而溺漿如汁或吐血衄血或咳嗽遺精或斑黃無汗由津液之枯涸或中風瘛瘲以精血之敗傷凡此之類有屬無根之焰有因火不歸原是皆陰不足以配陽病在陰中之水也又如火虧於下或為神氣之昏沉或為動履之困倦其有頭目眩暈而七竅偏廢者有咽喉哽咽而嘔惡氣短者此皆上焦之陽虛也有飲食不化而吞酸反胃者有痞滿隔塞而水泛為痰者皆中焦之陽虛也有清濁不分而腸鳴滑泄者有陽痿精寒而臍腹多痛者皆下焦之陽虛也又或畏寒灑灑者以火臟之陽虛不能禦寒也或肌肉膨脹者以土臟之陽虛不能制水也或拘攣痛痹者以木臟之陽虛不能營筋也或寒嗽虛喘身涼自汗者以金臟之陽虛不能保肺也或遺精血泄二便失禁腰骨如折骨痛之極者以水臟之陽虛精髓內竭也凡此之類皆陽不足以勝陰病在陰中之火也王太僕曰寒之不寒責其無水熱之不熱責其無火無水無火皆在命門故曰陰虛之病不可不察也所謂真陰之治者凡亂有所由起病有所由生故治病必當求其本蓋五臟之本本在命門神氣之本本在元精此即真陰之謂也王太僕曰壯水之主以制陽光益火之源以消陰翳惟薛立齊獨得其妙而常用仲景八味丸錢氏六味丸即益火壯水之劑也寒邪中人本屬表症而汗液之化必由乎陰中風為病身多偏枯而筋脈之敗必由乎陰虛勞生火非壯水何以救其燎原瀉利亡陰非補腎何以因其門戶臌脹由乎水邪主水須求水臟關格本乎陰虛欲強陰舍陰不可此數者乃疾病中最大綱領明者覺之可因斯而三反矣張景嶽命門後論命門為精血之海脾胃為水穀之海均為五臟六腑之根然命門為元氣之本為水火之宅五臟之陰氣非此不能滋五臟之陽氣非此不能發而脾胃中州待火能生然必少陽春氣始於下則三陽從地起而後萬物得以化生豈非命門之陽氣正為脾胃之母乎吾故曰脾胃為灌注之本得後天之氣命門為化生之源得先天之氣此中本末固有先後而東垣曰補腎不若補脾須知可曰補脾不若補腎可不辨而明矣然命門有火候即元陽之謂也稟賦有強弱元氣有盛衰陰陽有勝負病治有微甚此火候之所宜辨也蓋一陽之元氣必自下而升而三焦之普護乃各見其候下焦之候如地土化生之本也中焦之候如灶釜水穀之爐也上焦之候如太虛神明之宇也地土有肥瘠而出産異山川有厚薄而藏蓄異聚散操權總由陽氣得一分則有一分之用失一分則有一分之虧凡壽夭勇怯精血病治之基無不由此元陽之足與不足以為消長盈縮之主下焦火候之謂也中焦如灶釜者胃中陽氣其熱如釜飲食之滋本於水谷食強則體壯食少則身衰若灶釜之少一炬則遲化一頃增一炬則速化一時火力不到則全然不化故脾胃之化與不化及飲食之能與不能亦總由陽明之氣強與不強而陰寒之邪有犯與不犯耳及其既病則漸痞漸長或隔或嘔或膨聚不消或吞酸噯腐食氣不變或腹疼肚痛終日不飢或清濁不分或完穀不化蓋化則無不運行不化則無不留滯運行則為氣為血留滯則為積為痰此中焦火候之謂也上焦如太虛者神明根於陽氣陽氣化為神靈陽之在下則溫暖故曰相火以位陽之在上則昭明故曰君火以明是以陽長陰消五官治而萬類盛若陽衰陰勝而陽為陰折聰明奪而神氣減此上焦火候之謂也夫以三焦論火候非不各有所司惟命門實先天真一之氣藏於坎中自下而上與後天胃氣相接此生生之本也使真陽不發於淵泉則總屬無根之火矣火而無根即病氣也非元氣也易以雷在地下而為復可見火之標在上而火之本在下若使命門陰勝則元陽畏避而龍火無藏身之地遊散不歸而為煩熱格陽等證善治此者惟從其性使陽和之氣直入坎中相求同氣虛陽歸原矣故曰甘溫除大熱正此謂也昧者不明此理以虛陽作實熱不思溫養此火但知寒涼可以滅火安望其尚留生意耶若三焦有客熱邪火皆凡火耳固不得不除而除火何難本非正氣火候之謂也況命門有生氣即乾元不息之機不息則惟動惟升所以陽得生氣息則惟靜惟降所以陰得死氣故乾元之氣始於下而盛於上升則向生坤元之氣始於上而盛於下降則向死此陰陽之歧相間不過毛髮而終竟遠以千里故死生之柄惟此毫釐升降之機耳譬之水暖則化氣化氣是升生也水寒則成冰成冰是降死也故腎氣獨沉則奉生者少即此生氣之理也至若人之生氣無所不在如臟氣顏色聲音脈息四肢二便俱有生氣生氣即神氣神自形生何不可辨明者察之孰者能益生氣孰者能損生氣或先攻病氣以保生氣或先固生氣以御病氣使不有原始要終之明則是寸光之流耳蓋命門有門戶為一身鞏固之關經曰倉凜不藏者是門戶不要也水泉不止者是膀胱不藏也得守者生失守者死又曰腎者胃之關也關門不利故聚水而從其類又曰黑色通於腎開竅於二陰可見北門之主總在乎腎而腎之政令總在乎命門命門司陰陽之柄陰陽和則出入有常陰陽病則啓閉無序故有癃閉不通者以陰竭水枯乾涸之不行也有滑泄不禁者以陽虛火敗收攝之無主也陰精既竭非壯水必不能行陽氣既虛非益火必不能固此治法也趙養葵火為先天論越人謂左為腎右為命門非也命門即在兩腎各一寸五分之間當一身之中易所謂一陽陷於二陰之中內經曰七節之旁中有小心是也名曰命門是為真主乃一身之太極無形可見兩腎之中是其安宅三焦是其臣使之官稟命而行周流於五臟六腑之間而不息名曰相火相火代天行化此先天無形之火與後天有形之火不同出之右旁小竅者也其左旁亦有小竅乃真陰真水氣也亦無形上行夾脊至腦中為髓海泌其津液注之於脈以榮四末內注五臟六腑以應刻數常隨相火而潛行於周身與後天有形之水不同但命門無形之火在兩腎有形之中為黃庭故曰五臟之真惟腎為根可見命門為十二經之主腎無此則無以作強而技巧不出矣膀胱無此則三焦之氣不化而水道不行矣脾胃無此則不能蒸腐水穀而五味不出矣肝膽無此則將軍無決斷而謀慮不出矣大小腸無此則變化不行而二便閉矣心無此則神明昏而萬事不能應矣正所謂主不明則十二官危也譬之元宵之燈鰲山走馬拜舞飛走者無一不具中間惟是一火耳火旺則動速火微則動緩火熄則寂然不動而拜舞飛走者軀殼未嘗不存也故曰此身非汝有是天地之委形也夫水為立命之門乃人身之至寶何世之養身不知節欲保真水以全火而日夜戕賊此火既病矣治病者不知溫養此火而日用寒涼以直滅此火焉望其有生氣耶余今直指其歸元之路夫命門真主之火乃水中之火相依而永不相離者也火之有餘緣真水之不足也毫不敢去火只補水以配火壯水之主以制陽光火之不足因見水之有餘也亦不必瀉水就於水中補火益火之原以消陰翳所謂原與主者皆屬先天無形之妙非曰心為火而其原在肝腎為水而其原屬肺之謂也若夫風寒暑濕燥火六者之入於人身此客氣也非主氣也主氣固客氣不能入醫家徒知客者除之慢不加意於主氣縱有言固主氣者專以脾胃為一身之主焉知坤土是離火所生而艮土又屬坎水所生耶故此一水一火俱屬無形之氣相火稟命於命門真水又隨相火自寅至申行陽二十五度自酉至醜行陰二十五度周流於臟腑之間滯則病息則死矣故曰先天惟此一火克全此火而歸之矣趙養葵水火論三條世人皆曰水剋火而余獨曰水養火世人皆曰金生水而余獨曰水生金世人皆曰土剋水而余獨於水中補土世人皆曰本剋土而余獨升木以培土何則君相二火以腎為宮水剋火者後天有形之水火也水養火者先天無形之水火也肺金之氣夜臥則歸藏於腎水之中丹溪謂之母藏子宮子隱母胎此一臟名曰嬌臟畏熱而畏寒腎中有火則金畏火刑而不敢歸腎中無火則水冷金寒而不敢歸或為喘脹或為咳嗽或為不寐或為不食斯時欲補土母以益子喘脹愈甚清之瀉之肺氣日消死期迫矣惟收斂一法僅似有理然不得其門從何而入夫肺出氣也腎納氣也肺為氣之主腎為氣之本凡氣從臍下逆奔而上者此腎虛不能納氣歸元也毋徒從事於肺或壯水之主或益火之原金向水中生矣若夫土者隨火寄生即當隨火而補然而補火有至妙之理陽明胃土隨少陰心火而生故補胃土者補心火而歸脾湯一方又從火之外家而補之俾木生火火生土也太陰脾土隨少陽相火而生故補脾土者補相火而八味丸一方合水火既濟而蒸腐之此一理也張仲景立建中湯以健脾土木曰曲直曲直作酸芍藥味酸為甲木土曰稼穡稼穡作甘甘草味甘作己土酸甘相合甲己化土又加肉桂蓋桂屬龍火使助其化也仲景立方之妙類如此又以見木生土之義世以木剋土舉欲伐之不知木氣者生生之氣也陽氣也元氣也胃氣也同出而異名者也焉可伐之此東垣脾胃論用升柴以疏木氣諄諄言之詳也龍雷之火無形而有聲不焚草木得雨而益熾見於季春而伏於季秋原夫龍雷之見者以五月一陰生水底冷而天上熱龍為陽物故隨陽而上升至冬至一陽來復故龍亦隨陽而下伏雷亦收聲人身腎中相火亦猶是也平日不能節欲以致命門火衰腎中陰盛龍火無藏身之位故遊於上而不歸是以上焦煩熱咳嗽等症善治者以溫腎之藥從其性而引之歸原使行秋冬陽伏之令而龍歸大海此至理也奈何今之治陰虛火衰者以黃柏知母為君而愈寒其腎速其斃良可悲哉若有陰虛火旺者此腎水乾枯而火偏盛宜補水以配火亦不宜苦寒之品以滅火壯水之主以鎮陽光正謂此坎乾水也氣也即小而井大而海也兌坤水也即微而露大而雨也一陽陷於二陰為坎坎以水氣潛行地中為萬物受命根本故曰潤萬物者莫潤乎水一陰上徹於二陽為兌兌以有形之水普施於萬物之上為資生之利澤故曰說萬物者莫說乎澤明此二水可以悟治火之道矣心火者有形之火也相火者無形之火也無形之火由燥熱而津液枯以五行有形之兌水制之者權也吾身自有上池之水氣也無形者也以無形之水沃無形之火常而可久者也是為真水真火升降即宜而成既濟矣喻嘉言秋燥論病機云諸氣膹郁皆屬於肺諸痿喘嘔皆屬於上二條明指燥病言矣生氣通天論謂秋傷於燥上逆而咳發為痿厥燥病之要一言而終與病機二條適相吻合只以誤傳傷燥為傷濕解者竟指燥為濕遂至經旨不明今一論之其左胠脅痛不能轉側嗌乾面塵身無膏澤足外反熱腰痛驚駭筋攣丈夫㿗疝婦人小腹痛目昧眥瘡則燥病之本於肝而散見不一者也又痹論云陰氣者靜則神藏躁則消亡其所以致燥而令陰氣消亡之故引而未發又因內經脫遺燥症後雖以東垣之大賢其治燥諸方但養營血及補腎肝虧損二便祕結而已初不論及於肺也夫諸氣膹郁之屬於肺者屬於肺之燥非屬於肺之濕也苟肺氣不燥則諸氣稟清肅之令而周身四達亦胡膹郁耶諸痿喘嘔之屬於上上亦指肺不指心也若統上焦心肺並言則心病不主痿喘及嘔也惟肺燥甚則肺葉痿而不用肺氣逆而喘鳴食難過膈而嘔出三者皆燥證之極者也經文原有逆秋氣則太陰不收肺氣焦滿其可稱為濕病乎內經云心移熱於肺傳為膈消肺燥之由來遠矣苟其人腎水足以上升而交於心則心火下降而交於腎不傳於肺矣心火不傳於肺曾何傷燥之虞哉即腎水或見不足其腸胃津液足以協濟上供肺亦不致過傷也若夫中下之澤盡竭而高源之水猶得措於不傾則必無之事矣所以經文又云二陽結謂之消手陽明大腸熱結而津不潤足陽明胃熱結而血不榮證成消渴舌上赤裂大渴引飲與心移熱於肺傳為膈消文雖異而義則一也治膈消者用白虎加人參湯專救其肺以施諸氣膹郁諸痿喘嘔罔不合矣繆仲淳治病喜用潤劑於以治燥似乎獨開生面然亦未有發明偶因世之患燥病者多聰明偶合然可以治內傷之燥不可以治外感之燥節取其長可矣陰陽別論云二陽之病發心脾有不得隱曲男子少精女子不月其傳為風消其傳為息賁死不治此亦肺燥所由來而未經揭出者夫燥而令男子津液衰少女子精血枯閉亦云極矣然其始但不利於隱曲之事耳其繼則胃之燥傳入於脾而為風消風消者風熱熾而肌肉消削也大腸之燥傳入於肺而為息賁息賁者息有音而上奔不下也是則腸胃合心脾以其成肺金之燥三臟二腑陰氣消亡殆盡可救療乎夫由心之肺已為死陰之屬然脾氣散二陽之精上輸於肺猶得少蘇涸鮒今以燥之為害令生我者盡轉而浚我之生故直斷為死不治也從前憒之特繹明之張景嶽虛損論二則損分五臟而五臟所藏則無非精與氣耳夫精為陰人之水也氣為陽人之火也水火得其正則為精為氣水火失其和則為熱為寒此因偏損所以致有偏勝故水中不可無火無火則陰勝而寒病生火中不可無水無水則陽勝而熱病起但當詳辨陰陽則虛損之治無餘義矣如水虧者陰虛也只宜大補真陰切不可再伐陽氣火虛者陽虛也只宜大補元陽切不可再傷陽氣此因陽氣不足而復伐其陰陰亦損矣陰已不足而再傷其陽陽又亡矣夫治虛治實本是不同實者陰陽固有餘但去其餘則得其平虛者陰陽有不足再去所有則兩者俱敗其能生乎故治虛之要凡陰虛多熱者最嫌辛燥恐助陽邪也尤忌苦寒恐伐生氣也惟喜純甘壯水之劑補陰以配陽則剛為柔制虛火自降而陽歸乎陰矣陽虛多寒者最嫌涼潤恐助陰邪也尤忌辛散恐傷陰氣也只宜甘溫益火之品補陽以配陰則不得其主陰寒自斂而陰從乎陽矣是以氣虛者宜補其上精虛者宜補其下陽虛者宜補而兼暖陰虛者宜補而兼清此固陰陽之治辨也其有氣因精而虛者自當補精以化氣精因氣而虛者自當補氣以生精又如陽失陰而離者非補陰何以收散亡之氣水失火而敗者非補火何以蘇垂絶之陰此又陰陽相濟之妙用也故善補陽者必於陰中求陽則陽得陰助而生化無窮善補陰者必於陽中求陰則陰得陽升而泉源不竭故以精氣分陰陽則陰陽不可離以寒熱分陰陽則陰陽不可混此又陰陽邪正之離合也知陰陽邪正之治則陰陽和而生道得矣人知陰虛惟一而不知陰虛有二如陰中之水虛則病在精血陰中之火虛則病在神氣蓋陽衰則氣去故神志為之昏亂非火虛乎陰虧則形壞故肢體為之廢弛非水虛乎今以神離形壞之證乃不求水火之原而猶以風治鮮不危矣試以天道言之其象顯然旱則多燥燥則多風是風木之化從乎燥燥則陰虛之候也故凡治類風者專宜培補真陰以救根本使陰氣復則風燥自除然外感者非曰絶無虛症氣虛則虛也內傷者非曰必無實症有滯則實也治虛者察其在陰在陽而直補之治實者察其因痰因氣而暫開之此內傷外感及虛實攻補之間最當察其有無微甚而酌其治也甚至有元氣素虧猝然倒撲上無痰下失禁瞑目昏沉此厥竭之證尤與風邪無涉使非大劑參附或七年之艾破格挽回又安望其復真氣於將絶之頃哉倘不能察其表裡又不能辨其虛實但以風之為名多用風藥不知風藥皆燥燥復傷陰風藥皆散散復傷氣以內傷作外感以不足為有餘是促人之死也張景嶽論東垣脾胃論人以水穀為本故脾胃為養身之本惟東垣獨知其義發為脾胃論因引內經之義如生氣通天論曰蒼天之氣清淨則志意治順之則陽氣固雖有賊邪勿能為害也陽氣者煩勞則張故蒼天之氣貴清淨陽氣惡煩勞此病從脾胃生者一也又引五常政大論曰陰精所奉其人壽陽精所降其人夭陰精所奉謂脾胃既和穀氣上升春夏令行故其人壽陽精所降謂脾胃不和穀氣下流收藏令行故其人夭此病從脾胃生者二也又引六節藏象論曰脾胃大腸小腸三焦膀胱者倉廩之本營之居也此至陰之類通乎土氣凡十一藏者皆取決於膽也夫膽者少陽春生之氣春氣升則萬物安故膽氣春生則餘臟從之膽氣不升則飧泄腸澼不一而起此病從脾胃生者三也又引本論曰天食人以五氣地食人以五味此之謂氣者上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣氣或乖錯人何以生此病從脾胃生者四也諸如此論皆東垣獨得之見茲察其所謂蒼天貴清淨陽氣惡煩勞者此指勞倦之為病也所謂收藏令行故其人夭者此指陰盛陽衰之病也所謂春生則萬物安者此指降則無生之為病也所謂氣或乖錯人何以生者此指陽氣受傷之為病也東垣垂惠後世開導來學誠非小矣獨怪其論中有曰喜怒憂恐損耗元氣資助心火火與元氣不兩立火勝則乘其土位所以為病若此數語大見矛盾夫元氣既損多見生陽日縮神氣日消何以反助心火脾胃屬土得火則生何謂火勝則乘其土位耶且人之元氣本貴清和寒固能病熱亦能病而因勞動火者固常有之自不得不從清補若因勞犯寒而寒傷脾胃者尤酷尤甚第熱症顯而寒症隱真熱症易辨假熱症尤不易辨也矧元氣屬陽熱為同氣邪猶可制陰為陽賊寒其仇也生氣被伐無不速亡由此觀之寒與元氣尤不兩立若東垣前言獨令後人之妄言火者反忘前四條之格言而單執火不兩立之說為成案此白璧之瑕余實不能不為東垣惜也及再考東垣之方如補中益氣升陽益胃黃耆人參清暑益氣湯等方每用升柴此即其培養春生之氣而每用芩連亦即其制伏邪之意第二三分之芩連固未必即敗陽氣而以五七分之參術果能斡旋元氣乎思古仲景立方之則用味不過三四品用數每至二三兩且人之氣血本大同疾病多相類而仲景之方大而簡東垣之方小而雜何其懸絶一至如此此其中必有至道存焉實以後學不敢雌黃而私心向往不能不霄壤於其間也喻嘉言脈部位論心之脈絡小腸小腸之脈絡心肺之脈絡大腸大腸之脈絡肺此可以論病機如心移熱於小腸肺移熱於大腸之類不可定部位也小腸當候之於右尺以火從火也大腸當候之於左尺以金從水也三焦屬火亦候於右腎膀胱屬水亦候於左腎一尺而水火兩分一臟而四腑兼屬乃天然不易之至道蓋胸中屬陽腹中屬陰大腸小腸膀胱三焦所傳渣滓水液濁氣皆陰惟腹中可以部置非若胃為水穀之海清氣在上膽為決斷之官靜藏於肝可得位之於中焦也至於上焦重重膈膜遮蔽清虛之宇惟心肺得以居之而諸腑不與焉所謂膈盲之上中有父母者是也心主血為陰肺主氣為陽其營衛於周身非父母而何然心君無為而治肺為相傅華蓋而覆於心上以布胸中之氣而燮理其陰陽膻中為臣使包裹而絡於心下以寄喉舌之司而宣布其政令是以心火寂然不動動而傳之心胞與三焦之火即為相火素問謂手少陽與心主為表裡靈樞謂手厥陰之脈出屬心胞絡下膈歷絡三焦手少陽之脈散絡心胞合心主正見心胞相火與於少陽相火為表裡故歷絡於上下兩相輸應也心君寧相火安而膻中喜樂出焉心君擾相火翕然從之而百度改其常焉心胞所主二火之出入關係之重如此是以亦得分手經之一而可稱為腑耳王叔和以相絡之故大小二腸候之於上而不知水穀變化濁穢之氣去膈上父母清陽之氣迥不相通豈可因外絡連屬反謂右寸之清陽上浮者為大腸脈沉者謂肺脈經所謂臟真高於肺者乃真臟高於大腸矣左寸之浮者為小腸脈沉者為心脈水中汙泥反浮於蓮花之上有是理乎夫心胞之脈裹擷乎心代君主行事從左寸候之亦理之當然耳趙羽皇參附宜虛論萬病莫若虛證最難治經云不能治其虛安問其餘蓋虛之為言空也無也家國空虛非惠養元元錙銖積纍必不能奠安邦本家道豐享病之虛者亦猶是也故治虛之要溫補為先溫補之功參附為首蓋參者參也與元氣為參贊者也體弱用此恍若陰霾見睍寒谷回春生機勃勃欲露是真起死之靈苗回生之仙草也故不特氣虛宜用即血虛宜用內傷宜用即外感亦宜用煩渴由乎火邪得人參而陰津自長腫脹由乎氣壅仗參力而痞悶全消以至食不欲入食反脹或翻胃噎膈泄利亡陰灑淅惡寒多汗漏風等症無不賴人參之大力作元氣之藩籬而不知者妄謂肺熱傷肺參能作飽尤屬駭異不知肺金之冤熱非人參莫能救援脾虛之滿中非參朮何由健運種種功勳難以枚舉昔賢嘉其功魁群草信不誣耳至附子一味有斬關之能奪旗之勇虞摶謂其能引補氣藥行十二經以追散失之元陽引補血藥入血分以滋養不足之真陰引發散藥開腠理以驅逐在表之風寒引溫藥達下焦以驅除在裡之冷濕其用亦宏矣哉人止知手足厥冷下痢完穀一切陰寒等候而用之此係正治人所易曉然其最妙處反能以熱攻熱故胃陽發露而為口爛舌糜腎陽發露而為面赤吐紅入於滋陰補氣藥中頃刻神清熱退則其能反本回陽也謂其能壯火益土也世人甘用寒涼畏投溫劑一用參附即妄加詆譭亦知秋冬之氣非所以生萬物者乎若乃強陽已極房術用以興陽外感伏陽陽厥用之狂越譬之服毒自刃此自作之孽豈參附之罪耶附格言一何柏齊曰足相火屬膽配肝主血者也手相火屬三焦配腎之命門主精者也肝與命門皆屬風木木中有火則精血之中有熱氣也然精血體潤水也火與水相守故不發至發而為熱則皆精血將枯之所致也譬木枯則火易焚耳故相火發者難治今虛勞骨蒸之病皆相火發熱之證也小水不能滅大火法當補陰則熱自退此論丹溪主寒涼之誤人之臟腑以脾胃為本蓋人之飲食皆入於胃而運於脾為地之土也然脾胃之能化與否實由於水火二氣非脾胃之所能也火盛則脾胃燥水盛則脾胃濕皆不能化物乃生諸病水腫之症蓋水盛而火不能化也火衰而不能化水故水之入於脾胃皆滲入血脈骨肉血亦化水而發腫脹皆自然之理也導其水復補其火使二氣平和病斯去矣丹溪謂脾失運化由肝木侮脾乃欲清心經之火使肺金得令以制肝本迂而不切劉河間謂補瀉脾胃之本者蓋以脾胃中和之氣也燥其濕則為瀉潤其燥則為補丹溪曰氣無補法者庸俗之論也以其痞滿壅塞似難於補不知正氣虛則濁氣滯正氣得補而行健運之職則濁氣自下而痞滿除氣虛不補邪何由退內經曰壯者氣行則愈怯者著而成病欲破滯氣消脹滿必補脾氣至的至當非淺見所知者大凡失血脈皆洪大無力即芤脈也陰血既虧陽無所依浮散於外故見此象誤認為實火大謬張三錫曰大抵虛損宜分兩途一則中氣虛屬內傷脈緩或虛大無力可治一則真陰虧損陰虛火旺脈弦數無力難治又曰心肺損而色敗腎肝損而形痿發黃有陰陽天五之土為火所焚陽黃也地二之火為水所溺陰黃也虛損之微者真火尚存服寒涼猶可虛損之甚者真火已虧藥用寒涼豈能使之化為精血以補其虛乎人身之中藏真有三曰元精曰元氣曰元神精乃臟腑之真非榮血之比故曰天癸氣為臟腑之大經為動靜之主故曰神機脈為天真委和之大氣其機運升降皆隨氣而動因血而榮精氣資始相生不失以養一身為人之司命若精不足則氣失資化氣不足則血失所榮血不足則氣無所附天真散亂而病生焉張三錫曰勞傷五臟皆成瘵獨肺勞莫治以咳嗽咳血陰火上炎日晡甚久之咽喉生瘡一邊睡或左或右寒涼滋陰則傷脾而增瀉參朮益氣而助火則增嗽添瀉添喘死期迫矣大抵脈細數骨蒸干嗽聲啞者必不可救乃真陰虧損病在膏盲藥莫能及也其發潮熱者俗以涼藥濟之不知陰虛生內熱非芩連知柏所可治者如外感熱邪邪淨則止傷食發熱宿滯化則止此陰虛非一朝一夕心靜可以養陰而又全賴飲食從胃中生出陰血若不顧脾胃徒事坎離則陰未必滋熱未必除脾胃轉傷熱嗽愈甚矣東垣曰百病晝則增劇夜則安靜是陽病有餘乃氣病而血不病也夜則增劇晝則安靜是陰病有餘乃血病而氣不病也晝則發熱夜則安靜是陽自旺於陽分也晝則安靜夜則發熱是陽氣下陷入陰中也名曰熱入血室晝則發熱煩躁夜亦發熱煩躁是重陽無陰當亟瀉其陽峻補其陰夜則惡寒晝則安靜是陰血自旺於陰分也夜則安靜晝則惡寒是陰氣上溢於陽中也夜則惡寒晝亦惡寒是重陰無陽當亟瀉其陰峻補其陽晝則惡寒夜則煩躁飲食不入名曰陰陽交錯者死東垣曰兩寸脈實謂之陽盛陰虛下之則愈兩寸脈俱虛謂之陰陽俱虛補陽則陰竭補陰則陽竭宜調之以甘藥兩寸脈不足求之於地地者脾胃也當從陰引陽兩寸脈短小乃陽氣不足病在下也謂之陰盛陽虛取之下陵三里補瀉無形是謂導氣固精治在五亂中取法乃不足病也當取穴於腹募氣海甚者取三里氣衝以毫針引之兩關脈俱實上不至發汗下不至利大便宜芍藥湯瀉其土實兩關脈俱虛脈沉細宜服理中湯脈弦遲宜服建中湯或加黃耆附子之類兩尺俱實是陰盛陽虛下之則愈兩尺俱虛宜服姜附湯補陽問何陰虛而補陽曰陰本根於陽仲景云兩尺脈俱虛者不宜下下之為逆逆者死兩尺或不見或短小病在天上求之於五臟背俞或血絡經隧伏火是天上有陰火故陽不收藏也又難經云下部無脈或兩尺竭絶乃為食塞當吐先哲曰浮沉遲數滑澀六者之中復有大相懸絶之要人多不識夫浮為表矣而凡陰虛者脈必浮而無力是浮不可概言表可升散乎沉為里矣而凡表邪初感之甚者陰寒束於皮毛陽氣不能外達則脈必先見沉緊是沉不可概言里可功內乎遲為寒矣而傷寒初退餘熱未消脈多遲滑是遲不可概言寒可溫中乎數為熱矣而凡虛損之候陰陽俱虧氣血散亂者脈必急數愈數者愈虛愈虛者愈數是數不可概言熱可寒涼乎微細類虛矣而痛極壅蔽者脈多伏匿是伏不可概言虛可驟補乎洪弦類實矣而真陰大虧者必關格倍常是弦不可概言實可消伐乎如是則綱領之中復有大綱領存焉醫不能以四診相參而欲孟浪此脈之所以難言也王好古曰脈之不病其神不言當自有也脈之既病當求其中神之有與無焉如六數七極熱也脈中有力即有神也三遲二敗寒也脈中有力即有神也熱有神也瀉其熱而神在焉寒而有神去其寒而神在焉寒厥之脈苟無力無神將何藥以泄熱去寒乎使不知此將何依以生崆峒子云人之病痰火十之八九老人不宜速降其火虛人不宜盡去其痰攻之太甚則病轉劇而致危殆以固元氣為本凡病類推而行之小學有虛實分治之法謂疾病之生也皆因外感內傷生火生濕生熱生痰四者而已審其少壯新病是濕則燥之是火則瀉之濕而生熱則燥濕而兼清熱火而生痰則瀉火而兼豁痰無餘蘊矣當其衰老久病又當攻補兼施如氣虛而有濕熱痰火則以四君補氣而兼燥濕清熱瀉火豁痰血虛而有痰火濕熱則以四物補血而兼泄火豁痰清熱燥濕如此則攻補合宜故曰少壯新病攻邪可審老衰久病補益為先若夫陰虛火動脾胃虛衰真陰者水也脾胃者土也土雖喜燥然太燥則草木枯槁水雖喜潤然太潤則草木濕爛是以補脾滋腎之劑在燥濕得宜耳治其旺氣謂病有陰陽氣有衰旺不明衰旺則治之反甚如陽盛陰衰者陰虛火旺也治之者不知補陰而專用苦寒治其旺豈知苦寒皆沉降沉降則亡陰陰愈亡則火愈甚故服寒反熱者陰虛不宜降也又如陽衰陰盛者氣弱生寒也治之者不知補陽以消陰而專用辛溫治陰之旺豈知辛熱能耗散耗散則亡陽陽愈亡則寒愈甚故服熱藥反寒者陽虛不宜耗也此無他皆以專治旺氣故其相反如此喻嘉言曰逆秋氣則傷肺冬為飧泄與春傷於風夏生飧泄不同然傷風而飧泄以風為主風者木也傷肺而飧泄以肺為主肺者金也其候各異風邪傷人必入空竅而空竅惟脾胃為最風既居之其導引如順風揚帆不俟脾之運化食入即出以致飧已即泄也不知者以為脾虛完穀不化如長夏洞泄寒中及冬月飧泄之泄反以補脾剛燥之藥助風性之徑有泄無已每至於束手無策倘知從春令治之用桂杖領風從肌表而出一二劑可愈也秋月之傷肺傷於肺之燥也與秋傷於燥冬生咳嗽同是一病但在肺則為咳嗽在大腸則為飧泄世所謂肺移熱於大腸久為腸澼者即此病也但使肺熱不傳於大腸則飧泄自止不知者惟務止澀以燥益燥不亦冤哉逆冬氣則傷腎春為痿厥同一病乎曰痿自痿厥自厥本是二病然痿者必至於厥厥者必至於痿究竟同一病也但肝氣失恃則痿病先見筋脈未傾則厥病先見耳肝病則筋失所養如其夙有筋患不覺忽然而痿矣肝氣以條達為順素多鬱怒其氣不條達而橫格漸至於下虛上盛氣高不返眩運不知人而厥矣厥必氣通始蘇也此皆冬時失養臟之道正氣不足之病與治痰治風絶不相干一味培補腎水生津養血聽其筋自柔和肝自條達可也若精枯氣削亦難為矣藥以勝病乃致脾胃不勝藥猶不加察元氣亦壞變症多端如脾虛而氣短不能以續變而似喘促尚用降氣定喘之藥如脾虛衛氣不行變而為浮腫尚用耗氣利水之藥如脾虛鬱滯變而作寒熱尚謂外感用外散之藥虛而愈虛直令氣盡身亡全不悔悟復以此法施之他人展轉戕生可勝誅哉人之真氣所在其義有三曰上中下也上者所以受於天以通呼吸者也中者生於水穀以養榮衛者也下者氣化於精藏於命門以為三焦之根本者也故上有氣海曰膻中也其治在肺中有水穀氣血之海曰中氣也其治在脾胃下有氣海曰丹田也其治在腎人之所賴惟此氣耳氣聚則生氣散則死故帝曰氣為內寶此誠最重之詞醫家最切之旨也今之醫家但知見病治病初不識人根本天下之理亦烏有根本受傷而能無敗者耶天下假虛之證不多見而假實之症最多假寒之症不難治而假熱之治多誤然實者多熱虛者多寒如丹溪曰氣有餘便是火故實能受寒而余續之曰氣不足便是寒故虛能受熱世有不明真假本末而知醫者則未敢許也喻嘉言曰腎中真陽得水以濟之留戀不脫得土以堤之蟄藏不露而手足之陽為之役使流走周身固護腠理而捍衛於外脾中之陽法天之健消化飲食傳布津液而運行於內胸中之陽若日之馭離照當空消陰除翳而宣布於上此三者豐亨有象腎中真陽安享太平惟在位在上在中之陽衰微不振陰氣乃始有權或膚冷不溫漸至肌硬不柔衛外之陽不用矣或飲食不化漸至嘔泄痞脹脾中之陽不用矣或當膺阻礙漸至窒塞不開胸中之陽不用矣乃取水土所封之陽出而在事頭面得陽而戴赤肌膚得陽而熯燥脾胃得陽而除中其能久乎龐安常曰有陰水不足陰火上升肺受火侮不得清肅下行由是津液凝濁生痰不生血者此當以潤劑加門冬地黃枸杞之類滋其陰使上逆之火得返其宅而息焉則痰自清矣投以二陳立見危殆有腎虛不能納氣歸原出而不納積而不散則痰生焉八味丸主之此證甚難心為血之主肝為血之臟肺為氣之主腎為氣之臟誠哉是言也學者惟知血之出於心而不知血之納於肝惟知氣之出於肺而不知氣之納於腎假如血痢作恙治以行血逐積等劑而其痛獨存者血之所藏無以養也必佐以養肝則其痛止如喘嗽氣鳴治以調氣豁痰而終不下降者以氣之所藏無以歸也必佐以安腎則其氣歸原此傳心吃緊之法也格言二趙養葵曰陽統乎陰血隨乎氣古人治血必先理氣血脫益氣故有補血不用四物之論如血虛發熱立補血湯一方以黃耆一兩為君當歸四錢為臣氣藥多而血藥少使陽生陰長又如失血暴甚欲絶者以獨參湯一兩頓煎服純用氣藥斯時也有形之血不能速生幾微之氣所當亟固使無形生出有形蓋陰陽之妙原根於無也故曰無名天地之始春秋晝夜陰陽之門戶又十二時而按分五臟之陰陽醫者全憑此以明得病之根源而施治療之方術就中二至最為緊要至者極也陰極生陽絶處逢生啓無而有陽極生陰從有而無陽變陰化之不同也然其尤重獨在冬至或問冬至一陽當漸向和暖何為大寒冰雪反盛夏至一陰當漸向清涼何為溽暑酷熱反熾有說乎曰此將來者進成功者退隱微之際未易明也陽伏於下逼陰於上井水氣蒸而堅冰至也陰生於下格陽於上井水寒而電雷合也今人病面紅口渴煩躁喘咳誰不曰火盛之極抑孰知其為腎中陰寒所逼乎以寒涼之藥進而斃者吾不知其凡幾矣談陰陽者具言氣血是矣詎知火為陽氣之根水為陰血之根觀之天地日為火之精故氣隨之月為水之精故潮隨之然此陰陽水火又同出一根周流而不息相偶而不離惟其同出一根而不相離也故陰陽又各互為其根陽根於陰陰根於陽無陽則陰無以生無陰則陽無以化從陽而引陰從陰而引陽各求其屬而窮其根也世人但知水火為陰陽而不知水火為陰陽之根能知水火為陰陽而誤認心腎為水火之真此道之所以不明不行也陰陽者虛名也水火者實體也寒熱者天之淫氣也水火者人之真元也淫氣湊疾可以寒熱藥攻之真元致病即以水火之真調之然不求其屬投之不入先天水火原屬同宮火以水為主水以火為原故取之陰者火中求水其精不竭取之陽者水中尋火其明不熄斯大寒大熱之病得其平矣偏寒偏熱之士不可與言也土金隨母寄生故欲補土金者從寄生處而補其母是以東垣有隔二之治是從母也有隔三之治又從母之外家也土金惟寄生故其死為真死惟水火從真生故其死不死絶處逢生矣是以余於五行中獨重水火而其生克之妙用又從先天之根而與世論不同王仲暘曰風病至極則似燥金之證而皺揭燥澀熱病至極則似寒水之證而戰栗厥逆土病至極則似風木之證而濕鬱熱發金病至極則似二火之證而為三消癰疽瘡瘍水病至極則似濕土之證而為跗腫肉泥故推本至標則知其源從標至本則識其所承故醫不惑於症病不惑於藥始可與言治矣滑伯仁曰厥陰太陽少氣多血太陰少陰少血多氣陽明氣血俱多少陽氣多血少男子婦人均有此氣血也男子多用氣故氣常不足婦人多用血故血常不足所以男子病多在氣分婦人病多在血分世俗乃謂男子多氣女子多血豈不謬哉喻嘉言曰病發而有餘必纍及於他臟他氣先治其本使不入於他腑他氣為善病發而不足必受他臟他氣之纍先治其標不使纍及本臟為善春生本於冬藏夏長本於春生四時皆然故冬不藏無以逢春生春不生無以逢夏長不明天時則不知養藏養生之道從何補救難經二十二難謂經言脈有是動有所生病一脈變為二病其義至今未解曰此正論營衛所主病先後也一脈變為二病者同一經脈病則變為二淺深不同也邪入之淺氣留而不行所以衛先病也及邪入漸深而血壅不濡其營乃病則營病在衛病後矣使衛不先為是動而營何自後所生病耶朱丹溪曰人間之火可以濕伏可以水滅諸苦寒能瀉有餘之火是也龍雷之火逢濕則焰遇水益燔太陽一照火即尋滅桂附制相火是也如火井之火沃水彌熾以土灑之即滅亦陰火也素問云諸寒之而熱者取之陰諸熱之而寒者取之陽所謂求其屬也王太僕曰益火之源以消陰翳壯水之主以制陽光夫寒之而熱者人徒知以寒治熱而不知熱之不衰者由乎真水之不足也熱之而寒者人徒知以熱治寒而不知寒之不衰者由乎真火之不足也故取之陰所以益腎水之不足而使其制夫心火之有餘取之陽所以益心火之不足而使其勝夫腎水之有餘也屬由主也求其屬者言水火之不足而求之心腎也張三錫曰氣鬱久則中氣傷不宜克伐補中益氣佐舒郁川芎香附之類又難經云血主濡之氣主煦之一切氣病用氣藥不效少佐芎歸血藥流通而愈乃屢驗者失血後大熱大渴發熱症似白虎惟脈虛大不長實為異耳誤用涼劑必死當歸補血湯主之方用黃耆一兩當歸五錢大凡病後咳嗽吐血脈大而芤屬上焦陽絡傷下血溺血為陰絡傷俱死血不歸原責之胃寒涼藥屢用不效甘草炙炮乾薑等分引血歸元妙薛立齊曰凡人飲食勞倦起居失宜見一切火症悉屬內真寒而外假熱故肚腹喜暖常以熱手按口畏冷物此形氣病氣俱屬不足法當純補元氣為主中年後齒縫脹皆氣虛而火泛上補中自愈韓飛霞曰肺氣虛而咳嗽自汗脈緩不食當先補脾所謂虛則補其母也張三錫曰有潮熱似虛胸膈痞塞背心疼痛服補藥不效者此乃痰症隨氣而潮故熱隨飲而亦潮宜以痰飲求之丹溪曰陽旺則能生陰如失血後即當用參耆歸地大補之若遷延日久虛火克肺即難用矣夏月煩渴不可遽為暑熱而用香薷益元散須斟酌之果脈虛大自汗煩渴遠行不曾用冷物無房勞亦可作暑治李士材曰救腎者必本於陰血血為陰主下降虛則上升當斂而抑之救脾者必本於陽氣氣為陽主上升虛則下陷當升而舉之虛勞起死獨參有大力可以倚賴故主於滋陰如朱丹溪治勞之案用參者十有其七神以治勞如葛可久垂訓之方十居其七也自好古肺熱傷肺之說節齊服參必死之說印定後人眼目甘用苦寒至死不悔良可悲也不知肺家本經自有熱者肺脈獨實參誠不宜用若金被火乘者肺方受虧非參莫救腎之陰虛則精不藏肝之陽強則氣不固以腎主閉藏肝主疏泄也天下無逆流之水人身無倒上之痰故善治痰者不治痰而治氣氣順則一身之津液隨氣而順矣治痰無他法健其脾而已矣健脾無他法去其濕而已濕去則脾自健脾健則痰自消此治虛治本之法也治痰無他法清其火而已矣清火無他法順其氣而已矣氣降則火自清火清則痰自化此治痰治標之法也格言三程郊倩曰拘攣頑麻不仁風證有此當是風痰阻滯經絡氣道不通利也氣道不通利脾虛不能運氣雖是補不忘攻曰氣順則風消尤須攻不忘補從脾胃中壯及主氣使津液得達阻滯自無此烏藥八味順氣之所由設也風眩頭暈風在上而虛在下治法不治風而治血血足於下氣自清於上何風之有此陽病治陰之旨也心藏神而主血於脾實為母子脾乏膏腴因奪母氣以為食虛處遂並移於母健忘驚悸等證實由脾虛乏津乏液之故必使脾氣壯而無上奪方得心血足而能下文此又歸脾湯之一義也中虛不能化氣則陰逆於下陽格於上此亦邪居半表裡之間變小柴胡湯為半夏瀉心湯彼和解於表裡間此和解於上下際表裡間俱屬陽上下之際兼有陰也陰逆則鬱必甚故去柴胡加黃連以解陽邪佐溫以破陰逆也金主燥而令降木主滋而令升凡金令之不從其燥者全賴木氣之升能致五臟之蒸溽到肺而成其津液也故木氣升則五臟之氣奉春令而俱升木氣降則五臟之氣奉秋令而俱降降則五臟之氣不得上承自然下蝕凡土邪陷下而剋水火淫寡畏而熯金皆職於此金以溽蒸不到而加火淫遂成燥金津液之源已竭周身之百骸誰為之灌溉者是則一燥而無所不燥降令多升令少而濕熱之邪遂盛於下部而成痿軟蓋濕熱為物升則化不升則不化也法欲救金體之燥須是從木令之升但使五臟各有升令之奉則土能生金金能生水水能制火雖其間有補有瀉皆可以此一字為用神所謂少陽為樞者此也故能致津液通氣血則少陽之妙法矣腎氣虛寒自無溫泉溉木木無陽以養氣不上升而下陷凡腎家陰精欲為閉藏者肝偏盜之而疏泄陽併入陰故陰精自出夜夢鬼交治法亟宜於陰中輔陽使木氣得暖敷榮必不盜及母氣矣疝氣者肝之經絡環陰器最為招寒之地與寒為類者更有濕寒濕互於陰處必凝凝則成形不比陽經之能比氣易聚還易散也經曰一陰盛而脈脹不通故曰㿗癃疝則知此中已多結滯所宜從寒濕中求之破此結滯之陽也精者水也非火不成火者人身之真氣也真氣不足則臟寒遂無以鍛鍊成精經曰水之精為志火之精為神惟交心腎為一家夾一水於二火之間直從兩精相搏處始及坎離此之謂鼎汞也有餘在肝不得腎水之升而陽獨治故有餘之邪見於上焦不足在腎不得肝火之降而陰獨治故不足之因見於下部惟從肝腎二經通及山澤之氣故補腎而肝亦益也腎陰虛而陽得湊之無以為內之守則陽強而陰益弱故精時自出得熱則遺治法固宜滋腎尤要清心心者火之源也火不擾而水自寧陰虛之人水虧不能滋木榮血必傷所以陽火獨治而不得血潤則必吸動腎水以自救無奈滴水不能救盛火反從火化而升煎成血咯血之出於腎者此也此際復營分之虧與壯水之主養陰退陽是為正治然皆兼有破滯法者以血成則必燥燥成必帶淤況曾服過寒涼不淤處有淤也耳作膿疳者腎開竅於耳以陰逆於下則陽越於上邪從虛受故上虛補在下先求二腎納氣然後清發上焦始為有功蓋精勝則邪卻也腎虛耳重頭痛偏正陰下而陽上則格拒而多病及巔部下虛上實經謂厥成為巔疾是也至陰虛天氣絶至陽盛地氣不足故不足者溫之使陰中有陽則下不虛有餘者瀉之使陽中有陰則上不實補益肝腎道並行而不相悖也頭部為天居陽中之陽而能得地部陰精之上奉者全賴督沖二脈領腎中水火之英精交集於其巔也督沖虛而不到則陰精莫奉而耳作蟬鳴鬚髮脫落種種虛證迭見於上上虛而仍補在下以生氣之原在腎中之水火不在上也水有真水有客水腎氣溫則客水亦攝而歸真腎氣寒則真水亦從而為客水客寒必搏之所以有身體沉重疼痛之症真武湯從土中植火使真水從溫處鎮攝客水自化而歸真正不必行導滲之令也人身以陽氣為主滋生髮育之本也有時互陰而舉之以抱陽之陰為妻陰不嫌其偕有時黜陰而伸之以背陽之陰為賊陰最防其奪經曰知陽者知陰知陰者知陽脈有陰陽病機之盈虛倚伏在此能於此窮其所謂則於病在先一層深一層上見病之源病之轉移進退機則系乎脈陽中有陰陰中有陽不可不就病與脈交互處一合參之並就脈與病參差處一反勘之死處便可冀生生中且須防死只在陰陽反復之間汗下之法可施於有形之陰陽不可施於無形之陰陽有形者汗下之邪從汗下出而陰陽自安無形者一誤汗下無汗可去而所去者無非本臟之氣損陰損陽害不可言六經內三陰惟少陰厥陰多假症如躁煩戴陽是也然而其脈不假三陽中陽明間有假脈如熱深厥深而脈反沉之類是也然而口燥舌乾不得臥之證自在若太陽證原自無假太陽之脈必浮太陽之證必發熱然與少陰腎同司寒水所以表症原自根里脈雖浮而浮中自分虛實實則主表虛則便關乎里症雖發熱而發熱原分標本標則從邪本則便關乎正世人顧表不及里顧邪不及正卒病一來開手便錯以致壞病種種莫不自太陽變成此非太陽之假人自不辨其標本不辨其虛實耳至若少陽一經豈無混淆然少陽來路必由太陽不兼太陽之症不成少陽矣少陰得趺陽鎮伏而後肯交合三焦三焦之氣升則為神元陽透腦至髓海為神光是即營衛發生之祖少陰之氣升則為鬼奔豚犯關奪絳宮為死氣實由趺陽失令之由為神為鬼只在趺陽勝負間營衛盛其下自有溫泉趺陽厚其上必無陰氣羅東逸曰補肝者養陰腎肝同一治古人言之矣然肝木得少陽土脈震發非少陽不升木氣條茁又非太陰不長故肝食採於脾者也蓋補肝者必於土中升木若補中益氣之升柴是以少陽騰土逍遙散之術苓是以太陰升木前人已有其意特未暢發耳喻嘉言曰肺燥喜於用潤脾滯又艱於運食故脾胃虛之極食飲不思則於清肺藥中少加參朮以補脾肺燥之極熱盛咳頻則於補脾藥中少加阿膠以潤燥治龍雷之火全以收藏為主病有胃經受病而胃脈反不見其病只是上下兩傍心腎肝肺之脈時時另起一頭不安其常此非上下兩傍之見病端也乃中央氣弱不能四迄如母虛子失乳故見飢餒之象耳治宜四君子以理脾胃則中央之樞軸轉而四畔之機關盡利矣人之陰氣衰則不能自主而從陽上升凡其泄越者皆身中之至寶向非收拾歸元將何底極是以事親養老諸方皆以溫補下元為務誠有見於老少不同治少年人惟恐其有火高年人惟恐其無火無火則運行艱而易衰是火者老人性命之根未可以水輕折也昔賢治喉干謂八味丸為聖藥譬之釜底加薪則釜中津氣上騰可見下虛者不但真陰虛究竟真陽亦虛蓋陽氣以潛藏為貴藏則勿亢藏則可久惟真陰一虛則孤陽失守上浮為熱苟收而攝之於下則口中之濁痰鼻中之濁涕不作而口中之津液常生矣凡治氣之原有三一曰肺氣肺氣清則遍身之氣肅然下行一曰胃氣胃氣和則胸中之氣亦易下行一曰膀胱之氣膀胱之氣壯則能吸引胸中之氣下行是以膻中之氣亂而即治擾而即寧者賴此三氣為輸運若三氣反干則於胸膈為緊為脹可勝道哉然尚有一吃緊關頭人身胸中空曠如太虛地氣上為云必天氣降為雨地氣始收藏不動此義首重在膀胱膻中位於膈內膀胱位於腹內膀胱之氣化則空洞善容而膻中之氣得以下運不化則腹已見脹膻中之氣安能下達耶然其權在於葆腎腎氣動必先注於膀胱膀胱滿脹勢必奔於胸膈腎氣不動則收藏愈固膀胱得以清靜無為而膻中之氣注之不盈矣丹溪等方書說病在左血多病在右氣多教人如此認證因起後執著內經則無此說內經但言左右者陰陽之道路夫左右既為陰陽往還之道路何嘗可偏執哉況左半雖血為主非氣以統之則不流右半雖氣為主非血以麗之則易散故肝膽居左其氣常行於右脾胃居右其氣常行於左是以生生不息也故凡治一偏之病法宜從陰引陽從陽引陰從左引右從右引左蓋觀樹木之偏枯者將溉其枯者乎抑溉其未枯者使榮茂而因以條暢其枯者乎張隱菴曰靈樞本輸篇曰少陽屬腎腎上連肺故將兩臟蓋少陽乃三焦之生氣發於右腎上合包絡為相火之原左腎屬水上連於肺故為兩臟也又本藏篇曰腎合三焦膀胱蓋右腎之氣上合於心主包絡而為一臟又素問咳論曰腎咳不已則膀胱受之久咳不已則三焦受之是內經止曰腎原無命門之名蓋以一腎合三焦一腎合膀胱是為兩臟而配合兩腑者也春傷於風夏生飧泄秋傷於濕冬生咳嗽東方生風春之氣也中央生濕土之氣也主於夏秋之交故曰秋傷於濕陽受風氣陰受濕氣風乃陽邪故傷於風者上先受之陽病者上行極而下故春傷於風夏生飧泄濕乃陰邪故傷於濕者下先受之陰病者下行極而上故秋傷於濕冬生咳嗽此天地陰陽之邪隨人氣之上下升降者也冬傷於寒春必病溫夏傷於暑秋必痎瘧夫溫病瘧病皆邪伏於內而後發者寒乃陰邪冬時陽氣內盛故邪伏於外在皮膚之間至春陽氣長盛外伏之陰邪與陽相遇邪正相搏寒已化熱故春發為溫病也暑乃陽邪夏時陽氣在外裡氣虛寒故邪伏於裡在募原之間至秋陰氣長盛內伏之陽邪與陰相遇邪正相持故發為往來寒熱之痎瘧此天地陰陽之邪隨人氣之內外出入者也柯韻伯曰人知火能生土而不知水能生土知土為水仇而不知水為土母但知脾為至陰而不知胃為元陽蓋陽明火氣所鍾故主燥化太陰濕土真陰之所生是水之子也真陰之主故名太陰水精所成故主濕化陽道主實又主熱熱實相搏則胃實而地道不通是以六經亡津液而胃中乾燥者皆得轉屬於陽明而陽明則無所復傳是即陽明燥化之為病此知胃燥反傳於脾之說謬矣陰道主虛又主寒虛寒相搏則腹滿而下利益甚凡五臟受病自利不渴者咸屬太陰若脾家實腐穢反自去是即太陰濕化之為患此知脾強反為脾約之說非矣土有燥氣所以生金則燥土是燥金之父也土有濕氣所以養金則濕土是肺金之母也無火則土不生無水則土亦不生土不燥則金不生土不濕則金亦不生此水火互根剛柔相須之理也喻嘉言曰今人學識未廣者見煩熱枯燥等證不敢用附子者惡其以熱助熱也孰知不藏精之人腎中陽氣不鼓精液不得上升故枯燥外見才用附子助陽則陰氣上交於陽位如釜底加火釜中之氣水上騰而潤澤有立至者仲景方輒用附子一枚今人亦不敢用一錢總由其識之未充耳仲景用桂枝湯以和榮而解肌此定例也然不但為太陽中風本藥即少陰經之宜汗者亦在取用其最妙處在用芍藥以益陰而和陽太陽經之榮衛得芍藥酸收則不為甘溫發散所逼而安其位也至若少陰則更為陰藏而少血所以強逼少陰汗者重則血從耳目口鼻出而竭厥可虞輕亦小便不利而枯涸可待用藥自當知芍藥之例倍加益陰以和陽所用桂枝多入地黃以匡芍藥之不逮此比例之法也程郊倩曰人身以陽氣為主生身之源在此切須從脈去照顧浮陽多從證上見出假有餘真陽自從脈上見出真不足萬不可以假亂真也
