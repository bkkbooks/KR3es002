body:
  text: 卷八病能集六婦人治例四篇女科一經病通治薛新甫曰經曰飲食入謂遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行東垣先生謂脾為生化之源心統諸經之血誠哉是言也竊謂心脾平和則經候如常苟七情內傷六淫外侵飲食失節起居不時脾胃虛損心火妄動則月經不調矣有先期而至者蓋血生於脾土故云脾統血凡血當用苦甘之劑以助陽氣而生陰血也蓋先期而至者有因脾經血燥宜加味逍遙散有因脾經鬱滯者宜歸脾湯有因肝經怒火者宜加味小柴胡湯有因血分有熱者宜加味四物湯有因勞役火動者宜補中益氣湯過期而至者有因脾經血虛者宜人參養榮湯有因肝經血少者宜六味地黃丸有因氣虛血弱者宜八珍湯又曰血者水穀之精氣也和調五臟灑陳六腑在婦人上為乳汁下為血海故雖心主血肝藏血亦皆統攝於脾胃補脾和胃血自生矣凡經行禁用苦寒辛散之藥經閉東垣曰經閉不行有三婦女腸胃久虛形體羸弱氣血俱衰而致經水斷絶不行或病中消胃熱善食漸瘦津液不生夫經者血脈津液所化津液既竭為熱所爍肌肉漸瘦時見燥渴血海枯竭名曰血枯經絶宜瀉胃之燥熱補益血氣經自行矣此病適行而有子子亦不成而為胎病者有矣或心包絡脈洪數躁作時見大便祕澀小便雖不利而經水閉絶不行此乃血海乾枯宜調血脈除包絡中火邪而經自行矣或因勞心心火上行月事不來者胞脈閉也胞脈屬於心而絡於胞中今氣上迫脈心氣不得下通故月事不來宜安心補血瀉火經自行矣薛立齋曰經閉者何夫經水陰血也屬衝任二脈主上為乳汁下為月水其為患有因脾虛而不能生血者有因脾郁傷而血耗損者有因胃火而血銷鑠者有因脾胃損而血少者有因勞傷心而血少者有因怒傷肝而血少者有因腎水不能生肝而血少者有因肺氣虛不能行血而閉者治療之法若脾虛而不行者調而補之脾鬱而不行者解而補之胃火而不行者清而補之脾胃損而不行者調而補之勞傷心血而不行者靜而補之怒傷肝而不行者和而補之肺氣虛而不行補脾胃腎虛而不行補脾肺經云損其肺益其氣損其心補其榮衛損其脾補其飲食適其寒溫損其肝緩其中損其腎益其精審而治之庶無誤矣王宇泰曰薛氏治血枯大法以補養真元為主蓋本易水師弟之旨而廣之方約之曰婦人之經病有月候不調者有月候不通者然不調不通之中有兼疼痛者有兼發熱者此分而為四也不調之中有趲前有遲後者則趲前為熱退後為虛也不通之中有血滯者有血枯者則血滯者宜破血枯宜補也疼痛之中有常時作痛者有經後經前作痛者則常時與經前作痛為血積經後為血虛也發熱之中有常時發熱者有經行發熱者則常時為血虛有積經行為血虛有熱也則又分而為八焉大抵經痛內因憂思憤怒外因飲冷形寒憤怒所觸則鬱結不行經前産後飲冷形寒則惡露不盡此經候不調不通作痛發熱之所由也調氣破血開鬱補虛涼血清熱治之有道也歟然氣行血行氣止血止故治血病以行氣為先香附之類是也熱則流通寒則凝結故治血病以熱藥為佐肉桂之類是也經漏李東垣曰經水漏不住有二婦人脾胃虛損致命門脈沉細而數疾或沉弦而洪大有力寸關脈亦然皆由脾胃有虧下陷於腎與相火相合濕熱下迫經漏不止其色紫黑如夏月腐肉之臭中有白帶者脈必弦細寒作於中有赤帶者其脈洪數病熱明矣必腰痛成臍下痛臨經欲行而先發寒熱往來兩脅急縮兼脾胃證出見或四肢困倦心煩悶不得眠臥心下急宜大補脾胃而升降氣血可一服而愈或貴而後賤富而後貧病名脫營者心氣不足其火大熾旺於血脈之中又或脾胃飲食失節火乘其中形質肌肉顏色似不病者此心病也下形於脈故脾胃飲食不調其證顯矣而經水不時而下或適來適斷暴下不止治當以大補氣血之劑補養脾胃微加鎮墜心火之藥治其心補陰瀉陽經自止矣痿論云悲哀太甚則胞絡絶胞絡絶則陽氣內動發則心下滿數溲血也故經曰大經空虛發則肌痹傳為脈痿此之謂也治宜升陽益胃湯血脫益氣古人之法也先補胃氣以助生長故曰陽生陰長諸甘藥為之先務薛立齋曰血崩經云陰虛陽搏謂之崩又云陽絡傷則血外溢陰絡傷則血內溢又云脾統血肝藏血其為患因脾胃虛損不能攝血歸源或因肝經有火血得熱而下行或因肝經有風血得風而妄行或因怒動肝火血熱而沸騰或因肝經鬱結血傷而不歸經或因怒動肝火悲哀太過胞絡傷而下崩治療之法脾胃虛弱者六君子湯加芎歸柴胡脾胃虛陷者補中益氣加白芍山梔肝經血熱四物加柴梔苓術肝經風熱加味逍遙或小柴胡加山梔白芍丹皮若怒動肝火亦用前藥脾經鬱火歸脾加山梔柴胡丹皮哀傷胞絡四君加升柴山梔故東垣丹溪諸先生云凡下血證須用四君子以收功斯言厥有旨哉若大去血後毋以脈診當急用獨參湯救之其發熱咳嗽脈數乃是元氣虛弱假熱之脈也尤當用人參之類此等證候無不由脾胃先損故脈洪大察其有胃氣受補可救誤用寒涼之藥復傷脾胃生氣反不能攝血歸元是速其危也薛立齋醫案一婦人內熱作渴飲食少思腹內近左初如雞卵漸大四寸許經水三月一至肢體消瘦齒頰似瘡脈洪數而虛左關尤甚此肝脾鬱結之證外貼阿魏膏午前用補中益氣湯午後以加味歸脾湯兩月許肝火少退脾胃尚健仍與前湯送六味丸午後又用逍遙散送歸脾丸又月餘日用蘆薈丸二服空心以逍遙散下晡時以歸脾湯下喜其調理謹慎年餘而愈一婦人發熱口乾月經不調兩腿無力服祛風滲濕之劑腿痛體倦二膝浮腫經事不通余作脾肝腎三經血虛火燥證名鶴膝風用六味丸八味丸兼服兩月形體漸健飲食漸進膝腫漸消不半載而痊前證若脾腎虛寒腿足軟痛或足膝枯細用八味丸若飲食過多腿足或臀後痠痛或浮腫作脹用補中益氣加茯苓半夏主之一婦人性沉靜勤於女工善怒小腹內結一塊或作痛或痞滿月經不調恪服伐肝之劑內熱寒熱胸膈不利飲食不甘形體日瘦牙齦蝕爛此脾土不能生肺金肺金不能生腎水腎水不能生肝木當滋化源用補中益氣六味地黃至仲春而愈松江太守何恭人性善怒腹聚一塊年餘形體骨立倏然往來齶蝕透腮或泥春木旺剋土仍行伐肝時季冬肝脈洪數按之弦緊餘脈微弱余曰洪數弦緊肝經真氣發見而邪氣實也自保不及何能剋土況面色青中隱白乃腎水不足肝木虧損肺金剋制惟慮至春木不能發生耳勉用壯脾胃滋腎水二劑肝脈悉退後大怒耳內出血肝脈仍大按之如無煩躁作渴此無根之火以前藥加肉桂二劑肝脈仍斂熱渴頓退復因大怒以致飲食不進果卒於季冬辛巳日此木衰弱而金刑剋信矣一婦人經候過期發熱倦怠或用四物黃連之類反兩月一度且少血而成塊又用峻藥通之兩目如帛所蔽余曰脾為諸陰之首目為血脈之宗此脾傷五臟皆為失所不能歸於目矣遂用補中益氣濟生歸脾二湯專主脾胃年餘而愈一婦人年四十索性急先因飲食難化月經不調服理氣化痰藥反肚腹膨脹大便泄瀉又加烏藥蓬朮肚腹腫脹小便不利加豬苓澤瀉痰喘氣急手足厥冷頭面肢體腫脹指按成窟脈沉細右寸為甚余曰此脾肺之氣虛寒不能通調水道下輸膀胱滲泄之令不行生化之氣不運即東垣所云水飲留積若土之在雨中則為泥矣得和風暖日水濕去而陽化自然萬物生長喜其脈相應遂與金匱加減腎氣丸料服之小便即通數劑腫脹消半四肢漸溫自能轉側又與六君子加木香肉桂炮薑治之全愈後不戒七情飲食即為泄瀉仍用前藥加附子五分而安一婦人素有頭暈不時而作月經遲而少余以為中氣虛不能上升而頭暈不能下化而經少用補中益氣湯而愈後因勞而作月經如湧此勞傷火動用前湯加五味子一劑服之即愈前證雖云亡血過多氣無所附實因肺氣虧損西賓錢思曾云室年三十尚無嗣月經淋漓無期夫婦異處者幾年矣思曾欲為娶妾以謀諸餘余曰此鬱怒傷肝脾虛火動而血不歸經乃肝不能藏脾不能攝也當清肝火補脾氣遂與加味歸脾逍遙二藥送至其家仍告其姑曰服此病自愈而當受胎妾可無娶也果病愈次年生子一婦人多怒經行或數日或半月後止三年後淋漓無期肌體倦瘦口渴內熱盜汗如洗日晡熱甚余用參朮耆歸茯神遠志棗仁麥冬五味丹皮龍眼肉炙草柴胡升麻治之獲痊此證先有怒動肝火血熱妄行後乃脾氣下陷不能攝血歸源故用前藥若胃熱亡津液而經不行宜清胃若心火亢甚者宜清心若服燥藥過多者宜養血若病久氣血衰宜健脾胃一婦人性善怒産後唇腫內熱月水不調食少作嘔大便不實唇出血水用理氣消導胸膈痞滿頭目不清唇腫經閉用清胃行血肢體倦怠發熱煩躁涎水湧出欲用通經之劑余曰病本七情肝脾虛損數行攻伐元氣益虛者耳法當補陰益陽遂以加味歸脾湯加味逍遙散補中益氣湯如法調治元氣漸復唇瘡亦愈後因怒寒熱耳痛胸脅脹悶唇焮腫甚此是怒動肝火而血傷遂用四物合小柴胡加山梔頓愈後又怒脅乳作脹肚腹作痛嘔吐酸涎飲食不入小水不利此是怒動肝木克脾土乃用補脾氣養脾血而愈又因勞役怒氣飲食失節發熱喘渴體倦不食去血如崩唇腫熾甚肝經有火脾經氣虛遂用補中益氣加黑梔丹皮芍藥而愈此證每見但治其瘡不固其本而死者多矣一婦人年六十有四久鬱怒頭痛寒熱春間乳內時痛服流氣飲之類益甚不時有血如經行又大驚恐飲食不進夜寐不寧乳腫及兩脅焮痛如炙午前後色赤余以為肝脾鬱火血燥先以逍遙散加酒炒黑龍膽一錢山梔半錢兩劑頓退又二劑而全消再用歸脾加炒梔貝母諸證悉退一婦人因怒血崩久不已面青黃而或赤此肝木製脾土而血虛也用小柴胡合四物以清肝火生肝血又用歸脾補中二湯益脾氣以生肝血而痊若因肝經有風熱而血不寧者用防風一味為丸以兼證之藥煎送或肝經火動而不寧者用條芩炒為丸以兼證之藥煎送無有不效一婦人性急每怒非太陽耳項喉齒胸乳作痛則胸滿吞酸吐瀉少食經行不止此皆肝火之證肝自病則外證見土受克則內症作若自病見用四物加白朮茯苓炒山梔炒龍膽若內症作用四君加柴胡白芍神麯吳萸炒連諸症漸愈惟月經不止是血分有熱脾氣尚虛以逍遙散倍用白朮茯苓陳皮又以補中益氣加酒炒芍藥兼服而調歸大化內人患月事不期崩血昏憒發熱不寐或謂血熱妄行投以寒劑益甚或以胎成受傷投以止血亦不效余曰此脾氣虛弱無以統攝故耳法當補脾而血自止用補中益氣湯加炮薑不數劑而效惟終夜少睡驚悸其家另服八珍湯更不效余曰雜矣乃與歸脾湯加炮薑以補心腎遂如初一婦人素有胃火服清胃散而安後因勞役燥渴內熱肌肉消瘦月經不行此胃火消爍陰血用逍遙散加丹皮炒山梔以清胃熱用八珍湯加茯苓遠志以養脾血而經自行一婦因勞耳鳴頭痛體倦此元氣不足用補中益氣加麥冬五味而痊三年後因飲食勞倦前症益甚月經不行晡熱內熱自汗盜汗用六味地黃丸補中益氣湯頓愈前症若因血虛有火用四物加山梔柴胡不應八珍加前藥若氣虛弱用四君子若怒便耳聾或鳴者實也小柴胡加芎歸山梔虛用補中益氣加山梔若午前甚作火治用小柴胡加炒連炒梔氣虛用補中益氣午後作血虛用四物加白朮茯苓若陰虛火動或兼痰甚作渴必用地黃丸以壯水之主經云頭痛耳鳴九竅不利腸胃之所生也脾胃一虛耳目九竅皆為之病治法綱曰內經方血枯一證與血膈相似皆經閉不通之候然而枯與膈則相反有如冰炭夫枯者枯竭之謂膈者阻隔之謂血本不虛而或氣或寒或積有所逆病發於暫其症則或痛或實必通之以血行而愈此可攻者枯者其來有漸脾胃氣乏衝任內竭其症無形此必不可通者也夫血既枯矣只當補養陰氣使其血充若勉強通之則枯愈枯不危何待耶良方藥禁一通經丸若脾胃無虧暴怒氣逆或生冷所傷陰血凝滯月經不通者宜暫用之若脾胃虛弱不能生血者宜用六君當歸若因脾胃鬱火內耗其血者宜用歸脾湯若因肝脾鬱怒而月經不通者宜用加味歸脾湯若因肝脾虛熱血傷而月經不通者宜用加味逍遙散一艾附丸若脾胃虛寒陰血不足氣逆發熱月經不調或胎氣不安者暫宜用之若肝腎虧損陰虛發熱月經不調或崩漏帶下或便血吐衄小便淋澀或晡熱內熱寒熱往來或盜汗自汗不時倏熱宜用六味丸若兼脾氣不足飲食少思者佐以六君子一四物湯若脾經血燥發熱或月經不調宜暫用之若因脾經虛熱肝經怒火所致宜用四君子佐以加味逍遙散若因脾經氣虛血弱兼晡熱內熱宜用八珍湯加柴胡丹皮若因元氣下陷而致諸症宜用補中益氣湯一人參橘皮湯若胎前氣痞痰滯作嘔不食者宜暫用之若脾胃氣虛胸膈痞脹痰停作嘔飲食少思者宜用半夏茯苓湯若因怒動肝火剋制脾土而致前症宜用六君子加柴胡山梔枳殼脾胃虛寒者用六君子加木香砂仁內半夏治脾胃虛寒諸證尤當用之一紫蘇順氣飲若胎動不安元氣無虧者宜暫用之若因脾氣虛弱者宜用六君子加紫蘇枳殼鬱結傷脾者宜用四君子加柴胡山梔蘇梗鬱怒傷肝脾者用六君子加柴胡黃芩枳殼一四物膠艾湯若內熱胎痛下血不止宜暫用之若因肝經風熱而下血者宜用防風黃芩丸若因肝火血熱宜用加味逍遙散若因脾經鬱火宜用加味歸脾湯若因脾氣虛陷宜用補中益氣倍加升麻柴胡若因事下血宜用八珍湯加膠艾一黃芩白朮二味為安胎之藥若脾胃蘊熱中氣無虧者暫宜用之凡屬脾胃虛痞飲食少思或泄瀉嘔吐面色萎黃肢體倦怠者宜用六君子湯一達生散若厚味安逸者宜用若芻蕘勞役者不宜用一小續命湯若外中風邪腰背反張筋脈瘛瘲者宜暫用之若産後失血過多陽火熾盛虛熱生風者宜用八珍湯加鉤藤丹皮如不應當用四君子湯加當歸丹皮鉤藤若陽氣脫陷者宜用補中益氣湯如不應加附子氣血敗者宜用十全大補湯如不應急加附子亦有生者一澤蘭湯若産後惡露腹痛胸滿少氣宜用之若體倦面黃食少少寐而惡露不止宜用加味歸脾湯若氣血虛損而惡露上攻先用失笑散後用八珍湯禁用黑神散奪命丹之類一産後口鼻起黑氣鼻衄者是胃氣虛敗而血滯也急用二味參蘇飲多有生者女科二赤白帶證張子和曰帶脈起少腹側季脅之端環身一周如束帶之於身與沖督任三脈同起而異行一原而三歧皆絡帶脈沖督任三脈皆統於篡戶循陰器沖督任三脈以帶脈束之因余經上下往來遺熱於帶脈之間熱者血也血積多日不流火則從金之化金則從革而為白乘少腹間冤熱白物滑溢隨溲而下綿綿不絶多不痛也或有痛者則壅礙因壅而成痛也內經少腹冤熱溲出白液冤者屈滯也病非本經為他經冤抑而成此疾也朱丹溪曰帶下赤屬血白屬氣主治濕痰為先漏與帶俱是胃中痰積流下滲入膀胱無人知此只宜升提甚者上必用吐法以提其氣下用二陳湯加蒼白朮仍用丸子又云赤白帶下皆屬血出於大腸小腸之分肥人多是濕痰海石半星蒼朮柏川芎椿皮青黛瘦人白帶少多是熱以炒柏滑石椿皮川芎海石蛤粉羅先生法或十棗湯或伸佑丸或玉燭散皆可服但實者可行虛者不可峻攻血虛者加減四物氣虛者參朮陳皮間服之濕勝者用固腸丸相火動者於諸藥中少加黃柏滑石滑者加龍骨赤石脂滯者加葵花性躁者加黃連痰氣帶下者蒼朮香附滑石蛤粉半夏茯苓丸服寒月少加乾薑臨機應變必須斷厚味薛立齋曰赤白帶下徐用誠先生云前證白屬氣而赤屬血東垣先生云血崩久則亡陽故白滑之物下流未必全拘於帶脈亦有濕痰流注下焦或腎肝陰淫之濕勝或因驚恐而木乘土位濁液下流或思慕為筋痿戴人以六脈滑大有力用宣導之法此瀉其實也東垣以脈微細沉緊或洪大而虛用補陽調經乃兼責其虛也丹溪用海石南星椿根皮之類乃治其濕痰也竊謂前證皆當壯脾胃升陽氣為主佐以各經見證之藥色青者屬肝小柴胡加山梔防風濕熱壅滯小便赤澀用龍膽瀉肝湯肝血不足或燥熱風熱用六味丸色赤者屬心用小柴胡加黃連山梔當歸思慮過傷用妙香散等藥色白者屬肺用補中蓋氣加山梔色黃者屬脾用六君子加山梔柴胡不應用歸脾湯色黑者屬腎用六味丸氣血俱虛八珍湯陽氣下陷補中益氣湯濕痰下注前湯加茯苓半夏蒼朮黃柏氣虛痰飲下注四七湯送六味丸不可拘肥人多痰瘦人多火而以燥濕瀉火之藥輕治之也薛立齋醫案一孀婦腹脹脅痛內熱晡熱月經不調肢體痠麻不時吐痰或用清氣化痰喉間不利帶下青黃腹脅膨脹用行氣之劑胸膈不利肢體時麻此鬱怒傷損肝脾前藥益甚也朝用歸脾湯以解脾郁生脾氣夕用加味逍遙散以生肝血清肝火兼服百劑而安一婦人瘧久兼之帶下發後口乾倦甚余用七味白朮散加麥冬五味作大劑煎與恣飲再發稍可乃用補中益氣加茯苓半夏十餘劑而愈一婦人吞酸胸滿食少便泄月經不調服法制清氣化痰丸兩膝漸腫寒熱往來帶下黃白而青體倦余以為脾胃虛濕熱下注用補中益氣倍用參術加茯苓半夏炮薑而愈若因怒發熱少食或兩腿赤腫或指縫常濕用六君加柴胡升麻及補中益氣湯一婦人年逾六十帶下者白因怒胸膈不利飲食少思服消導利氣之藥反痰喘胸滿大便下血余曰此脾虛虧損不能攝血歸原也用補中益氣湯加茯苓半夏炮薑四劑諸症頓愈又用八珍湯加柴胡山梔而安血分水分腫滿證薛立齋曰血分水分腫滿二症或因飲食起居失養或因六淫七情失宜以致脾胃虧損不能生髮統攝氣血乖違行失常道若先因經水斷絶後至四肢浮腫小便不通血化為水名曰血分宜用椒目丸治之若因小水不利後至身面浮腫經水不通水化為血名曰水分宜用葶藶丸治之此屬形氣不足邪淫隧道必用此藥以宣導其邪而佐以輔補元氣庶使藥力有所伏而行則邪自不能容而真氣亦不至於復傷矣一婦人月經不調晡熱內熱飲食少思肌體消瘦小便頻數服濟陰丸月經不行四肢浮腫小便不通余曰此血分也朝用椒仁丸夕用歸脾湯漸愈後專用歸脾湯五十餘劑而全一婦人月經不調小便短少或用清熱分利之劑小便不利三月餘身面浮腫月經不通余曰此水分也遂朝用葶藶丸夕用歸脾湯漸愈乃用人參丸問服而愈以上二症作脾虛水氣用分利等藥而歿者多矣一婦人素性急先因飲食難化月水不調或用理氣化痰藥反肚腹膨脹大便泄瀉又加烏藥蓬朮肚皮腫脹小便不利加豬苓澤瀉痰喘氣急手足厥冷頭面肢體腫脹指按成窟脈沉細右寸尤甚余曰此脾肺虛冷不能通調水道下輸膀胱滲泄之令不行生化之氣不運東垣云水飲留積若土在雨中則為泥矣得和氣暖日水濕去而陽化自然萬物生長喜其脈相應遂與金匱腎氣丸加減丸散服之小便即通數劑腫脹消半四肢漸溫自能轉側又與六君子加木香肉桂炮薑治之全愈後不戒七情不調飲食頓作泄瀉仍用前藥加附子五分而安食症血症心腹疼痛等證良方曰婦人食症由臟腑虛弱經行不忌生冷飲食或勞傷元氣所致若形氣虛弱須先調補脾胃為主而佐以消導若形氣充實當先疏導為主而佐以補脾胃若氣壅血滯而不行者宜用烏藥散散而行之若脾氣鬱而血不行者宜用歸脾湯解而行之若肝脾血燥而不行者宜用加味逍遙散清而行之大抵食積痞塊之類為有形蓋邪氣勝則實真氣奪則虛當養正辟邪而積自除矣雖然堅者削之客者除之胃氣未虛或可少用若病久虛乏者不宜輕用婦人積年血症由寒溫失節脾胃虛弱月經不通相結盤牢久則腹脅苦痛蓋其症多兼七情虧損五臟氣血乖違而致氣主煦之血主濡之脾統血肝藏血故鬱結傷脾恚怒傷肝者多患之腹脅作痛正屬肝脾二經症也治法宜固元氣為主而佐以攻伐之劑當以歲月求之若欲速效投以峻劑反致有誤血氣心痛主心絡傷若寒邪所傷溫散之飲食停滯消導之肝火妄動辛平之脾氣鬱結和解之醫案一婦人患心痛飲食少思諸藥到口即吐豫以為脾土虛弱用白朮一味同黃土炒每服一兩以米泔煎濃徐服少許數日後自能大飲食用三餘斤而安上舍陳履學長子室素怯弱産後患疥瘡年餘不愈因執喪旬月每欲眩僕一日感氣忽患心脾高腫作疼手不可按而嘔吐不止六脈微細或見其形實誤認諸痛不可補氣乃用青皮木香五味吳茱萸等藥而愈繼復患瘧且墮胎又投理氣行血之藥病雖去元氣轉脫再投參耆補劑不應矣六脈如絲欲絶迎余診之曰形雖實而脈虛極反用理氣之劑損其真氣故也連投參耆歸朮附乾薑桂二劑間用八味丸五日寢食漸甘六脈全復若心脾疼時即服此等藥瘧亦不作矣心腹疼痛若氣滯血淤用沒藥散勞傷元氣用益氣湯肝脾鬱結用四七湯怒動肝火用小柴胡湯肝脾血虛用四物湯脾肺氣虛用四君子湯中氣虛弱用補中益氣湯氣血俱虛用八珍湯醫案一婦人每怒心腹作痛久而不愈此肝火傷脾氣也用炒山梔一兩生薑五片煎服而痛止更以二陳加山梔桔梗乃不發陸小村母久患心腹疼痛每作必胸膈滿嘔吐手足俱冷面赤唇麻咽乾舌燥寒熱不時月餘竟夕不安其脈洪大衆以痰火治之屢止屢作逮乙巳春發頻而甚仍用前藥反劇此寒涼損真之故內真寒而外假熱也且脈洪弦而有怪狀乃脾氣虧損肝木乘之而然當溫補胃氣遂用補中益氣湯加半夏茯苓吳茱萸木香一服熟寐徹曉洪脈頓斂怪脈頓除諸證釋然婦人小腹疼痛因氣寒血結用威靈仙散氣滯血凝用當歸散肝經血虛用四物湯加參術柴胡芍藥肝脾虛寒用六君子湯加柴胡肉桂若兼嘔吐加木香四肢逆冷再加炮薑婦人兩脅脹痛按東垣先生云胸脅作痛口苦舌乾寒熱往來發嘔發吐四肢滿悶淋溲便難腹中急痛此肝木之妄行也竊謂前證若暴怒傷血用小柴胡芎歸山梔氣虛用四物參朮柴胡山梔若久怒傷氣用六君子芎歸山梔若氣血俱傷用六味地黃丸若經行腹痛寒熱晡熱或月經不調發熱痰咳少食嗜臥體痛用八珍柴胡丹皮若脅脹發熱口渴唾痰或小便淋瀝頸項結核或盜汗便血諸血失音用六味丸若兩脅作脹視物不明筋急面色青小腹痛或小便不調用補肝散若概用香燥之劑反傷清和之氣則血無所生諸證作焉醫案一婦人性急吐血發熱兩脅脹痛日晡益甚此怒氣傷肝氣血俱虛也朝用逍遙散倍加山梔黃柏貝母桔梗麥冬夕以歸脾湯送地黃丸而愈一孀婦內熱晡熱肢體痠麻不時吐痰或用清氣化痰藥喉間不利白帶腹脹用行氣散血藥胸膈不利肢體時麻此鬱怒傷肝脾而藥益甚也余則朝用歸脾湯以解脾郁生脾氣夕用加味逍遙散以清肝火生肝血百餘劑而愈後因怒飲食日少肢體時麻此乃肝木侮土用補中益氣加山梔白茯苓半夏而愈又飲食失調兼有怒氣肢體麻甚月經如注脈浮洪而數此脾受肝傷不能統血而致崩肝氣虧損陰血而脈大繼用六君子加芎歸炮薑而血崩止又用補中益氣加炮薑茯苓半夏而元氣復更用歸脾湯逍遙散調理而安婦人心腹脹滿由心脾虛損邪氣乘之若脾胃虛痞用六君子湯脾胃虛寒者用人參理中湯鬱結氣滯者用歸脾湯肝侮脾土用六君子柴胡芍藥脾氣壅滯用平胃散肺氣壅滯用紫蘇飲宿食壅滯用養胃湯脾血虛痞用四物參術以上六證互相參用醫案一婦人胸膈不利飲食少思腹脹吞酸或用疏利之藥反致中滿不食余以為脾土虛而肝木勝用補中益氣加砂仁香附煨薑又以六君子加芎歸桔梗而愈吳江史元年母久病之後遇事拂意忽胸腹脹滿面目微腫兩腿重滯氣逆上升言語喘促所服皆清氣之劑不效余曰此脾肺虛寒也先用六君子一劑病勢頓減後用補中益氣加茯苓半夏乾薑二劑形體頓安後以七情失調夜間腹脹乃以十全大補加木香治之而痊治心腹脹滿余嘗獨用厚朴薑汁炒每服五錢薑七片水煎溫服間服沉香降氣湯得效此病氣元氣壅實之治法也小便出血熱入血室證薛立齋曰婦人小便尿血或因膏粱炙爆或因醉飽入房或因飲食勞役或因六淫七情以致元氣虧損不能統攝歸原若因怒動肝火者用加味逍遙散調送發灰若膏粱積食者用清胃散加槐花甘草房勞所傷者用六君子加柴胡升麻凡久而虧損元氣者用補中益氣為主鬱結傷脾者用歸脾為主醫案一婦人尿血因怒氣寒熱或頭痛或脅脹用加味逍遙諸證稍愈惟頭痛此陽氣虛用補中益氣加蔓荊子而痊後鬱怒小腹癘痛次日尿血熱甚仍用前藥加龍膽草並歸脾湯將愈因飲食所傷血仍作徹夜不寐心忡不寧此脾血尚虛用前湯而安一婦人尿血久用寒涼止血藥面色萎黃肢體倦怠飲食不甘晡熱作渴三年矣此前藥復傷脾胃元氣下陷不能攝血也蓋病久鬱結傷脾用補中益氣湯以補元氣用歸脾湯以解脾郁使血歸經更用加味逍遙散以調養肝血一月諸證漸愈三月而痊婦人傷寒或勞役或怒氣發熱適遇經行以致熱入血室或血不行或血不止令人晝則明瞭安靜夜則譫語如見鬼狀用小柴胡加生地血虛者用四物加生地柴胡切不可犯胃氣若病既愈而血未止或熱未已元氣素弱用補中益氣脾氣素郁用歸脾血氣素弱用十全大補醫案一婦人經行感冒日間安靜至夜譫語用小柴胡加生地治之頓安但內熱頭暈用補中益氣加蔓荊子而愈後因惱怒寒熱譫語胸脅脹痛小便頻數月經先期此是肝火血熱妄行用加味逍遙散加生地而愈一婦人因怒寒熱頭痛譫語日晡至夜益甚而經暴至蓋肝藏血此因怒動肝火而血妄行用加味逍遙散加生地治之神思頓清但食少體倦月經未已蓋脾統血此脾氣虛不能攝用補中益氣治之月經漸止一婦人懷抱素郁感冒經行譫語服發散之劑不應用寒涼降火前症益甚更加月經不止肚腹作痛嘔吐不食痰涎自出此脾胃虛寒用香砂六君子脾胃漸健諸症漸退又用歸脾湯而痊愈師尼寡婦室女寒熱醫案一婦人因夫經商久不歸發寒熱月經旬日方止服降火涼血反潮熱內熱自汗盜汗月經頻數余曰熱汗氣血虛也經頻肝脾虛也用歸脾湯六味丸而愈一放出宮人年逾三十兩胯作痛肉色不變大小便中作痛如淋登廁尤痛此瘀血漬入隧道為患乃男女失合之症也難治後潰不斂又患瘰癧而歿此婦為吾鄉湯氏妾湯為商常在外可見此婦在內久懷憂鬱及出外又不能如願是以致生此症愈見瘰癧流注乃七情氣血損傷不可用攻伐皎然矣按精血篇云女人天癸既至逾十年無男子合則不調未逾十年思男子合亦不調不調則舊血不出新血誤行或潰而入骨或變而為腫或雖合而難子合多則瀝枯虛人産乳衆則血枯殺人觀其精血思過半矣一室女年十七癧久不愈天癸未通發熱咳嗽飲食少思或欲用通經丸余曰此症潮熱經候不調者不治所喜脈不澀且不潮熱尚可治但養氣血益津液其經自行惑於速效仍用之余曰非其治也此乃慓悍之劑大助陽火陰血得之則妄行脾胃得之則愈虛經果通而不止飲食愈少更加潮熱遂致不救歷節痛風證薛立齋曰歷節痛或因飲食起居失節或因七情六淫失宜以致脾胃虧損腠理不密外邪所侵或為肝火內動肝血耗損或為肢體疼痛或為肢節難伸或為卒然掣痛或為走痛無常或內熱晡熱自汗盜汗或經候不調飲食不甘其治法屬風邪者小續命湯走注疼痛者漏蘆散骨節疼痛者四生丸濕熱痛者消燥湯兼痰佐以二陳肝火者加味逍遙加羌活川芎脾郁者加味歸脾加羌活川芎血虛者四物加羌活川芎氣虛者四君加羌活川芎氣血俱虛者八珍加羌活川芎月經先期而痛者加味逍遙散為主月經過期而痛者補中益氣為主大抵痛而不敢按者屬病氣元氣俱實也手按而痛緩者病氣元氣俱虛也若勞役而作痛者元氣虛也飲食失宜而作痛者脾胃虛也惱怒而作痛者肝火也經行而作痛者血虛也凡此皆固元氣為主而佐以治病之藥醫案一婦人自汗盜汗發熱晡熱體倦少食月經不調吐痰甚多二年矣遍身作痛天陰風雨益甚用小續命湯而痛止用補中益氣加味歸脾二湯三十餘劑而愈自汗等症皆鬱結傷損脾氣不能輸養諸臟所致故用前二湯專主脾胃若用寒涼降火理氣化痰復傷生氣多致不起一婦人因怒月經去多發熱作渴左目緊小頭項動搖四肢抽搐遍身疼痛此怒動肝火肝血虛而內生風用加味逍遙散加鉤藤數劑諸證漸愈又用八珍湯調理而安一婦人歷節作痛發熱作渴飲食少思月經過期諸藥不應脈洪大按之微細用附子八物四劑而痛止用加味逍遙散而元氣復六味丸而月經調一婦人體肥胖素內熱月經先期患痛風下身微腫痛甚小便頻數身重脈緩症屬風濕而血虛有熱先用羌活勝濕湯四劑腫痛漸愈用清燥湯數劑小便漸清用加味逍遙十餘劑內熱漸愈為飲食停滯發熱仍痛面目浮腫用六君子加升柴而愈又因怒氣小腹痞悶寒熱嘔吐此木侮脾土用前藥加山梔木香而安惟小腹下墜似欲去後此脾氣下陷用補中益氣而愈後因勞役怒氣作嘔吐痰遍身腫痛月經忽來寒熱用六君加柴胡山梔以扶元氣清肝火腫痛嘔吐悉退用補中益氣以升陽氣健營氣月經寒熱悉瘥流注證薛立齋曰婦人流注或因憂思鬱怒虧損肝脾或因産後勞役復傷氣血以致營氣不從逆於肉內或因腠理不密外邪乘之或濕痰流注或撲跌血滯或産後惡露蓋氣流而注血注而凝或生於四肢關節或流於胸腹腰臀或結塊或漫腫皆屬虛損急用蔥尉及益氣養營湯則未成自消已成自潰若久而腫起作痛肢體倦怠病氣有餘形氣不足尚可治若漫腫微痛屬形氣病氣俱不足最難治不作膿或不潰氣血虛也用八珍湯憎寒畏寒陽氣虛也十全大補湯晡熱內熱陰血虛也四物加參術作嘔欲嘔胃氣虛也六君加炮薑食少體倦脾氣虛也補中益氣加伏苓半夏四肢逆冷小便頻數命門火衰也八味丸小便頻數痰盛作渴腎水虧也六味丸月經過期多日不止肝脾虛也八珍湯加柴胡壯丹皮凡潰而氣血虛弱不斂者更用十全大補湯煎膏外補之久潰而寒邪凝滯不斂者用豆豉餅祛散之其潰而內有膿管不斂者用針頭散腐化之自愈若不補氣血不節飲食不慎起居不戒七情或用寒涼克伐俱不治醫案一婦人左臂患之年許不潰堅硬不痛肉色不變脈弱少食月經過期日晡發熱勞怒則痛遂與參耆歸朮芎芍熟地貝母遠志香附桔梗丹皮甘草百餘帖而消一婦人因怒脅下腫痛胸膈不利脈沉滯以方脈流氣飲數劑少愈以小柴胡對二陳加青皮桔梗貝母數劑頓退更以小柴胡湯對四物二十餘劑而痊一婦人潰後發熱豫以為虛彼不信乃服敗毒藥果發大熱竟致不救夫潰瘍雖有表證發熱宜以托裡為主佐以表散之劑何況瘰癧流注乎若氣血充實經絡通暢決無患者此證之因皆由氣血素虧或七情所傷經絡鬱結或腠理不密六淫外侵隧道壅塞若不察其所因辨其虛實鮮不誤人瘰癧證薛立齋曰婦人瘰癧或因胎産血崩虧損腎肝或因憂思鬱怒傷損肝脾或因恚怒風熱肝膽血燥或因水涸血虛筋攣則纍纍然如貫珠多生於耳前後項側胸脅間若寒熱腫痛乃肝經氣動而為病用柴胡梔子散以清肝火為主而佐以逍遙以養肝血若寒熱既止而核不消是乃肝經之血亦病用加味四物湯以養肝血為主而佐以柴胡梔子散以清肝火若初生如豆粒附著於筋肉色不變內熱口乾精神倦怠久不消潰乃肝脾虧損用逍遙散歸脾湯六味丸健脾土培肝木切不可輕用散堅追毒之劑外臺密要云肝腎虛熱則生癧矣病機云瘰癧不繫膏粱丹毒因虛勞氣鬱所致補形氣調經脈其瘡當自消散誤下之先犯病禁經禁若久潰泳浮大邪火盛也面色㿠白金剋木也皆不治醫案一婦人久病而不愈或以為木旺之症用散腫潰堅湯伐之腫硬益甚余以為肝經氣血虧損當滋化源用六味地黃丸補中益氣湯至春而愈此證若肝經風火暴病元氣無虧宜用前湯若風木旺而自病宜用瀉青丸虛者用地黃丸若水不能生木亦用此丸若金來剋木宜補脾土生腎水大凡風木之病但壯脾土則木自不能克矣若行伐木則脾胃先傷而木反來剋土矣一婦人潰後發熱煩躁作渴脈大而虛以當歸補血湯六劑而寒熱退又以聖愈湯數劑而痊愈更以八珍加貝母遠志三十餘劑而斂一婦人項結核寒熱頭痛脅乳脹痛內熱口苦小便頻數證屬肝火血虛用四物加柴胡山梔膽草而愈又用加味逍遙而安一婦人瘰癧後遍身而癢脈大按而虛以十全大補湯加香附治之而愈大凡潰後午前癢作氣虛午後癢作血虛若作風治之必死一婦人項核腫痛察其氣血俱實先以必效散一服下之更以益氣養營湯補之三十餘劑而消常治此症若必欲出膿但虛弱者先用前湯待其氣血稍充乃用必效散去其毒仍用補藥無不效未成膿者灸肘尖調經解鬱及膈蒜灸多自消有膿即針之若氣血復而核不消卻服散堅之劑月許不應氣血不損須用必效散其毒一下即多服益氣舉營湯如不效亦灸肘尖如瘡口不斂者更用豆豉餅琥珀膏若氣血俱虛或不慎飲食七情者不治女科三胎前諸證薛立齋曰妊娠若元氣不實發熱倦怠或胎動不安用當歸散因氣惱加枳殼胸膈痞悶再加蘇梗或作痛加柴胡若飲食不甘或欲嘔吐用六君加紫蘇枳殼若惡阻嘔逆頭暈體倦用參橘散未應用六君子湯若惡阻嘔吐不食煩悶亦用參橘散之類若頓僕胎動腹痛下血用膠艾湯未應用八珍湯加膠艾若頓僕毒藥腰痛短氣用阿膠散未應煎送知母丸若頓僕胎傷下血腹疼用佛手散未應用八珍送知母丸若心驚膽怯煩悶不安名子煩用竹葉湯未應血虛佐以四物氣虛佐以四君若下血不止名胎漏血虛用二黃散血去多用八珍湯未應用補中益氣湯若因事而動下血用枳殼湯加生熟地黃未應或作痛更加當歸血不止八珍湯加膠艾若不時作痛小腹重墜名胎痛用地黃當歸湯未應加參術陳皮或因脾氣虛用四君加歸地中氣虛用補中益氣湯若面目虛浮肢體如水氣名子腫用全生白朮散未應用六君子湯下部腫甚用補中益氣倍加茯苓或因飲食失宜吐嘔泄瀉此是脾胃虧損用六君子湯若足指發腫漸至腿膝喘悶不安或足指縫出水名水氣用天仙藤散脾胃虛弱兼以四君子未應用補中益氣湯兼以逍遙散若胎氣上攻心腹脹滿作痛名子懸用紫蘇飲飲食不甘兼以四君子湯內熱晡熱兼逍遙散若小便澀少或成淋瀝名子淋用安營散不應兼八珍湯腿足轉筋而小便不利急用八味丸緩則不救若項強筋攣語澀痰盛名子癇用羚羊角散或飲食停滯腹脹嘔吐此是脾胃虛弱而不能消化用六君子湯不應用平胃散加茯苓或胎作脹或腹作痛此是脾氣虛而不能承載用安胎飲加升麻白朮不應用補中益氣或臍腹作脹或小便淋閉此是脾胃氣虛胎壓尿胞用四物加二陳參術空心服後探吐藥出氣定又吐數次必安或因勞役所傷或食煎炒小便帶血此是血得熱而流於脬中宜清膀胱用逍遙散或遺尿不禁或為頻數此是肝火血熱用加味逍遙散若胸滿腹脹小便不通遍身浮腫名胎水不利用鯉魚湯脾胃虛佐以四君子病名同而形症異形症異而病名同聊見本方醫案一妊娠六月每怒氣便見血甚至寒熱頭痛脅脹腹痛作嘔少食余謂寒熱頭痛肝火上衝也脅脹腹痛肝氣不行也作嘔少食肝侮脾胃也小便見血肝火血熱也用小柴胡加芍藥炒黑山梔茯苓白朮而愈一妊娠六月體倦食少勞役見血用六君子加當歸熟地升麻柴胡而愈一妊娠三月飲食後因怒患瘧連吐三次用藿香正氣散二劑隨用安胎飲一劑而愈後因怒氣痰盛狂言發熱胸脹手揉少得此肝脾氣滯用加味逍遙散加川芎二劑頓退四劑而安一妊娠飲食後惱怒寒熱嘔吐頭痛惡寒胸脅脹痛大便不實而色青小便頻數而有血余曰當清肝健脾為主不信乃主安胎止血益甚問余曰何也曰大便不實而色青此是飲食所傷而兼木侮小便頻數而有血是肝火血流於胞而兼挺痿遂用六君子加枳殼紫蘇山梔二劑脾胃頓醒又用加味逍遙散加紫蘇枳殼二劑小便頓清更節飲食調理而安一妊娠每至五月肢體困倦飲食無味先兩足腫漸至遍身後又頭面此是脾肺氣虛朝用補中益氣夕用六君子加蘇梗而安一妊娠因怒吐血塊四月不止兩脅脹痛小便淋澀此怒而血蓄於上部火炎而隨出也脅脹腹痛小便淋澀肝經本病也用小柴胡加四物四劑而止卻用六君子安胎飲調理而安惡阻若中脘停痰用二陳加枳殼若飲食停滯用六君子加枳殼若脾胃虛弱用異功散若胃氣不足用人參橘皮湯兼氣惱加枳殼胸脅脹悶再加蘇梗脅痛再加柴胡若飲食少思用六君子加紫蘇枳殼頭暈體倦用六君子湯若脾胃虛弱嘔吐不食用半夏茯苓湯蓋半夏乃健脾氣化痰滯之主藥也脾胃虛弱而嘔吐或痰涎壅滯飲食少思胎不安必用茯苓半夏倍加白朮陳皮砂仁能安胎氣健脾胃豫常用之驗矣胎動不安胎氣鬱滯者用紫蘇飲脾氣虛弱者用六君子湯加蘇殼鬱結傷脾歸脾湯加柴梔鬱怒傷肝脾者四七湯加芎歸怒動肝火者加味小柴胡湯若胎已死急用平胃散加朴硝腐化之漏胎下血若因風熱用防風黃芩丸若因血熱用加味逍遙散若因血虛用二黃散若因血去太多用八珍湯未應補中益氣湯若因肝火用柴胡山梔散若因脾火用加味歸脾湯若因事下血作痛用八珍湯加阿膠熟艾若因脾胃虛弱用補中益氣湯加五味子若因脾胃虛陷用前湯倍用升麻柴胡若潮晡熱內熱用逍遙散咳嗽若秋間風邪傷肺用人參敗毒散春間風邪傷肺用參蘇飲若脾肺氣虛用六君子芎歸桔梗若血虛四物桑皮杏仁桔梗腎火上炎用六味丸加五味子服脾胃氣虛風寒所傷用補中益氣加桑皮杏仁桔梗蓋肺屬辛金生於己土嗽久不愈者多因脾土不能生肺氣腠理不密以致外邪復感或以肺氣虛不能生水以致陰火上炎而然治法當壯土金生腎水為善瘧因脾胃虛弱飲食停滯或外邪所感鬱怒傷脾或暑邪所伏審系飲食停滯用六君子加桔梗蒼朮藿香外邪多而飲食少用藿香正氣散外邪少而飲食多用人參養胃湯勞傷元氣用補中益氣湯若鬱怒所傷用小柴胡兼歸脾湯若木侮土而不愈用六君子為主佐以安胎藥仍參三陰三陽而治之小産重於大産蓋大産如栗熟自脫小産如生採破其皮殼斷其根蒂豈不重於大産治法宜補形氣生新血去淤血若未足月痛而欲産芎歸補中湯倍知母止之若産而血不止人參黃耆湯補之若産而心腹痛當歸川芎湯主之胎氣弱而小産者八珍湯固之若出血過多而發熱聖愈湯汗不止急用獨參湯發熱煩躁肉瞤筋惕八珍湯大渴面赤脈洪而虛當歸補血湯身熱面赤脈沉而微四君薑附若陽氣自旺者補中益氣湯陽氣陷於陰中者四物二連湯重陽無陰者四物湯無火者八味丸無水者六味丸一妊娠停食腹滿嘔吐吞酸作瀉不食余以為飲食停滯兼肝木傷脾土用六君子湯以健脾胃加蒼朮厚朴以消飲食吳茱萸黃連以清肝火諸症悉愈又以六君子加砂仁調而脾土乃安一妊娠胸腹膨脹吐痰不食此脾胃虛而飲食為痰用半夏茯苓湯漸愈又用六君子加枳殼蘇梗而飲食如常後因恚怒脅脹不食吐痰噁心用半夏茯苓湯加柴胡山梔而愈一妊婦內熱晡熱或兼寒熱飲食少思其胎或下墜或上攻此肝經血虛而火動耳先用加味逍遙散數劑次用六君子加柴胡枳殼各數劑而安一妊婦下血服涼血之劑下血益甚食少體倦此脾氣虛而不能攝血余用補中益氣湯而愈後因怒而寒熱其血仍下此肝火旺而血沸騰用加味逍遙散血止用補中益氣湯而安一妊婦每因恚怒其胎上逼左關脈弦洪乃肝火內動用小柴胡加茯苓枳殼山梔而愈但體倦不食用六君子調養脾土加柴胡枳殼調和肝氣而瘥一妊婦下血發熱作渴食少體倦屬脾氣虛而肝火所侮用四君子加柴胡山梔血止因怒復作用六君加柴胡山梔升麻而安一妊婦胎上逼胸滿噯氣飲食少思此脾氣鬱滯用紫蘇飲頓安又用四君子加枳殼柴胡山梔而瘥一妊婦因怒胸膈不利飲食少思服消導順氣之劑脾胃愈弱飲食愈少大便不實且無度久而便黃水或帶白視其面色黃中隱白余曰黃色脾虛也白色肺虛也朝以補中益氣湯升補胃氣夕以六君子培補脾氣而愈一妊婦心腹作痛胸脅作脹吞酸不食此肝脾氣滯用二陳山楂山梔青皮木香而愈又因怒仍痛胎動不食面色青黃肝脈弦緊脾脈弦長此肝乘其土用六君子湯加升麻柴胡木香而安一妊婦心痛煩熱作渴用白朮散即愈後因停食其痛仍作胸腹膨脹按之則痛此因飲食停滯用人參養胃湯按之不痛乃脾胃受傷以六君子補之而愈一妊婦小腹作痛其胎不安氣攻左右或時逆上小便不利用小柴胡加青皮山梔清肝火而愈後因怒小腹脹滿小便不利水道重墜胎仍不安此亦肝火熾盛所致用龍膽瀉肝湯一劑諸證頓愈乃以四君子加升柴以培脾土而安一妊婦飲食停滯心腹脹滿或用人參養胃湯加青皮山楂枳殼其脹益甚其胎上攻噁心不食右關脈浮大按之則弦此脾土不足肝木所侮余用六君子加柴胡升麻而愈後小腹痞悶用補中益氣升舉脾氣乃瘥吳江庠史萬湖子室年二十餘疫疾墮胎時咳服清肺解表之藥喘急不寐豫以為脾土虛不能生肺金藥復損而益甚也先與補中益氣湯加茯苓半夏五味炮薑四劑漸愈後往視之用八珍加五味及十全大補而愈一妊婦胎六月體倦懶食面黃晡熱而胎不長因勞欲墜此脾氣不足也用八珍湯倍加參朮茯苓三十餘劑脾胃漸健而胎安且長矣一妊婦因怒寒熱往來內熱晡熱脅痛嘔吐胎至八月而不長此因肝脾鬱怒所致用六君子加柴胡山梔枳殼紫蘇桔梗痛愈而胎亦長矣一妊婦墮胎昏憒不時吐痰自用養血化痰之劑昏憒不省自汗發搐痰涎湧出彼以為中風欲用祛風化痰余曰此屬脾氣虛寒所致用十全大補加炮薑二十餘劑而愈一妊婦八月胎欲墮如産臥久少安日晡益甚此氣血虛弱朝用補中益氣加茯苓半夏隨愈更以八珍湯調理而安一妊婦嗽則便自出此肺氣不足腎氣虧損不能司攝用補中益氣以培土金六味丸加五味以生腎氣而愈一妊婦咳嗽其痰上湧日五六碗許諸藥不應余以為此水泛為痰用六味丸及四君子湯各一劑稍愈數劑而安一妊婦因怒吐血兩脅脹痛小便淋漓此怒而血蓄於上隨火出也用小柴胡合四物四劑而血止用六君子安胎飲調理而安一妊婦煩熱吐痰噁心頭暈惡食此脾虛風痰為患用半夏白朮天麻湯以補元氣祛風邪漸愈惟頭暈未痊乃用補中益氣湯加蔓荊子以升補陽氣而愈一妊婦出汗口噤腰背反張時作時止此怒動肝火也用加味逍遙散漸愈又用鉤膝散而止更以四君加鉤藤山梔柴胡而安一妊婦四肢不能伸服祛風燥血之劑遺尿痰甚四肢抽搐余謂肝火血燥用八珍湯加炒黑黃芩為主佐以鉤藤湯而安後因怒前證復作小便下血寒熱少寐飲食少思用鉤藤散加山梔柴胡而血止用加味逍遙散寒熱退而得寐用六君子湯加芍藥鉤藤飲食進而漸愈一婦人經閉八月肚腹漸大面色或青或黃用治胎之藥不應余曰面青脈澀寒熱往來肝經血病也面黃腹大少食體倦脾經血病此鬱怒傷脾肝之證非胎也不信仍用治胎之類不驗余用加味歸脾逍遙二藥各二十餘劑諸證稍愈彼欲速效別服通經丸一服下血昏憒自汗惡寒手足俱冷嘔吐不食余用人參炮薑二劑漸愈又用十全大補湯五十餘劑而安一妊婦患瘧已愈但寒熱少食頭痛晡熱內熱此脾虛血弱也用補中益氣加蔓荊子頭痛頓止又用六君子加芎歸飲食頓進再用逍遙加參術而寒熱愈一妊婦霍亂已止但不進飲食口內味酸泛行消導寬中余曰此胃氣傷而虛熱也當用四君子湯彼不信乃服人參養胃湯嘔吐酸水其胎不安是胎復傷也仍與四君子湯俾煎熟令患者先嗅藥氣不作嘔則呷少許恐復嘔則胎為鉤動也如是旬余而愈邊太常側室妊娠泄瀉自用枳實黃連之類腹悶吐痰發熱惡寒飲食到口即欲作嘔強匙許即吞酸不快欲用祛痰理氣余曰此因脾胃傷而痰滯中脘若治痰氣復傷脾胃矣遂以參朮炮薑為末丸如黍粒不時含咽三五丸漸加二三十丸三日後進六君子而尋愈地官胡成之內妊娠久痢自用消導理氣之劑腹內重墜胎氣不安又用阿膠艾葉之類不應余曰腹重墜下元氣虛也胎動不安內熱盛也遂用補中益氣而安又用六君子湯痊愈司徒李杏岡仲子室孕五月小便不利諸藥不應余曰非八味不能救不信別用分利之藥肚腹腫脹以致不起一妊婦飲食後因惱怒寒熱嘔吐頭痛惡寒胸腹脹痛大便不實其面青色小便頻數時或有血服安胎止血之劑益甚余曰寒熱嘔吐而腹脹此肝木克脾土而元氣傷也大便不實而面青此飲食傷脾兼肝侮土也小便頻數而有血此肝熱傳胞而兼挺痿也用六君子加枳殼紫蘇山梔二劑脾胃頓醒又用加味逍遙散加紫蘇枳殼二劑小便頓清後節飲食調理而安一妊婦因怒尿血內熱作渴寒熱往來胸乳間作脹飲食少思肝脈弦弱此肝經血虛而熱也用加味逍遙散八味地黃丸兼服漸愈又用八珍湯加柴胡山梔丹皮而愈一妊娠每胎至五月肢體倦怠飲食無味先每足腫漸至遍身後及頭面此是脾肺氣虛朝用補中益氣夕用六君子加蘇梗而愈地官李孟卿娶三十五歲女為繼室妊娠慮其難産索加味歸芎湯四劑備用果産門不開止服一劑頓然分娩女科四産後諸證妊娠欲産之時但覺腹內轉動即當正身仰臥待兒轉身向下時作痛試捏産母手中指中節或本節跳動方與臨盆即産矣若初覺不仰臥以待轉胞或未産而水頻下此胞衣已破血水先干必有逆生難産之患若橫生者兒先露手臂令母正臥以手徐推兒臂下體令其正直復以中指摩其肩勿令臍帶攀系即生逆生者兒先露足令母正臥以手按推其足仍推兒轉正即生偏生者兒頭偏在一邊亦照前法徐正其頭即生或兒後頭骨偏在穀道邊徐推近上即生礙産者兒頭雖正但不能下蓋因胎轉臍帶攀肩所致用中指按兒兩肩理脫臍帶即生坐産者兒將欲生其母疲倦久坐椅褥抵其生路急用巾帶高懸令母以手攀之輕輕屈足良久兒順即生盤腸生者臨産母腸先出此難以收上以萆麻子四十九粒研爛塗産母頭項待腸收上急洗去設為風吹乾不能收者以磨刀水少許溫熱拭潤其腸再用磁石煎湯服之即收上磁石須陰陽家用有驗者俗以水噀母面使驚而腸亦收之蓋驚則氣散恐反致他證戒之若胞衣破而不得分娩者用保生無憂散以固其血自然生息如血已耗損用八珍湯料一斤益母草半斤水數碗煎熟不時飲之亦有得生者大抵難産多患於安逸富貴之家治法雖云胎前清氣産後補血不可專執若脾胃不實氣血不充宜預調補如因難産或大寒時急以大油紙捻徐徐燒斷其臍帶雖兒已死令暖氣入腹多得復生切不宜用刀斷之子死腹中多因驚動太早或觸犯禁忌或抱腰太重或胞衣先破血水先盡而胎乾涸故耳其候産母唇舌皆黑者子母俱死若舌黑或脹悶甚者其子已死矣先以平胃散一兩酒水各半煎卻投朴硝半兩服或用硝一兩以童便調下亦妙胎衣不出有因惡露入衣脹而不能出有因元氣虧損而不能送出其惡露流入衣中者脹痛用奪命丹或失笑散以消淤血緩則不救其元氣不能送者腹中不脹痛用保生無憂散一劑即時而産一婦人分娩最易至四十妊娠下血甚多産門不開亦與前湯一劑又用羌憂散斤許一劑煎熱飲之以助其血而産一産婦陰門不閉發熱惡寒用十全大補加五味子數劑而寒熱悉退又用補中益氣加五味子數劑而斂若初産腫脹或焮痛而不閉者當用加味逍遙散若腫既消而不閉者當用補中益氣湯切忌寒涼之劑一産婦失治腫潰不已形體消瘦飲食少思朝寒暮熱自汗盜汗半年矣用補中益氣加茯苓半夏以健脾胃膿水漸少飲食漸進用歸脾湯以解脾郁共五十餘劑元氣漸復而瘡亦愈矣産後腹痛産後小腹作痛俗名兒枕用失笑散行散之若惡露已去而仍痛用四神散調補之若不應用八珍湯若痛而噁心或欲作嘔用六君子湯若痛而泄瀉用六君子送四神丸若泄瀉痛而或後重用補中益氣送四神丸若胸膈飽脹或惡食吐酸或腹痛手不可按此是飲食所致當用二陳加白朮山楂以消導若食既消而仍痛或按之不痛或更加頭疼煩熱作渴虛寒欲嘔等證此是中氣被傷宜補脾胃為主若發熱腹痛按之痛甚不惡食不吞酸此是淤血停滯用失笑散以消之若止是發熱頭痛或兼腹痛按之卻不痛此是血虛用四物加炮薑參術以補之病機要云胎産之病從厥陰經論之無犯胃氣及上二焦為之三禁不可汗不可下不可利小便發汗者同傷寒下早之症利大便則脈數而已動於脾利小便則內亡津液胃中枯燥製藥之法能不犯三禁則營衛自和而寒熱止矣如發渴用白虎氣弱用黃耆血刺痛則用當歸腹中痛則用芍藥宜詳察脈證而用之凡溪先生云産後當大補氣血為先雖有雜證從未治之一切病多是血虛皆不可發表醫案一産婦腹痛發熱氣口脈大余以為飲食停滯不信乃破血補虛反寒熱頭痛嘔吐涎沫又用降火化痰理氣四肢逆冷泄瀉下墜始信謂余曰何也余曰此脾胃虛之變證也法當溫補遂用六君加炮薑二錢肉桂木香一錢四劑諸證悉退再用補中益氣之劑元氣悉復一婦人産後腹痛後重去痢無度形體倦怠飲食不甘懷抱久郁患繭唇寐而盜汗如雨竟夜不寐神思消爍余曰氣血虛而有熱用當歸六黃湯內黃芩連柏炒黑一劑汗頓止再劑全止乃用歸脾湯八珍散兼服元氣漸復而愈一産婦小腹疼痛小便不利用薏苡仁湯二劑痛止更以四物加桃仁紅花下淤血而愈大抵此證皆因營衛不調或淤血停滯所致若脈洪數已有膿但數微有膿脈遲緊乃淤血下之即愈若腹脹大轉側作水聲或膿從臍出或從大便出宜用蠟礬丸太乙膏及托裡藥凡淤血停滯宜急治之緩則腐化為膿最難治療若流注關節即患骨疽失治多為敗證産後血暈並失血産後元氣虧損惡露乘虛上攻眼花頭暈或心下滿悶神昏口噤或痰壅盛者急用失笑散主之若血下多而暈或神昏煩亂者大劑芎歸湯補之或藝臺子散或童子小便有痰加二陳湯若因勞心力而致者宜補中益氣加香附若因氣血虛極不省人事用清魂散繼以芎歸湯及大補氣血之劑凡産後口眼喎斜等證當大補氣血為主而兼以治痰若脾胃虛而不能固者用六君子湯醫案一産婦月餘矣因怒兩脅脹痛忽吐血甚多發熱惡寒胸腹脹滿用八珍加柴胡丹皮炮薑而安卻用十全大補仍加炮薑而愈前症因脾肺氣血虧損而胸腹虛痞雖投大補若非薑桂辛溫助其脾肺以行藥勢亦無以施其功而反助其脹耳一産婦兩手麻木服愈風丹天麻丸遍身皆麻神思倦怠晡熱作渴自汗盜汗此氣血俱虛也用十全大補加炮薑數劑諸證悉退卻去炮薑又數劑而愈但內熱此血虛也用逍遙散而痊産後發痙因去血過多元氣虧極或外邪相搏其形牙關緊急四肢徑強或腰背反張肢體抽搐若有汗而不惡寒者曰柔痙無汗而惡寒者曰剛痙然産後患之實由亡血過多筋無所養而致故傷寒汗下過多與潰瘍膿血大泄多患之乃敗證也若大補氣血多保無虞若攻風邪必死醫案一産婦牙關緊急腰背反張四肢抽搐兩目連札余以為去血過多元氣虧損陰火熾盛用十全大補加炮薑一劑而蘇又數劑而安余在吳江時定更後聞喧嚷云某家婦忽僕牙關緊急已死矣詢云新産婦余意其勞傷氣血而發痙也急用十全大補加附子煎滾令人抬正其身一人以手夾正其面卻挖開其口將藥灌之不咽藥已冷反側其面出之仍正其面復灌以熱藥又冷又灌如此五次方咽下隨灌以熱藥遂蘇大凡産後或病久元氣虛弱見病百端皆因脾胃虧損內真寒而外假熱但用六君子或補中益氣加炮薑溫補脾氣諸症悉退若四肢畏冷屬陽氣虛寒急加附子病因多端當臨證制宜庶無誤矣醫案一産婦糞後下血諸藥不應飲食少思肢體倦怠此中氣虛弱用補中益氣加茱萸炒黃連五分四劑頓止但怔忡少寐寢汗未止用歸脾湯治之而愈一婦人但怒便血寒熱口苦或胸脅脹痛或小腹痞悶此木乘土倍用六君子加柴胡山梔而愈用補中益氣加味逍遙二藥而不復作一婦人久下血在糞前屬脾胃虛寒元氣下陷用補中益氣加連炒茱萸一錢數劑稍緩乃加生茱萸五分數劑而愈一婦人産後便血口乾飲湯胸脅膨滿小腹悶墜內熱晡熱飲食不甘體倦面黃日晡則赤灑淅惡寒此脾肺氣虛先用六君加炮薑木香諸證漸愈用補中益氣將愈用歸脾湯全愈後飲食失節勞役兼怒氣發熱血崩夜間熱甚譫語不絶此熱入血室用加味柴胡二劑而熱退用補中益氣而血止用逍遙歸脾二方調理而安大便不通案一産婦大便八日不通用通利之藥中脘作痛飲食甚少或云通則不痛痛則不通乃用蜜導之大便不禁厄逆不食余曰此脾腎復傷用六君子加吳茱萸肉果骨脂五味數劑喜其年壯不然多致不起産後寒熱因氣血虛弱或脾胃虧損乃不足之證經云陰虛則發熱陽虛則惡寒若大便不通尤屬氣血虛弱切不可用發表降火藥若寸口脈微名陽氣不足陰氣上入於陽中則惡寒用補中益氣湯尺部脈弱名陰氣不足陽氣下陷於陰中則發熱用六味地黃丸大抵陰不足陽往從之則陽內陷而發熱陽不足陰往從之則陰上入而惡寒此陰陽不歸其分以致寒熱交爭故惡寒而發熱也當用八珍湯若病後四肢發熱或形體倦怠此元氣未復濕熱乘之故耳宜補中益氣湯若肌熱大渴引飲目赤面紅此血虛發熱用當歸補血湯若認為熱則誤矣醫案一婦人産後惡寒發熱用十全大補加炮薑治之而愈但飲食不甘肢體倦怠用補中益氣而安又飲食後犯怒惡寒發熱抽搐咬牙難候其脈視其面色青中隱黃欲按其腹以手護之此肝木侮脾土飲食停滯而作用六君加木香一劑而安一産婦惡寒發熱余欲用八珍加炮薑治之其家知醫以為風寒小柴胡湯余曰寒熱不時乃氣血虛不信仍服一劑汗出不止譫語不絶煩熱作渴肢體抽搐余用十全大補二劑益甚脈洪大重按如無仍以前湯加附子四劑稍緩數劑而安産後咳嗽或因陰血耗損或因肺氣虧損或陰火上炎或風寒所感主治之法若陰血虛者用芍歸熟地參術肺氣傷者用四君芎歸桔梗陰火上炎者六味加參術風寒所感者補中益氣加桔梗紫蘇若淤血入肺發喘急用二味參蘇飲多有得生者若兼口鼻起黑或鼻出血急用前散亦有得生者然而所患悉因胃氣不足蓋胃為五臟之根本人身之根蒂胃氣一虛五臟失所百病生焉但患者多謂腠理不密所致殊不知肺屬辛金生於己土亦因土虛不能生金而腠理不密外邪所感其陰火上炎亦壯土金生腎水以制火為善若徑治其病則誤矣醫案一産婦咳嗽聲重鼻塞流涕此風寒所感用參蘇飲一鍾頓愈六七乃與補中益氣加桔梗茯苓半夏一劑而愈又與六君加黃耆以實其腠理而安一産婦朝吐痰夜發熱兼之無寐用清痰降火藥肌體日瘦飲食日少前證愈甚余曰早間吐痰脾氣虛也夜間發熱肝血虛也晝夜無寐脾血耗也遂用六君子湯加味逍遙散加味歸脾湯以次補調不月而痊一産婦咳嗽痰盛面赤口乾內熱晡熱徹作無時此陰火上炎當補脾腎遂用補中益氣六味地黃丸而愈一産婦咳而腹滿不食涕唾面腫氣逆此病在胃關於肺用異功散而愈産後瘧一産婦患瘧久不愈百病峰起其脈或洪大或微細或弦緊或沉伏難以名狀用六君加炮薑二十餘劑脈證稍得又用參術煎膏佐以歸脾湯百餘劑而瘥産後痢一産婦瀉痢年餘形體骨立內熱晡熱自汗盜汗口舌糜爛日吐痰三碗許脈洪大重按全無此命門火衰脾土虛寒而假熱然痰者乃脾虛不能統攝歸原也用八味丸補火以生土用補中益氣湯兼補肺金而脾胃健一婦人五月患痢日夜無度小腹墜痛發熱惡寒用六君子湯送香連丸二服漸愈仍以前湯送四神丸四服痊愈至七月終怠惰嗜臥四肢不收體重節痛口舌乾燥飲食無味大便不實小便頻數灑淅惡寒悽慘不樂此肺與脾胃虛寒而陽氣不伸也用升陽益胃湯而痊
